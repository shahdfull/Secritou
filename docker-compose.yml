services:
  postgres:
    image: postgres:16-alpine
    container_name: secritou-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secritou
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:v1.22.1-p0
    container_name: secritou-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/secritou
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: secritou-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: secritou-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: secritou-api
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:5432/secritou?schema=public&pgbouncer=true
      CLIENT_ORIGIN: http://localhost:5173
      REDIS_URL: redis://redis:6379
      CACHE_ENABLED: "true"
      JOBS_ENABLED: "true"
      METRICS_ENABLED: "true"
      METRICS_PATH: /metrics
      METRICS_TOKEN: ${METRICS_TOKEN:-change-me-metrics-token}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: secritou-client
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5173:80"

  postgres-backup:
    image: postgres:16-alpine
    container_name: secritou-pg-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secritou
      RETENTION_DAYS: "7"
    volumes:
      - postgres-backups:/backups
      - ./observability/scripts/pg-backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c", "chmod +x /backup.sh && while true; do /backup.sh; sleep 86400; done"]

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: secritou-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      server:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: secritou-alertmanager
    restart: unless-stopped
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:11.5.2
    container_name: secritou-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
  postgres-backups:
  redis-data:
  prometheus-data:
  grafana-data:
