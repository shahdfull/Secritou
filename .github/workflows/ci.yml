name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

# NOTE (MED-1): Pin actions to commit SHAs for supply-chain security.
# Run `gh release view --repo actions/checkout` and update the SHA below.
# Dependabot (.github/dependabot.yml) will keep these up-to-date automatically.

jobs:
  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=client
      - run: npm run typecheck --workspace=client
      - run: npm run test:coverage --workspace=client
      - run: npm run build --workspace=client
      - name: Bundle secret scan
        run: |
          if grep -rE "(sk-[A-Za-z0-9]{20,}|AKIA[A-Z0-9]{16}|ghp_[A-Za-z0-9]{36})" client/dist/assets/ 2>/dev/null; then
            echo "::error::Potential secret detected in client bundle"
            exit 1
          fi
          echo "Bundle secret scan passed."

  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: secritou
          POSTGRES_PASSWORD: secritou
          POSTGRES_DB: secritou_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      # SEC-212: connect_timeout/pool_timeout raised from Prisma's 5s/10s defaults — the CI
      # runner has been observed dropping a single Prisma connection attempt (SELECT 1 in each
      # test file's before()) even while Postgres answers real queries successfully throughout
      # the rest of the same run, scattered across ~16/77 test files per run. This hardens the
      # connection itself against a transient runner network blip instead of trying to guarantee
      # the service is "ready" before the process starts (already proven insufficient — the
      # skips happen well after Postgres is in active, successful use elsewhere in the run).
      DATABASE_URL: postgresql://secritou:secritou@localhost:5432/secritou_test?connect_timeout=30&pool_timeout=30
      JWT_ACCESS_SECRET: ci-test-access-secret-min-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-min-32-chars
      CACHE_ENABLED: "true"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Wait for Postgres and Redis to accept real queries
        # SEC-212: the `services:` health-checks (pg_isready / redis-cli ping, run INSIDE each
        # service container) only prove the server process has started accepting TCP connections,
        # not that it can reliably execute a query under runner CPU/network contention at job
        # start — the app-level connectivity checks in server/test/*.test.ts each make exactly one
        # un-retried query and permanently self-skip their whole file on a single transient
        # failure. Looping a real query here, before npm ci/any test file runs, absorbs that
        # transient window instead. Redis is probed with a raw RESP PING over a Node TCP socket
        # rather than `redis-cli`, which is not installed on the runner host (only inside the
        # redis:7-alpine service container) — confirmed by a real CI run where this step's
        # Postgres probe passed on attempt 1 but `redis-cli: command not found` silently looped
        # as a failed PING for all 30 attempts under `2>/dev/null`.
        run: |
          for i in $(seq 1 30); do
            if PGPASSWORD=secritou psql -h localhost -p 5432 -U secritou -d secritou_test -c "SELECT 1" >/dev/null 2>&1; then
              echo "Postgres ready after ${i} attempt(s)."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Postgres did not become queryable after 30 attempts."
              exit 1
            fi
            sleep 2
          done
          for i in $(seq 1 30); do
            if node -e "
              const net = require('node:net');
              const sock = net.createConnection({ host: 'localhost', port: 6379 }, () => sock.write('PING\r\n'));
              sock.setTimeout(2000, () => { sock.destroy(); process.exit(1); });
              sock.on('data', (data) => { process.exit(data.toString().includes('PONG') ? 0 : 1); });
              sock.on('error', () => process.exit(1));
            "; then
              echo "Redis ready after ${i} attempt(s)."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Redis did not respond to PING after 30 attempts."
              exit 1
            fi
            sleep 2
          done
      - run: npm ci
      - run: npm run prisma:validate --workspace=server
      - run: npm run prisma:format:check --workspace=server
      - run: npm run prisma:generate --workspace=server
      - name: Apply migrations
        run: npx prisma migrate deploy
        working-directory: server
      - name: Create shadow database
        run: |
          PGPASSWORD=secritou psql -h localhost -p 5432 -U secritou -d secritou_test \
            -c "CREATE DATABASE secritou_shadow;"
      - name: Schema drift check
        env:
          SHADOW_DATABASE_URL: postgresql://secritou:secritou@localhost:5432/secritou_shadow
        # SEC-193: Invoice.[projectId,invoiceType] and Proposal.leadId are real PARTIAL unique
        # indexes (see comments on those models in schema.prisma) — a form `prisma migrate diff`
        # always reports as "missing" because Prisma's schema DSL cannot express a WHERE clause.
        # Diffed as text and filtered to ignore only these 2 known lines, not `--exit-code`, so
        # any OTHER drift on any other table still fails this step.
        run: |
          cd server
          DIFF_OUTPUT=$(npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --shadow-database-url "${SHADOW_DATABASE_URL}")
          echo "$DIFF_OUTPUT"
          UNEXPECTED=$(echo "$DIFF_OUTPUT" | grep -E '^\[\+\]|^\[-\]|^\[\*\]' | grep -v 'Added unique index on columns (projectId, invoiceType)' | grep -v 'Added unique index on columns (leadId)' | grep -v "Changed the \`Invoice\` table" | grep -v "Changed the \`Proposal\` table" || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Unexpected schema drift beyond the known SEC-193 partial indexes:"
            echo "$UNEXPECTED"
            exit 1
          fi
          echo "Schema drift check passed (only the known SEC-193 partial indexes differ)."
      - run: npm run lint --workspace=server
      - run: npm run typecheck --workspace=server
      - name: Seed database
        # SEC-212 real root cause: this job migrates secritou_test but never seeded it, so the
        # Service table (and other seed-only reference rows) was always empty here — deterministic
        # across every run, not infra flakiness. At least 18 test files' before() hooks throw when
        # a required seed row is missing (e.g. commissionService.test.ts: `const service = await
        # prisma.service.findFirst(); if (!service) throw new Error("no Service seeded")`), which
        # their catch block reports identically to "no reachable database" — self-skipping the
        # whole file and dragging coverage under the threshold. Confirmed by reproducing locally
        # against fresh, healthy Docker containers (zero CI runner involved): same skips, same
        # coverage percentages to the decimal, while files with a bare `SELECT 1` (no seed
        # dependency) passed cleanly with real DB traffic throughout the same run.
        run: npm run prisma:seed --workspace=server
      - run: npm run test:coverage --workspace=server
      - run: npm run build --workspace=server
      - name: Circular dependency check
        run: npx --yes madge --circular --extensions ts src/
        working-directory: server

  restore-smoke-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: secritou
          POSTGRES_PASSWORD: secritou
          POSTGRES_DB: secritou_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://secritou:secritou@localhost:5432/secritou_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate --workspace=server
      - name: Apply migrations
        run: npx prisma migrate deploy
        working-directory: server
      - name: Dump test DB (custom format)
        run: |
          PGPASSWORD=secritou pg_dump \
            --host=localhost --port=5432 --username=secritou \
            --format=custom --no-owner --no-acl \
            secritou_test > /tmp/test.dump
          echo "Dump size: $(du -h /tmp/test.dump | cut -f1)"
      - name: Create restore target DB
        run: |
          PGPASSWORD=secritou psql \
            -h localhost -p 5432 -U secritou -d postgres \
            -c "CREATE DATABASE secritou_restore;"
      - name: Restore dump to new DB
        run: |
          PGPASSWORD=secritou pg_restore \
            --host=localhost --port=5432 --username=secritou \
            --dbname=secritou_restore \
            --no-owner --no-acl --jobs=2 \
            /tmp/test.dump
      - name: Smoke-test restored DB
        run: |
          PGPASSWORD=secritou psql \
            -h localhost -p 5432 -U secritou -d secritou_restore \
            -c "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename;" \
            -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public';"
          echo "Restore smoke-test passed."

  i18n-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/check-i18n.mjs

  contrast-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/check-contrast.mjs

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: secritou
          POSTGRES_PASSWORD: secritou
          POSTGRES_DB: secritou_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      NODE_ENV: development
      # SEC-212: see the identical DATABASE_URL comment in the `server` job.
      DATABASE_URL: postgresql://secritou:secritou@localhost:5432/secritou_test?connect_timeout=30&pool_timeout=30
      JWT_ACCESS_SECRET: ci-test-access-secret-min-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-min-32-chars
      CACHE_ENABLED: "true"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      FRONTEND_URL: http://localhost:5173
      PLAYWRIGHT_SKIP_WEB_SERVER: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Wait for Postgres and Redis to accept real queries
        # SEC-212: see the identical step in the `server` job — same runner-contention symptom
        # observed here as the app server's first real request (login) being slow enough to trip
        # Playwright's default 5s expect() timeout while Postgres/Redis are still warming up.
        # Redis is probed with a raw RESP PING over a Node TCP socket rather than `redis-cli`,
        # which is not installed on the runner host (only inside the redis:7-alpine service
        # container) — confirmed by a real CI run of the `server` job where the Postgres probe
        # passed on attempt 1 but `redis-cli: command not found` silently looped as a failed PING
        # for all 30 attempts under `2>/dev/null`.
        run: |
          for i in $(seq 1 30); do
            if PGPASSWORD=secritou psql -h localhost -p 5432 -U secritou -d secritou_test -c "SELECT 1" >/dev/null 2>&1; then
              echo "Postgres ready after ${i} attempt(s)."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Postgres did not become queryable after 30 attempts."
              exit 1
            fi
            sleep 2
          done
          for i in $(seq 1 30); do
            if node -e "
              const net = require('node:net');
              const sock = net.createConnection({ host: 'localhost', port: 6379 }, () => sock.write('PING\r\n'));
              sock.setTimeout(2000, () => { sock.destroy(); process.exit(1); });
              sock.on('data', (data) => { process.exit(data.toString().includes('PONG') ? 0 : 1); });
              sock.on('error', () => process.exit(1));
            "; then
              echo "Redis ready after ${i} attempt(s)."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Redis did not respond to PING after 30 attempts."
              exit 1
            fi
            sleep 2
          done
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run prisma:generate --workspace=server
      - name: Apply migrations
        run: npx prisma migrate deploy
        working-directory: server
      - name: Seed database
        run: npm run prisma:seed --workspace=server
      - run: npm run build --workspace=client
      - name: Start server
        run: npm run dev --workspace=server > server.log 2>&1 &
      - name: Wait for server
        run: npx wait-on http://localhost:5000/api/v1/health -t 60000
      - name: Start client preview
        run: npm run preview --workspace=client > client-preview.log 2>&1 &
      - name: Wait for client
        run: npx wait-on http://localhost:5173 -t 60000
      - run: npx playwright test --reporter=list
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
