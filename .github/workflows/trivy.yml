name: Trivy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 5 * * 1"

jobs:
  filesystem:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  docker:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    needs: filesystem
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t secritou-server:ci -f server/Dockerfile .

      - name: Build frontend image
        run: docker build -t secritou-client:ci -f client/Dockerfile .

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: secritou-server:ci
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: secritou-client:ci
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
