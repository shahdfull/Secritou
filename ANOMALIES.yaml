  - id: SEC-095
    titre: "onError absent ou générique sur plusieurs mutations du module (TimeTrackingTab, ProjectMeetingsTab, TaskChecklist, TaskAttachments) — les codes métier serveur (PROJECT_ARCHIVED, etc.) ne remontent aucun message lisible à l'utilisateur du formulaire"
    perimetre: "4.2/4.3 — client/src/features/projects/TimeTrackingTab.tsx, client/src/features/projects/ProjectMeetingsTab.tsx, client/src/features/tasks/components/TaskChecklist.tsx, client/src/features/tasks/components/TaskAttachments.tsx"
    regle_violee: null
    classe: "ux_erreur_serveur_non_remontee"
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      Sera résolu quand, sur ces mutations, une erreur serveur porteuse
      d'un code métier connu (ex. `PROJECT_ARCHIVED`,
      `CHECKLIST_LIMIT_REACHED`, transition invalide) déclenche un toast
      au message spécifique et actionnable, vérifié par un test qui
      simule le rejet et confirme le message affiché — au lieu d'un échec
      silencieux (mutation sans `onError`) ou d'un « Erreur » générique.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Audit a11y/UX LECTURE SEULE, lecture directe. Contraste avec le bon
      motif déjà en place ailleurs dans le module :
      `ProjectsPage.tsx#handleUpdate/handleConfirmDelete` décodent
      `error.response.data.error.code` et mappent chaque code métier
      (COMPLETION_REQUIRES_CLIENT_APPROVAL, INVALID_STATUS_TRANSITION,
      PROJECT_HAS_INVOICES, PROJECT_HAS_ONBOARDING) sur un message i18n
      dédié ; `TasksKanban.tsx#handleDragEnd` surface `error.response.data
      .error.message` du serveur. À l'inverse : `TimeTrackingTab.tsx`
      (createEntry), `ProjectMeetingsTab.tsx` (createMeeting/updateMeeting/
      deleteMeeting), `TaskChecklist.tsx` (createItem/updateItem/
      deleteItem), `TaskAttachments.tsx` (deleteDocument) appellent leurs
      mutations SANS `onError` local — l'échec est donc soit silencieux,
      soit réduit au toast générique éventuel du hook. Or SEC-089 vient de
      faire en sorte que checklist/commentaires soient rejetés
      `409 PROJECT_ARCHIVED` sur un projet archivé/COMPLETED : ce rejet
      n'a aujourd'hui aucun rendu utilisateur lisible sur ces formulaires
      (l'ajout de sous-tâche/pièce jointe « ne fait rien » sans
      explication). Impact : action qui échoue en silence. Le rendu par
      défaut des hooks n'a pas été audité exhaustivement ici (périmètre =
      composants du module) — d'où gravité mineure.

      APPROFONDISSEMENT AVANT CORRECTIF : `useDeleteChecklistItem`/
      `useUpdateChecklistItem`/`useCreateChecklistItem`
      (`useTaskChecklist.ts`) n'avaient en réalité AUCUN `onError`, pas
      même générique — plus grave que le rapport initial (qui parlait
      d'un « toast générique éventuel du hook ») : pour la checklist
      précisément, l'échec était RÉELLEMENT silencieux, zéro toast.
      Même constat pour `useCreateDocument`/`useUpdateDocument`/
      `useDeleteDocument` (`useDocuments.ts`, consommé par
      `TaskAttachments.tsx` mais aussi `DocumentsPage.tsx` et
      `ProjectDetailPage.tsx`).

      Corrigé (même session, choix du porteur : « Tout traiter (4
      items) ») : nouvel utilitaire partagé
      `client/src/utils/apiError.ts#getServerErrorMessage` (extrait
      `error.response.data.error.message`, même pattern déjà établi
      par `TasksKanban.tsx#handleDragEnd`). Câblé dans les `onError`
      de `useCreateTimeEntry` (`useTimeEntries.ts`),
      `useCreateProjectMeeting`/`useUpdateProjectMeeting`/
      `useDeleteProjectMeeting`/`useSetMeetingSchedule`
      (`useProjectMeetings.ts`),
      `useCreateChecklistItem`/`useUpdateChecklistItem`/
      `useDeleteChecklistItem` (`useTaskChecklist.ts`, qui n'avaient
      aucun `onError` — désormais avec message serveur en priorité et
      un repli spécifique par action), et
      `useCreateDocument`/`useUpdateDocument`/`useDeleteDocument`
      (`useDocuments.ts`, bénéficie aux 3 consommateurs, pas seulement
      `TaskAttachments.tsx`). Corrigé au niveau des HOOKS plutôt qu'en
      ajoutant un second `onError` par composant appelant, pour éviter
      un double toast (React Query appelle à la fois le `onError` du
      `useMutation` et celui passé à `mutate()`, vérifié par lecture du
      code source `@tanstack/query-core`). Clés i18n
      `documents.createError`/`updateError`/`deleteError` ajoutées
      (FR/EN, absentes jusqu'ici).

      Preuve par test réel : nouveau fichier
      `useTaskChecklist.test.tsx` (2 cas) — appelle réellement
      `useCreateChecklistItem` contre un rejet Axios simulé porteur
      d'un code `PROJECT_ARCHIVED`, confirme le message serveur exact
      affiché (pas de double toast) ; second cas, absence de réponse
      structurée → repli spécifique. Vérification complète : `npx tsc
      --noEmit` (client, propre), `npx vitest run` (client, 90/90),
      `npm run lint` (client, 12 warnings — SEC-049, stable), `npm run
      build` (succès), `node scripts/check-i18n.mjs` (vert). Résolu
      SANS confirmation CI : workflow GitHub Actions sur `origin/main`
      en `workflow_dispatch` uniquement (déviation établie en session
      le 2026-07-17, citée à chaque clôture depuis).

