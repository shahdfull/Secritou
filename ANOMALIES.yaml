  - id: SEC-181
    titre: "La convention de pagination (page/pageSize/orderBy/orderDir via parseListQuery) n'est pas uniforme : contact.controller.ts et customQuestion.controller.ts utilisent un paramètre `limit` au lieu de `pageSize`, tandis qu'aiConversation.controller.ts/projectMeeting.controller.ts/timeEntry.controller.ts réimplémentent leur propre parsing page/pageSize avec des plafonds et comportements de repli divergents (50, 100, ou aucun plafond visible) au lieu d'appeler parseListQuery"
    perimetre: "transverse — server/src/controllers/{contact,customQuestion,aiConversation,projectMeeting,timeEntry}.controller.ts ; server/src/utils/listQuery.ts#parseListQuery"
    regle_violee: null
