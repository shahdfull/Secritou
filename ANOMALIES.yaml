      production.

      RÉSOLU (session en cours) : `idor.test.ts` entièrement réécrit.
      Lecture directe préalable des routes réelles a montré que le modèle
      de scoping de ce dépôt n'a jamais utilisé de `where: {id, companyId}`
      au niveau repository : `GET /invoices/:id`/`GET /proposals/:id`
