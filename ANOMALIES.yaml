      (`1f8ff97`..`2c8d3cc`, module 4.7/4.8/4.10 + SEC-024/025), vérifié
      par `git log --oneline -- <fichier>` sur chacun, tous antérieurs de
      plusieurs commits/sessions. Un lint isolé sur les fichiers réellement
      modifiés cette session
      (`server/src/repositories/executiveMetrics.repository.ts`,
      `server/test/executiveMetricsProjectRisks.test.ts`,
      `client/src/types/permissions.ts`) est vert.

      Décision du porteur du projet (AskUserQuestion, session du
      2026-07-17) : « Ouvrir SEC-026 (dette lint), rouvrir SEC-010
      (Recommandé) » — d'abord seulement enregistré et diagnostiqué.

      CORRIGÉ dans la même session, sur demande explicite du porteur du
      projet (« ok on corrige alors ») :

      Server, 30 des 33 erreurs — pattern `req.user?.sub!`/`req.user?.role!`
      (le type `no-non-null-asserted-optional-chain` reproché) remplacé par
      `req.user!.sub`/`req.user!.role` dans les 5 contrôleurs concernés
      (`comment.controller.ts`, `freelancer.controller.ts`,
      `project.controller.ts`, `summary.controller.ts`,
      `task.controller.ts`) — l'assertion porte désormais sur `req.user`
      lui-même (garanti non-null par le middleware `authenticate` sur
      toutes ces routes), pas sur le résultat d'un chaînage optionnel ;
      `sub`/`role` sont des champs obligatoires de `JwtPayload`
      (`server/src/types/auth.ts`), donc aucun `!` n'est nécessaire après
      eux. Les 3 erreurs `no-useless-catch` restantes corrigées en
      supprimant le `catch` inutile (`agentOrchestrator.service.ts` :
      catch+rethrow devant un `finally` réel, `finally` seul conservé ;
      `upload.service.ts` : `try/catch` entier supprimé, aucun `finally`).
      Les 2 `no-constant-condition` dans `invoice.service.test.ts`
      corrigées en remplaçant les conditions littérales
      (`if (-100 <= 0) throw ...`, qui ne prouvaient rien — CLAUDE.md,
      règle sur les tests qui réimplémentent leur cible) par un appel réel
      à `addPaymentSchema.safeParse` (`server/src/validators/invoice.validator.ts`,
      `amount: positiveDecimal` = `z.number().positive()`), le vrai garde-fou
      qui rejette déjà les montants ≤ 0 au niveau validateur — les tests
      appellent maintenant le code réel au lieu de simuler une condition à
      côté.

      Client, les 4 erreurs :
      `axios.ts` — `no-async-promise-executor` corrigée en extrayant le
      corps de l'exécuteur `async` dans une fonction `runRefresh` nommée,
      appelée depuis un exécuteur de `Promise` synchrone (mêmes paramètres
      `resolveRefresh`/`rejectRefresh`, même comportement — le `try/catch/
      finally` interne gérait déjà correctement le rejet, seul le pattern
      d'exécuteur async lui-même était en cause). `ProjectDetailPage.tsx` —
      les 3 `react-hooks/rules-of-hooks` corrigées en remontant
      `useMySplitForProject`/`useProjectTemplateForService`/
      `useApplyProjectTemplate` AVANT les deux `return` anticipés
      (`isLoading`, `isError || !project`) : c'était un vrai bug (nombre de
      hooks appelés variable selon l'état de chargement, pas seulement un
      style discutable), corrigé en passant `project?.id ?? ""`/
      `project?.serviceId` aux hooks — les trois sont déjà conçus pour être
      inertes tant que leur argument est vide/undefined (`enabled` interne
      ou `!!serviceId`), donc aucun effet de bord avant que `project` soit
      chargé.

      i18n-check : `scripts/check-i18n.mjs` corrigé pour reconnaître la
      convention de suffixe pluriel i18next (`_zero`/`_one`/`_two`/`_few`/
      `_many`/`_other`) — accepte désormais une clé utilisée comme
      `t("key", { count })` si au moins une variante suffixée existe dans
      l'un des deux fichiers de traduction, au lieu d'exiger la clé littérale
      exacte. Vérifié : seuls `_one`/`_other` sont réellement utilisés dans
      ce dépôt (`grep` sur les deux fichiers de traduction).

      EFFET DE BORD DÉCOUVERT ET ÉCARTÉ (pas une anomalie) : `npm run
      prisma:format:check --workspace=server` échouait localement à la
      première tentative, mais `prisma format` puis re-`--check` ne
      produisait ensuite AUCUNE différence de contenu (fichier identique
      octet pour octet, même hash MD5 avant/après) — `git status` l'a un
      instant signalé modifié puis le diff réel était vide (artefact de
      normalisation de fin de ligne local à ce poste Windows, jamais un
      changement de contenu). `git checkout -- server/prisma/schema.prisma`
      exécuté pour ne rien laisser dans le commit. N'explique donc PAS le
      job "server" original — confirmé que les 33 erreurs ESLint en sont
      l'unique cause réelle sur ce HEAD.

      VÉRIFICATION LOCALE COMPLÈTE (les 4 workspaces/gates que la CI
      exécute, en plus des jobs déjà nommés) : `npm run lint
      --workspace=server` → 0 erreur (167 warnings, tolérés). `npm run lint
      --workspace=client` → 0 erreur (153 warnings, tolérés). `npx tsc
      --noEmit` vert des deux côtés. `node scripts/check-i18n.mjs` → passé.
      `npm run build --workspace=server` et `--workspace=client` → les deux
      réussissent. Scan de secrets sur le bundle client → propre. Suite de
      tests complète : server 274/274 (incluant les 2 tests
      `invoice.service.test.ts` réécrits), client 22/22 (7 fichiers) — deux
      exécutions, aucune régression.

      `resolu` déclaré SANS confirmation CI — dérogation explicite à la
      règle commit+CI de CLAUDE.md, déjà établie par le porteur du projet
      dans cette même session (« no make it resolu ») ; le critère de
      résolution textuel exige un push vu vert par la CI, condition qui ne
      peut être remplie qu'après ce commit — signalé ici pour qu'une
      lecture future distingue « vérifié localement, exhaustivement » de
      « confirmé par la CI elle-même ».

  - id: SEC-027
    titre: "RG-008 (déclenchement de la commission) : affirmation d'exclusivité jamais prouvée par test, seul le chemin nominal était vérifié"
    perimetre: "4.5 Rémunération des associés, 4.4 Facturation — server/src/services/commission.service.ts, server/src/services/invoice.service.ts"
    regle_violee: "RG-008"
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un test appelle réellement `invoiceService.addPayment`
      contre une base réelle et confirme à la fois qu'un paiement effectivement
      appliqué à une facture crée une `Commission` par partenaire proratisée
      correctement, ET qu'un paiement sans effet réel sur le solde de la
      facture (entièrement absorbé par un trop-perçu) n'en crée aucune —
      pas seulement une lecture du chemin nominal ou un grep.
    detecte_le: "2026-07-17"
    source: manuel
    confiance: certain
    note: >
      Trouvé en répondant à la question du porteur du projet « is there
      something a vérifier dans ce projet » — un audit de lecture (agent
      general-purpose, sans modification) sur REFERENTIEL.md §5 (RG-001 à
      RG-021) a identifié 8 règles métier à provenance faible ou négative
      non testée, aucune trackée dans ANOMALIES.yaml. RG-008 choisie en
      premier par le porteur du projet (« RG-008 (commission) puis RG-002
      (scoping pôle) (Recommandé) ») comme la plus critique côté argent.

      CONSTAT (déjà noté dans REFERENTIEL.md v0.2.1, jamais formalisé en
      anomalie) : RG-008 affirme qu'une `Commission` est créée
      « uniquement lorsqu'un paiement est effectivement enregistré » —
      une exclusivité. Seul le chemin nominal (`computeForPaymentTx`
      appelé depuis `addPayment`) était vérifié par lecture directe ;
      aucun test n'assérait qu'aucun autre chemin ne crée de commission
      hors de ce déclencheur, ni que le déclencheur lui-même est bien
      conditionné sur un montant réellement appliqué (pas seulement sur
      l'existence d'un `Payment`).

      VÉRIFICATION RÉELLE effectuée :
      (1) Grep exhaustif sur `server/src` : un seul point d'écriture
      `tx.commission.create` dans tout le dépôt
      (`commission.repository.ts:49`, dans `createManyTx`). Un seul
      appelant de `computeForPaymentTx` dans tout le dépôt :
      `invoice.service.ts:268`, à l'intérieur de `addPayment`, conditionné
      sur `appliedAmount > 0`.
      (2) `commission.service.ts` lu intégralement (137 lignes) : aucun
      autre chemin de création de `Commission` n'existe (les autres
      méthodes du service sont toutes en lecture ou en mutation de statut
      PENDING→PAID, jamais en création).
      (3) Contrainte structurelle en renfort : `Commission.paymentId` est
      `@unique` dans `schema.prisma` — au plus une commission par
      paiement, garanti par la base elle-même, pas seulement par la
      logique applicative.

      Nouveau test `server/test/commissionCreationExclusivity.test.ts`
      (câblé dans `test/run-all.test.ts`), appelle réellement
      `invoiceService.addPayment` contre une base migrée — pas une
      réimplémentation :
      - un paiement réel (400 sur une facture de 1000, split 50%) crée
        exactement 1 `Commission`, `basis` = 400, `amount` = 200 ;
      - un paiement entièrement absorbé par un trop-perçu (facture déjà
        soldée à `amountPaid = amount` mais statut encore `PARTIAL`,
        état atteignable en écrivant directement la ligne de test, jamais
        par `addPayment` lui-même) ne crée aucune `Commission` —
        confirme que le déclencheur porte sur le montant réellement
        appliqué, pas la simple existence du `Payment`.

      Un premier essai du 2e test utilisait une facture `status: PAID`
      pour simuler un trop-perçu total, mais `addPayment` refuse tout
      paiement sur une facture déjà `PAID`/hors `SENT`/`PARTIAL`/`OVERDUE`
      (`HttpError 409 INVOICE_NOT_ACCEPTING_PAYMENTS`) — corrigé en gardant
      le statut `PARTIAL` avec `amountPaid` déjà égal au montant total,
      un état qu'`addPayment` lui-même ne produirait jamais mais qui isole
      correctement la branche `appliedAmount = 0` sans dépendre du guard
      de statut.

      `npx tsc --noEmit` vert. Suite complète : 276/276 (274 + 2 nouveaux),
      ~15-18s, aucune régression. `resolu` déclaré SANS confirmation CI —
      la CI est actuellement désactivée sur `origin/main` (déclenchement
      automatique retiré à la demande du porteur du projet, `workflow_dispatch`
      seul) — dérogation déjà établie dans cette session (« no make it
      resolu »), documentée pour qu'une lecture future ne prenne pas ce
      `resolu` pour une confirmation CI, qui est actuellement impossible à
      obtenir par un push normal tant que la CI reste désactivée.

  - id: SEC-028
    titre: "proposalService.create n'appliquait aucun scoping de pôle sur clientId/leadId/serviceRequestId — un Manager pouvait créer une proposition (donc plus tard un projet) sur un client/lead d'un autre pôle"
    perimetre: "4.1 CRM & Pipeline commercial, 4.2 Gestion de projet — server/src/services/proposal.service.ts, server/src/controllers/proposal.controller.ts"
    regle_violee: "RG-002"
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un Manager ne peut, par aucune combinaison de
      clientId/leadId/serviceRequestId, créer une proposition rattachée à
      un Lead assigné à un autre pôle ou à un Client déjà exclusivement lié
      à un projet d'un autre pôle — vérifié par un test qui appelle
      réellement `proposalService.create` contre une base réelle sur les
      deux axes (rejet ET autorisation légitime), pas seulement une lecture
      de code.
    detecte_le: "2026-07-18"
    source: manuel
    confiance: certain
    note: >
      Trouvé en vérifiant RG-002 (« Un Manager ne peut créer ou modifier un
      projet que dans son propre pôle ») en réponse à la question du
      porteur du projet « is there something a vérifier dans ce projet » —
      pas pendant un audit formel de 4.1/4.2, enregistré immédiatement
      conformément à CLAUDE.md.

      CONSTAT : `project.service.ts#createProject`/`updateProject` forcent
      bien `serviceId` au pôle du Manager (déjà vérifié `code_direct`), ce
      qui couvre le texte littéral de RG-002. Mais `createProject` ne
      vérifie jamais que la proposition source (`data.proposalId`)
      appartient elle-même au pôle du Manager — et en remontant la chaîne,
      `proposalService.create` (appelée par `POST /proposals`, seul point
      d'entrée réel de création) n'appliquait AUCUN scoping de pôle sur
      `clientId`/`leadId`/`serviceRequestId`, seulement le RBAC générique
      (`authorize("ADMIN","MANAGER")` + `requirePermission("proposals",
      "create")`, rôle/permission, jamais le pôle de la cible). Le seul
      contrôle existant (`createProposal` controller, branche
      `req.body.projectId`) ne s'active que si un `projectId` est fourni à
      la création — or une proposition naît presque toujours SANS projet
      existant (c'est justement `createProject` qui le crée ensuite à
      partir de la proposition acceptée). Un Manager du pôle A pouvait donc
      créer une proposition — et plus tard un projet, une fois acceptée —
      sur un client/lead du pôle B, contournant l'intention de RG-002 sans
      violer son texte littéral.

      NUANCE STRUCTURELLE CONFIRMÉE PAR LECTURE DIRECTE DU SCHÉMA :
      `Client` n'a PAS de pôle propre (`schema.prisma` : aucun champ
      `serviceId` sur `Client`, un même client peut avoir des projets dans
      plusieurs pôles) ; `ServiceRequest` non plus (son pôle, quand il en a
      un, se déduit de `client.projects.some.serviceId` — mécanisme déjà
      utilisé pour scoper `ServiceRequest` en LECTURE dans
      `serviceRequest.repository.ts`, jamais repris ici) ; `Lead`, en
      revanche, a un `serviceId` propre et non ambigu.

      DÉCISION DU PORTEUR DU PROJET (AskUserQuestion, session du
      2026-07-18) : « Vérifier le pôle du Lead directement
      (`Lead.serviceId`), et pour ServiceRequest/clientId nu, autoriser si
      le client a AU MOINS un projet dans le pôle du Manager OU aucun
      projet du tout (client neuf) (Recommandé) ».

      CORRECTIF ÉCRIT : nouvelle fonction
      `assertProposalCreationInScope(data, scope)` dans
      `proposal.service.ts` — pour `leadId`, rejette si
      `Lead.serviceId` existe et diffère du pôle du Manager ; pour
      `clientId`, calcule l'ensemble des `serviceId` distincts des projets
      existants du client et rejette seulement si le client a AU MOINS un
      projet ET aucun dans le pôle du Manager (un client sans aucun projet
      reste neutre/accessible). Appelée en tête de `proposalService.create`
      (nouveau paramètre `scope?: ServiceScope`, optionnel donc
      rétrocompatible — un seul appelant réel dans tout le dépôt,
      `proposal.controller.ts`, déjà mis à jour). Le contrôle existant sur
      `projectId` (déjà présent, plus précis via `getProjectById`) est
      conservé tel quel, pas remplacé.

      Nouveau test `server/test/proposalCreationScope.test.ts` (câblé dans
      `test/run-all.test.ts`), appelle réellement `proposalService.create`
      contre une base migrée, 5 cas : Lead d'un autre pôle → rejeté (404) ;
      Lead du même pôle → autorisé ; Client déjà exclusivement lié à un
      projet d'un autre pôle → rejeté (404) ; Client neuf sans aucun projet
      → autorisé ; ADMIN (sans scope de pôle) → toujours autorisé quel que
      soit le pôle cible.

      `npx tsc --noEmit` vert. Suite complète : 281/281 (276 + 5 nouveaux),
      ~27s, aucune régression. `resolu` déclaré SANS confirmation CI — la
      CI est actuellement désactivée sur `origin/main` sur demande du
      porteur du projet (workflow_dispatch seul, session du 2026-07-17),
      dérogation « no make it resolu » déjà établie dans cette session.

  - id: SEC-029
    titre: "RG-017 (Client sans accès aux outils d'exécution) : provenance déduction/conditionnelle, jamais vérifiée directement par test — aucun défaut trouvé, preuve manquante comblée"
    perimetre: "4.11 Module IA (agent-service, GELÉ) — server/src/services/agentOrchestrator.service.ts, server/src/routes/ai.routes.ts, server/src/routes/aiConversation.routes.ts"
    regle_violee: "RG-017"
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un test appelle réellement
      `agentOrchestratorService.executeAgent` (le garde-fou métier réel,
      pas seulement le middleware `authorize` générique déjà testé
      ailleurs) avec un rôle CLIENT et confirme le rejet, ET qu'un scan
      direct confirme l'absence de toute primitive d'exécution de commande
      dans `server/src` — pas seulement une déduction combinant l'absence
      de RG-016 à un contrôle de rôle observé ailleurs.
    detecte_le: "2026-07-18"
    source: manuel
    confiance: certain
    note: >
      Traité en réponse à la question du porteur du projet « is there
      something a vérifier dans ce projet », après RG-008 (SEC-027) et
      RG-002 (SEC-028) — RG-017 nommée dans l'audit de lecture initial
      comme priorité sécurité (3e position), mais touchant exclusivement
      le module 4.11 Module IA, classé GELÉ. CLAUDE.md interdit tout
      audit sur un module GELÉ sauf si une anomalie remontée bloque le
      flux argent — pas le cas ici (question de sécurité, pas d'argent).

      DÉCISION EXPLICITE DU PORTEUR DU PROJET (AskUserQuestion, session du
      2026-07-18) : « Dégeler explicitement 4.11 pour cette vérification
      uniquement » — lecture directe ciblée autorisée pour RG-017
      spécifiquement, sans lever le gel pour le reste (aucune correction
      fonctionnelle, aucune nouvelle capacité, module 4.11 reste GELÉ pour
      tout le reste après cette vérification).

      VÉRIFICATION RÉELLE, AUCUN DÉFAUT TROUVÉ (contrairement à SEC-027/
      SEC-028) :
      (1) `server/src/routes/ai.routes.ts` : les 3 routes (`/chat`,
      `/brief`, `/tasks`) portent chacune `authorize("ADMIN", "MANAGER")`
      explicitement, jamais CLIENT.
      (2) `server/src/routes/aiConversation.routes.ts` : `router.use(
      authenticate, authorize("ADMIN", "MANAGER"))` appliqué à toutes les
      routes du fichier avant même leur définition.
      (3) `agentOrchestratorService.executeAgent` (le service métier réel
      derrière `/brief` et `/tasks`) revérifie lui-même le rôle
      (`if (!["ADMIN", "MANAGER"].includes(userRole)) throw 403`) — un
      second garde-fou indépendant du middleware de route, qui rejetterait
      même un appel interne qui aurait oublié le middleware.
      (4) `aiConversation.controller.ts` lu intégralement : toutes les
      méthodes dérivent l'identité de `req.user!.sub` (le JWT authentifié),
      aucun paramètre `userId`/`role` manipulable par le corps de requête.
      (5) Grep exhaustif sur tout `server/src` : aucune primitive
      `child_process`/`execSync`/`spawn`/`eval` nulle part — confirme
      directement la base de RG-016 (aucun sandboxing car aucune
      exécution n'existe du tout), pas seulement repris comme fait acquis.
      (6) Côté client : aucune référence à `ai/chat`/`ai/brief`/`ai/tasks`/
