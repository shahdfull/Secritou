  - id: SEC-193
    titre: "Le job \"server\" de .github/workflows/ci.yml échoue structurellement à l'étape \"Schema drift check\" (prisma migrate diff --from-migrations ... --to-schema-datamodel ...) : Invoice.[projectId,invoiceType] et Proposal.leadId sont déclarés comme index uniques TOTAUX dans schema.prisma (@@unique/@unique), mais les migrations réelles les créent en index uniques PARTIELS (WHERE invoiceType <> 'STANDARD' ; WHERE leadId IS NOT NULL) — une forme que le DSL Prisma ne peut pas exprimer nativement, donc le diff les signale à tort comme absents à chaque exécution"
    perimetre: "server/prisma/schema.prisma (modèles Invoice, Proposal) ; .github/workflows/ci.yml (job server, étape \"Schema drift check\") ; migrations 20260713120000_invoice_partial_unique, 20260625160000_add_lead_id_to_proposal"
    regle_violee: null
    classe: "limite_prisma_index_partiel_non_representable"
    gravite: mineur
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand `npx prisma migrate diff --from-migrations
      ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma
      --shadow-database-url <url> --exit-code` (la commande exacte du job
      "server") sort avec le code 0 sur une base neuve migrée depuis zéro —
      soit en documentant explicitement dans schema.prisma (commentaire sur
      chaque modèle concerné, pas seulement dans le fichier de migration)
      que l'index unique réel est partiel et pourquoi le diff le signale à
      tort, avec une décision du porteur sur l'étape CI (l'assouplir pour ce
      cas précis documenté, ou accepter qu'elle reste rouge sur ce point
      connu), soit par toute autre solution qui fait disparaître le faux
      signal sans masquer un vrai futur drift sur ces mêmes tables.
    detecte_le: "2026-07-22"
    source: manuel
    confiance: certain
    note: >
      Découvert en investiguant l'échec du job "server" sur le premier run
      CI déclenché après réactivation des triggers push/pull_request
      (commit 998af57, SEC-010). Reproduit localement avec une vraie shadow
      database (`postgresql://secritou:secritou@localhost:5434/
      secritou_shadow_test`, créée puis supprimée pour ce test) : le diff
      rapporte `[+] Added unique index on columns (projectId, invoiceType)`
      sur `Invoice` et `[+] Added unique index on columns (leadId)` sur
      `Proposal`, alors que les deux existent réellement en base. Cause
      confirmée par lecture directe des migrations :
      `20260713120000_invoice_partial_unique/migration.sql` documente
      explicitement « Partial indexes cannot be expressed in the Prisma
      schema language, so this index is intentionally declared only here »
      (l'ancien index total de `20260711183136_sync_schema_drift` a été
      remplacé par un partiel excluant `invoiceType = 'STANDARD'`, pour ne
      pas plafonner les factures STANDARD à une seule par projet) ;
      `20260625160000_add_lead_id_to_proposal/migration.sql` crée
      `Proposal_leadId_key` en `CREATE UNIQUE INDEX ... WHERE "leadId" IS
      NOT NULL`, confirmé par un commentaire similaire dans
      `20260711183136_sync_schema_drift/migration.sql:35`. Aucun des deux
      contextes n'est visible depuis `schema.prisma` seul — seul le
      commentaire du fichier de migration l'explique, jamais lu par
      quelqu'un qui audite uniquement le schéma. Non causé par cette
      session : les deux migrations datent du 2026-06-25 et du 2026-07-13,
      bien avant la réactivation du trigger CI qui a permis de le
      découvrir — SEC-010 (CI restée en `workflow_dispatch` seul depuis le
      2026-07-17 jusqu'à cette session) explique pourquoi ce défaut de
      pipeline n'avait jamais été vu vert ou rouge par une exécution
      automatique jusqu'ici. Décision explicite du porteur (AskUserQuestion,
      session du 2026-07-22) : enregistrer sans toucher à `ci.yml` ni au
      schéma pour l'instant — le job "server" reste donc rouge sur cette
      étape précise tant qu'une décision de traitement n'est pas prise
      séparément.

      CORRECTIF ÉCRIT (même session, second passage sur le job "server" en
      échec) : le premier symptôme observé n'était pas SEC-193 directement
      — le step "Schema drift check" échouait AVANT d'atteindre le vrai
      diff (« You must pass the --shadow-database-url » : le job "server"
      ne déclarait aucun service Postgres ni shadow database, malgré
      `DATABASE_URL` déjà défini comme si un service existait — bug de
      configuration CI distinct, corrigé séparément). Une fois ce bug de
      config corrigé (service `postgres` ajouté au job, étape "Apply
      migrations", base `secritou_shadow` dédiée créée avant le diff), le
      job retombe bien sur le vrai SEC-193. Décision du porteur
      (AskUserQuestion, second passage, même session) : documenter les 2
      index dans `schema.prisma` (commentaire explicite sur
      `Invoice.@@unique([projectId, invoiceType])` et `Proposal.leadId`)
      et adapter le step CI pour tolérer SPÉCIFIQUEMENT ces 2 lignes de
      diff connues (capture texte filtrée, pas `--exit-code` brut) — toute
      autre ligne de diff continue de faire échouer l'étape. Vérifié
      localement dans les deux sens avant de committer : le filtre laisse
      passer les 2 index partiels connus ET détecte un drift injecté
      artificiellement sur un champ sans rapport
      (`Task.fakeDriftTestField`, ajouté puis retiré pour ce seul test,
      jamais commité). `resolu` NON déclaré : le correctif est commité
      localement mais pas encore vu vert par la CI elle-même sur ce commit
      précis. Reste `en_cours` jusqu'à confirmation du run CI réel.

  - id: SEC-194
    titre: "npm run test:coverage --workspace=server (job \"server\" de ci.yml) n'a probablement jamais pu réussir depuis son introduction : (1) le binaire c8 qu'il appelle en dur n'était déclaré nulle part dans server/package.json (ni dependencies ni devDependencies), échec immédiat \"c8: not found\" sur toute installation fraîche (npm ci) ; (2) une fois c8 installé, la couverture réelle mesurée (64.46% lignes/statements, 72.59% branches, 42.91% fonctions) est très en dessous des seuils exigés par le script (85/80/85/85), jamais atteints"
    perimetre: "server/package.json (script test:coverage, devDependencies) ; .github/workflows/ci.yml (job server)"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand `npm run test:coverage --workspace=server` sort
      avec le code 0 sur une installation fraîche (`npm ci` puis la
      commande, sans installation manuelle préalable de `c8`) — vérifié
      localement puis confirmé par un run CI vert sur le job "server".
    detecte_le: "2026-07-22"
    source: manuel
    confiance: certain
    note: >
      Découvert en poursuivant l'investigation du job "server" après la
      correction du "Schema drift check" (SEC-193) : le step suivant du
      pipeline (`npm run test:coverage --workspace=server`) échouait avec
      `sh: 1: c8: not found`, exit code 127. Confirmé par lecture directe :
      `grep -n '"c8"' server/package.json` ne retourne rien avant cette
      session — le script `test:coverage` (`server/package.json:15`)
      appelle `c8` directement (pas `npx c8`), donc rien ne l'installe
      automatiquement sur un `npm ci` frais, contrairement à l'exécution
      locale habituelle où `npx` masque l'absence en téléchargeant le
      binaire à la volée à chaque appel (confirmé : `which c8` ne retrouve
      rien non plus sur la machine de développement). `git log -p --
      package.json` ne montre qu'un seul commit d'introduction de ce
      script, jamais modifié depuis — cohérent avec le fait que SEC-010
      (CI restée en `workflow_dispatch` seul depuis le 2026-07-17) a
      empêché toute exécution automatique de ce step avant cette session.

      RÉSOLU (session en cours), en deux volets, décision explicite du
      porteur (AskUserQuestion) pour chacun :
      1) `npm install --save-dev c8` exécuté dans `server/` — `c8` ajouté
      à `server/package.json#devDependencies` (`package-lock.json`
      régénéré en conséquence). Débloque l'échec immédiat.
      2) Une fois `c8` installé, la couverture réelle mesurée (`npx c8
      --reporter=text-summary node --test --import tsx
      test/run-all.test.ts`, 520/520 tests verts) : Statements 64.46%
      (18584/28830), Branches 72.59% (1187/1635), Functions 42.91%
      (427/995), Lines 64.46% (18584/28830) — très en dessous des seuils
      exigés (85/80/85/85), jamais configurés avec un `.c8rc.json` pour
      exclure les fichiers non pertinents (ex. point d'entrée, certains
      contrôleurs jamais exercés par les tests unitaires) — non
      investigué plus avant dans cette session si une exclusion aurait pu
      relever ces chiffres sans écrire de nouveaux tests. Décision du
      porteur (AskUserQuestion) : baisser les seuils au niveau réel
      mesuré, avec marge de sécurité (`--statements 60 --branches 70
      --functions 40 --lines 60`, chacun arrondi sous la valeur mesurée
      pour absorber la variance normale entre runs) plutôt que d'exiger
      une remontée de couverture non demandée. Vérifié : `npm run
      test:coverage --workspace=server` sort désormais avec le code 0 en
      local. Ne PAS relever ces seuils sans nouvelle instruction — ce ne
      sont pas des seuils de qualité arbitrés, seulement un plancher
      reflétant l'état réel du dépôt au 2026-07-22, choisis pour ne plus
      jamais faire échouer silencieusement `test:coverage` sur un défaut
      de configuration plutôt que sur une vraie régression de couverture.
      `en_cours` (pas `resolu`) : le critère local passe, mais la CI n'a
      pas encore confirmé ce commit précis — conformément à la règle du
      dépôt.

  - id: SEC-195
    titre: "Le garde `{ skip: !dbAvailable }` (ou `!schemaLoaded`), qu'il soit posé sur `describe(...)` OU sur chaque `test(...)` individuel, est structurellement peu fiable dans server/test/*.ts : l'option `skip` est TOUJOURS évaluée de façon SYNCHRONE au moment de l'enregistrement de describe/test, avant que le `before()` asynchrone correspondant (qui assigne réellement `dbAvailable`) n'ait pu s'exécuter — contrairement à ce que cette entrée affirmait initialement, déplacer `skip` du `describe` vers chaque `test()` individuel NE corrige RIEN : `test(name, { skip: !flag }, fn)` a exactement le même défaut de timing que `describe(name, { skip: !flag }, fn)`, seul un check FAIT DANS LE CORPS du test (via le paramètre `t: TestContext` et `t.skip(msg)`) s'exécute après que before() a résolu"
    perimetre: "server/test/*.ts — 63 fichiers corrigés dans cette passe (grep sur `SEC-195:` pour la liste exacte, à jour) : archivedProjectTaskVisibility, authCookieAndLogoutReuse, authPhoneRoundTrip, checkInvoiceFollowup, clientApproveEmailPortalUrl, clientInviteResend, clientPortalActivationBackfill, commissionCreationExclusivity, commissionService, contactConvertToLeadScope, creditNoteApply, creditNoteCumulativeAmount, creditNoteNumberConcurrency, depositRateSingleSource, documentCreateHttp, documentScopeManager, documentSignContract, errorEnvelope.http, executiveMetricsActiveProjectsParallel, executiveMetricsCriticalCountUnbounded, executiveMetricsProjectRisks, freelancerSeesOwnDeliverable, idor, invoiceAuditLog, invoiceCreateFromProposal, invoiceNumberingGapless, invoicePaymentInviteFailure, invoiceScopeManager, lead.repository, leadCreateConcurrency, leadCreateScope, leadDuplicateEmail, leadListExcludesNotes, leadService, leadsKanbanMaxPageSize, managerScopeIdorFixes, markOverdueInvoicesAuditLog, metricAnomalyAndCommissionBatching, portalActivationOnPayment, projectClientApproveBalanceInvoice, projectClientApproveConcurrency, projectCreateArchiveRestore, projectDetailIncludesTasks, projectStatusInFilter, projectTemplateIdempotencyAndFreelancerFields, proposal.service, proposalAcceptCascade, proposalAcceptCascadeConcurrency, proposalAcceptRbacHttp, proposalCreationScope, proposalListOrderBy, proposalScopeAfterCreation, proposalScopeSendUpdateAddSection, proposalWriteScopeRefusal, reportsPageSortOrder, schemaIndexCleanupAndTimeEntryFk, searchScope, serviceRequestService, taskCompletedAtBackfill, taskPrioritySort, taskUpdateScopeRefusal, userDeleteFinancialHistory, userProfilePhone.http"
    regle_violee: null
    classe: "garde_skip_evalue_avant_before_async"
    gravite: majeur
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand les 63 fichiers listés ci-dessus utilisent
      exclusivement le pattern : `describe(...)` SANS option `skip`, et
      chaque `test(...)` accepte un paramètre `t` et vérifie
      `if (!dbAvailable) { t.skip("..."); return; }` comme première ligne
      du corps du test (le seul mécanisme qui s'exécute après que
      before() a résolu) — vérifié par grep exhaustif confirmant zéro
      occurrence restante de `{ skip: !dbAvailable` ou `{ skip:
      !schemaLoaded` en dehors des commentaires, ET par un run CI vert
      sur le commit qui porte ce correctif (voir règle générale du
      dépôt : un correctif non commité/non vert en CI reste `en_cours`).
    detecte_le: "2026-07-22"
    source: audit_llm
    confiance: certain
    note: >
      Découvert en investiguant un run CI réel (commit `97470f0`, job
      "server") qui échouait avec des erreurs Prisma explicites
      (`Argument client is missing`, `Argument where ... needs at least
      one of id or serviceId`) sur des variables (`clientId`, `serviceId`)
      censées être assignées par un `before()` — alors que 3 exécutions
      locales consécutives de la suite complète, avec les mêmes variables
      d'environnement CI simulées, passaient 520/520 sans aucun échec.
      Hypothèse initiale confirmée : `node:test` lit l'option `skip` au
      moment de l'enregistrement synchrone de describe/test, alors que le
      `before()` correspondant ne s'exécute que lors du "run" réel de la
      suite, trop tard pour influencer un `skip` déjà figé.

      Correction de cette entrée (même session, avant toute clôture) :
      le critère de résolution initial affirmait que
      `projectTemplateIdempotencyAndFreelancerFields.test.ts` utilisait
      "déjà correctement" le pattern `skip` au niveau `test()` individuel
      (ligne 90), et proposait de généraliser cette migration
      describe→test aux 38 autres fichiers. Ce critère était FAUX : ce
      fichier précis faisait partie des échecs CI sur ce run, alors qu'il
      utilisait déjà `test(name, { skip: !dbAvailable }, fn)`. Reproduit
      empiriquement via deux scripts `node -e` isolés : un `test(name, {
      skip: !flag }, fn)` enregistré après un `before()` async qui met
      `flag = true` après un délai artificiel EST SAUTÉ quand même,
      exactement comme au niveau `describe` — l'option `skip` de `test()`
      partage le même défaut d'évaluation synchrone que celle de
      `describe()`. Le seul pattern qui fonctionne réellement : accepter
      `(t)` dans le corps du test et faire `if (!flag) { t.skip(msg);
      return; }` comme première ligne du test — ce corps ne s'exécute
      qu'après que node:test a attendu la résolution de before().

      Portée réelle également corrigée à la hausse : la première passe
      avait compté "39 fichiers" par un grep approximatif ; un nouveau
      grep exhaustif sur `server/test/*.ts` a trouvé 63 fichiers avec le
      pattern `skip: !dbAvailable`/`skip: !schemaLoaded` (describe-level
      ou test-level confondus), tous corrigés dans cette même session par
      script + vérification manuelle des cas ambigus (fichiers à
      describe multiples, variante multi-lignes `describe(\n  title,\n
      { skip: ... },\n  () => {`). Après correction : 555 tests locaux,
      554 passent, le seul échec restant (`taskBulkActions.test.ts`,
      SEC-097, assertion de timing sur l'exécution concurrente) est un
      test préexistant non touché par cette passe, non lié au défaut
      décrit ici. `npm run typecheck` et `npm run lint` verts côté
      server après correction. Reste à committer et confirmer un run CI
      vert sur ce commit avant de passer ce statut à `resolu`.

