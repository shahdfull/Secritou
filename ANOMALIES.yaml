  - id: SEC-012
    titre: "Types maison substitués aux types d'entrée Prisma générés (15 repositories)"
    perimetre: "transverse — server/src/repositories/**"
    regle_violee: null
    classe: "type_maison_substitue_au_type_prisma"
    gravite: majeur
    statut: ouvert
    critere_de_resolution: >
      C'est résolu quand plus aucun paramètre `data` de repository n'est typé
      par un littéral écrit à la main : tous utilisent le type Prisma généré
      correspondant (Prisma.<Model>UpdateInput / CreateInput). Vérifié par
      `grep -rn "Partial<{" server/src/repositories/*.ts` → zéro résultat,
      ET `npm run typecheck --workspace=server` vert sur le commit
      correspondant.
    detecte_le: "2026-07-16"
    source: manuel
    confiance: certain
    note: >
      SEC-006 (phone/updateMe) est un symptôme de cette classe et sera
      résolue mécaniquement par la conversion. Le point clé : il n'y a rien
      à auditer — la conversion EST l'audit. Une fois les types générés en
      place, tsc détecte tout écart champ/modèle à chaque compilation, sans
      variance, définitivement. 17 méthodes sur 15 fichiers : approval,
      client, clientSuccess (×4), document, freelancerApplication, invoice,
      lead, managerPermission, permissionProfile, project, proposal,
      serviceRequest, task, user (×2, dont updateMe). Un seul repository du
      dépôt, clientOnboarding.repository.ts, utilise déjà le type Prisma
      généré — c'est l'exception, pas la règle.
