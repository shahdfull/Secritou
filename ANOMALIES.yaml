      (`newProject`, `createProject`, `createProjectDesc`, etc.)
      volontairement laissées en place (orphelines mais inoffensives —
      `check-i18n.mjs` ne signale que les clés manquantes/désynchronisées,
      pas les clés inutilisées, hors périmètre de ce correctif).

      `npx tsc --noEmit` vert. `npm run build` réussi. `resolu` déclaré
