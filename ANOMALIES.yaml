      code de production. Gravité `moyen` (alignée sur SEC-087, même
      classe) : ce n'est pas un bug de production observé, mais un test
      vert trompeur sur exactement la zone (accès direct par ID à une
      facture/proposition d'un autre client/pôle) où une régression
