  - id: SEC-172
    titre: "Migration 20260711204823_client_portal_activated_at ajoute Client.portalActivatedAt (nullable) sans aucun backfill — le seul chemin qui le renseigne est invoice.service.ts#addPayment sur un NOUVEL évènement de paiement (where: portalActivatedAt: null), qui ne se redéclenche jamais pour une facture DEPOSIT déjà PAID avant cette migration : un client dont l'acompte était déjà payé avant le 2026-07-11 resterait verrouillé hors de son portail indéfiniment"
    perimetre: "server/prisma/migrations/20260711204823_client_portal_activated_at/migration.sql ; server/src/services/invoice.service.ts:250-259 ; server/src/middlewares/rbac.middleware.ts#requireActivatedPortal"
    regle_violee: null
    classe: "migration_champ_derive_sans_backfill"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand tout client ayant une facture DEPOSIT au statut
      PAID (ou PARTIAL suffisant selon la règle métier d'activation) voit
      son `portalActivatedAt` correctement renseigné, y compris pour les
      clients dont ce paiement a eu lieu avant l'introduction de la colonne
      — via un script de backfill ponctuel (`UPDATE "Client" SET
      "portalActivatedAt" = ... WHERE ...` dérivé de l'historique
      `Payment`/`Invoice` existant) — vérifié par une requête confirmant
      qu'aucun client avec un acompte payé n'a `portalActivatedAt IS NULL`.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      3e passe d'audit base de données, item migrations/backfill — exemple
      quasi littéral de ce que l'item 4 de la demande décrivait ("un nouveau
      champ de date dérivé"). Lecture directe :
      `20260711204823_client_portal_activated_at/migration.sql` — un simple
      `ALTER TABLE "Client" ADD COLUMN "portalActivatedAt" TIMESTAMPTZ(6)`,
      aucun `UPDATE` de backfill. Recherche exhaustive (`grep -rn
      "portalActivatedAt" server/`) : le seul point d'écriture est
      `invoice.service.ts:257-258`
      (`prisma.client.updateMany({ where: { id: invoice.clientId,
      portalActivatedAt: null }, data: { portalActivatedAt: new Date() }
      })`), câblé sur l'évènement "paiement reçu sur une facture DEPOSIT"
      (commentaire ligne 252 : distingue explicitement l'activation
      initiale d'un paiement ultérieur sur un client déjà activé). Ce
      chemin ne se déclenche QUE lors d'un NOUVEL évènement `Payment` —
      une facture DEPOSIT déjà au statut `PAID` avant l'introduction de
      cette colonne (2026-07-11) ne génère plus jamais d'évènement de
      paiement (elle est déjà soldée), donc son client reste
      `portalActivatedAt: null` de façon permanente. `requireActivatedPortal`
      (`rbac.middleware.ts:28-47`) bloque explicitement tout accès portail
      CLIENT tant que `activatedAt` est falsy (403
      `PORTAL_NOT_ACTIVATED`) — donc un tel client serait verrouillé hors
      de son propre portail sans recours applicatif, seule une intervention
      manuelle en base le débloquerait. Gravité `majeur` (catégorie
      incohérence menant à un blocage utilisateur direct, pas une simple
      perte de précision de rapport) : dormant à 0 client actif aujourd'hui,
      mais se déclenche automatiquement pour tout client historique dont le
      paiement précède cette migration — à vérifier avant toute mise en
      production si des paiements réels ont eu lieu avant le 2026-07-11.

      RÉSOLU (session en cours), en deux volets :

      1) Backfill ponctuel : nouvelle migration
      `20260721000000_backfill_client_portal_activated_at` (`UPDATE
      "Client" ... FROM (SELECT clientId, MIN(COALESCE(paidAt, updatedAt))
      FROM "Invoice" WHERE invoiceType='DEPOSIT' AND status='PAID' GROUP
      BY clientId) ... WHERE portalActivatedAt IS NULL`), appliquée
      directement sur la base de dev réelle (le SQL exécuté via
      `prisma.$executeRawUnsafe`, puis la migration marquée appliquée avec
      `npx prisma migrate resolve --applied` — PAS `migrate dev`/`deploy`,
      pour ne jamais toucher à la migration externe non commitée déjà en
      attente, `20260720000000_lead_email_unique_active`, hors périmètre de
      cette session). Requête de contrôle immédiate après application :
      zéro client restant avec un acompte `PAID` et `portalActivatedAt
      NULL` (5 clients affectés avant, dont Carrefour/Géant/Monoprix
      Tunisia du seed — 0 après).

      2) CONSTAT SUPPLÉMENTAIRE en écrivant le test de vérification : le
      backfill ponctuel ne corrige que les lignes existantes au moment où
      il tourne — en relançant la suite complète, `server/test/
      projectClientApproveBalanceInvoice.test.ts` (fichier préexistant,
      non modifié) crée une facture DEPOSIT directement au statut `PAID`
      via `prisma.invoice.create`, contournant totalement
      `invoiceService.addPayment` — reproduisant EN DIRECT le même défaut
      pour tout futur chemin d'écriture (import, fixture, action admin
      future) qui poserait un statut PAID sans passer par ce service.
      Une migration ponctuelle ne peut structurellement pas empêcher cette
      récidive. Question posée explicitely au porteur malgré la consigne
      "ne pas interrompre" (jugée nécessaire : un choix d'architecture,
      pas un simple constat) — réponse reçue : "Derive at read-time
      (recommended)". Implémenté dans
      `clientRepository.getPortalActivatedAt` (`client.repository.ts`) :
      si la colonne cache est `null`, une requête de secours cherche une
      facture DEPOSIT/PAID réelle liée au client ; si trouvée, la colonne
      est auto-réparée (`updateMany` sur `portalActivatedAt: null`) et
      l'horodatage réel (`paidAt` sinon `updatedAt` de la facture) est
      retourné — `requireActivatedPortal` (qui appelle cette fonction) ne
      peut donc plus jamais désynchroniser du fait réel "acompte payé",
      quel que soit le chemin d'écriture qui a produit ce fait.

      Preuve par test réel : `server/test/clientPortalActivationBackfill.test.ts`
      (nouveau fichier, importé dans `run-all.test.ts`) — un cas crée un
      Client + une facture DEPOSIT/PAID par écriture DIRECTE (contournant
      `addPayment`, reproduisant le scénario du constat supplémentaire),
      appelle `clientRepository.getPortalActivatedAt` (code réel, la
      fonction dont dépend `requireActivatedPortal`) et vérifie qu'elle
      trouve l'acompte via le repli et auto-répare la colonne ; un second
      cas confirme que le chemin normal (`invoiceService.addPayment` réel)
      active toujours le portail. Suite complète (496 tests) verte :
      `node --test --import tsx test/run-all.test.ts`. `npx tsc --noEmit`
      et `npm run lint --workspace=server` verts. Fix et tests produits
      par mes propres appels d'outils dans cette session ; la migration
      externe `20260720000000_lead_email_unique_active` reste non touchée,
      toujours en attente, comme confirmé par `npx prisma migrate status`
      après ces opérations. Dérogation CI déjà accordée par l'utilisateur
      pour cette session : `resolu` malgré l'absence de run CI vert sur ce
      commit précis.

