  - id: SEC-093
    titre: "Kanban des tâches (TasksKanban.tsx) : ouvrir le détail d'une carte est souris-seule (onClick sur un div sans role/tabIndex/onKeyDown) ; le déplacement clavier dnd-kit reste par ailleurs sans annonce lecteur d'écran"
    perimetre: "4.3 Gestion des tâches — client/src/features/tasks/TasksKanban.tsx#SortableTaskCard"
    regle_violee: null
    classe: "a11y_clavier_lecteur_ecran"
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      Sera résolu quand un utilisateur au clavier seul peut, depuis une
      carte du Kanban, ouvrir le détail de la tâche (Enter/Espace
      déclenchant la même action que le clic) — vérifié par un test qui
      rend `TasksKanban`, met le focus sur une carte et confirme que la
      touche Enter appelle `onTaskClick`. Point distinct de SEC-057 (qui
      ne portait que sur les `aria-label` des boutons icône de
      ProjectsPage) et de SEC-056 (vue carte mobile de la liste).
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Audit a11y/UX LECTURE SEULE du module Gestion de Projets (client),
      lecture directe intégrale. `SortableTaskCard` (TasksKanban.tsx:85-135)
      est un `<Card>` (div) qui porte `onClick={onClick}` pour ouvrir le
      `TaskDetailDrawer`, sans `role="button"`, `tabIndex` ni `onKeyDown`
      propres. Pour une carte DÉPLAÇABLE, dnd-kit injecte via `attributes`
      un `role="button"` et `tabIndex=0` qui la rendent focusable — mais
      la touche Enter/Espace n'y déclenche PAS `onClick` (elle sert au
      ramassage dnd-kit), donc ouvrir le détail au clavier reste
      impossible. Pour une carte NON déplaçable (FREELANCER, tâche non
      assignée : `draggable=false`, listeners omis mais `attributes`
      toujours étalés), elle reçoit quand même `role="button"`+`tabIndex=0`
      de dnd-kit tout en n'ayant aucune action clavier du tout — focusable
      mais inerte. Par ailleurs `DndContext` n'a pas d'`accessibility`/
      `announcements` configuré : un déplacement clavier réussi n'émet
      aucune annonce ARIA traduite FR (dnd-kit fournit des annonces par
      défaut en anglais). Impact concret : un utilisateur clavier/lecteur
      d'écran ne peut pas consulter une tâche depuis la vue Kanban — il
      doit basculer en vue Liste (qui, elle, expose un bouton « Voir »).
      Contournement existant (vue Liste accessible) → gravité mineure,
      mais réel.

      Corrigé (même session, choix du porteur : « Tout traiter (4
      items) ») : `onKeyDown` ajouté à `SortableTaskCard` — la touche
      Enter (jamais réclamée par le `KeyboardSensor` de dnd-kit, qui
      utilise Espace/flèches pour le ramassage/déplacement) déclenche
      désormais `onClick`, sur les cartes déplaçables ET non
      déplaçables. `accessibility.announcements` traduites (FR/EN)
      ajoutées sur `DndContext` (`onDragStart`/`onDragEnd`/
      `onDragCancel`, citant le titre de la tâche) — `onDragOver`
      délibérément laissé au comportement par défaut de dnd-kit
      (mapper fiablement un id de cible de dépôt vers un statut de
      colonne ici aurait été une supposition risquée). Preuve par test
      réel : nouveau fichier `TasksKanban.test.tsx` — rend le
      composant réel, met le focus sur une carte, presse Enter,
      confirme l'appel réel à `onTaskClick`. Vérification complète :
      `npx tsc --noEmit` (client, propre), `npx vitest run` (client,
      90/90), `npm run lint` (client, 12 warnings — SEC-049, stable),
      `npm run build` (succès), `node scripts/check-i18n.mjs` (vert).
      Résolu SANS confirmation CI : workflow GitHub Actions sur
      `origin/main` en `workflow_dispatch` uniquement (déviation
      établie en session le 2026-07-17, citée à chaque clôture
      depuis).

