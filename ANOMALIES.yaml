  - id: SEC-004
    titre: "README.md décrit une architecture multi-tenant inexistante"
    perimetre: "documentation projet — voir REFERENTIEL.md §0 « Documents du projet »"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand README.md ne contient plus aucune affirmation
      multi-tenant ni référence à un middleware tenant, et que sa
      présentation du projet est cohérente avec le caractère mono-tenant
      énoncé en REFERENTIEL.md §1/§7.
    detecte_le: "2026-07-16"
    source: audit_llm
    confiance: certain
    note: >
      Faits vérifiés directement, session du 2026-07-16 : README.md:3
      affirme "a full-stack SaaS platform for agencies and SMEs [...] all in
      one multi-tenant workspace" ; README.md:102 cite un middleware `tenant`
      dans la liste des middlewares du projet — ce fichier n'existe pas
      (server/src/middlewares/ listé : auth, cache, error, logging,
      metricsAuth, mustChangePassword, rateLimit, rbac, upload, validate,
      verifyN8nWebhook — aucun tenant.middleware.ts). Company est un
      singleton strict (`singleton Boolean @default(true)` +
      `@@unique([singleton])`, schema.prisma) ; recherche exhaustive dans
      schema.prisma : aucun champ companyId ni tenantId sur aucun modèle.
      Arbitrage rendu : la cible est un outil interne MONO-TENANT (réponse du
      porteur du projet, session du 2026-07-16, Q2) — voir REFERENTIEL.md §6,
      "Architecture multi-tenant : REJETÉ".

      RÉSOLU (session du 2026-07-17) : README.md:3 reformulé (« a full-stack
      internal platform for a single digital agency [...] mono-tenant
      workspace », au lieu de « multi-tenant workspace ») ; README.md:102
      corrigé (`tenant` retiré de la liste illustrative des middlewares).
      Recherche exhaustive `grep -in "tenant"` sur tout README.md après
      correction : plus aucune occurrence hors la mention correcte
      « mono-tenant » elle-même. Confirmé directement : `ls
      server/src/middlewares/` liste toujours les 11 mêmes fichiers réels
      (auth, cache, error, logging, metricsAuth, mustChangePassword,
      rateLimit, rbac, upload, validate, verifyN8nWebhook), aucun
      `tenant.middleware.ts`.

