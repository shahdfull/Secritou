      dans ce dépôt (aucun `*.test.tsx` pour `features/settings/**`) — la
      garantie tient à la lecture directe confirmant que `MODULES` est
      bien la seule source consommée génériquement, pas à un test. **Limite
      de vérification signalée explicitement : aucun outil de navigateur
      disponible dans cet environnement pour cliquer réellement sur
      Settings → Utilisateurs et confirmer visuellement les 2 nouvelles
      lignes — vérification de niveau code uniquement (typecheck +
      lecture directe du rendu générique), pas un test UI en conditions
      réelles.**

      `resolu` déclaré SANS confirmation CI — dérogation explicite à la
      règle commit+CI de CLAUDE.md, déjà établie par le porteur du projet
