      Nuance par rapport à la formulation du rapport : le déclencheur
      exact est `clientApprove` (l'approbation client qui fait passer
      le projet à COMPLETED), pas un simple changement de statut
      générique — le mécanisme décrit existe bien tel quel, seule la
      description du déclencheur est précisée ici. Aucune action
      requise cette session.

      REVU (session du 2026-07-21, passe « corriger tout les ouvert ») :
      volontairement laissé `ouvert` — le critère de cette entrée le
      prévoit explicitement (« Reste ouvert comme rappel de bonne
      pratique, pas comme travail à faire »), point positif sans défaut à
      corriger ; le passer `resolu` fabriquerait une résolution qui
      n'existe pas. Pas un oubli de cette passe.

  - id: SEC-063
    titre: "L'onglet Mes livrables (FREELANCER) appelle POST /documents pour deposer un livrable, mais cette route est authorize(ADMIN, MANAGER) seul — un FREELANCER recoit systematiquement 403 avant meme le controle requirePermission, jamais atteignable via ce flux"
    perimetre: "4.2 Gestion de projet — server/src/routes/document.routes.ts, server/src/services/document.service.ts, server/src/controllers/document.controller.ts, client/src/features/projects/ProjectDetailPage.tsx"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      Sera résolu quand un FREELANCER peut effectivement déposer un
      livrable depuis l'onglet « Mes livrables » de
      `ProjectDetailPage.tsx` sans recevoir de 403 — soit en ajoutant
      `FREELANCER` à `authorize(...)` sur `POST /documents` (en
      s'assurant que `requirePermission("documents","create")` ou une
      vérification service équivalente empêche alors un FREELANCER de
      créer un document en dehors de ses propres tâches/projets
      assignés), soit via une route dédiée plus restreinte. Décision
      de conception à trancher avec le porteur avant correctif (portée
      exacte de ce qu'un FREELANCER peut créer).
    detecte_le: "2026-07-19"
    source: manuel
    confiance: certain
    note: >
      Découvert incidemment en travaillant sur SEC-060 (pièces jointes
      sur tâche), en vérifiant qui peut légitimement attacher un
      document — enregistré immédiatement conformément à la règle
      CLAUDE.md « enregistrement immédiat de tout écart constaté hors
      d'un audit formel ».

      Confirmé par lecture directe : `client/src/features/projects/
      ProjectDetailPage.tsx` (onglet « Mes livrables », visible
      uniquement `isFreelancer`) appelle `useCreateDocument()` →
      `documentsApi.createDocument` → `POST /documents`. Or
      `server/src/routes/document.routes.ts` ligne 37-43 déclare cette
      route `authorize("ADMIN", "MANAGER")` — `authorize` rejette en
      403 avant même d'atteindre `requirePermission`, pour tout rôle
      hors de cette liste (`rbac.middleware.ts#authorize`, lu
      directement). Aucune autre route de création de document
      n'existe pour FREELANCER dans ce fichier. Ce flux UI existant est
      donc, tel quel, un bouton qui échoue systématiquement en
      production — jamais vérifié par un test d'intégration réel
      (recherche : aucun test n'appelle `POST /documents` avec un
      acteur FREELANCER). Non corrigée lors de sa découverte (hors du
      périmètre demandé à ce moment-là — SEC-060, pièces jointes sur
      tâche —, et nécessitait une décision de conception sur la portée
      exacte de ce qu'un FREELANCER peut créer, non déductible seul).

      Reprise ensuite sur instruction explicite du porteur (« ouii »
      confirmant la poursuite des anomalies ouvertes, puis choix «
      SEC-063 (Recommandé) » via AskUserQuestion parmi les 3 anomalies
      restantes du périmètre). Correctif : `authorize("ADMIN",
      "MANAGER", "FREELANCER")` ajouté à `POST /documents`
      (`document.routes.ts`) ; garde d'autorisation ajoutée dans
      `documentService.create` (nouveau second paramètre `viewer`,
      absent jusqu'ici de cette méthode) — un FREELANCER ne peut créer
      qu'un document `type: "DELIVERABLE"`, et seulement sur un projet
      où il a une tâche assignée (`project.count({ tasks: { some:
      { assigneeId } } })`, même pattern déjà utilisé pour le scope de
      lecture FREELANCER dans `documentRepository`) — sinon 403
      `FREELANCER_DELIVERABLE_ONLY`/`FREELANCER_NOT_STAFFED`. Sans
      cette garde, ajouter `FREELANCER` à `authorize()` seul aurait
      permis à n'importe quel freelancer de créer un document de
      n'importe quel type sur n'importe quel projet de l'entreprise —
      `requirePermission` ne fait rien pour les rôles non-MANAGER
      (confirmé par lecture directe de `rbac.middleware.ts`), donc
      cette vérification service est la seule barrière réelle.

      Effet de bord découvert en écrivant le test réel de ce
      correctif : un test préexistant non écrit cette session
      (`freelancerSeesOwnDeliverable.test.ts`) appelait
      `documentService.create` avec un seul argument — cassé par
      l'ajout du second paramètre `viewer` obligatoire, corrigé en lui
      passant un `viewer` cohérent avec l'intention du test (le second
      cas, qui teste délibérément un document SANS `projectId`, utilise
      `{ role: "ADMIN" }` plutôt que `FREELANCER` pour ne pas se heurter
      à la nouvelle garde qui n'est pas ce que ce test-là vérifie).

      SEC-068 (voir plus bas) découverte incidemment en corrigeant
      celle-ci : même avec cette garde d'autorisation, la création
      échouait quand même car `title` était retiré silencieusement par
      le schéma de validation partagé — corrigée dans la même passe
      sur décision du porteur (« Corriger SEC-068 aussi, dans la même
      passe (Recommandé) »), sans quoi ce correctif SEC-063 n'aurait
      jamais fonctionné réellement.

      Test réel ajouté (avec SEC-068) : `server/test/documentCreateHttp.test.ts`,
      4 cas via `supertest` contre la vraie route HTTP `POST /documents`
      (pas seulement le service) — ADMIN crée un document et son
      `title` persiste ; FREELANCER staffé dépose son livrable avec
      succès ; FREELANCER tentant un type non-DELIVERABLE refusé 403 ;
      FREELANCER non staffé sur le projet refusé 403. Vérification
      complète : voir note de SEC-068 (correctifs et vérification
      livrés dans la même passe).

