  - id: SEC-204
    titre: "3 lacunes d'accessibilité sur des composants transverses à fort réemploi : SortableTableHead.tsx (colonne triable de toutes les listes, LeadsPage + TasksListView) rendait le tri sur un <div onClick> sans role/tabIndex/gestionnaire clavier ni nom accessible ; SearchInput.tsx (5 réemplois) et le champ de recherche globale GlobalSearch.tsx (présent sur chaque page via le header) n'exposaient qu'un placeholder comme seul indice, jamais lu de façon fiable par tous les lecteurs d'écran et disparaissant dès qu'une valeur est saisie"
    perimetre: "client/src/components/common/SortableTableHead.tsx ; client/src/components/shared/crud/SearchInput.tsx ; client/src/components/common/GlobalSearch.tsx"
    regle_violee: null
    classe: "composant_transverse_accessibilite_manquante"
    gravite: mineur
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand un utilisateur clavier seul peut activer le tri
      d'une colonne (Tab puis Entrée/Espace) et entendre son état
      (triée/non triée, ordre) via un lecteur d'écran, et quand chaque
      champ de recherche transverse porte un nom accessible qui survit à
      la saisie — vérifié par un test qui interroge réellement le DOM
      rendu par ces composants partagés (role="button"/aria-sort sur
      l'en-tête triable, aria-label sur les champs de recherche), pas par
      une relecture visuelle seule.
    detecte_le: "2026-07-22"
    source: manuel
    confiance: certain
    note: >
      Demande explicite du porteur : ajouter des `aria-label` sur les
      composants transverses à fort réemploi plutôt que fichier par
      fichier, pour que le gain se propage à toutes les pages
      consommatrices. Revue ciblée des composants partagés à plus haut
      réemploi (`client/src/components/ui/`, `client/src/components/
      common/`, `client/src/components/shared/crud/`) : `Button`,
      `Dialog`, `ConfirmDeleteDialog` (9 réemplois), `DetailDrawer`
      (4 réemplois), `DataTablePagination`, `NotificationBell`, le menu
      compte/paramètres d'`AdminLayout` étaient déjà correctement
      labellisés (texte visible sur les boutons, ou `aria-label`/
      `DialogTitle`+`DialogDescription` déjà en place) — vérifiés sans
      constat. `EntityToolbar.tsx`, `EntityDialog.tsx`, `FilterBar.tsx`,
      `PageHeader.tsx` : 0 réemploi réel (code mort, non traité ici, hors
      périmètre de la demande qui porte sur des composants réellement
      consommés).

      3 lacunes réelles corrigées : (1) `SortableTableHead.tsx` — le
      contrôle de tri était un `<div onClick>` sans aucune sémantique
      interactive ; remplacé par un vrai `<button type="button">` avec
      `aria-label` décrivant la colonne et l'état de tri courant, et
      `aria-sort` posé sur le `<TableHead>` parent (`ascending`/
      `descending`/`none`) — corrige à la fois le clavier (Tab/Entrée
      fonctionnent nativement sur un `<button>`) et le lecteur d'écran
      pour LeadsPage ET TasksListView simultanément, un seul fichier
      touché. (2) `SearchInput.tsx` — ajout de `aria-label={placeholder}`
      en repli, actif pour ses 5 réemplois sans qu'aucun appelant n'ait à
      changer son code. (3) `GlobalSearch.tsx` (recherche globale du
      header, présente sur toutes les pages authentifiées) — même
      correctif, `aria-label={t("search.placeholder")}` sur le champ.
      `Table`/`TableHead` génériques (`ui/table.tsx`) volontairement NON
      modifiés : un `<table>` sans `aria-label` mais avec de vrais
      `<th scope="col">` textuels reste navigable de façon significative
      par un lecteur d'écran (lacune mineure, pas cassée) ; comme le
      composant sert des données différentes sur 14+ pages, lui imposer
      un `aria-label` générique (« tableau de données ») aurait été moins
      utile qu'un attribut natif déjà transmis via `...props` pour
      l'appelant qui veut en poser un — pas de changement nécessaire,
      la capacité existe déjà. `npx tsc --noEmit` (client) et
      `npm run lint --workspace=client` (12 warnings, tous déjà dans
      l'exception documentée du même fichier — aucun nouveau) verts ;
      suite de tests client 117/117 après le changement de structure DOM
      de `SortableTableHead` (div -> button).

      Étendu (même session, demande explicite du porteur) : revue
      systématique du même motif clavier (`role="button"`/`onKeyDown`/
      `tabIndex` manquants sur un élément non nativement interactif)
      sur TOUT `client/src/components/ui/`, `client/src/components/
      common/` et `client/src/components/shared/crud/` — pas seulement
      les composants déjà touchés pour l'`aria-label`. Repéré tout
      `onClick` posé sur un élément non-`<button>` dans ces trois
      dossiers (`SkillTagInput.tsx`, `password-input.tsx`,
      `GlobalSearch.tsx`, `sidebar.tsx` `SidebarTrigger`/`SidebarRail`,
      `DataTablePagination.tsx`, `FileUploadField.tsx`,
      `GlobalErrorBoundary.tsx`, `RouteBoundary.tsx`,
      `SortableTableHead.tsx`) et vérifié chacun individuellement :
      `SortableTableHead.tsx` était la SEULE occurrence réelle du défaut
      dans cet ensemble (déjà corrigée ci-dessus). Tous les autres
      `onClick` recensés sont soit déjà posés sur un vrai `<button>`
      nativement accessible au clavier (`password-input.tsx`,
      `DataTablePagination.tsx`, `FileUploadField.tsx`,
      `GlobalErrorBoundary.tsx`, `RouteBoundary.tsx`, `SidebarTrigger`),
      soit un wrapper `<div onClick>` autour d'un `<input>` déjà
      focusable nativement où le clic ne fait que reporter le focus sur
      l'élément déjà interactif (`GlobalSearch.tsx` ligne 101,
      `SkillTagInput.tsx` ligne 61-64 — Tab atteint directement le vrai
      champ, le div n'est pas un contrôle indépendant), soit un
      composant Radix (`accordion`, `select`, `tabs`, `radio-group`,
      `switch`, `checkbox`, `navigation-menu`) dont le primitive
      garantit déjà `role`/`tabIndex`/gestion clavier complète en
      interne — vérifiés sans constat. `SidebarRail` pose délibérément
      `tabIndex={-1}` (affichage souris-seul de redimensionnement,
      `SidebarTrigger` sert d'équivalent clavier) — comportement voulu,
      pas un oubli. Aucun changement de code supplémentaire nécessaire
      pour ce volet : la lacune identifiée par le porteur n'avait qu'une
      seule occurrence réelle dans les composants transverses, déjà
      traitée.

  - id: SEC-205
    titre: "LeadDetailDialog.tsx : useLead ne déstructure jamais isLoading — pendant que la fiche détaillée (avec les propositions liées) est en cours de chargement, current retombe sur la prop lead issue de la liste, qui ne porte jamais proposals, et la section affiche « aucune proposition liée » alors que le lead en a peut-être réellement, juste pas encore chargées (faux état vide, pas seulement un indicateur de chargement manquant)"
    perimetre: "client/src/features/leads/LeadDetailDialog.tsx (ligne 42, avant correctif)"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand l'ouverture de la fiche détail d'un lead ayant
      des propositions liées affiche un indicateur de chargement pendant
      la requête `useLead`, puis les propositions réelles une fois
      chargées — jamais le message « aucune proposition » avant que le
      chargement ne soit terminé — vérifié par un test qui rend le vrai
      composant, retarde volontairement la résolution de la requête, et
      confirme l'absence du message vide pendant ce délai.
    detecte_le: "2026-07-22"
    source: manuel
    confiance: certain
    note: >
      Découvert en répondant à la demande explicite du porteur de
      généraliser EmptyState/skeleton aux fichiers `features/*.tsx` sans
      état de chargement/vide géré. Audit large (agent dédié) sur
      l'ensemble des pages/composants `features/*.tsx` consommant une
      requête : ~52 fichiers géraient déjà les deux états correctement
      (en JSX ad-hoc, pas via un composant partagé — le porteur a choisi
      de ne pas les migrer, leur état actuel étant fonctionnel), 0 fichier
      n'avait ni l'un ni l'autre. Un seul vrai trou trouvé :
      `LeadDetailDialog.tsx` a bien un état vide (`proposals.length === 0`)
      mais aucun état de chargement — `useLead(...)` n'y déstructurait que
      `data`, jamais `isLoading`/`isPending`. Concrètement, `current`
      (ligne 43, `detailedLead ?? lead`) retombe sur la prop `lead` issue
      de la liste/Kanban tant que la requête détaillée n'a pas résolu ; or
      cette prop ne porte jamais `proposals` (absent du payload de liste),
      donc `proposals` vaut `[]` et le composant affiche le message vide
      AVANT que la vraie réponse (potentiellement non vide) n'arrive — un
      faux négatif visible à chaque ouverture de la fiche, pas seulement
      une absence de spinner cosmétique.

      Corrigé dans la même session : `isLoading` (renommé
      `isLoadingDetail`) déstructuré de `useLead`, un indicateur de
      chargement (spinner + texte `common.loading`) inséré avant le test
      `proposals.length === 0` dans le rendu de la section propositions.
      Preuve par test réel (nouveau fichier
      `client/src/features/leads/LeadDetailDialog.test.tsx`) : mocke
      `@/api/axios` (le vrai module HTTP, pas le hook) avec une promesse
      dont la résolution est retardée manuellement, confirme que le
      message vide n'apparaît PAS pendant l'attente, puis que la vraie
      proposition s'affiche une fois la promesse résolue ; second test
      confirme le message vide réel une fois la requête résolue sans
      proposition. `npx tsc --noEmit` et `npm run lint --workspace=client`
      (12 warnings, exception déjà documentée, aucun nouveau) verts ;
      suite de tests client complète 119/119 (35 fichiers, +1 fichier/+2
      tests). Statut `en_cours` : correctif non encore committé.

  - id: SEC-206
    titre: "3 tokens du design system échouaient WCAG AA une fois réellement mesurés (conversion oklch -> sRGB puis ratio de contraste) : --border/--input quasi invisibles (~1.2-1.3:1 au lieu de 3:1 requis pour une limite non-texte, clair ET sombre) sur les champs de formulaire ; --accent-foreground réutilisé tel quel sur le badge bg-accent-soft en mode sombre alors qu'il est conçu pour du texte sombre sur --accent (encore clair en mode sombre), donnant 1.28:1 au lieu de 4.5:1 sur 8 fichiers de badges de statut"
    perimetre: "client/src/styles.css (--border, --input, --accent-foreground/--accent-soft) ; 8 fichiers consommateurs du badge accent-soft (ApprovalsPage.tsx, ProposalsClientPage.tsx, CommissionsPage.tsx, DashboardCharts.tsx, DashboardPage.tsx, InvoicesPage.tsx ×2, ProposalsPage.tsx, ProductDashboard.tsx)"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand tous les tokens de couleur du design system
      (client/src/styles.css, modes clair ET sombre) satisfont WCAG 2.1 AA
      (4.5:1 texte normal, 3:1 texte large/UI non-texte) sur chaque paire
      fond/premier-plan réellement consommée par un composant du dépôt —
      vérifié par un script qui convertit chaque token oklch() en sRGB,
      calcule le ratio de contraste réel (pas une estimation visuelle), et
      échoue si une seule paire est sous le seuil requis ; ce script tourne
      en CI sur chaque push/PR (aucune régression future ne peut être
      mergée sans être détectée).
    detecte_le: "2026-07-22"
    source: manuel
    confiance: certain
    note: >
      Demande explicite du porteur : passer les tokens du design system
      dans un vérificateur de contraste WCAG AA, faisable en dev sans
      donnée de production. Nouveau script autonome
      `scripts/check-contrast.mjs` (sans nouvelle dépendance npm, décision
      explicite du porteur) : parse `:root`/`html.dark` dans styles.css,
      convertit chaque `oklch(L C H)` en sRGB via les matrices standard
      OKLab -> linear-sRGB (formules CSS Color 4 / Björn Ottosson),
      calcule la luminance relative et le ratio WCAG réels — conversion
      vérifiée par sanity-check (oklch(1 0 0) -> blanc pur, oklch(0 0 0)
      -> noir pur). 18 paires par mode (36 au total) construites à partir
      des combinaisons fond/premier-plan RÉELLEMENT utilisées par les
      composants (grep sur `client/src/components/ui` et `client/src/
      features`), pas un produit cartésien de tous les tokens.

      3 échecs réels confirmés (valeurs hex calculées pour élimination du
      doute) : (1) `--border`/`--input` clair (`#e3ddd8`/`#eae3de` sur fond
      `#fdfbfa`) et sombre : ~1.2-1.3:1, un liseré de champ de formulaire
      quasi invisible, très en dessous du minimum non-texte 3:1 (WCAG
      1.4.11) — corrigé en assombrissant `--border`/`--input` clair de
      L=0.9/0.92 à L=0.66, et en éclaircissant leurs équivalents sombres
      de L=0.22/0.2 à L=0.47, jusqu'à 3.0:1 exact dans les deux modes.
      (2) `primary` sur `primary-soft` (paire testée initialement) :
      3.72:1 en texte — mais vérification des consommateurs réels
      (`grep` sur `text-primary.*bg-primary-soft`) montre que TOUS les
      badges de statut utilisent déjà `primary-strong` (créé lors d'un
      audit a11y antérieur, cf. commentaire déjà présent dans
      styles.css) ; seul un icône décoratif (ContactPage.tsx:332) utilise
      `text-primary`/`bg-primary-soft`, contenu non-texte sous le seuil
      3:1 qu'il satisfait déjà — pas un constat réel, le script corrigé
      pour tester `primary-strong` (la vraie paire texte) au lieu de
      `primary`. (3) `--accent-foreground` sombre (`#050302`) sur
      `--accent-soft` sombre (`#2f1c19`) : 1.28:1 — bug de réutilisation
      croisée claire/sombre du même token : `--accent-foreground` est
      conçu comme texte sombre pour `--accent` (qui reste clair en mode
      sombre, `oklch(0.75 0.06 30)`) et fonctionne très bien pour cet
      usage (grep confirme des dizaines d'usages réels dans les menus/
      dropdowns/calendrier), mais les 8 fichiers de badges de statut
      l'utilisaient AUSSI sur `--accent-soft`, qui lui devient une teinte
      sombre en mode sombre — la même paire qui marche en mode clair
      s'effondre en mode sombre. Corrigé en créant un nouveau token
      `--accent-strong` (miroir exact de `--primary-strong`, même
      convention déjà établie dans ce dépôt), calculé séparément pour
      chaque mode (clair : `oklch(0.5 0.048 30)`, 4.95:1 ; sombre :
      `oklch(0.88 0.06 30)`, 11.02:1), et migré les 8 fichiers consommant
      la paire `bg-accent-soft`+`text-accent-foreground` vers
      `text-accent-strong` — `--accent-foreground` lui-même non modifié
      (aurait cassé ses dizaines d'usages réels et corrects sur
      `--accent`).

      Script câblé en CI (`.github/workflows/ci.yml`, nouveau job
      `contrast-check`, même structure que `i18n-check`) — non
      contournable pour une future régression de token. `npx tsc
      --noEmit`, `npm run lint --workspace=client` (12 warnings,
      exception déjà documentée, aucun nouveau) et la suite de tests
      client complète (119/119) verts après les changements de tokens et
      de classes Tailwind. Statut `en_cours` : correctifs non encore
      committés.

  - id: SEC-207
    titre: "Diff Swagger vs comportement réel sur Invoice/Proposal/Project : 5 divergences réelles trouvées — POST/respond proposal documentent un conflit de version en 400 alors que PROPOSAL_VERSION_MISMATCH/INVALID_PROPOSAL_TRANSITION/PROPOSAL_EXPIRED sont réellement des 409 ; POST /proposals documente un 403 générique pour un dépassement de scope MANAGER qui renvoie en réalité des 404 (Lead/Client not found) ; clientInvited documenté comme reflétant une invitation réelle alors qu'il vaut toujours false (RG-018/SEC-002) ; POST/PUT /projects omettent totalement le champ status (et serviceId pour PUT) du schéma de requête documenté alors qu'il est réellement accepté ; GET /projects documentait un stub {id,name,description} au lieu du vrai schema Project (lui-même incomplet, corrigé dans la même passe)"
    perimetre: "server/src/routes/proposal.routes.ts, server/src/routes/project.routes.ts, server/src/swagger.ts#Project"
