      `for (const row of rows) { created.push(await tx.commission.create({
      data: row, include: {...} })) }`, avec un commentaire explicite ligne
      46 : « Create one by one to return the created records » — limitation
      connue de l'API Prisma `createMany` (ne supporte pas `include`/le
      retour des lignes créées dans les versions historiques de Prisma).
      `rows` correspond aux partenaires ayant une part sur un projet
      (`ProjectCommissionSplit`), borné par le nombre d'associés de
      l'agence (REFERENTIEL.md : 1 CEO + 3 associés) — donc N ≤ 4 dans la
