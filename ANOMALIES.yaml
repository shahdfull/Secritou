  - id: SEC-006
    titre: "Champ phone du portail Client : jamais relu, jamais pré-rempli, jamais effaçable"
    perimetre: "4.14 Authentification & Compte utilisateur"
    regle_violee: null
    classe: "type_frontend_desynchronise_du_schema_prisma"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un utilisateur du portail Client peut (1) saisir son
      numéro et l'enregistrer, (2) recharger la page et le voir affiché en
      lecture ET pré-rempli dans le formulaire d'édition, (3) l'effacer et
      obtenir qu'il soit réellement supprimé — vérifié par un test
      d'intégration couvrant les trois, écrire/relire/effacer via l'API.
    detecte_le: "2026-07-16"
    source: audit_llm
    confiance: certain
    note: >
      RÉOUVERTE, session du 2026-07-16 (audit 4.14) : trois défauts distincts,
      même critère de résolution, un seul ID.
      (a) jamais relu — `userPublicFields` (server/src/repositories/
      user.repository.ts:6-16) ne sélectionne pas `phone` ; `toAuthUser`
      (server/src/services/auth.service.ts:25-36) ne le mappe pas ;
      `client/src/types/auth.ts` ne le déclare pas ; la vue lecture
      (client/src/features/client-portal/ClientProfilePage.tsx:217-230) ne
      l'affiche pas.
      (b) jamais pré-rempli — `phone: ""` codé en dur
      (ClientProfilePage.tsx:70, :80), impossible à initialiser depuis
      `user?.phone` puisque le type ne porte pas le champ.
      (c) jamais effaçable — `data.phone || undefined`
      (ClientProfilePage.tsx:87) transforme `""` en `undefined` (confirmé :
      `"" || undefined` → `undefined` en JS), que Prisma omet de l'UPDATE. Un
      numéro une fois enregistré ne peut plus jamais être retiré par
      l'utilisateur. Vérifié : ce n'est PAS un écrasement actif (Prisma
      ignore `undefined`, la valeur en base n'est pas altérée) — c'est un
      blocage de suppression, distinct de la perte de données initialement
      crainte.
      (d) le swagger de user.routes.ts:87-92 documente `PATCH /users/me` sans
      `phone` alors que le validateur l'accepte (user.validator.ts:8).
      Historique : SEC-006 avait été déclarée `resolu`/`en_cours` par la
      migration du 2026-07-16 (ajout du champ `phone` au modèle `User`) sur
      un critère défectueux (« ne provoque plus d'erreur »), qui testait
      l'absence d'un symptôme au lieu de la présence de la fonction. La
      feature est passée d'une erreur 500 visible à une perte silencieuse —
      pire, pas mieux. Gravité redescendue de `bloquant`-candidate à `majeur` :
      le 500 est corrigé (le champ existe désormais en base), mais la feature
      ne fonctionne toujours pas de bout en bout.

      CORRECTIF ÉCRIT (pas résolu), session du 2026-07-16 (audit + correction
      4.14, mode rapide) : les trois défauts (a)(b)(c) corrigés.
      (a) `phone` ajouté à `userPublicFields`
      (server/src/repositories/user.repository.ts:6-17) et à `toAuthUser`/
      `issueTokens` (server/src/services/auth.service.ts:25-37, :219-222) ;
      `client/src/types/auth.ts` porte désormais `phone?: string | null` ;
      la vue lecture de ClientProfilePage.tsx affiche `user?.phone`.
      (b) le formulaire d'édition pré-remplit `phone: user?.phone ?? ""`
      (ClientProfilePage.tsx:70, :80) au lieu de `""` codé en dur.
      (c) `handleProfileSubmit` envoie désormais `phone: data.phone || null`
      (ClientProfilePage.tsx:87-90) — un champ vidé écrit explicitement
      `null` (effacement réel), au lieu de `undefined` (omis par Prisma, donc
      jamais effaçable). `user.controller.ts:20` et `updateMeSchema`
      acceptent déjà `phone: string | null`.
