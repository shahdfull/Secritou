      `CreateProjectForm`, `useCreateProject`). Le formulaire d'ÉDITION
      (`editForm`/`handleEdit`, sur un projet existant, sans
      `proposalId`) reste intact et fonctionnel — seul le chemin de
      CRÉATION directe est retiré. Route serveur `POST /projects`
      (validateur, service) volontairement non touchée : reste
      disponible pour un futur usage programmatique/API directe si
      besoin, seul le point d'entrée UI cassé est retiré.

      Aucun test ajouté : retrait de code mort côté UI, pas de nouvelle
      logique métier à prouver — la garantie tient au typecheck (0
      erreur après retrait, confirmant qu'aucun autre code du dépôt ne
