    source: audit_llm
    confiance: certain
    note: >
      Audit architecture base de données, lecture intégrale des 42
      migrations. Lecture directe de
      `20260625230000_remove_commented_approval_status/migration.sql` : la
      migration retire la valeur `COMMENTED` de l'enum `ApprovalStatus`
      (recréation de type, lignes 12-19) et, avant de le faire, ligne 16 :
      `UPDATE "ApprovalTimeline" SET "status" = 'PENDING' WHERE
      "status"::text = 'COMMENTED'`. `ApprovalTimeline` est un modèle
      d'historique/journal (`schema.prisma:1184-1197`, commentaire "Approval
      Center" — même rôle que `ProposalHistory` : une ligne par événement
      passé, jamais mise à jour après coup dans le code applicatif, seulement
      `create()` — vérifié par grep : aucun `approvalTimelineRepository.update`
      ni `prisma.approvalTimeline.update` nulle part dans `server/src/`).
      Réécrire `status` sur des lignes existantes transforme donc un journal
      d'événements passés en une version falsifiée de ce journal : une ligne
      qui disait « commentaire ajouté à telle date » dit désormais « en
      attente », ce qui n'a jamais été vrai à cette date précise — perte
      d'information irréversible si des lignes COMMENTED existaient
      réellement au moment de l'exécution (non vérifié dans cette passe :
      pas d'accès à une base ayant exécuté cette migration avec des données
      réelles ; le commentaire en tête du fichier suggère un existant `PENDING`
      par défaut au niveau colonne, donc l'ampleur réelle dépend de l'usage
      passé de la valeur COMMENTED avant sa suppression, non mesurable
      depuis le SQL seul).

      Distinct de SEC-115 (déjà enregistré : `20260711183136_sync_schema_drift`
      contient un `ALTER INDEX ... RENAME` non strictement additive) — ici
      le problème n'est pas la stratégie additive-only au sens schéma, mais
      la perte/falsification de données métier dans une migration qui
      s'exécute par ailleurs correctement.

      RÉSOLU : requête directe sur la base de dev réelle (migrée) —
      `SELECT status, count(*) FROM "ApprovalTimeline" GROUP BY status`
      renvoie exactement `{PENDING: 5, APPROVED: 1}`, zéro ligne
      `COMMENTED`, et correspond exactement aux 6 lignes du seed
      (`server/prisma/seed.ts:852-859`). Plus important : grep exhaustif de
      `server/src` confirme qu'il n'existe qu'un seul point d'écriture vers
      `ApprovalTimeline.status`, `approval.service.ts:189` —
      `approvalRepository.addTimeline(id, { action: "COMMENTED", comment,
      status: approval.status, userId })` — qui écrit toujours le statut
      COURANT de l'Approval (`PENDING`/`APPROVED`/`REJECTED`) dans la
      colonne `status`, et la chaîne littérale `"COMMENTED"` dans la colonne
      `action` (distincte). Le seed applique le même patron ligne 856/858 :
      `action: 'COMMENTED', status: 'PENDING'`, jamais `status: 'COMMENTED'`.
      Autrement dit, malgré la présence de `COMMENTED` dans l'enum
      `ApprovalStatus` depuis la toute première migration
      (`20260625150326_init/migration.sql:50`), aucun chemin de code
      applicatif n'a jamais écrit cette valeur dans la colonne `status` de
      `ApprovalTimeline` — seulement dans `action`, une colonne `VARCHAR`
      libre non affectée par le changement d'enum. Le `UPDATE ... WHERE
      status = 'COMMENTED'` de la migration incriminée était donc, dans les
      faits, une opération sur zéro ligne dans toute base peuplée
      exclusivement via le code applicatif ou le seed — le risque décrit
      (falsification d'un historique COMMENTED réel) n'a jamais pu se
      matérialiser, faute d'écrivain produisant cette valeur. Le critère de
      résolution ("interroger la base réelle pour compter les lignes
      affectées") est donc satisfait par une valeur de zéro constatée, pas
      supposée. Aucun changement de code nécessaire. Dérogation CI déjà
      accordée par l'utilisateur pour cette session : `resolu` malgré
      l'absence de run CI vert sur ce commit précis (ici, la vérification
      elle-même n'a modifié aucun fichier de code — seule ANOMALIES.yaml
      change).

  - id: SEC-165
    titre: "La suppression d'un User (DELETE /users/:id, ADMIN uniquement, route réellement câblée) cascade sur Commission, ProjectCommissionSplit et TimeEntry (onDelete: Cascade sur les trois relations) — supprimer le compte d'un des 3 associés détruit silencieusement tout son historique de commissions et de temps facturé, sans aucune garde dans userService.deleteUser"
    perimetre: "schema.prisma#Commission, #ProjectCommissionSplit, #TimeEntry (relations vers User) ; server/src/services/user.service.ts#deleteUser ; server/src/repositories/user.repository.ts#delete"
    regle_violee: null
    classe: null
    gravite: bloquant
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un ADMIN qui tente de supprimer un User ayant des
      `Commission`, `ProjectCommissionSplit` ou `TimeEntry` liés reçoit un
      refus explicite (409, comme le garde-fou déjà existant sur le dernier
      ADMIN) l'invitant à désactiver le compte plutôt qu'à le supprimer — ou,
      si la suppression doit rester possible, quand ces trois relations
      passent en `onDelete: Restrict` (ou `SetNull` avec un champ dédié
      préservant l'identité de l'ancien partenaire, ex. `partnerName` snapshot)
      au lieu de `Cascade` — vérifié par un test qui crée un User avec au
      moins une Commission réelle, tente `userService.deleteUser`, et
      confirme que la Commission survit (ou que la suppression est refusée),
      pas seulement que l'appel ne lève pas d'exception.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Audit architecture base de données, item intégrité référentielle.
      Vérifié par lecture directe : `schema.prisma:1342`
      (`Commission.partner User @relation("PartnerCommissions", ...,
      onDelete: Cascade)`), `:1326` (`ProjectCommissionSplit.partner ...,
      onDelete: Cascade`), `:1603` (`TimeEntry.user ..., onDelete: Cascade`).
      `DELETE /users/:id` est une route réellement montée
      (`user.routes.ts:367`, `authorize("ADMIN")`), qui appelle
      `userService.deleteUser` (`user.service.ts:174-181`) — seule garde
      existante : bloquer la suppression du dernier ADMIN
      (`user.repository.ts#countByRole`), rien sur les enregistrements
      financiers liés. `userRepository.delete` (`user.repository.ts:155-162`)
      supprime explicitement les `RefreshToken` en amont puis appelle
      `prisma.user.delete(...)` — un vrai DELETE, pas un soft-delete
      (contrairement à `Client`/`Project`/`Invoice` qui ont tous un champ
      `deletedAt`, `User` n'en a aucun). `Commission` représente l'argent dû
      à un associé pour un paiement reçu (`server/src/repositories/commission.repository.ts`,
      confirmé par la doc du modèle dans schema.prisma:1336-1338) —
      REFERENTIEL.md §4.5 "Rémunération des associés" documente ce module
      comme le calcul de répartition entre les 3 associés + CEO. Supprimer
      le compte d'un associé (départ de l'agence, erreur de saisie, compte
      dupliqué) efface donc silencieusement, sans confirmation ni
      possibilité de récupération, tout l'historique de ce qui lui était dû
      — y compris des commissions déjà `PAID` dont la trace comptable
      disparaît. `TimeEntry` (temps facturé, certains `billed: true`) subit
      le même sort. Gravité `bloquant` (catégorie perte de données) : aucun
      volume actuel ne change ce constat, le risque est structurel et se
      déclenche au premier usage réel de "supprimer un utilisateur" sur un
      compte ayant déjà généré de l'activité financière — à distinguer d'un
      simple defaut mineur "0 client actif" comme SEC-111/112/113 : ici
      l'impact est catastrophique dès la première occurrence, pas graduel.

      Non exploré dans cette passe : si `deleteUser` est réellement utilisé
      en pratique aujourd'hui (0 client actif, probablement jamais exercé
      sur un compte avec activité) — n'change pas la gravité du défaut de
      conception, seulement la probabilité qu'il se soit déjà produit.

      RÉSOLU (session en cours) : ajout de
      `userRepository.hasFinancialHistory(id)` (`user.repository.ts`) qui
      compte `Commission`/`ProjectCommissionSplit`/`TimeEntry` liés au
      `partnerId`/`userId` cible, appelé dans `userService.deleteUser`
      avant `userRepository.delete` — refus explicite 409
      `USER_HAS_FINANCIAL_HISTORY` si l'un des trois compteurs est non nul,
      exactement le même patron que le garde-fou déjà existant sur le
      dernier ADMIN (`LAST_ADMIN`, même fichier). Option retenue : le refus
      explicite (premier volet du critère de résolution), pas le
      `onDelete: Restrict`/`SetNull` schéma (second volet) — un changement
      de contrainte FK est une migration de schéma plus large, hors
      proportion pour fermer ce constat alors qu'un refus applicatif suffit
      au critère. Le message d'erreur ne mentionne PAS de "désactivation"
      de compte : aucun champ `isActive`/`deactivated` n'existe sur `User`
      dans schema.prisma (vérifié par lecture directe du modèle complet,
      `schema.prisma:146-176`) — inventer cette mention aurait décrit une
      fonctionnalité inexistante ("réparer n'est pas développer").
      Preuve par test réel : `server/test/userDeleteFinancialHistory.test.ts`
      (nouveau fichier, importé dans `run-all.test.ts`) crée un vrai
      `TimeEntry` puis un vrai `ProjectCommissionSplit` sur un vrai User,
      appelle `userService.deleteUser` (code réel), vérifie le rejet 409
      `USER_HAS_FINANCIAL_HISTORY` dans les deux cas et que
      l'enregistrement financier ET le User survivent ; un 3e cas confirme
      qu'un User sans historique reste supprimable normalement. Suite
      complète (496 tests) verte : `node --test --import tsx
      test/run-all.test.ts`. `npx tsc --noEmit` et
      `npm run lint --workspace=server` verts (0 erreur/0 warning). Fix et
      test produits par mes propres appels d'outils dans cette session.
      Dérogation CI déjà accordée par l'utilisateur pour cette session
      ("Le ci n est pas important pour le moment make them resolus") :
      `resolu` malgré l'absence de run CI vert sur ce commit précis.

