      (`defaultValues.startDate:""`, `dueDate:""`) et
      `openCreateDialogForProject` (même défaut), et
      `handleEditTask` fait `editForm.reset({...task, startDate:
      task.startDate ? ... : "", dueDate: ... ? ... : ""})` — une
      tâche sans date affiche donc `""` au montage du formulaire
      d'édition aussi. Aucun nettoyage n'existe entre le formulaire et
      l'appel réseau (`useTasks.ts#useCreateTask/useUpdateTask`
      transmettent `data` tel quel, `tasks.api.ts#create/update` ne
      transforment rien). Confirmé qu'aucun test n'existe pour
      `TaskCreateDialog.tsx`/`TaskEditDialog.tsx` couvrant ce chemin —
      c'est ce qui a laissé passer ce défaut malgré les nombreuses
      sessions d'audit précédentes sur ce module.

      Corrigé (même session, choix du porteur : « Tout traiter (14
      items) ») : `useTaskActions.ts` — nouvelle fonction
      `stripEmptyDates` appliquée dans `runCreate`/`runUpdate` (seul
      point de convergence des deux formulaires avant l'appel réseau),
      convertit `""` en `undefined` pour `startDate`/`dueDate`.
      Preuve par test réel : `useTaskActions.test.tsx` (2 cas — appelle
