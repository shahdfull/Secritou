  - id: SEC-145
    titre: "error.middleware.ts : ZodError sort sans l'enveloppe {error:{code,message}} que portent toutes les autres branches (P2002, Multer, HttpError, 500 générique), rendant le format d'erreur non uniforme pour un client API"
    perimetre: "server/src/middlewares/error.middleware.ts"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand la branche ZodError (error.middleware.ts:74-81)
      renvoie la même enveloppe `{ error: { code, message, details },
      message, details }` que les autres branches (avec `code:
      "VALIDATION_ERROR"` et `details` portant `error.flatten()`), ET
      qu'un test appelant une route réelle avec un payload invalide vérifie
      la présence de `body.error.code` sur la réponse 422 — pas seulement
      `body.message`/`body.issues` comme aujourd'hui.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Vérifié par lecture directe, error.middleware.ts : la branche P2002
      (l.14-20), Multer (l.42-48), le générique `statusCode` (l.64-70),
      HttpError (l.85-93) et le 500 générique (l.100-106) renvoient toutes
      `{ error: { code, message, ... }, message, ... }`. Seule la branche
      ZodError (l.76-79) déroge : `{ message: "Validation failed", issues:
      error.flatten() }` — pas de clé `error.code`, pas de clé `details`.
      Un client qui parse uniformément `body.error.code` sur toute réponse
      d'erreur (au lieu de brancher sur la présence/absence de la clé)
      obtient `undefined` spécifiquement sur les 422 de validation, le cas
      d'erreur le plus fréquent en pratique (saisie utilisateur invalide).

      CORRECTIF ÉCRIT (pas résolu — non commité, pas encore de test
      dédié), session du 2026-07-20 : branche ZodError modifiée pour
      renvoyer `{ error: { code: "VALIDATION_ERROR", message, details },
      message, issues, details }` — `issues` conservé pour compatibilité
      avec d'éventuels consommateurs existants (aucun trouvé côté
      client/src par grep), `details` et `issues` portent la même valeur
      (`error.flatten()`). Suite `test:unit` complète 453/453 verte après
      le changement (aucune régression), mais aucun nouveau test n'assère
      spécifiquement `body.error.code === "VALIDATION_ERROR"` sur un 422 —
      le critère de résolution formel n'est donc pas encore rempli malgré
      le correctif.

