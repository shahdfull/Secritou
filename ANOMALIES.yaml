  - id: SEC-184
    titre: "creditNoteService.create ne vérifie le montant du nouvel avoir que contre invoice.amountPaid, jamais contre la somme des avoirs déjà émis sur la même facture — des avoirs cumulés peuvent dépasser ce que le client a réellement payé, créditant client.creditBalance au-delà du montant reçu"
    perimetre: "4.4 Facturation — server/src/services/creditNote.service.ts#create (lignes 48-61)"
    regle_violee: null
    classe: "garde_montant_cumulatif_manquante"
    gravite: bloquant
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand la garde de `creditNoteService.create` compare
      le nouveau montant à `invoice.amountPaid MOINS la somme des
      avoirs déjà émis sur cette facture (statut confirmé, non annulé)`,
      pas seulement à `invoice.amountPaid` seul — prouvé par un test qui
      appelle réellement `creditNoteService.create` deux fois de suite
      sur la même facture payée intégralement (ex. 1000 payés, un
      premier avoir de 800 accepté, un second avoir de 700 doit être
      refusé alors qu'il passerait aujourd'hui puisque 700 < 1000).
    detecte_le: "2026-07-21"
    source: audit_llm
    confiance: certain
    note: >
      Audit finance/RevOps (item 3, avoirs). Vérifié par lecture directe :
      `creditNote.service.ts:48-61` — la seule garde est `if (data.amount
      > Number(invoice.amountPaid)) throw new HttpError(409, ...,
      "CREDIT_EXCEEDS_PAID")`, exécutée dans une transaction (`tx`, pas
      de TOCTOU sur la lecture elle-même) mais qui ne relit ni ne somme
      jamais `tx.creditNote.findMany({ where: { invoiceId } })`. Scénario
      concret : facture de 1000 TND intégralement payée
      (`amountPaid = 1000`) ; un premier avoir de 800 TND est émis
      (remboursement partiel) — passe (800 ≤ 1000),
      `client.creditBalance` incrémenté de 800 ; un second avoir de 700
      TND est émis sur la MÊME facture par erreur ou abus — passe
      également (700 ≤ 1000, la vérification ignore le premier avoir) —
      total des avoirs = 1500 TND sur une facture qui n'a rapporté que
      1000 TND à l'agence, `client.creditBalance` gonflé de 400 TND
      au-delà de ce qui a réellement été reçu. Gravité `bloquant` (perte
      d'argent réelle, pas juste une incohérence comptable) : ce
      `creditBalance` gonflé est ensuite consommable via `POST
      /invoices/{id}/apply-credit` pour réduire le montant dû sur
      D'AUTRES factures — la fuite ne reste pas cantonnée à la facture
      d'origine. Non vérifié dans cette passe : si un avoir peut être
      annulé/inversé (auquel cas la somme devrait exclure les avoirs
      annulés) — `CreditNote` n'a pas de champ `status` dans le schéma
      lu, seulement `appliedAt`/`appliedToInvoiceId`, donc probablement
      aucune notion d'annulation d'avoir n'existe — à confirmer si
      pertinent pour la correction exacte.

      RÉSOLU (session en cours) : `creditNoteService.create` calcule
      désormais, à l'intérieur de la même transaction,
      `tx.creditNote.aggregate({ where: { invoiceId }, _sum: { amount }
      })` et compare le nouveau montant à `invoice.amountPaid -
      alreadyCredited` au lieu de `invoice.amountPaid` seul. Confirmé
      dans cette même passe que `CreditNote` n'a effectivement aucun
      champ de statut/annulation (relecture complète du modèle,
      `schema.prisma:1368-1386` : `appliedAt`/`appliedToInvoiceId`
      seulement) — donc chaque ligne compte inconditionnellement dans la
      somme, cohérent avec l'absence de toute notion d'annulation dans
      le code applicatif. Preuve par test réel
      (`server/test/creditNoteCumulativeAmount.test.ts`) : appelle
      `creditNoteService.create` deux fois de suite sur la même facture
      de 1000 TND intégralement payée — exactement le scénario du
      critère de résolution (800 puis 700, le second refusé avec 409
      `CREDIT_EXCEEDS_PAID`, `creditBalance` resté à 800) — plus un cas
      de contrôle où deux avoirs qui somment exactement au montant payé
      (400+600) réussissent tous les deux. Suite complète verte (499
      tests), `npx tsc --noEmit` et `npm run lint --workspace=server`
      verts. Fix et test produits par mes propres appels d'outils dans
      cette session. Dérogation CI déjà accordée par l'utilisateur pour
      cette session : `resolu` malgré l'absence de run CI vert sur ce
      commit précis.

