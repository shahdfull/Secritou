  - id: SEC-167
    titre: "Trois colonnes portent à la fois une contrainte @unique/@@unique ET un @@index séparé sur exactement les mêmes colonnes (User.email, FreelancerApplication.email, Payment.idempotencyKey) — un index redondant qui n'apporte aucun bénéfice de requête (la contrainte unique crée déjà son propre index) mais double le coût d'écriture (INSERT/UPDATE) et l'espace disque sur ces colonnes"
    perimetre: "schema.prisma#User (lignes 200+203), #FreelancerApplication (lignes 891-892), #Payment (ligne 966+978)"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `@@index([email])` est retiré de `User` et de
      `FreelancerApplication`, et `@@index([idempotencyKey])` retiré de
      `Payment` (la contrainte `@unique`/`@@unique` sur ces mêmes colonnes
      couvre déjà toute recherche par égalité) — vérifié par
      `\d "User"`/`\d "Payment"` sur la base après migration, confirmant
      un seul index par colonne concernée au lieu de deux.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Audit architecture base de données, item types et contraintes.
      Vérifié par lecture directe et exhaustive de tout `schema.prisma`
      (1683 lignes) : `User` (lignes 200-203) déclare `@@unique([email])`
      PUIS `@@index([email])` juste en dessous sous le commentaire
      "// Indexes for faster queries" ; `FreelancerApplication` (lignes
      891-892) même patron exact : `@@unique([email])` suivi de
      `@@index([email])` ; `Payment.idempotencyKey` (ligne 966) porte
      `@unique` au niveau champ, ET `@@index([idempotencyKey])` est
      redéclaré ligne 978 dans le bloc d'index du modèle. PostgreSQL crée
      automatiquement un index B-tree unique pour toute contrainte
      `UNIQUE`/`@@unique` — un second `@@index` sur les mêmes colonnes est
      un doublon fonctionnel : aucune requête n'en bénéficie (le planificateur
      utilise l'index unique, jamais les deux), mais chaque `INSERT`/`UPDATE`
      touchant ces colonnes doit maintenir deux structures d'index au lieu
      d'une. Confirmé qu'aucun autre modèle du schéma ne répète ce patron
      (`Client.email`, `Service.name`, `Skill.name` — tous `@unique`/`@@unique`
      sans `@@index` redondant associé). Gravité mineure : coût réel mais
      faible en écriture, aucun risque d'incohérence de données.

      RÉSOLU (session en cours) : les 3 `@@index` redondants retirés
      (`User.email`, `FreelancerApplication.email`,
      `Payment.idempotencyKey`), même migration batch que SEC-111/112/
      113/166. Preuve par test réel
      (`server/test/schemaIndexCleanupAndTimeEntryFk.test.ts`) : requête
      `pg_indexes` sur la base réelle confirmant que
      `User_email_idx`/`FreelancerApplication_email_idx`/
      `Payment_idempotencyKey_idx` n'existent PLUS, tandis que
      `User_email_key`/`FreelancerApplication_email_key`/
      `Payment_idempotencyKey_key` (les index créés automatiquement par
      les contraintes `@unique`/`@@unique`) existent toujours — un seul
      index par colonne concernée, exactement le critère demandé. Suite
      complète verte (505 tests), `npx tsc --noEmit` et
      `npm run lint --workspace=server` verts. Dérogation CI déjà
      accordée par l'utilisateur pour cette session : `resolu` malgré
      l'absence de run CI vert sur ce commit précis.

