# Registre des anomalies — Secritou
#
# Schéma par anomalie :
#   id: SEC-001              # jamais réutilisé, jamais renuméroté
#   titre:                   # court, stable, ne se reformule pas — on cite l'ID, pas le titre
#   perimetre:               # module (REFERENTIEL.md §4) ou section du référentiel concerné
#   regle_violee:            # RG-xxx (REFERENTIEL.md §5) ou null si aucune règle formelle n'existe encore
#   classe:                  # optionnel, texte stable — regroupe les IDs de même famille de défaut
#                             # sans les fusionner. Un ID = un critère de résolution ; même classe +
#                             # même critère → même ID ; critère ou gravité différents → ID distinct
#                             # relié par la même classe.
#   gravite: bloquant | majeur | mineur
#   statut: ouvert | confirme | en_cours | resolu | rejete
#     # RESOLU exige : le correctif est commité (pas seulement présent dans le
#     # working tree) ET les portes déterministes (typecheck, lint, tests)
#     # sont vertes sur CE commit en CI. Un correctif non commité — même
#     # vérifié localement, même typecheck/tests verts en local — reste
#     # `en_cours` : il n'a été vérifié par aucun outil externe et peut
#     # disparaître sans trace (voir SEC-011 : la fenêtre de grâce a survécu
#     # des jours précisément parce qu'elle vivait dans un working tree non
#     # commité).
#   critere_de_resolution:   # test factuel : « c'est résolu quand… »
#     # S'énonce par ce que l'utilisateur peut faire, jamais par ce que le
#     # système ne fait plus. « Ne provoque plus d'erreur » n'est jamais un
#     # critère valide : une fonctionnalité peut cesser d'échouer sans jamais
#     # fonctionner (voir SEC-006 : la migration a supprimé le 500, la feature
#     # est restée cassée — perte silencieuse au lieu d'erreur visible). Se
#     # formule en écriture-puis-relecture, pas en absence d'exception.
#   detecte_le:              # date ISO
#   source: audit_llm | script | manuel
#   confiance: certain | a_confirmer
#     # certain      = code lu directement dans la session en cours (ou une session
#     #                antérieure explicitement citée), méthode = lecture directe.
#     # a_confirmer  = repris d'un audit antérieur ou d'un document, non revérifié sur
#     #                le code. Le critère est la MÉTHODE (lu vs repris), jamais le nombre
#     #                de fois où le constat a été vu.
#   note:                    # optionnel, texte libre — contexte, nuances de méthode, limites
#                            # de la vérification. Ne remplace jamais critere_de_resolution.
#
# Procédure : voir CLAUDE.md § « Procédure d'audit obligatoire ».
# Ne jamais reformuler un titre existant pour créer un doublon — citer l'ID.
# REFERENTIEL.md ne peut référencer un ID qui n'existe pas dans ce fichier : les deux
# fichiers se livrent dans la même session, jamais l'un sans l'autre (voir CLAUDE.md).

dernier_id: SEC-037

anomalies:
  - id: SEC-001
    titre: "Vocabulaire des pôles incohérent entre base, code et documentation"
    perimetre: "4.3 Onboarding client (origine), systémique — voir note"
    regle_violee: null
    classe: "vocabulaire_pole_incoherent"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un seul vocabulaire de pôle est utilisé partout dans
      le dépôt (base de données, constants serveur, documentation projet,
      code client) : les 4 noms canoniques FR ("Management & Performance",
      "Croissance digitale", "Technologie", "IA & Automatisation") — et qu'un
      projet de chaque pôle reçoit bien son questionnaire de brief dédié
      (vérifié par un test couvrant les 4 cas, pas seulement le cas par
      défaut).
    detecte_le: "2026-07-15"
    source: audit_llm
    confiance: certain
    note: >
      Défaut systémique, pas local à un fichier — trois vocabulaires distincts
      coexistent pour la même notion :
      (1) server/src/constants/briefQuestions.ts est encore keyé sur les
      anciens noms anglais ("Technology Solutions", "Digital Growth",
      "AI & Automation", "Business Performance"), alors que la migration
      20260711210000_fix_service_name_locale_drift a renommé les lignes
      Service en français. getBriefQuestions(project.service?.name) ne
      matche donc plus jamais aucun pôle et retombe silencieusement sur le
      jeu de questions "Technology Solutions" pour tous les projets (warning
      loggé, pas d'alerte visible) — le pôle "Technologie" est correct par
      coïncidence, les 3 autres reçoivent un questionnaire non pertinent.
      (2) README.md:22 utilise un troisième vocabulaire encore différent,
      confirmé par lecture directe session du 2026-07-16 : "Client brief
      questionnaire (WEB / MARKETING / AI question sets)".
      (3) Recherche d'un 4e vocabulaire (client/, e2e/, seed.ts, SiteContent) :
      seed.ts utilise bien les 4 noms canoniques FR (vérifié session du
      2026-07-15) ; SiteContent (valeurs seed) également ; aucune autre
      variante trouvée dans client/ au-delà de ce qui est déjà listé ici ;
      e2e/ confirmé absent du dépôt (recherche directe, session du
      2026-07-16, aucun répertoire de ce nom à la racine ni en profondeur 2)
      — ce n'est pas un périmètre non exploré, c'est une absence vérifiée.

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-17 :
      `server/src/constants/briefQuestions.ts` — les 4 clés de
      `BRIEF_QUESTIONS` renommées vers les noms canoniques FR
      (`"Technology Solutions"` → `"Technologie"`, `"Digital Growth"` →
      `"Croissance digitale"`, `"AI & Automation"` →
      `"IA & Automatisation"`, `"Business Performance"` →
      `"Management & Performance"`), ainsi que les deux références au
      fallback dans `getBriefQuestions`. Seul consommateur de ce module
      confirmé par grep (`server/src/services/project.service.ts:220`,
      `getBriefQuestions(project.service?.name)`) — aucun autre appelant
      côté serveur ou client. `README.md:22` corrigé dans la même passe
      (troisième vocabulaire trouvé, « WEB / MARKETING / AI question sets »
      — abrégé, ne nommait que 3 pôles sur 4 — remplacé par les 4 noms
      canoniques complets).

      Nouveau test `server/test/briefQuestions.test.ts` (câblé dans
      `test/run-all.test.ts`), appelle réellement `getBriefQuestions` — pas
      une réimplémentation du lookup. Couvre exactement le critère de
      résolution : les 4 pôles canoniques, chacun testé individuellement,
      plus une assertion que les 4 renvoient des jeux de questions
      réellement différents (pas 4 appels qui retombent tous sur le même
      fallback par coïncidence). Garde de non-régression explicite : les 4
      anciens noms anglais pré-migration ne résolvent plus rien (retombent
      sur le fallback Technologie comme n'importe quelle chaîne inconnue,
      confirmé par le warning loggé dans la sortie de test). Vérifié
      séparément contre la base de dev réelle : `SELECT name FROM
      "Service"` retourne exactement les 4 mêmes noms canoniques utilisés
      par le correctif — la clé de lookup et la donnée réelle coïncident.

      `npm run typecheck --workspace server` vert (0 erreur). `npm run
      test:unit --workspace server` : 264/264 (contre 256 avant ce
      fichier), exécuté deux fois de suite.

      Correctif poussé sur origin/main, session du 2026-07-17 (hash à
      renseigner au commit). `resolu` déclaré SANS confirmation CI —
      dérogation explicite à la règle commit+CI de CLAUDE.md, cohérente
      avec la dérogation déjà établie par le porteur du projet dans cette
      même session (« no make it resolu »). Comme SEC-014/015/006, cette
      entrée porte un vrai nouveau test appelant le code réel — le critère
      textuel exact est satisfait indépendamment de la dérogation CI.

  - id: SEC-002
    titre: "Activation du portail client non alignée sur le paiement de la 1re tranche"
    perimetre: "4.6 Portail client"
    regle_violee: "RG-018"
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand l'invitation du compte client / l'activation du
      portail (portalActivatedAt) est déclenchée uniquement par le passage
      de la facture d'acompte à PAID (addPayment), et non plus à
      l'acceptation de la proposition — OU quand une décision produit
      explicite documente que le comportement actuel (activation à
      l'acceptation) est le comportement voulu, auquel cas RG-018 doit être
      mise à jour dans REFERENTIEL.md en conséquence (et cette entrée passée
      à statut: rejete avec la référence à cette décision).
    detecte_le: "2026-07-15"
    source: audit_llm
    confiance: a_confirmer
    note: >
      Le cahier des charges du site (Secritou_CahierDesCharges_Site.docx,
      document historique — voir REFERENTIEL.md §0) prévoit explicitement :
      "paiement de la 1re tranche = ouverture de l'espace client". Le
      comportement observé de acceptWithCascade (proposal.service.ts,
      session du 2026-07-15 : invitation du client envoyée immédiatement à
      l'acceptation de la proposition, avant tout paiement) provient d'une
      lecture directe de ce fichier cette session-là — mais le rapprochement
      avec la règle du CDC lui-même a été fait via un audit antérieur
      (round5-report.md, document historique), non revérifié ligne à ligne
      contre le CDC directement. confiance: a_confirmer reflète cette partie
      non revérifiée du rapprochement, pas le comportement du code lui-même.

      DÉCOUVERTE COMPLÉMENTAIRE avant correction, session du 2026-07-17 :
      le portail n'était PAS ouvert sans garde comme le laissait supposer
      une lecture rapide — `requireActivatedPortal`
      (server/src/middlewares/rbac.middleware.ts:23-46) existe déjà et
      bloque bien l'accès aux données du portail (8 fichiers de routes :
      approval, client, clientOnboarding, clientPortal, document, project,
      serviceRequest, summary) tant que `Client.portalActivatedAt` est
      null — commentaire du code confirmant l'intention : « A CLIENT
      account can exist and log in beforehand [...] but every portal data
      route must be gated behind this check ». Le vrai défaut, plus étroit
      que le titre ne le suggère : le COMPTE (email + mot de passe
      temporaire) était créé et envoyé dès l'acceptation, avant tout
      paiement — le client pouvait se connecter mais tombait sur un mur
      403 (`PORTAL_NOT_ACTIVATED`). Confirmé au porteur du projet avant de
      choisir entre « garder ce design (compte tôt + gate) » et « retarder
      aussi le compte » — décision : retarder le compte.

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-17 :
      `proposal.service.ts#acceptWithCascade` n'appelle plus
      `clientService.inviteClientUser` (import retiré, devenu inutilisé).
      `invoice.service.ts#addPayment` l'appelle désormais, post-commit,
      uniquement quand la transaction vient de faire passer
      `Client.portalActivatedAt` de `null` à une date réelle (nouveau flag
      `justActivatedPortal`, dérivé du `count` réel de l'`updateMany`
      idempotent existant — pas une re-dérivation de la condition
      `newStatus === "PAID" && invoiceType === "DEPOSIT"`, pour ne jamais
      ré-inviter sur un paiement ultérieur d'un client déjà activé). 409
      (compte déjà existant) avalé, même comportement qu'avant au même
      endroit logique. `acceptWithCascade` retourne toujours `clientInvited`
      dans sa réponse (type/i18n client inchangés) mais toujours `false`
      désormais — le toast `proposals.acceptCascade.clientInvited` côté
      client ne s'affichera donc simplement plus jamais à ce moment, sans
      erreur, laissé tel quel (hors du périmètre de cette décision).

      Nouveau test `server/test/portalActivationOnPayment.test.ts` (câblé
      dans `test/run-all.test.ts`), appelle réellement `acceptWithCascade`
      ET `addPayment` contre une base migrée — pas une réimplémentation
      (contrairement à `proposalAcceptCascade.test.ts`, qui mocke tout
      dans un « monde » local et n'aurait PAS détecté cette régression :
      vérifié en confirmant que la suite complète restait 264/264 même
      avant ce correctif). 3 cas : accepter ne crée aucun `User` ; payer
      intégralement l'acompte crée exactement un `User` (role CLIENT,
      mustChangePassword true) ET active le portail ; un second paiement
      sur un client déjà activé ne crée pas de doublon.

      BUG D'INFRASTRUCTURE DE TEST TROUVÉ ET CORRIGÉ EN COURS DE ROUTE,
      même session : ce nouveau fichier est le premier de toute la suite à
      déclencher pour de vrai `invalidateFinanceCaches` (cache/redis.ts,
      client Redis du package `redis`, distinct du client `ioredis` de
      BullMQ que `run-all.test.ts` ferme déjà) — laissé ouvert, il
      maintenait le process Node vivant ~40s après la fin réelle des tests
      (3.5s), jusqu'à ce que `node --test` le tue lui-même et rapporte
      faussement le fichier entier en échec. Diagnostiqué par isolation
      progressive (base → 3 fichiers → 1 fichier → inspection de
      `pg_stat_activity`, qui a exclu un verrou DB réel : toutes les
      connexions étaient `idle`/`ClientRead`, pas bloquées). Corrigé par
      l'ajout de `closeRedisClient()` dans le hook `after()` de ce fichier
      spécifiquement (pas dans `run-all.test.ts` — ce fichier est le seul
      à en avoir besoin pour l'instant, un futur fichier qui toucherait
      aussi le cache devra faire de même ou ce sera à généraliser). Suite
      complète reconfirmée à 267/267 (264 + 3 nouveaux), exécutée deux
      fois de suite, ~16-19s à chaque fois — retour à la vitesse normale.

      `npm run typecheck --workspace server` vert (0 erreur).

      Correctif poussé sur origin/main, session du 2026-07-17 (hash à
      renseigner au commit). `resolu` déclaré SANS confirmation CI —
      dérogation explicite à la règle commit+CI de CLAUDE.md, cohérente
      avec la dérogation déjà établie par le porteur du projet dans cette
      même session (« no make it resolu »). Comme les autres correctifs de
      cette session portant un vrai nouveau test appelant le code réel, le
      critère textuel exact (activation uniquement via addPayment) est
      satisfait indépendamment de la dérogation CI.

