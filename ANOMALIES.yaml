  - id: SEC-018
    titre: "rating.controller.ts restreint via req.user!.id au lieu de req.user!.sub"
    perimetre: "4.7 Freelances"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: rejete
    critere_de_resolution: >
      C'est résolu quand rating.controller.ts (méthode getRatingsByFreelancerId
      ou équivalent) utilise le même champ que le reste du code
      (`req.user!.sub`, cohérent avec JwtPayload dans client/src/types/auth.ts
      et le reste des controllers), vérifié par un test d'intégration
      confirmant qu'un FREELANCER authentifié voit bien ses propres notes
      (pas de régression silencieuse si le champ actuel se révèle en réalité
      fonctionnel).
    detecte_le: "2026-07-17"
    source: audit_llm
    confiance: certain
    note: >
      Constat incident (AUDIT_GRID.md, session du 2026-07-17) :
      rating.controller.ts restreint la lecture des notes d'un FREELANCER à
      ses propres notes via `req.user!.id`, alors que le reste du code
      (confirmé par les audits 4.14 antérieurs) utilise `req.user!.sub`
      (champ du JwtPayload). `confiance: a_confirmer` d'origine — pas
      vérifié si `id` existe réellement comme alias sur ce type ou si c'est
      un bug silencieux qui romprait le scoping.

      REJETÉ (vérification directe, session du 2026-07-17) : faux positif.
      `server/src/types/auth.ts:4-5` — `JwtPayload` porte à la fois `id` et
      `sub`, ce ne sont pas des noms concurrents dont un seul existerait.
      `server/src/services/auth.service.ts:44-45` (`signAccessToken`) —
      les deux champs sont signés avec exactement la même valeur
      (`id: user.id, sub: user.id`) à l'émission du token. `req.user!.id`
      et `req.user!.sub` sont donc strictement équivalents au runtime pour
      tout token émis par ce chemin — aucune divergence de scoping possible,
      juste une incohérence de convention de nommage entre fichiers, pas un
      bug fonctionnel. Rejeté plutôt que fermé en `resolu` : rien n'a été
      corrigé, le constat d'origine était simplement faux à la vérification.

