    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand ces 5 controllers appellent `parseListQuery`
      (comme la majorité des autres endpoints de liste) au lieu de
      parser `req.query` à la main, avec un paramètre `pageSize` partout
      (pas `limit`) — ou qu'une décision explicite documente pourquoi ces
      5 endpoints ont volontairement une convention différente (ex.
      contraintes historiques d'un client déjà intégré sur `limit`).
    detecte_le: "2026-07-21"
    source: audit_llm
    confiance: certain
    note: >
      Audit architecture API (item 5, pagination). Vérifié par grep direct
      sur `server/src/controllers/*.ts` : `contact.controller.ts:36-37` et
      `customQuestion.controller.ts:18-19,45-46` lisent
      `req.query.limit` (pas `pageSize` — nom de paramètre différent de
      la convention dominante) ; `aiConversation.controller.ts:7-8` plafonne
      à 50 en dur ; `timeEntry.controller.ts:21-22` plafonne à 100 (pas 50,
      le défaut de `parseListQuery`) ; `projectMeeting.controller.ts:11-12`
      fait `Number(req.query.page)`/`Number(req.query.pageSize)` sans
      valeur de repli visible en cas de paramètre absent (`NaN` possible).
      Aucun des 5 ne semble exposer `orderBy`/`orderDir` (non vérifié en
      profondeur, seul `page`/`limit`/`pageSize` grepé dans cette passe).
      Impact : un client frontend générique construit autour de la
      convention `pageSize` (le hook de pagination partagé, déjà vu dans
      les passes précédentes de cet audit sur `ReportsPage`/`LeadsPage`)
      enverrait silencieusement un paramètre ignoré sur ces 5 endpoints,
      retombant sur leurs valeurs par défaut respectives sans erreur ni
      avertissement.

      RÉSOLU PARTIELLEMENT, décision documentée (session en cours) :
      vérification directe des 3 controllers `aiConversation`/
      `projectMeeting`/`timeEntry` a trouvé un constat moins large que le
      titre d'origine — les trois utilisent DÉJÀ le nom `pageSize` (pas
      `limit`), avec des replis sûrs
      (`aiConversation.controller.ts:7-8` :
      `Math.max(1, Number(...)||1)`/`Math.min(50, Math.max(1,
      Number(...)||20))` ; `timeEntry.controller.ts:21-22` :
      `Number(...)||1`/`Math.min(Number(...)||20, 100)` ;
      `projectMeeting.controller.ts:10-13` : déjà gardé par
      `Number.isInteger(page) && page>0 && ...`, AUCUN `NaN` possible
      contrairement à ce que la note d'origine supposait sans le
      vérifier) — seul leur PLAFOND diffère de `parseListQuery` (50 vs
      100 vs interne), pas leur convention de nommage. Seuls
      `contact.controller.ts` et `customQuestion.controller.ts` avaient
      le vrai défaut décrit (paramètre `limit` au lieu de `pageSize`,
      silencieusement ignoré par un client générique) — corrigé dans les
      deux en acceptant `pageSize` en priorité, `limit` gardé en repli
      pour compatibilité ascendante (`req.query.pageSize ??
      req.query.limit`), sans toucher aux signatures de service
      existantes (`getContactRequests`/`getMyQuestions`/
      `getAllQuestions` gardent `(status, page, limit)` — un renommage de
