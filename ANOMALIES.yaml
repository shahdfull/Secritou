  - id: SEC-015
    titre: "Aucune relance échelonnée après passage d'une facture au statut OVERDUE"
    perimetre: "4.4 Facturation & Paiements, transverse server/src/jobs/**"
    regle_violee: null
    classe: "relance_facture_defectueuse"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand une facture passée au statut OVERDUE continue de
      recevoir les relances échelonnées FIRST/SECOND/FINAL (ou un
      mécanisme équivalent dédié aux factures OVERDUE existe et tourne
      réellement), vérifié par un test qui simule une facture OVERDUE
      dépassant successivement les seuils de relance et observe qu'elle
      reçoit bien les notifications/emails attendus — pas seulement la
      notification unique de transition SENT/PARTIAL → OVERDUE.
    detecte_le: "2026-07-17"
    source: audit_llm
    confiance: certain
    note: >
      Lecture intégrale session du 2026-07-17 des 8 fichiers de
      server/src/jobs/** (index.ts, jobNames.ts, queues.ts,
      redisConnection.ts, et les 4 processors) pour répondre spécifiquement
      à la question : existe-t-il un mécanisme dédié aux factures déjà en
      retard qui rendrait volontaire l'exclusion d'OVERDUE dans
      checkInvoiceFollowup (SEC-014) ? Réponse : oui et non.
      markOverdueInvoices (maintenance.processor.ts:246-315, cron quotidien
      4h15, bien enregistré et déclenché — jobs/index.ts:256-260) bascule
      SENT/PARTIAL → OVERDUE et envoie UNE notification/email au moment de
      cette transition. Mais aucun job ne relance ensuite une facture déjà
      OVERDUE : checkInvoiceFollowup (le seul mécanisme de relance
      échelonnée FIRST/SECOND/FINAL, cron hebdomadaire lundi 9h) filtre
      `status IN ["SENT","PARTIAL"]` et ne voit donc plus jamais une
      facture une fois passée OVERDUE. Recherche exhaustive des 21 noms de
      jobs (jobNames.ts, grep direct) et des 12 fonctions restantes de
      ceoAlerts.processor.ts (checkTaskDeadlines, checkOverdueTasks,
      checkMeetingReminders, checkStaleLeads, checkPendingCommissions,
      checkCustomQuestionSla, checkApprovalSla, weeklyHealthBoardDigest,
      lues intégralement) : aucune ne touche aux factures. Conséquence
      concrète : une facture qui devient OVERDUE reçoit une notification
      unique puis plus aucune relance jamais, quel que soit le nombre de
      jours de retard supplémentaires accumulés.

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-17 (même passe que
      SEC-014, même fonction) : `checkInvoiceFollowup` interroge désormais
      `status: { in: ["SENT", "PARTIAL", "OVERDUE"] }` — ajout d'OVERDUE au
      filtre existant. Une facture qui bascule OVERDUE (via
      `markOverdueInvoices`) redevient donc visible par ce job hebdomadaire
      et continue de recevoir ses paliers FIRST/SECOND/FINAL, au lieu de
      disparaître silencieusement de son champ de vision.

      Nouveau test dans `server/test/checkInvoiceFollowup.test.ts` (le même
      fichier que SEC-014, câblé dans `test/run-all.test.ts`) — cas couvert
      exactement par le critère de résolution : une facture déjà en statut
      `OVERDUE`, 35 jours passés sa `dueDate`, reçoit bien un rappel FINAL
      via un appel réel à `checkInvoiceFollowup` (pas une simulation de sa
      logique). Cas complémentaire (anti-régression, pas dans le critère
      d'origine mais nécessaire pour ne pas introduire un nouveau bug en
      résolvant celui-ci) : une facture OVERDUE ayant déjà reçu le palier
      FIRST ne reçoit pas de doublon lors d'une nouvelle exécution.
      `npm run typecheck --workspace server` vert. `npm run test:unit
      --workspace server` : 256/256, exécuté deux fois de suite.

