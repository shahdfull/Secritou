      défaut du formulaire et confirme que le payload HTTP intercepté
      ne porte ni `startDate` ni `dueDate`). Vérification complète :
      `npx tsc --noEmit` (client, propre), `npx vitest run` (client,
      85/85, dont ces 2 nouveaux). Résolu SANS confirmation CI :
      workflow GitHub Actions sur `origin/main` en `workflow_dispatch`
      uniquement (déviation établie en session le 2026-07-17, citée à
      chaque clôture depuis).

