    source: audit_llm
    confiance: certain
    note: >
      Audit exhaustif du module Gestion de Projets, confirmé par
      lecture directe. `handleEditTask` (`useTaskActions.ts`) fait
      `editForm.reset({...task, startDate:..., dueDate:...})` — TOUTES
