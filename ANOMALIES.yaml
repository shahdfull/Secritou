      reste `ouvert` uniquement pour l'item non retenu (dépendances
      entre tâches). Quatrième et dernier des 4 items retenus, traité
      après SEC-064 (pièces jointes), SEC-065 (mentions) et SEC-066
      (actions en masse), dans l'ordre confirmé par le porteur.

      Trois décisions de conception tranchées via AskUserQuestion avant
      tout code, chacune changeant significativement le modèle de
      données à construire : (1) profondeur — un seul niveau, une
      sous-tâche ne peut pas elle-même avoir de sous-tâches (écarte
      l'imbrication récursive et son UI) ; (2) autonomie — une
      sous-tâche est une simple checklist (titre + fait/pas fait), PAS
      une entité `Task` complète avec assignee/statut/échéance propres
      (écarte la réutilisation de `Task.parentId`, qui aurait laissé
      croire à tort qu'une sous-tâche est une vraie tâche) ; (3)
      complétion — aucune règle automatique ne bloque le statut du
      parent en fonction de ses sous-tâches, statuts totalement
      indépendants (écarte une nouvelle règle métier de blocage à
      concevoir et tester).

      Conséquence directe de (1)+(2) : nouveau modèle Prisma dédié et
      plus léger, `TaskChecklistItem` (titre, `done` booléen,
      `position`, `taskId`), plutôt qu'un self-reference
      `Task.parentId` — migration
      `20260719193000_add_task_checklist_item`. `position` toujours
      dérivée côté serveur du nombre d'items existants (jamais
      transmise/fiée par le client), pour que deux créations
      concurrentes ne collisionnent pas sur le même index.

      Autorisation : même audience que les commentaires de tâche
      (ADMIN/MANAGER/FREELANCER assigné, `taskRepository.existsInCompany`
      réutilisé tel quel dans le contrôleur) — une checklist est un
      outil de travail collaboratif sur la tâche, pas un contenu
      réservé au management, cohérent avec le fait qu'un FREELANCER
      peut déjà modifier le statut de ses propres tâches. Contrairement
      aux commentaires (SEC-059) et réunions (SEC-055/F6), pas de
      restriction supplémentaire par auteur — n'importe qui ayant accès
      à la tâche peut cocher/modifier/supprimer n'importe quel item,
      décision cohérente avec la nature « checklist partagée » du
      concept retenu. Isolation cross-tâche testée explicitement :
      modifier/supprimer un item via un `taskId` qui ne correspond pas
      au sien 404 (même garde que SEC-059/SEC-055).

      Nouvelles routes : `GET`/`POST /tasks/:taskId/checklist`,
      `PUT`/`DELETE /tasks/:taskId/checklist/:itemId`. Côté client :
      nouveau composant `TaskChecklist.tsx` (case à cocher par item,
      barre de progression purement informative — n'influence jamais
      le statut de la tâche, ajout via champ + Entrée, suppression au
      survol), câblé dans `TaskDetailDrawer.tsx` au-dessus de
      `TaskAttachments`.

      Tests réels ajoutés : `server/test/taskChecklist.test.ts` (4 cas
      d'intégration réelle contre une base migrée — position dérivée
      serveur et non transmise, bascule fait/renommage sans effet de
      bord croisé, suppression isolée des autres items, isolation
      cross-tâche 404) ;
      `client/src/features/tasks/components/TaskChecklist.test.tsx` (4
      cas — affichage des items et du compteur, ajout appelle la vraie
      requête POST, bascule appelle la vraie requête PUT avec
      `done: true`, suppression appelle la vraie requête DELETE).

      Vérification complète : serveur `npx tsc --noEmit` (clean), `npm
      run lint` (0/0), `npx tsx --test test/run-all.test.ts` (370/370,
      4 nouveaux) ; client `npx tsc --noEmit` (clean), `npm run lint`
      (12 warnings — exception SEC-049, stable), `npx vitest run`
