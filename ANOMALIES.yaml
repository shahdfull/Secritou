  - id: SEC-174
    titre: "Le token d'accès JWT est purement stateless (aucune vérification DB, aucune liste de révocation) — un compte ADMIN/MANAGER supprimé ou dont le rôle est rétrogradé reste utilisable avec les anciens droits jusqu'à expiration naturelle du token (15 min par défaut)"
    perimetre: "4.0 Authentification/RBAC — server/src/middlewares/auth.middleware.ts#authenticate ; server/src/config/env.ts (JWT_ACCESS_EXPIRES_IN)"
    regle_violee: null
    classe: "revocation_session_differee"
    gravite: mineur
    statut: en_cours
    critere_de_resolution: >
      Sera résolu soit par une décision explicite du porteur documentant la
      fenêtre de 15 minutes comme un risque accepté (à écrire dans
      REFERENTIEL.md §7, avec le motif : coût d'une vérification DB sur
      chaque requête authentifiée jugé disproportionné pour un outil interne
      0 client actif), soit par l'ajout d'une vérification (ex. colonne
      `tokenVersion`/`revokedAt` sur `User`, comparée dans `authenticate`)
      si le porteur juge la fenêtre inacceptable — dans les deux cas la
      décision doit être écrite, pas laissée implicite.
    detecte_le: "2026-07-21"
    source: audit_llm
    confiance: certain
    note: >
      Audit AppSec, item 1 (authentification). Vérifié par lecture directe :
      `auth.middleware.ts#authenticate` (lignes 16-22) ne fait que
      `jwt.verify(token, env.JWT_ACCESS_SECRET, {...})` — aucun appel à
      `userRepository`/`prisma` dans ce middleware, donc aucune vérification
      que l'utilisateur du token existe encore, est toujours actif, ou a
      toujours le même rôle. `JWT_ACCESS_EXPIRES_IN` vaut `15m` par défaut
      (`env.ts:13`, le README mentionne 1h — écart de documentation, non
      vérifié plus avant ici). Distinct de SEC-165 (suppression physique de
      User, `verifie: code_direct`, déjà enregistré) : SEC-165 porte sur le
      fait que la suppression existe et cascade en base ; SEC-174 porte sur
      la fenêtre de validité résiduelle du token déjà émis après cette
      suppression (ou après une rétrogradation de rôle/pôle), propriété
      distincte non couverte par un ID existant (grep "stateless",
      "révocation", "JWT_ACCESS_EXPIRES" dans ANOMALIES.yaml : aucun
      résultat pertinent avant cette entrée). Gravité `mineur` et non
      `majeur` : la fenêtre est bornée à 15 minutes (pas un token de longue
      durée), le refresh token est lui bien vérifié en DB à chaque rotation
      (`auth.service.ts#refresh`) donc la session ne peut pas se prolonger
      au-delà du prochain refresh raté, et RG-016 (sandboxing exec) limite
      déjà la surface de ce que ferait un accès résiduel de 15 min. Absent
      vs défaillant : le mécanisme de révocation immédiate n'existe pas du
      tout (absent), ce n'est pas une implémentation bancale d'un mécanisme
      déjà tenté.

      BLOQUÉ SUR DÉCISION PORTEUR (session en cours) : le critère de
      résolution exige explicitement une décision produit écrite (risque
      accepté documenté vs implémentation d'un `tokenVersion`/`revokedAt`)
      que je ne peux pas trancher moi-même sans instruction explicite du
      porteur — passé en `en_cours` plutôt que laissé `ouvert`, pour
      distinguer "pas encore regardé" de "regardé, bloqué sur un choix qui
      n'est pas le mien à faire". Point accessoire relevé en relisant :
      l'écart README (15 min réel vs "1h" documenté pour
      `JWT_ACCESS_EXPIRES_IN`) mentionné dans la note d'origine comme "non
      vérifié plus avant" reste également non vérifié dans cette passe
      (hors périmètre de ce constat précis, à traiter séparément si
      confirmé).

