  - id: SEC-136
    titre: "proposalService.acceptWithCascade : le fallback try/catch sur la collision P2002 (Project.proposalId / Invoice.proposalId uniques) ne peut jamais réussir dans la même transaction — Postgres bloque toute commande suivante (25P02) une fois la transaction en échec, donc le tx.project.findFirst/tx.invoice.findFirst de secours échoue systématiquement dans le cas réel qu'il est censé gérer"
    perimetre: "server/src/services/proposal.service.ts#acceptWithCascade"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand deux appels strictement concurrents à
      `acceptWithCascade` sur la même proposition ne laissent jamais plus
      d'un `Project`/`Invoice` de dépôt en base ET que l'appel perdant de la
      course reçoit une réponse cohérente (les IDs du gagnant), pas une
      erreur `25P02` opaque — prouvé par un test qui appelle réellement
      `acceptWithCascade` deux fois en concurrence
      (`Promise.allSettled`) sur une base migrée et vérifie l'état final.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Découvert en écrivant le test de concurrence pour SEC-134 : la
      première exécution du test a révélé en pratique
      (`prisma:error ... ConnectorError ... code: "25P02", message:
      "current transaction is aborted, commands ignored until end of
      transaction block"`) que `tx.project.findFirst`/`tx.invoice.findFirst`
      (proposal.service.ts, catch des lignes ~447/472 avant correctif)
      échouent toujours en cas de collision réelle — la transaction
      Postgres reste "aborted" après l'erreur `P2002` du `create`, donc
      toute requête suivante dans le même `tx` échoue immédiatement, avant
      même d'atteindre le `ROLLBACK` implicite de Prisma. Le code avait
      pourtant l'intention correcte (capturer P2002, relire le gagnant) —
      seule l'hypothèse que la transaction reste utilisable après une
      erreur catchée était fausse.

      CORRECTIF ÉCRIT ET VÉRIFIÉ, même session : `acceptWithCascade` est
      désormais une fine méthode avec retry qui délègue à
      `acceptWithCascadeAttempt` (renommage de l'ancien corps) ; si le
      premier essai lève `P2002` ou `P2010`/`meta.code === "25P02"` (la
      transaction entière ayant déjà été rollback par Prisma à ce stade,
      hors de tout état "aborted"), un second essai est tenté — il démarre
      une TOUTE NOUVELLE transaction qui trouve `proposal.status ===
      "ACCEPTED"` (et `linkedProject`/`invoice` déjà peuplés par le
      gagnant) et retourne simplement ses IDs sans retenter aucune
      création. Preuve : `server/test/proposalAcceptCascadeConcurrency.test.ts`
      (nouveau, appelle réellement `proposalService.acceptWithCascade` deux
      fois via `Promise.allSettled` sur la même proposition, contre une
      vraie base) — vérifié qu'au plus un `Project` existe en base au final
