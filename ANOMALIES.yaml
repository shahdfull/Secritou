      `z.string().refine(isValidDateString).transform(...).optional()`
      — `.optional()` n'accepte que `undefined`, jamais une chaîne
      vide : `""` échoue au `refine` avec le message « Invalid date ».
      Vérifié par exécution directe du schéma réel :
      `{startDate:"",dueDate:""}` → `success:false` (2 issues
      « Invalid date ») ; `{}` (champs omis) → `success:true`. Or
