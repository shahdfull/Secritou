      mécanisme équivalent dédié aux factures OVERDUE existe et tourne
      réellement), vérifié par un test qui simule une facture OVERDUE
      dépassant successivement les seuils de relance et observe qu'elle
      reçoit bien les notifications/emails attendus — pas seulement la
      notification unique de transition SENT/PARTIAL → OVERDUE.
    detecte_le: "2026-07-17"
    source: audit_llm
    confiance: certain
    note: >
      Lecture intégrale session du 2026-07-17 des 8 fichiers de
      server/src/jobs/** (index.ts, jobNames.ts, queues.ts,
      redisConnection.ts, et les 4 processors) pour répondre spécifiquement
      à la question : existe-t-il un mécanisme dédié aux factures déjà en
      retard qui rendrait volontaire l'exclusion d'OVERDUE dans
      checkInvoiceFollowup (SEC-014) ? Réponse : oui et non.
      markOverdueInvoices (maintenance.processor.ts:246-315, cron quotidien
