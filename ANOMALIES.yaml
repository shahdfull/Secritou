  - id: SEC-065
    titre: "Aucune logique de mention @ n'existe dans les commentaires de tache — ni parsing, ni notification dediee, ni UI d'autocomplete"
    perimetre: "4.3 Gestion des tâches — server/src/utils/mentions.ts, server/src/services/comment.service.ts, client/src/features/tasks/components/MentionTextarea.tsx, client/src/features/tasks/components/TaskDetailDrawer.tsx, client/src/features/tasks/TasksPage.tsx"
    regle_violee: null
    classe: "fonctionnalites-pm-standard-absentes"
    gravite: moyen
    statut: resolu
    critere_de_resolution: >
      Résolu quand un utilisateur peut taper `@` dans le champ de
      commentaire d'une tâche, voir une liste de personnes suggérées,
      en sélectionner une, et que cette personne reçoit une
      notification explicitement formulée comme une mention (plutôt
      que la notification générique de nouveau commentaire) — sans
      jamais notifier quelqu'un qui n'a pas accès à la tâche, même s'il
      est mentionné par son identifiant.
    detecte_le: "2026-07-19"
    source: manuel
    confiance: certain
    note: >
      Sous-ensemble de SEC-060 (item 6 du constat P1, rapport Product
      Owner), relié par `classe` — jamais fusionné avec SEC-060, qui
      reste `ouvert` pour l'item non retenu (dépendances) et l'item
      encore en cours (sous-tâches). Deuxième des 4 items retenus,
      traité après SEC-064 (pièces jointes) dans l'ordre confirmé par
      le porteur.

      Approche technique tranchée via AskUserQuestion : autocomplete +
      identifiant, plutôt qu'un parsing de texte libre `@Nom` (jugé
      ambigu sur des homonymes et cassant sur un nom contenant un
      espace). Le client insère un token explicite
      `@[Nom affiché](userId)` ; le serveur
      (`utils/mentions.ts#extractMentionedUserIds`) n'utilise jamais le
      nom affiché pour la résolution, seulement l'identifiant.

      Décision de conception tranchée en cours de route, après qu'un
      premier test a révélé une incohérence : le flux de notification
      existant (assignee + ADMIN + MANAGER du pôle) couvre déjà tout le
      monde ayant accès à la tâche, donc une mention ne peut jamais
      atteindre quelqu'un de nouveau — elle ne fait que dupliquer une
      notification déjà prévue. Tranché via AskUserQuestion : le
      destinataire mentionné reçoit UNE seule notification, avec le
      libellé spécifique « Vous avez été mentionné » au lieu du
      libellé générique « Nouveau commentaire » — pas de doublon.

      Invariant de sécurité central, testé explicitement : mentionner
      un identifiant d'utilisateur SANS accès à la tâche (ni assignee,
      ni staff du pôle du projet) n'aboutit à aucune notification pour
      cette personne — la liste de candidats proposée côté client
      (`mentionableUsers`, dérivée de `filterAssignableUsers(users)`)
      n'est PAS la barrière de sécurité réelle ; le serveur revérifie
      indépendamment l'accès à la tâche avant toute notification de
      mention, conformément au principe déjà appliqué ailleurs dans
      cette session (le client ne doit jamais être la seule barrière
      d'autorisation).

      Correctif serveur : `utils/mentions.ts#extractMentionedUserIds`
      (regex ciblée sur la syntaxe `@[...](uuid)`, dédoublonnée) ;
      `comment.service.ts#createComment` calcule `mentionedIds`
      (intersection des mentions extraites avec l'ensemble des
      destinataires standard déjà résolus) et personnalise le
      titre/message de leur notification en conséquence — aucune
      notification supplémentaire n'est enfilée pour un mentionné hors
      de cet ensemble.

      Correctif client : nouveau composant `MentionTextarea.tsx`
      (extrait pour rester réutilisable) — taper `@` ouvre un
      `Popover` listant `mentionableUsers` filtrés par le texte tapé
      après `@` ; la sélection insère le token `@[Nom](id)` et
      repositionne le curseur. Câblé dans `TaskDetailDrawer.tsx`
      (remplace le `Textarea` brut du formulaire de commentaire) via
      une nouvelle prop `mentionableUsers`, elle-même alimentée par
      `assignableUsers` déjà calculé dans `TasksPage.tsx` (exclut
      CLIENT, déjà utilisé pour le sélecteur d'assigné — SEC-054).

      Tests réels ajoutés : `server/test/mentions.test.ts` (5 cas,
      logique pure d'extraction) ; `server/test/taskCommentMentions.test.ts`
      (3 cas d'intégration réelle contre une base migrée, observant les
      vrais appels `communicationQueue.addBulk` via `node:test`
      `mock.method` plutôt qu'une réimplémentation — mention de
      l'assignee reçoit une notification unique au libellé spécifique ;
      mention d'un utilisateur hors scope n'aboutit à aucune
      notification pour lui ; un destinataire standard non mentionné
      garde le libellé générique) ; `client/src/features/tasks/components/MentionTextarea.test.tsx`
      (3 cas — ouverture de l'autocomplete, filtrage par texte tapé,
      token inséré correspondant exactement à ce que le serveur attend).

      Vérification complète : serveur `npx tsc --noEmit` (clean), `npm
      run lint` (0/0), `npx tsx --test test/run-all.test.ts` (362/362,
      8 nouveaux) ; client `npx tsc --noEmit` (clean), `npm run lint`
      (12 warnings — exception SEC-049, stable), `npx vitest run`
      (51/51, 3 nouveaux), `npm run build` (succès). Résolu SANS
      confirmation CI : workflow GitHub Actions sur `origin/main` en
      `workflow_dispatch` uniquement (déviation établie en session le
      2026-07-17, citée à chaque clôture depuis).

  - id: SEC-066
    titre: "Aucune action en masse (selection multiple + changement de statut/suppression groupee) n'existe sur la liste des taches"
    perimetre: "4.3 Gestion des tâches — server/src/services/task.service.ts, server/src/controllers/task.controller.ts, server/src/routes/task.routes.ts, server/src/validators/task.validator.ts, client/src/api/tasks.api.ts, client/src/hooks/useTasks.ts, client/src/features/tasks/components/TasksListView.tsx"
    regle_violee: null
    classe: "fonctionnalites-pm-standard-absentes"
    gravite: moyen
    statut: resolu
    critere_de_resolution: >
      Résolu quand un utilisateur autorisé (ADMIN/MANAGER) peut
      sélectionner plusieurs tâches dans la vue liste, changer leur
      statut ou les supprimer en un lot, et voir un rapport clair de ce
      qui a réussi/échoué si le lot est partiellement rejeté — sans
      qu'aucune règle métier individuelle (transition de statut
      valide, scope de pôle MANAGER, restriction FREELANCER) ne soit
      contournée par le traitement en masse.
    detecte_le: "2026-07-19"
    source: manuel
    confiance: certain
    note: >
      Sous-ensemble de SEC-060 (item 3 du constat P1, rapport Product
      Owner), relié par `classe` — jamais fusionné avec SEC-060, qui
      reste `ouvert` pour l'item restant (sous-tâches). Troisième des 4
      items retenus, traité après SEC-064 (pièces jointes) et SEC-065
      (mentions), dans l'ordre confirmé par le porteur.

      Décision de conception centrale : plutôt que dupliquer ou
      raccourcir la logique métier déjà présente dans
      `taskService.updateTask`/`.deleteTask` (transitions de statut
      valides, vérification de conflit de disponibilité freelancer,
      notifications, invalidation de cache, scope MANAGER par pôle,
      restriction FREELANCER), les nouvelles méthodes
      `bulkUpdateStatus`/`bulkDelete` appellent ces méthodes existantes
      une par une, en boucle — chaque tâche du lot traverse exactement
      le même chemin d'autorisation/validation qu'une modification
      individuelle, aucune règle métier n'est contournée par le bulk.
      Traitement « au mieux » (pas de transaction tout-ou-rien) : un
      échec sur une tâche (transition de statut invalide, tâche hors
      du pôle du MANAGER) n'empêche pas les autres de réussir — le
      rapport détaillé par id (`{id, success, error?}`) permet à
      l'appelant de voir précisément ce qui a échoué, plutôt qu'un
      échec ou succès opaque sur l'ensemble du lot.

      Invariant de sécurité testé explicitement à deux niveaux :
      (1) une tâche hors du pôle d'un MANAGER échoue individuellement
      dans le lot (403, `assertProjectInScope` déjà en place dans
      `updateTask`/`deleteTask`) sans bloquer le traitement des tâches
      qui sont dans son pôle — le bulk n'élargit jamais silencieusement
      l'autorité d'un MANAGER ; (2) les routes `/tasks/bulk/status` et
      `/tasks/bulk/delete` sont `authorize("ADMIN","MANAGER")` — un
      FREELANCER n'y a structurellement pas accès, confirmé côté client
      par le masquage de la case à cocher de sélection quand
      `isFreelancer`.

      Nouvelles routes : `POST /tasks/bulk/status` (`taskIds[]`,
      `status`), `POST /tasks/bulk/delete` (`taskIds[]`), toutes deux
      plafonnées à 100 ids par appel (même borne que le plafond
      d'affichage Kanban à 200 tâches — ordre de grandeur raisonnable,
      pas un plafond arbitraire ; un lot plus grand doit être scindé
      côté client). Côté client : case à cocher par ligne + « tout
      sélectionner sur la page » dans `TasksListView.tsx` (vue desktop
      uniquement — l'action en masse est un usage typiquement desktop,
      la vue carte mobile n'a pas été étendue), barre d'actions
      conditionnelle (changement de statut via `Select`, suppression
      via `ConfirmDeleteDialog` réutilisé), reportant un résumé
      succès/échec via `toast` après exécution.

      Tests réels ajoutés : `server/test/taskBulkActions.test.ts` (4
      cas d'intégration réelle contre une base migrée — lot mixte
      valide/invalide rapporté correctement par tâche, tâche hors pôle
      MANAGER refusée sans bloquer les autres, suppression en lot
      réussie, tâche hors pôle non supprimée) ;
      `client/src/features/tasks/components/TasksListViewBulkActions.test.tsx`
      (6 cas — case à cocher masquée pour FREELANCER, barre d'action
      affichée à la sélection, changement de statut en masse appelle
      la vraie requête HTTP, suppression exige confirmation avant
      d'appeler la vraie requête, bouton supprimer masqué sans
      permission, désélection masque la barre). Écart de fichier de
      test évité : un premier jet ajoutait ces tests directement dans
      `TasksListView.test.tsx` avec un mock global de
      `@tanstack/react-virtual`, qui aurait fait doublonner le rendu
      des tâches et cassé les 2 tests SEC-056 existants (lesquels
      s'appuient sur le comportement inverse — zéro ligne rendue en
      JSDOM sans ce mock) — corrigé en isolant les nouveaux tests dans
      un fichier séparé (`TasksListViewBulkActions.test.tsx`) avec son
      propre mock, sans toucher au fichier existant. Polyfills
      `hasPointerCapture`/`setPointerCapture`/`scrollIntoView` ajoutés
      localement à ce nouveau fichier (non implémentés par JSDOM,
      requis par `@radix-ui/react-select` pour un clic réel).

      Vérification complète : serveur `npx tsc --noEmit` (clean), `npm
      run lint` (0/0), `npx tsx --test test/run-all.test.ts` (366/366,
      4 nouveaux) ; client `npx tsc --noEmit` (clean), `npm run lint`
      (12 warnings — exception SEC-049, stable), `npx vitest run`
      (57/57, 6 nouveaux), `npm run build` (succès). Résolu SANS
      confirmation CI : workflow GitHub Actions sur `origin/main` en
      `workflow_dispatch` uniquement (déviation établie en session le
      2026-07-17, citée à chaque clôture depuis).

  - id: SEC-067
    titre: "Aucune sous-tache/checklist n'existe sur une tache — model Task n'a ni parentId ni relation vers des Task[] enfants"
    perimetre: "4.3 Gestion des tâches — server/prisma/schema.prisma (model Task, model TaskChecklistItem), server/src/repositories/taskChecklist.repository.ts, server/src/services/taskChecklist.service.ts, server/src/controllers/taskChecklist.controller.ts, server/src/validators/taskChecklist.validator.ts, server/src/routes/task.routes.ts, client/src/api/taskChecklist.api.ts, client/src/features/tasks/hooks/useTaskChecklist.ts, client/src/features/tasks/components/TaskChecklist.tsx, client/src/features/tasks/components/TaskDetailDrawer.tsx"
    regle_violee: null
    classe: "fonctionnalites-pm-standard-absentes"
    gravite: moyen
    statut: resolu
    critere_de_resolution: >
      Résolu quand un utilisateur ayant accès à une tâche (ADMIN,
      MANAGER de son pôle, FREELANCER assigné) peut ajouter des
      sous-tâches sous forme de checklist (titre + fait/pas fait), les
      cocher/décocher, les renommer et les supprimer, sans qu'aucune
      règle automatique ne relie leur complétion au statut de la tâche
      parente (décision explicite du porteur : statuts indépendants).
    detecte_le: "2026-07-19"
    source: manuel
    confiance: certain
    note: >
      Sous-ensemble de SEC-060 (item 1 du constat P1, rapport Product
      Owner), relié par `classe` — jamais fusionné avec SEC-060, qui
      reste `ouvert` uniquement pour l'item non retenu (dépendances
      entre tâches). Quatrième et dernier des 4 items retenus, traité
      après SEC-064 (pièces jointes), SEC-065 (mentions) et SEC-066
      (actions en masse), dans l'ordre confirmé par le porteur.

      Trois décisions de conception tranchées via AskUserQuestion avant
      tout code, chacune changeant significativement le modèle de
      données à construire : (1) profondeur — un seul niveau, une
      sous-tâche ne peut pas elle-même avoir de sous-tâches (écarte
      l'imbrication récursive et son UI) ; (2) autonomie — une
      sous-tâche est une simple checklist (titre + fait/pas fait), PAS
      une entité `Task` complète avec assignee/statut/échéance propres
      (écarte la réutilisation de `Task.parentId`, qui aurait laissé
      croire à tort qu'une sous-tâche est une vraie tâche) ; (3)
      complétion — aucune règle automatique ne bloque le statut du
      parent en fonction de ses sous-tâches, statuts totalement
      indépendants (écarte une nouvelle règle métier de blocage à
      concevoir et tester).

      Conséquence directe de (1)+(2) : nouveau modèle Prisma dédié et
      plus léger, `TaskChecklistItem` (titre, `done` booléen,
      `position`, `taskId`), plutôt qu'un self-reference
      `Task.parentId` — migration
      `20260719193000_add_task_checklist_item`. `position` toujours
      dérivée côté serveur du nombre d'items existants (jamais
      transmise/fiée par le client), pour que deux créations
      concurrentes ne collisionnent pas sur le même index.

      Autorisation : même audience que les commentaires de tâche
      (ADMIN/MANAGER/FREELANCER assigné, `taskRepository.existsInCompany`
      réutilisé tel quel dans le contrôleur) — une checklist est un
      outil de travail collaboratif sur la tâche, pas un contenu
      réservé au management, cohérent avec le fait qu'un FREELANCER
      peut déjà modifier le statut de ses propres tâches. Contrairement
      aux commentaires (SEC-059) et réunions (SEC-055/F6), pas de
      restriction supplémentaire par auteur — n'importe qui ayant accès
      à la tâche peut cocher/modifier/supprimer n'importe quel item,
      décision cohérente avec la nature « checklist partagée » du
      concept retenu. Isolation cross-tâche testée explicitement :
      modifier/supprimer un item via un `taskId` qui ne correspond pas
      au sien 404 (même garde que SEC-059/SEC-055).

      Nouvelles routes : `GET`/`POST /tasks/:taskId/checklist`,
      `PUT`/`DELETE /tasks/:taskId/checklist/:itemId`. Côté client :
      nouveau composant `TaskChecklist.tsx` (case à cocher par item,
      barre de progression purement informative — n'influence jamais
      le statut de la tâche, ajout via champ + Entrée, suppression au
      survol), câblé dans `TaskDetailDrawer.tsx` au-dessus de
      `TaskAttachments`.

      Tests réels ajoutés : `server/test/taskChecklist.test.ts` (4 cas
      d'intégration réelle contre une base migrée — position dérivée
      serveur et non transmise, bascule fait/renommage sans effet de
      bord croisé, suppression isolée des autres items, isolation
      cross-tâche 404) ;
      `client/src/features/tasks/components/TaskChecklist.test.tsx` (4
      cas — affichage des items et du compteur, ajout appelle la vraie
      requête POST, bascule appelle la vraie requête PUT avec
      `done: true`, suppression appelle la vraie requête DELETE).

      Vérification complète : serveur `npx tsc --noEmit` (clean), `npm
      run lint` (0/0), `npx tsx --test test/run-all.test.ts` (370/370,
      4 nouveaux) ; client `npx tsc --noEmit` (clean), `npm run lint`
      (12 warnings — exception SEC-049, stable), `npx vitest run`
      (61/61, 4 nouveaux), `npm run build` (succès). Résolu SANS
      confirmation CI : workflow GitHub Actions sur `origin/main` en
