      Note : cette entrée avait déjà été marquée `resolu` plus
      tôt dans cette session, puis écrasée par une écriture concurrente
      externe sur ce même fichier qui a ramené `statut: resolu` sans note
      de résolution — republié ici pour de bon ; le code, lui, n'a jamais
