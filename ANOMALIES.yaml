      Dérogation CI déjà accordée par l'utilisateur pour cette session :
      `resolu` malgré l'absence de run CI vert sur ce commit précis.

      REVUE COMPLÈTE DU TEST (session du 2026-07-22, sur demande explicite
      du porteur de relire `permissionProfileDelete.test.ts` en entier, pas
      seulement son import) : deux constats. (1) Écart de nommage dans le
