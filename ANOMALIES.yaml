    critere_de_resolution: >
      Sera résolu soit en inversant l'ordre (invalider le cache avant ou
      dans la même opération atomique que la suppression réelle), soit
      par une décision explicite du porteur documentant que la fenêtre
      est jugée négligeable (durée de l'appel `prisma.delete` seul, TTL
      cache de 300s largement supérieur, `force` déjà un chemin rare et
      volontaire côté ADMIN) — dans les deux cas la décision doit être
      écrite (REFERENTIEL.md §7 ou commentaire dans le code), pas laissée
      implicite. Prouvé, si corrigé, par un test qui simule un
      `resolvePermissions` concurrent pendant l'intervalle exact entre
      les deux opérations et confirme qu'il ne voit jamais l'ancien
      profil après le début de la suppression.
    detecte_le: "2026-07-22"
    source: manuel
    confiance: certain
    note: >
      Découvert dans la même relecture intégrale que SEC-196, en
      vérifiant que le critère de résolution de SEC-114 (« pas
      silencieusement vidée ») porte sur le signal/la traçabilité de
      l'opération, pas sur une garantie d'atomicité stricte — cette
      fenêtre TOCTOU est donc hors du périmètre exact du critère de
      SEC-114 tel qu'écrit (qui n'est pas violé), mais reste un défaut
      réel distinct à tracer sous son propre ID plutôt que sous SEC-114
      (règle du dépôt : un ID = un critère de résolution). Impact borné :
      la fenêtre est la durée d'un seul appel Prisma (`delete`, ligne
      146) avant les `cacheDel` (lignes 148-151) — de l'ordre de la
      milliseconde en usage normal, pas une fenêtre longue ouverte
      indéfiniment. `force` est déjà un chemin volontaire et rare
      (suppression de profil RBAC par un ADMIN), pas un flux à haut
      volume concurrent — gravité `mineur` en conséquence, pas `majeur`.
      Non vérifié dans cette passe : le coût réel d'inverser l'ordre
      (invalider le cache avant que le profil soit confirmé supprimé
      risquerait, en cas d'échec de la suppression elle-même, de forcer
      un recalcul inutile plutôt que de créer une incohérence — probable
      compromis correct mais non testé ici).

      RÉSOLU (session en cours, commit `e3e67ff`) : double invalidation
      du cache — une fois AVANT `permissionProfileRepository.delete(id)`,
      une fois APRÈS (au lieu d'une seule invalidation après). Ferme les
      deux sous-fenêtres : un lecteur concurrent qui repeuplerait le
      cache avec l'état pré-suppression pendant l'appel `delete()`
      lui-même reste couvert par la seconde invalidation ; un lecteur
      concurrent juste avant le `delete()` ne trouve déjà plus rien en
      cache. N'élimine pas une race théorique infinitésimale (repeuplage
      exactement entre la seconde invalidation et le retour de la
      fonction), jugée negligeable au vu de la gravité `mineur` déjà
      établie et du volume d'usage réel (chemin ADMIN volontaire, rare).
      `npx tsc --noEmit` et `npm run lint --workspace=server` propres,
      suite complète 521/521 sur 3 exécutions consécutives, dont le test
      d'intégration réel de SEC-114 qui exerce précisément ce chemin.
      `resolu` NON déclaré : commité localement, pas encore confirmé
      vert par un run CI réel sur ce commit précis.

  - id: SEC-198
    titre: "documentGeneratorService.generateInvoicePDF affiche un « Net à payer » = Invoice.amount (TTC stocké) + TIMBRE_FISCAL (0.6 TND, constante locale au fichier) — TIMBRE_FISCAL n'est jamais stocké sur Invoice ni pris en compte par invoiceService.addPayment, qui compare tout paiement reçu à Invoice.amount seul : un client qui paie exactement le montant écrit sur son PDF (le « Net à payer ») sur-paie systématiquement de 0.6 TND par facture, créé automatiquement en avoir (CreditNote) via le mécanisme overpaidBy d'addPayment"
    perimetre: "server/src/services/documentGenerator.service.ts#generateInvoicePDF (TIMBRE_FISCAL, ligne 10, 486, 495-496) ; server/src/services/invoice.service.ts#addPayment (compare au TTC seul, jamais au timbre)"
    regle_violee: null
    classe: "affichage_desynchronise_du_stockage"
    gravite: majeur
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand le montant qu'un client est invité à payer (le
      PDF de facture) et le montant que `invoiceService.addPayment`
      compare réellement pour déterminer le statut PARTIAL/PAID sont la
      MÊME valeur — soit en stockant le timbre fiscal comme un champ réel
      sur `Invoice` (ex. `Invoice.timbreFiscal`, inclus dans `amount` dès
      la création) et en supprimant la constante locale dupliquée du
      générateur PDF, soit par une décision explicite du porteur
      documentant que le timbre fiscal est volontairement hors du champ
      `amount`/`addPayment` (README comptable, pas seulement un
      commentaire de code) — dans les deux cas, prouvé par une vérification
      dev reproduisant le scénario exact ci-dessous avec un résultat
      cohérent (le paiement du montant réellement demandé au client
      n'active ni un surpaiement ni un sous-paiement inattendu).
    detecte_le: "2026-07-22"
    source: manuel
    confiance: certain
    note: >
      Découvert en exécutant réellement le volet 2 d'une demande
      explicite du porteur (« vérifier la cohérence affiché vs stocké sur
      un cas réel en dev : générer une facture PDF et comparer chaque
      montant affiché au Invoice correspondant en base »). Script de
      vérification ponctuel (non committé, supprimé après usage) :
      crée un vrai `Client`/`Project`/`Invoice` (amountHT=370.37,
      tvaRate=0.19, tvaAmount=70.37, amount=440.74, valeurs volontairement
      non rondes pour détecter tout ré-arrondi silencieux), appelle
      réellement `documentGeneratorService.generateInvoicePDF`, télécharge
      le PDF réellement produit depuis MinIO (même chemin S3 que la
      production), en extrait le texte via `pdf-parse`. Résultat : les
      trois premières lignes (Montant HT, TVA, Montant TTC) correspondent
      exactement aux valeurs stockées (370,370 / 70,370 / 440,740 TND) —
      cohérence confirmée jusqu'à la 3e décimale (millime). Écart trouvé
      sur la 5e ligne : « Net à payer 441,340 TND » (441.34), alors que
      `Invoice.amount` réellement stocké en base est 440.74 — un écart de
      exactement 0.6 TND, la valeur de `TIMBRE_FISCAL`
      (`documentGenerator.service.ts:10`, commentaire ligne 9 : « barème
      en vigueur — à confirmer avec un comptable »). Confirmé par grep
      exhaustif que `TIMBRE_FISCAL` n'existe nulle part ailleurs dans
      `src/` — jamais lu par `invoice.service.ts#addPayment` (qui compare
      `data.amount` cumulé à `invoice.amount` seul, `invoice.service.ts:238-241`)
      ni par aucun repository. Impact concret : un client qui règle
      fidèlement le « Net à payer » écrit sur son PDF de facture (le seul
      montant qui lui est présenté comme dû) déclenche systématiquement
      la branche `overpaidBy > 0` d'`addPayment` (ligne 241, 264-267) —
      création automatique d'un `CreditNote` de 0.6 TND et d'une
      notification « trop-perçu » pour un paiement pourtant exact et
      volontaire, à chaque facture émise avec le régime TVA (donc
      chaque facture réelle du dépôt). Gravité `majeur` (pas `bloquant`) :
      aucune perte financière (l'avoir de 0.6 TND reste correctement
      crédité au client via le mécanisme déjà existant), mais un vrai
      défaut d'expérience/comptabilité qui génère un bruit systématique
      (CreditNote + notification) sur 100% des factures TVA, jamais
      remarqué car jamais testé bout-en-bout jusqu'ici (aucun test
      n'appelle `generateInvoicePDF` et ne compare son contenu réel au
      stockage — confirmé par grep `generateInvoicePDF` sur `server/test/`).

  - id: SEC-199
    titre: "Traçabilité AuditLog incomplète sur le cycle facture→paiement→avoir : invoiceService.create n'écrit AUCUNE entrée AuditLog (la création même d'une facture n'est pas tracée), et l'avoir automatique créé par addPayment lors d'un surpaiement (createCreditNoteTx, partagée avec creditNoteService.create) n'a pas sa propre entrée AuditLog — seul le log invoice.payment.add mentionne overpaidBy en passant, sans jamais tracer explicitement l'id/numéro du CreditNote créé"
    perimetre: "server/src/services/invoice.service.ts#create (aucun audit log) et #addPayment (crédit automatique non audité par lui-même) ; server/src/services/creditNote.service.ts#createCreditNoteTx (fonction partagée, auditée seulement côté appelant manuel)"
    regle_violee: null
    classe: "auditlog_couverture_incomplete_cycle_financier"
    gravite: majeur
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand un scénario réel création-facture → envoi →
      paiement-avec-surpaiement → application-d'avoir produit une entrée
      `AuditLog` distincte pour CHAQUE mutation financière réelle,
      chacune identifiable par son `entityId` propre — en particulier :
      une entrée `action: "invoice.create"` (ou équivalent) au moment de
      `invoiceService.create`, ET une entrée dont l'`entityId` est celui
      du `CreditNote` créé automatiquement par un surpaiement (pas
      seulement une mention `overpaidBy` dans le log du paiement) —
      prouvé par une relecture des lignes `AuditLog` réellement produites
      par ce scénario exact, pas par une lecture du code seul.
    detecte_le: "2026-07-22"
    source: manuel
    confiance: certain
    note: >
      Découvert en exécutant réellement le volet 4 d'une demande
      explicite du porteur (« vérifier la traçabilité AuditLog sur au
      moins un scénario complet — création facture → paiement → avoir —
      en relisant les entrées before/after générées en dev »). Script
      ponctuel (non committé, supprimé après usage) : `invoiceService.
      create` → `invoiceService.send` → `invoiceService.addPayment`
      (paiement de 1050 sur une facture de 1000, surpaiement de 50,
      déclenchant la création automatique d'un `CreditNote` via
      `createCreditNoteTx`) → `creditNoteService.applyCredit` (applique
      cet avoir sur une seconde facture de 30). Résultat réel : 4 lignes
      `AuditLog` trouvées (`invoice.send`, `invoice.payment.add`,
      `invoice.send` de la 2e facture, `creditNote.apply`) — 2 attendues
      manquantes. (1) Aucune ligne pour la création de la première
      facture : confirmé par lecture directe, `invoiceService.create`
      (`invoice.service.ts:127-131`) n'appelle jamais
      `auditLogService.record`, contrairement à `cancel`/`delete`/
      `restore`/`send`/`addPayment` qui le font tous. Grep exhaustif
      confirme 11 méthodes de mutation de ce fichier sans aucun audit log
      (`create`, `update`, `setReminderPaused`, `addItem`, `updateItem`,
      `deleteItem`, `addItemsFromTimeEntries`, `addReminder`,
      `createFromProposal`, `createDepositInvoiceTx`,
      `createBalanceInvoiceTx`) contre seulement 5 qui en ont — portée
      plus large que ce seul scénario, non étendue à toutes les 11 dans
      cette entrée (à trancher séparément si le porteur veut auditer
      chaque mutation ou seulement les plus sensibles). (2) Aucune ligne
      dont l'`entityId` est le `CreditNote` créé automatiquement par le
      surpaiement : `createCreditNoteTx` (`creditNote.service.ts:35-43`,
      fonction partagée) n'a elle-même aucun appel `auditLogService.
      record` — seul son appelant manuel, `creditNoteService.create`
      (ligne 69), logge après coup avec `entityId: creditNote.id`.
      Le chemin automatique (`invoice.service.ts:266`, appelé depuis
      `addPayment`) ne fait que ce même appel `createCreditNoteTx`, donc
      hérite de la même absence de log — le seul log produit
      (`invoice.payment.add`) mentionne `overpaidBy: 50` mais jamais l'id
      ou le numéro du `CreditNote` réellement créé, rendant impossible de
      relier directement ce log au futur `creditNote.apply` sans
      re-corréler manuellement par date/montant. Gravité `majeur` (pas
      `bloquant`) : aucun impact fonctionnel immédiat, mais un vrai trou
      de piste d'audit sur des mouvements d'argent réels (création de
      facture, création d'avoir) — exactement le type de défaut que la
      demande du porteur visait à débusquer en relisant les entrées
      réelles plutôt que le code seul.

  - id: SEC-200
    titre: "proposalsApi.getProposals désimbrique une couche de trop : le contrôleur renvoie l'enveloppe de pagination à plat ({ data, total, page, pageSize }), mais le client lit response.data.data — la liste des propositions n'apparaît donc JAMAIS dans l'UI (aucune recherche, aucune pagination, table toujours vide)"
    perimetre: "client/src/api/proposals.api.ts#getProposals ; server/src/controllers/proposal.controller.ts#getProposals (res.json(result) où result = { data, total, page, pageSize })"
    regle_violee: null
    classe: "client_desimbrication_enveloppe_pagination_incorrecte"
    gravite: bloquant
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand un utilisateur réel ouvrant /app/commercial voit la
      liste des propositions existantes s'afficher (au moins une ligne pour
      un jeu de données non vide), prouvé par un test qui appelle le vrai
      client HTTP (proposalsApi.getProposals) contre le vrai contrôleur (pas
      une réimplémentation miroir de la désimbrication) et vérifie que le
      tableau retourné est non vide quand le serveur a des propositions.
    detecte_le: "2026-07-22"
    source: manuel
    confiance: certain
    note: >
      Découvert incidemment en écrivant le scénario e2e Playwright
      "cascade proposition" (demande explicite du porteur : installer
      Playwright et écrire les scénarios critiques login/cascade/
      approbation). Le scénario échouait systématiquement à trouver la
      ligne d'une proposition fraîchement créée dans le tableau, alors que
      `curl` direct contre le même endpoint avec le même token confirmait
      une réponse serveur correcte à 100% ({"data":[{...1 proposition...}],
      "total":1,...}). Cause réelle isolée après élimination de toutes les
      autres hypothèses (StrictMode, CORS, pagination, debounce de
      recherche) : `getProposals` du contrôleur fait `res.json(result)`
      avec `result` déjà égal à `{ data, total, page, pageSize }` — une
      enveloppe PLATE — mais `proposalsApi.getProposals` côté client
      s'attendait à `{ data: PaginatedResponse }` et retournait
      `response.data.data`, soit `undefined.data` sur le tableau réel. Bug
      de production réel affectant TOUS les utilisateurs (0 client actif
      au moment de la découverte, donc jamais remonté), pas un artefact de
      test — la page Propositions n'a jamais pu afficher la moindre ligne
      depuis l'introduction de ce code. Correctif écrit dans la même
      session (non encore committé au moment de la rédaction de cette
      entrée) : `proposalsApi.getProposals` retourne maintenant
      directement `response.data` (le flat `PaginatedResponse`) au lieu de
      `response.data.data`. Statut `en_cours` tant que ce correctif n'est
      pas committé ET vert en CI sur ce commit exact (règle CLAUDE.md : un
      correctif dans un working tree non commité ne vaut jamais `resolu`).

      Test réel ajouté (2026-07-23, même session) :
      `server/test/proposalInvoiceListEnvelopeFlat.http.test.ts` — appelle
      le vrai contrôleur via `supertest` (`GET /api/v1/proposals`) et
      vérifie explicitement `res.body.data` est un tableau direct
      contenant la proposition fraîchement créée, pas un
      `res.body.data.data` imbriqué — verrouille la forme exacte à
      laquelle `proposalsApi.getProposals` fait confiance côté client,
      conformément au critère de résolution écrit ci-dessus. Câblé dans
      `test/run-all.test.ts`. Vérifié vert en local à plusieurs reprises
      (3/3 assertions passent, `npm run typecheck`/`npm run lint`
      --workspace=server propres) avant qu'un incident Docker local
      (moteur arrêté accidentellement en nettoyant des connexions
      résiduelles d'une session de débogage précédente) n'empêche une
      dernière passe de couverture complète — non lié au code de ce
      correctif, signalé tel quel plutôt que masqué. Statut laissé
      `en_cours` : le correctif est commité mais son run CI n'est pas
      encore observé au moment de cette note (règle CLAUDE.md : commité
      ET vert en CI, jamais l'un sans l'autre).

