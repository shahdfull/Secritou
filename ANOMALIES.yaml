  - id: SEC-047
    titre: "Task.priority modelise (Prisma/Zod/UI) mais absent de toute logique metier serveur — jamais critere de tri, notification ou regle : donnee purement declarative"
    perimetre: "4.3 Gestion des taches — server/prisma/schema.prisma, server/src/repositories/task.repository.ts, server/src/validators/task.validator.ts, shared/src/schemas/task.schema.ts"
    regle_violee: null
    classe: null
