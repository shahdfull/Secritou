      `GET /proposals?status=ACCEPTED&projectId=null`, non créé).

      CORRECTIF ÉCRIT : bouton "Nouveau projet", son `<Dialog>`/
      `<DialogTrigger>`, le formulaire `createForm` (react-hook-form +
      `createProjectSchema`), le handler `handleCreate`, et
      `useCreateProject()` retirés de `ProjectsPage.tsx`. `canCreate`
      (`usePermission("projects", "create")`) retiré, son seul usage
      étant ce bouton (confirmé par grep, aucun autre composant du dépôt
      ne consomme cette permission). Imports devenus morts nettoyés
