  - id: SEC-154
    titre: "clientService.inviteClientUser refuse inconditionnellement (409) dès qu'un User existe pour le clientId, sans distinguer un compte déjà confirmé d'un compte créé mais dont l'email d'invitation a échoué (SMTP down) — aucune action ADMIN de renvoi, seul un forgot-password self-service du client (qui doit déjà savoir qu'un compte existe) reste possible"
    perimetre: "server/src/services/client.service.ts, server/src/services/invoice.service.ts (addPayment)"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un ADMIN dispose d'une action explicite (endpoint
      ou bouton) pour renvoyer l'email d'invitation à un client dont le
      portail a déjà été activé (User existant, clientId), sans recréer
      l'utilisateur ni exiger que le client déclenche lui-même
      `forgot-password` en devinant qu'un compte existe. Vérifié par un
      test qui appelle cette action contre une base réelle et confirme
      qu'un email est ré-enfilé sans erreur 409 ni second User créé.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Vérifié par lecture directe : client.service.ts:80-96
      (`inviteClientUser`) — `existing.length > 0` déclenche
      inconditionnellement `throw new HttpError(409, "Client already has a
      portal account")`, avant toute tentative de renvoi. Le seul appelant
      (`invoice.service.ts:287-293`, dans `addPayment`, déclenché quand
      l'acompte passe PAID) catch ce 409 et l'avale silencieusement — donc
      un échec SMTP au moment de l'invitation initiale (le seul point
      d'appel) laisse un `User` en base sans que le client n'ait jamais vu
      l'email, et plus aucun signal ni action ne permet à un ADMIN de le
      renvoyer. Un chemin de contournement existe : `POST
      /auth/forgot-password` (auth.routes.ts:232) est public et ne révèle
      pas si un compte existe (`"If an account exists, a reset email has
      been sent"`), donc un client qui SAIT qu'il devrait avoir un compte
      peut le débloquer lui-même — mais rien ne l'informe qu'un compte a
      été créé s'il n'a jamais reçu l'email initial, et aucune action
      ADMIN équivalente n'existe côté back-office pour le faire à sa
      place. Gravité mineure : mitigé par l'existence du contournement
      self-service, mais l'absence d'action ADMIN reste un vrai manque
      opérationnel signalé lors d'un rapport tiers, à distinguer d'un
      constat écarté du même rapport (voir SEC-155 et la note "écarté" en
