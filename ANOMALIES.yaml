  - id: SEC-030
    titre: "RG-004b (facture de solde) : provenance code_grep seule, calcul exact jamais confirmé par lecture directe ni test réel — aucun défaut trouvé, preuve manquante comblée"
    perimetre: "4.4 Facturation, 4.2 Gestion de projet, 4.6 Portail client — server/src/services/project.service.ts (clientApprove)"
    regle_violee: "RG-004b"
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand une lecture directe ligne par ligne de
      `clientApprove` confirme la formule exacte du montant de solde, ET
      qu'un test appelle réellement `projectService.clientApprove` contre
      une base réelle et vérifie le montant exact de la facture BALANCE
      créée — dans le cas nominal (acompte à 30%) ET dans un cas où
      l'acompte réellement facturé dévie du taux attendu, pour distinguer
      un complément à 100% d'un recalcul indépendant fixe à 70%.
    detecte_le: "2026-07-18"
    source: manuel
    confiance: certain
    note: >
      Traité en réponse à la question du porteur du projet « is there
      something a vérifier dans ce projet », après RG-008 (SEC-027),
      RG-002 (SEC-028) et RG-017 (SEC-029) — RG-004b nommée dans l'audit de
      lecture initial comme priorité argent (facture de solde, provenance
      `code_grep` seule).

      VÉRIFICATION RÉELLE, AUCUN DÉFAUT TROUVÉ (comme SEC-029, contrairement
      à SEC-027/SEC-028) : lecture directe ligne par ligne de
      `project.service.ts#clientApprove` (lignes 306-308) confirme la
      formule exacte :
      `depositAmount = depositInvoice.amountHT ?? (proposalAmount * 30%)`
      `balanceAmount = proposalAmount - depositAmount`
      C'est un COMPLÉMENT À 100%, pas un recalcul indépendant fixe à 70%
      comme le texte littéral de la règle pourrait le laisser penser — en
      réalité un comportement PLUS robuste : quel que soit le montant
      réellement facturé pour l'acompte, le solde ajuste automatiquement
      pour que acompte + solde = montant total de la proposition, jamais
      un solde fixe qui pourrait sur- ou sous-facturer si l'acompte réel
      avait dévié de 30% pour une raison quelconque.

      Les 3 tests existants qui touchent `clientApprove`
      (`project.clientApprove.test.ts`, `ratingRequestNotification.test.ts`,
      `projectUpdateBlocksCompletion.test.ts`) réimplémentent tous une
      logique-miroir locale (« mirrors the guard order… ») au lieu
      d'appeler le vrai service — CLAUDE.md : un tel test « vaudrait
      `code_grep` au mieux ». Aucun des trois n'asserte quoi que ce soit
      sur le montant de la facture de solde.

      Nouveau test
      `server/test/projectClientApproveBalanceInvoice.test.ts` (câblé dans
      `test/run-all.test.ts`), appelle réellement
      `projectService.clientApprove` contre une base migrée, 2 cas :
      (1) cas nominal, acompte payé à 300 sur une proposition de 1000 →
      solde créé à 700 exactement ; (2) acompte dévié à 400 (pas les 30%
      habituels) sur la même proposition de 1000 → solde créé à 600
      exactement (pas 700, qui aurait prouvé un recalcul fixe déconnecté
      de l'acompte réel) — confirme explicitement que acompte + solde
      totalise toujours exactement le montant de la proposition, jamais
      plus, jamais moins.

      `npx tsc --noEmit` vert. Suite complète : 286/286 (284 + 2 nouveaux),
      ~23-25s, aucune régression. `resolu` déclaré SANS confirmation CI :
      la CI est actuellement désactivée sur `origin/main` sur demande du
      porteur du projet (workflow_dispatch seul, session du 2026-07-17),
      dérogation « no make it resolu » déjà établie dans cette session.

  - id: SEC-031
    titre: "POST /invoices acceptait un champ number manuel, contournant totalement le compteur InvoiceCounter et la garantie de numérotation sans trou"
    perimetre: "4.4 Facturation — server/src/validators/invoice.validator.ts, server/src/services/invoice.service.ts"
    regle_violee: "RG-012"
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `createInvoiceSchema` n'accepte plus de champ
      `number` du tout (strippé par Zod si fourni), quand
      `invoiceService.create` ne peut plus recevoir ni utiliser de `number`
      caller-supplied (retiré du type du paramètre), ET qu'un test appelle
      réellement `invoiceService.create` contre une base réelle pour
      confirmer à la fois la continuité de la séquence sur des créations
      consécutives, et qu'un `number` injecté dans l'entrée brute est
      systématiquement ignoré au profit du numéro réellement généré.
    detecte_le: "2026-07-18"
    source: manuel
    confiance: certain
    note: >
      Trouvé en vérifiant RG-012 (« factures numérotées séquentiellement
      par mois, sans trou ») en réponse à la question du porteur du projet
      « is there something a vérifier dans ce projet », 5e règle traitée
      après RG-008/RG-002/RG-017/RG-004b.

      CONSTAT : `nextInvoiceNumber` (`invoice.service.ts`) est correctement
      atomique — `upsert` avec `increment: 1` sur `InvoiceCounter`, toujours
      exécuté dans la même transaction Prisma que la création de la
      facture (`$transaction`), donc un échec de la création annule aussi
      l'incrémentation (rollback SQL complet, pas de trou possible par ce
      chemin). La suppression de facture est un soft-delete
      (`deletedAt`), pas une suppression physique, cohérent avec le
      commentaire du code (« disallowing invoice deletion »).

      MAIS : `invoiceService.create` (le point d'entrée de `POST
      /invoices`, réservé à `ADMIN`) acceptait un champ `number` optionnel
      directement dans son type d'entrée — si fourni, la méthode
      contournait entièrement `createInvoiceWithGeneratedNumber`/
      `nextInvoiceNumber`/`InvoiceCounter` et créait la facture avec le
      numéro fourni tel quel (`invoiceRepository.create(data as any)`).
      Le validateur `createInvoiceSchema` exposait ce même champ
      (`number: z.string().min(1).max(100).optional()`), le rendant
      atteignable depuis l'API HTTP. Seul garde-fou existant : la
      contrainte `@unique` sur `Invoice.number` (empêche un doublon exact,
      pas un trou dans la séquence auto-générée du mois, ni une collision
      future avec un numéro que le compteur générerait plus tard).

      DÉCISION DU PORTEUR DU PROJET (AskUserQuestion, session du
      2026-07-18) : « Lacune réelle à corriger : retirer `number` du
      validateur/endpoint (Recommandé) ».

      CORRECTIF ÉCRIT : `number` retiré de `createInvoiceSchema` (le
      middleware `validate()` utilise `schema.parse()`, qui strippe par
      défaut toute clé non déclarée — confirmé par lecture directe de
      `validate.middleware.ts`, aucune option `.passthrough()` nulle part) ;
      `number` retiré du type du paramètre de `invoiceService.create`, la
      méthode appelle désormais inconditionnellement
      `createInvoiceWithGeneratedNumber(data)`, sans branche de
      contournement. Aucun test existant ni appelant réel ne dépendait de
      ce champ (grep confirmé — un seul appelant réel dans tout le dépôt,
      `invoice.controller.ts#createInvoice`, qui transmet `req.body` tel
      quel).

      Nouveau test `server/test/invoiceNumberingGapless.test.ts` (câblé
      dans `test/run-all.test.ts`), appelle réellement
      `invoiceService.create` contre une base migrée, 2 cas : (1) deux
      créations consécutives sous le même préfixe mensuel obtiennent des
      numéros de séquence strictement consécutifs (aucun trou) ; (2) un
      `number` injecté dans le body brut est strippé par le validateur
      Zod réel (`createInvoiceSchema.parse`, pas une réimplémentation), et
      le service génère toujours son propre numéro réel, jamais celui
      fourni.

      `npx tsc --noEmit` vert. Suite complète : 288/288 (286 + 2 nouveaux),
      ~34s, aucune régression. `resolu` déclaré SANS confirmation CI : la
      CI est actuellement désactivée sur `origin/main` sur demande du
      porteur du projet (workflow_dispatch seul, session du 2026-07-17),
      dérogation « no make it resolu » déjà établie dans cette session.

  - id: SEC-032
    titre: "Le validateur currencyCode acceptait n'importe quelle devise à 3 lettres — aucune contrainte réelle à TND en écriture sur POST /invoices et POST /proposals"
    perimetre: "4.4 Facturation, 4.1 CRM & Pipeline commercial — server/src/validators/invoice.validator.ts, server/src/validators/proposal.validator.ts, shared/src/schemas/common.schema.ts"
    regle_violee: "RG-001"
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `createInvoiceSchema`/`createProposalSchema`
      rejettent explicitement toute devise différente de TND, ET qu'un
      test appelle réellement ces validateurs (pas une réimplémentation
      locale) pour confirmer le rejet d'une devise arbitraire ET
      l'acceptation de TND (explicite ou par défaut).
    detecte_le: "2026-07-18"
    source: manuel
    confiance: certain
    note: >
      Trouvé en vérifiant RG-001 (« toute proposition/facture est libellée
      en TND ») en réponse à la question du porteur du projet « is there
      something a vérifier dans ce projet », 6e règle traitée après
      RG-008/RG-002/RG-017/RG-004b/RG-012 — la dernière de la liste
      initiale des 8 règles à provenance faible identifiées par l'audit de
      lecture du début de cette série.

      CONSTAT : `currencyCode` (défini séparément dans
      `invoice.validator.ts` ET `proposal.validator.ts`, deux copies
      dupliquées) valait `z.string().length(3).toUpperCase()` — AUCUNE
      contrainte de valeur, n'importe quelle devise à 3 lettres (`USD`,
      `EUR`, etc.) passait la validation sur `POST /invoices` et `POST
      /proposals`. Seul un `.default("TND")` existait, mais rien
      n'empêchait un appelant de fournir explicitement une autre valeur.
      Aucun filtre de rattrapage dans `invoice.service.ts`/
      `proposal.service.ts` : `data.currency` transite tel quel jusqu'à la
      base. Impact réel confirmé : `DEFAULT_CURRENCY = "TND"`
      (`server/src/constants/currency.ts`) est déjà utilisée comme FILTRE
      dans les repositories analytics/forecast
      (`executiveMetrics.repository.ts`, `revenueForecast.repository.ts`,
      déjà lus intégralement lors de l'audit du module 4.8) — une facture
      créée dans une autre devise aurait été silencieusement exclue de
      TOUS les KPIs financiers (cash, forecast, executive metrics), pas
      seulement « non conforme à TND » mais invisible du pilotage.

      TROISIÈME COPIE TROUVÉE, également corrigée : `shared/src/schemas/
      common.schema.ts` exporte sa propre `currencyCode` identique (même
      défaut), utilisée par `shared/src/schemas/invoice.schema.ts`/
      `proposal.schema.ts` — ces deux fichiers sont du CODE MORT confirmé
      (grep exhaustif sur tout le monorepo : zéro import réel côté client
      ou serveur, seulement réexportés via `shared/src/index.ts`), mais
      portant le même nom exact que les vrais validateurs serveur — un
      risque de piège pour un développeur futur qui importerait
      `createInvoiceSchema` depuis `@secritou/shared` en pensant utiliser
      le vrai validateur. Corrigée par cohérence, sans activer ce code mort
      ni créer de nouvelle capacité.

      DÉCISION DU PORTEUR DU PROJET (AskUserQuestion, session du
      2026-07-18) : « Lacune réelle à corriger : contraindre `currencyCode`
      à TND uniquement (Recommandé) ».

      CORRECTIF ÉCRIT : `currencyCode` changée en `z.literal(DEFAULT_CURRENCY)`
      (import de la constante serveur existante, une seule source de
      vérité) dans `invoice.validator.ts` et `proposal.validator.ts` ; même
      changement en dur (`z.literal("TND")`, `shared/` ne peut pas
      dépendre de `server/`) dans `shared/src/schemas/common.schema.ts`.
      Vérifié qu'aucun test réel n'était affecté : les seuls usages de
      devises non-TND dans les tests (`idor.test.ts`,
      `proposal.service.test.ts`, `proposalAcceptCascade.test.ts`,
      `validators.test.ts`) sont soit des fixtures de données pour tester
      une logique différente (IDOR, cascade), soit — pour `validators
      .test.ts` — un schéma réimplémenté localement, déjà identifié comme
      déconnecté du vrai validateur, non affecté par ce changement.

      ÉCART INCIDENT TROUVÉ ET CORRIGÉ DANS LA MÊME PASSE (hors périmètre
      strict de SEC-032, enregistré immédiatement conformément à
      CLAUDE.md) : en exécutant les tests du workspace `shared` pour
      confirmer l'absence de régression, `shared/src/constants/
      contactForm.test.ts` échouait — un test figé (« frozen enum test »)
      attendait encore les 4 anciens noms de pôles anglais pré-migration
      (`Business Performance`, `Digital Growth`, `Technology Solutions`,
      `AI & Automation`) alors que `contactForm.ts` utilise déjà les 4 noms
      canoniques FR depuis une session antérieure (cf. SEC-001, déjà
      résolue côté serveur/client mais cette occurrence dans `shared/`
      n'avait jamais été couverte). Le code était déjà correct, seul le
      test était faux — corrigé (pas le code), même classe de défaut que
      SEC-001, occurrence distincte du même vocabulaire obsolète.

      Nouveau test `server/test/currencyRejectsNonTnd.test.ts` (câblé dans
      `test/run-all.test.ts`), appelle réellement `createInvoiceSchema`/
      `createProposalSchema` (pas une réimplémentation) : rejette USD/EUR,
      accepte TND explicite et par défaut sur les deux schémas.

      `npx tsc --noEmit` vert (server, client). `npm test` du workspace
      `shared` vert (9/9, après correction du test figé). Suite complète
      serveur : 292/292 (288 + 4 nouveaux), ~24-28s, aucune régression.
      `resolu` déclaré SANS confirmation CI : la CI est actuellement
      désactivée sur `origin/main` sur demande du porteur du projet
      (workflow_dispatch seul, session du 2026-07-17), dérogation « no
      make it resolu » déjà établie dans cette session.

      Toutes les 8 règles §5 identifiées par l'audit de lecture initial
      (RG-001, RG-002, RG-004b, RG-008, RG-012, RG-017, RG-005, RG-020)
      sont désormais traitées ou explicitement écartées comme non
      pertinentes (RG-005 statut PRÉVU par construction, RG-020 code déjà
      lu sans lacune technique réelle).

  - id: SEC-033
    titre: "Le détail d'un projet n'affichait jamais ses tâches — projectListSelect ne sélectionnait jamais la relation tasks"
    perimetre: "4.2 Gestion de projet — server/src/repositories/project.repository.ts, client/src/features/projects/ProjectDetailPage.tsx"
    regle_violee: null
    classe: null
    gravite: bloquant
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un utilisateur peut ouvrir le détail d'un projet
      et voir réellement la liste de ses tâches (pas seulement l'absence
      d'erreur) — vérifié par un test qui appelle réellement
      `projectService.getProjectById` contre une base réelle et confirme
      que les tâches créées apparaissent dans le résultat, avec leurs
      champs id/title/status.
    detecte_le: "2026-07-18"
    source: manuel
    confiance: certain
    note: >
      Signalé directement par le porteur du projet (constat détaillé,
      session du 2026-07-18), hors du fil des règles §5 en cours de
      vérification — enregistré immédiatement conformément à CLAUDE.md.

      CONSTAT (vérifié intégralement avant correction, pas pris tel quel) :
      `projectListSelect` (`project.repository.ts`, partagé par `findAll`
      ET `findById`) ne sélectionnait jamais la relation `tasks`. Le type
      `ProjectWithProgress` (même fichier) ne déclarait que `progress`/
      `taskDone`/`taskTotal`, jamais `tasks` — confirmant que ce champ
      n'avait jamais été prévu côté serveur pour ce chemin. Côté client,
      `types/project.ts#Project.tasks?: Task[]` (optionnel) masquait
      totalement l'absence côté TypeScript ; `ProjectDetailPage.tsx:98`
      (`const tasks = project.tasks ?? []`) recevait donc systématiquement
      un tableau vide. Conséquences confirmées par lecture directe :
      l'onglet Tâches toujours vide (ligne 199, condition `tasks.length >
      0` toujours fausse), le compteur par statut (ligne 203) et le lien
      « Voir toutes les tâches (n) » (lignes 278-286) jamais affichés, le
      bandeau « Partir du template » (lignes 294-303) affiché à tort en
      permanence dès qu'un template avec des tâches existe (branche
      `tasks.length === 0` toujours empruntée). Le % de progression restait
      correct car calculé par une requête SQL indépendante
      (`getProgressForProject`, agrégation directe sur `Task` sans passer
      par la relation Prisma), ce qui rendait l'incohérence visible pour
      l'utilisateur (barre à 60%, liste vide) plutôt que masquée.

      RBAC vérifié avant de choisir le correctif : `GET /tasks` (route
      dédiée) est gardée `authorize("ADMIN", "MANAGER", "FREELANCER")`,
      EXCLUANT explicitement CLIENT — un correctif « ajouter un
      `useTasks({projectId})` côté front » aurait cassé silencieusement
      pour le rôle CLIENT (403), qui accède à son propre projet via un
      chemin de scope différent (`findById`'s branche `else`, filtrée sur
      `clientId`). Corrigé côté SERVEUR à la place : `tasks` ajouté
      uniquement au `baseSelect` de `findById` (projet unique), PAS à
      `projectListSelect` lui-même (partagé avec `findAll`, la liste
      paginée — y ajouter `tasks` aurait tiré toutes les tâches de tous
      les projets listés, une régression de performance réelle sur un
      endpoint de liste). Scope du select limité aux 3 champs réellement
      consommés par `ProjectDetailPage.tsx` (`id`/`title`/`status` — les 2
      appels à `TimeTrackingTab` ne consomment que `{id, title}`),
      `ProjectWithProgress` mis à jour pour déclarer `tasks?` en cohérence.

      Nouveau test `server/test/projectDetailIncludesTasks.test.ts` (câblé
      dans `test/run-all.test.ts`), appelle réellement
      `projectService.getProjectById` contre une base migrée, 2 cas : un
      projet avec 3 tâches renvoie bien les 3 (titres et statuts corrects,
      pas juste "non vide") ; un projet sans tâche renvoie un tableau vide
      (pas `undefined`, pour que `?? []` côté front reste une garde
      défensive et non le masque du bug).

      `npx tsc --noEmit` vert (server, client — le type client `Project
      .tasks?: Task[]` accepte structurellement le shape réduit renvoyé).
      Suite complète serveur : 294/294 (292 + 2 nouveaux), ~23-25s, aucune
      régression. `resolu` déclaré SANS confirmation CI : la CI est
      actuellement désactivée sur `origin/main` sur demande du porteur du
      projet (workflow_dispatch seul, session du 2026-07-17), dérogation
      « no make it resolu » déjà établie dans cette session.

  - id: SEC-034
    titre: "L'onglet « Mes livrables » n'était filtré par aucun projet — et les livrables déposés n'avaient jamais de projectId, les rendant invisibles pour le freelance qui les dépose"
    perimetre: "4.2 Gestion de projet, 4.7 Freelances — client/src/features/projects/ProjectDetailPage.tsx, server/src/repositories/document.repository.ts"
    regle_violee: null
    classe: null
    gravite: bloquant
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un Freelancer ouvrant le détail d'un projet ne
      voit que les livrables de CE projet (pas ceux d'autres affaires), ET
      quand un livrable qu'il vient de déposer est réellement visible pour
      lui-même dans cette même liste — vérifié par un test qui appelle
      réellement `documentService.create` puis `documentService.getAll`
      contre une base réelle, scopé FREELANCER.
    detecte_le: "2026-07-18"
    source: manuel
    confiance: certain
    note: >
      Signalé directement par le porteur du projet (constat détaillé,
      session du 2026-07-18), immédiatement après SEC-033 (même fichier,
      même page) — enregistré et corrigé immédiatement conformément à
      CLAUDE.md.

      CONSTAT INITIAL (confirmé par lecture directe) :
      `ProjectDetailPage.tsx:60` appelait `useDocuments({ page: 1,
      pageSize: 50 })` sans jamais passer `projectId: project.id`, alors
      que le hook (`useDocuments`) et l'API (`documentsApi.getDocuments`)
      supportent ce paramètre. Un Freelancer ouvrant le projet A voyait
      donc la liste de tous ses documents `DELIVERABLE` toutes affaires
      confondues (et au-delà de 50 documents, certains disparaissaient
      silencieusement de la liste, pagination oblige).

      SECOND DÉFAUT TROUVÉ EN VÉRIFIANT (plus grave que le constat
      initial, empilé sur le même flux) : le dépôt du livrable
      (`createDocument`, lignes 366-375) ne transmettait JAMAIS
      `projectId`/`clientId` non plus — seulement `tags: [project.name]`
      (texte libre, fragile, cassable si le projet est renommé). Or
      `documentRepository.findAll`'s scope FREELANCER filtre `where
      .project = { tasks: { some: { assigneeId } } }` — vérifié
      EMPIRIQUEMENT contre une vraie base (script de vérification isolé,
      supprimé après usage) qu'une relation Prisma imbriquée sur un champ
      `null` (`Document.projectId` optionnel) ne matche JAMAIS ce filtre.
      Conséquence réelle : un livrable déposé par un freelance était
      INVISIBLE POUR LUI-MÊME dès qu'il consultait via ce chemin, y
      compris juste après l'avoir déposé — corriger uniquement la lecture
      (ajouter `projectId` à `useDocuments`) n'aurait rien changé tant que
      les documents créés n'avaient pas de `projectId` réel. Un ADMIN (pas
      de filtre `project`) ou un MANAGER dont le scope de pôle dépend de
      `Document.clientId` (`where.client = { projects: { some: {...} } }`)
      voyaient malgré tout ces documents — seul FREELANCER était
      strictement aveugle à ses propres dépôts.

      DÉCISION DU PORTEUR DU PROJET (AskUserQuestion, session du
      2026-07-18) : « Corriger les deux : lecture (projectId sur
      useDocuments) ET écriture (projectId sur createDocument)
      (Recommandé) ».

      CORRECTIF ÉCRIT : `ProjectDetailPage.tsx:60` passe désormais
      `projectId: id` (le paramètre de route, disponible dès le rendu,
      avant même le chargement de `project` — évite tout souci d'ordre de
      hooks). L'appel `createDocument` (lignes 366-378) transmet
      désormais `projectId: project.id` ET `clientId: project.clientId`
      en plus du `tags: [project.name]` existant (conservé pour la
      recherche texte déjà supportée côté serveur) — couvre à la fois le
      scope FREELANCER (`project.tasks.some`) et le scope MANAGER
      (`client.projects.some`).

      Nouveau test `server/test/freelancerSeesOwnDeliverable.test.ts`
      (câblé dans `test/run-all.test.ts`), appelle réellement
      `documentService.create` puis `documentService.getAll` contre une
      base migrée, 2 cas : (1) un livrable créé avec `projectId`/
      `clientId` est bien visible pour le freelance staffé sur ce projet ;
      (2) le même livrable SANS `projectId` (reproduisant le comportement
      d'avant correctif) reste invisible pour ce même freelance — preuve
      rigoureuse que le défaut était réel, pas supposé.

      ÉCART NON CORRIGÉ, SIGNALÉ MAIS HORS PÉRIMÈTRE DE CETTE PASSE : en
      lisant `document.schema.ts` (`shared/`), le champ `title` envoyé par
      `ProjectDetailPage.tsx` à la création n'existe dans AUCUN schéma de
      validation (`documentBaseSchema` ne connaît que `name`, pas
      `title`), alors que `Document.title` est un champ `String` requis
      (non nullable) dans `schema.prisma`. Zod strippe silencieusement ce
      champ avant qu'il n'atteigne le service — comportement à vérifier
      séparément (une future anomalie, pas ouverte ici faute de
      vérification complète du chemin de persistance réel).

      `npx tsc --noEmit` vert (server, client). Suite complète serveur :
      296/296 (294 + 2 nouveaux), ~21-25s, aucune régression. `resolu`
      déclaré SANS confirmation CI : la CI est actuellement désactivée sur
      `origin/main` sur demande du porteur du projet (workflow_dispatch
      seul, session du 2026-07-17), dérogation « no make it resolu » déjà
      établie dans cette session.

  - id: SEC-035
    titre: "Onglets Actif/Terminé du freelance (ProjectsPage.tsx) calculés par .filter() sur une seule page paginée — incompatible avec la pagination affichée en bas de page"
    perimetre: "4.2 Gestion de projet, 4.7 Freelances — client/src/features/projects/ProjectsPage.tsx, server/src/repositories/project.repository.ts"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un Freelancer avec plus de 12 projets voit des
      compteurs et un contenu de sous-onglet (Actif/Terminé) corrects et
      complets sans devoir naviguer manuellement page par page — vérifié
      par un test qui appelle réellement `projectRepository.findAll` avec
      un filtre `statusIn` contre une base réelle et confirme le filtrage
      ET la pagination indépendante (page 1 sur 2 projets ne masque jamais
      le second, atteignable en parcourant les pages).
    detecte_le: "2026-07-18"
    source: manuel
    confiance: certain
    note: >
      Signalé directement par le porteur du projet (constat détaillé,
      session du 2026-07-18) — enregistré et corrigé immédiatement
      conformément à CLAUDE.md.

      CONSTAT (vérifié intégralement) : `ProjectsPage.tsx`, `activeProjects`/
      `doneProjects` étaient calculés par `.filter()` sur `projects =
      projectsResult.data` — une seule page de `useProjects` (12 éléments
      par défaut, `useListParams(12)`). Si un freelance avait plus de 12
      projets, les compteurs des onglets et leur contenu étaient faux : un
      projet « Terminé » sur la page 2 n'apparaissait jamais dans l'onglet
      « Terminé » tant qu'on n'y naviguait pas manuellement — alors que la
      pagination en bas de page (`DataTablePagination`, `total`) portait
      sur le total réel non filtré. Deux logiques de pagination
      incompatibles coexistaient sur le même écran.

      Root cause serveur : `project.repository.ts#buildWhere` ne
      supportait qu'un filtre `status` UNIQUE (`ListQueryOptions.status`,
      partagé par toutes les entités du projet — leads, clients, invoices,
      etc.), incapable d'exprimer « Actif » qui regroupe 3 statuts
      (`PLANNING`/`IN_PROGRESS`/`REVIEW`).

      DÉCISION DU PORTEUR DU PROJET (AskUserQuestion, session du
      2026-07-18) : « Ajouter un filtre `statusIn` côté serveur, deux
      requêtes séparées côté client par sous-onglet (Recommandé) » — plutôt
      qu'un contournement fragile (augmenter le pageSize).

      CORRECTIF ÉCRIT :
      Serveur — nouveau paramètre `statusIn?: ProjectStatus[]` ajouté à
      `projectRepository.findAll`/`projectService.getAllProjects`, en plus
      de (pas remplaçant) `options.status` — pas d'élargissement du type
      générique `ListQueryOptions` partagé par toutes les entités, pour ne
      pas répercuter ce besoin spécifique aux projets ailleurs. Query
      param `statusIn` (liste séparée par virgules) parsé et validé dans
      `project.controller.ts` contre les valeurs réelles de `ProjectStatus`
      (`Object.values`), valeurs invalides silencieusement ignorées.
      Client — `projectsApi.getAll`/`useProjects` acceptent désormais
      `statusIn?: string` (type élargi localement, pas dans
      `ListQueryParams` partagé). `ProjectsPage.tsx` : les sous-onglets
      Actif/Terminé du Freelancer sont désormais deux requêtes `useProjects`
      indépendantes (`activePage`/`donePage`, état local par onglet, pas
      partagé avec l'URL de la liste ADMIN/MANAGER), chacune avec sa
      propre `DataTablePagination`. Les compteurs de badge utilisent
