      et build propres, lint stable à 12 warnings (l'exception
      `react-refresh` documentée, aucun nouveau cas introduit).
      `resolu` déclaré SANS confirmation CI : CI désactivée sur
      `origin/main` (workflow_dispatch seul, session du 2026-07-17),
