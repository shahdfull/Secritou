  - id: SEC-180
    titre: "Le fallback 404 générique (app.ts, route inexistante) répond { message: \"Route not found\" } au lieu de l'enveloppe d'erreur uniforme { error: { code, message }, message, requestId } produite par error.middleware.ts pour absolument tous les autres cas (HttpError, ZodError, Prisma P2002, Multer) — seul point de sortie HTTP de l'API qui ne porte ni error.code ni requestId"
    perimetre: "transverse — server/src/app.ts (lignes 134-136) ; server/src/middlewares/error.middleware.ts"
    regle_violee: null
    classe: "enveloppe_erreur_non_uniforme"
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand une requête vers une route inexistante (404)
      reçoit la même enveloppe que toute autre erreur — `{ error: { code:
      "ROUTE_NOT_FOUND", message }, message, requestId }` — soit en
      remplaçant le handler générique par `next(new HttpError(404, ...))`
      pour qu'il traverse `error.middleware.ts` comme tout le reste, soit
      par une décision explicite documentée si le porteur juge ce cas
      volontairement hors du contrat d'enveloppe — prouvé par un test HTTP
      réel (même style que `errorEnvelope.http.test.ts`, SEC-145/SEC-149)
      qui appelle une route inexistante et vérifie la présence de
      `error.code`/`requestId`.
    detecte_le: "2026-07-21"
    source: audit_llm
    confiance: certain
    note: >
      Audit architecture API (item 2, cohérence des codes d'erreur).
      Vérifié par lecture directe : `app.ts:134-136` —
      `app.use((_req, res) => { res.status(404).json({ message: "Route not
      found" }); })` — enregistré APRÈS `app.use("/api/v1", apiRoutes)`
      mais avant `app.use(errorMiddleware)`, donc ce handler répond
      directement sans jamais passer par `errorMiddleware` (pas de
      `next()`). `errorEnvelope.http.test.ts` (SEC-145/SEC-149), qui
      teste déjà l'enveloppe uniforme sur 8 scénarios HTTP réels
      (ZodError, HttpError x6, Multer implicite), ne couvre pas ce cas —
      grep sur son contenu confirmé : aucune requête vers une route
      inexistante. Impact concret pour un intégrateur tiers : une erreur
      de frappe dans l'URL de base (le cas le plus probable en phase
      d'intégration) est le seul chemin d'erreur de toute l'API où
      `response.data.error.code` est `undefined` au lieu d'une chaîne
      exploitable — cassant tout parsing générique d'erreur écrit contre
      le contrat par ailleurs cohérent (confirmé sur les 6 autres branches
      de `error.middleware.ts`, toutes unifiées sous `HttpError` depuis
      SEC-149).

      RÉSOLU (session en cours) : `app.ts` — le handler générique
      remplacé par `app.use((_req, _res, next) => { next(new
      HttpError(404, "Route not found", "ROUTE_NOT_FOUND")); })`, qui
      traverse désormais `errorMiddleware` comme toute autre erreur
      (option 1 du critère de résolution). Preuve par test réel : nouveau
      cas ajouté à `errorEnvelope.http.test.ts` (SEC-145/SEC-149, même
      fichier/style) — `GET /api/v1/this-route-does-not-exist` via le
      vrai stack HTTP (`app.ts` → `errorMiddleware`), vérifie `status
      404`, `error.code === "ROUTE_NOT_FOUND"`, `error.message` et
      `requestId` présents. Suite complète verte, `npx tsc --noEmit` et
      `npm run lint --workspace=server` verts. Fix et test produits par
      mes propres appels d'outils dans cette session. Dérogation CI déjà
      accordée par l'utilisateur pour cette session : `resolu` malgré
