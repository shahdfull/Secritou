  - id: SEC-036
    titre: "4 failles IDOR de scope MANAGER : réunions de projet, application de template, brief et timeline lisibles/modifiables hors du pôle du Manager"
    perimetre: "4.2 Gestion de projet — server/src/services/projectMeeting.service.ts, server/src/services/projectTemplate.service.ts, server/src/services/project.service.ts, server/src/routes/project.routes.ts"
    regle_violee: "RG-002"
    classe: "scope_manager_manquant"
    gravite: bloquant
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un Manager du pôle A reçoit un rejet (403 ou 404
      selon le point d'entrée) sur toute tentative de lister/créer des
      réunions, lire/modifier la cadence de rappel, appliquer un template,
      ou lire le brief/la timeline d'un projet du pôle B — vérifié par un
      test qui appelle réellement chaque méthode contre une base réelle,
      sur les 4 axes, ET confirme qu'un Manager du même pôle (ou un ADMIN
      non scopé) continue de fonctionner normalement.
    detecte_le: "2026-07-18"
    source: manuel
    confiance: certain
    note: >
      Signalé directement par le porteur du projet, sous la casquette
      « ingénieur sécurité » — 3 constats précis fournis, tous confirmés
      par lecture directe avant toute correction. Un 4e trou distinct
      trouvé en vérifiant le 3e, non mentionné dans le signalement
      initial — enregistré et corrigé dans la même passe conformément à
      CLAUDE.md.

      CONSTAT 1 (confirmé) : `projectMeeting.service.ts`
      (`listByProject`/`create`/`getSchedule`/`setSchedule`) n'appliquait
      AUCUN contrôle de scope — contrairement au pattern déjà en place
      dans `task.service.ts#assertProjectInScope`. Un Manager du pôle A
      pouvait lister/créer des réunions et lire/modifier la cadence de
      rappel (`meeting-schedule`, qui pilote le job de rappel quotidien)
      d'un projet du pôle B, en connaissant/devinant son UUID. Vérifié sur
      toute la chaîne (route → controller → service → repository) :
      aucun niveau ne filtrait.

      CONSTAT 2 (confirmé) : `projectTemplate.service.ts#applyToProject`
      chargeait bien `project.serviceId` (pour choisir le bon template du
      pôle) mais ne le comparait jamais au pôle du Manager appelant. Un
      Manager hors périmètre pouvait injecter en masse les tâches du
      template de son propre pôle dans un projet qui n'était pas le sien.

      CONSTAT 3 (confirmé) : `GET /:id/timeline-status` et `GET /:id/brief`
      n'avaient que `authenticate`, jamais `authorize(...)` — la
      protection reposait entièrement sur le filtrage interne du service,
      sans filet de sécurité au niveau routeur (un futur rôle ajouté ou un
      oubli de scoping service serait passé inaperçu).

      CONSTAT 4, TROUVÉ EN VÉRIFIANT LE CONSTAT 3 (pas dans le signalement
      initial) : `project.service.ts#getBrief`/`getTimelineStatus`
      construisaient un `where` qui ne filtrait EXPLICITEMENT que
      `CLIENT` et `FREELANCER` — le rôle `MANAGER` n'était jamais scopé
      par pôle dans ces deux méthodes, contrairement à
      `project.repository.ts#findById` qui gère bien ce cas
      (`serviceId: serviceId ?? undefined`). Un Manager du pôle A pouvait
      donc lire le BRIEF (potentiellement des objectifs/budget client
      confidentiels) ET la timeline complète de n'importe quel projet,
      indépendamment du problème d'`authorize()` du constat 3 — même avec
      un `authorize()` ajouté, sans ce correctif un Manager MANAGER aurait
      continué à tout voir.

      DÉCISION DU PORTEUR DU PROJET (AskUserQuestion, session du
      2026-07-18) : « Corriger les 4 dans la même passe (Recommandé) ».

      CORRECTIFS ÉCRITS :
      (1) `assertProjectInScope` (identique au pattern de
      `task.service.ts`) ajouté à `projectMeeting.service.ts`, appliqué
      aux 4 méthodes ; controllers mis à jour pour construire et
      transmettre le `scope` via `buildServiceScope`.
      (2) `projectTemplate.service.ts#applyToProject` : vérification
      directe `project.serviceId !== scope.userServiceId` (le projet est
      déjà chargé avec son `serviceId`, pas besoin d'une requête séparée
      comme dans le pattern générique) — `403 PROJECT_OUT_OF_SCOPE`.
      (3) `authorize("ADMIN", "MANAGER", "CLIENT", "FREELANCER")` ajouté
      explicitement aux 2 routes (`timeline-status`, `brief`), en filet de
      sécurité, pas en remplacement du scoping interne déjà nécessaire.
      (4) Filtre `if (role === "MANAGER") where.serviceId = managerServiceId
      ?? "__none__"` ajouté à `getBrief` ET `getTimelineStatus` ; les deux
      controllers construisent désormais le scope MANAGER et le
      transmettent en paramètre supplémentaire.

      Nouveau test `server/test/managerScopeIdorFixes.test.ts` (câblé
      dans `test/run-all.test.ts`), appelle réellement les 4 services
      contre une base migrée, 5 cas : rejet cross-pôle sur les 4 méthodes
      de `projectMeeting.service.ts` ; fonctionnement normal same-pole/
      ADMIN confirmé pour ne pas sur-restreindre ; rejet cross-pôle sur
      `applyToProject`, `getBrief`, `getTimelineStatus`.

      BUG DE TEST TROUVÉ ET CORRIGÉ EN COURS DE ROUTE (pas dans le code
      applicatif) : le premier jet du test déclarait `managerAScope` comme
      `const` au niveau module, capturant `serviceA` avant que le hook
      `before()` ne l'assigne (donc toujours `undefined`) — masquait un
      vrai bug de test sous un faux positif (tous les rejets passaient,
      mais pour la mauvaise raison : `userServiceId: undefined` rejette
      n'importe quel pôle, pas seulement le pôle B). Détecté par le test
      "same-pole Manager" qui échouait à tort. Corrigé en transformant
      `managerAScope` en fonction, appelée après l'assignation réelle de
      `serviceA`.

      `npx tsc --noEmit` vert. Suite complète : 303/303 (298 + 5 nouveaux),
      ~28-30s, aucune régression. `resolu` déclaré SANS confirmation CI :
      la CI est actuellement désactivée sur `origin/main` sur demande du
      porteur du projet (workflow_dispatch seul, session du 2026-07-17),
      dérogation « no make it resolu » déjà établie dans cette session.

  - id: SEC-037
    titre: "Qualité de code : incohérence prisma/prismaRead (risque plus grave qu'une simple charge inutile), Kanban tâches sans garde de transition + message d'erreur générique, plafond 200 tâches sans indicateur, typage mensonger sur getFreelancerAvailability"
    perimetre: "4.2 Gestion de projet, 4.6 Portail client — server/src/repositories/project.repository.ts, server/src/repositories/task.repository.ts, server/src/utils/projectProgress.ts, server/src/controllers/task.controller.ts, client/src/features/tasks/TasksKanban.tsx, client/src/features/tasks/TasksPage.tsx"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand : (1) aucune méthode d'écriture de
      project.repository.ts/task.repository.ts n'utilise prismaRead —
      vérifié par un test qui scanne le code source réel ; (2) le Kanban
      de tâches rejette visuellement une transition non autorisée avant
      tout appel réseau, ET affiche le message d'erreur réel du serveur
      quand un rejet survient malgré tout (ex: projet complété) ; (3) un
      bandeau signale une troncature quand plus de 200 tâches existent en
      vue kanban ; (4) le cast de getFreelancerAvailability porte un
      commentaire explicite documentant sa dépendance au middleware de
      validation.
    detecte_le: "2026-07-18"
    source: manuel
    confiance: certain
    note: >
      Signalé directement par le porteur du projet, casquette "ingénieur
      full-stack" — mélange de constats de qualité de code (points 1, 4,
      5, 6 corrigés ici) et d'observations positives (transactions de
      clientApprove, machine à états centralisée dans shared/ — non
      modifiées, saluées telles quelles, aucune anomalie associée).

      CONSTAT 1, PLUS GRAVE QUE RAPPORTÉ (vérifié) : le rapport signalait
      une simple incohérence de performance (task.repository.ts/
      projectProgress.ts sur prisma primaire au lieu de prismaRead). En
      vérifiant, trouvé pire : project.repository.ts faisait
      "import prismaRead as prisma" puis utilisait cet alias pour TOUT —
      y compris create/update/delete/archive/restore (écritures). Si
      DATABASE_READ_URL pointe un jour vers un vrai réplica en lecture
      seule, TOUTES les écritures sur Project échoueraient. Invisible
      actuellement car DATABASE_READ_URL n'est pas configuré dans cet
      environnement (prismaRead === prisma, même client sous-jacent) —
      exactement le genre de bug qui dort jusqu'à ce qu'un réplica soit
      réellement branché.

      CORRECTIF ÉCRIT : project.repository.ts importe désormais prisma
      ET prismaRead séparément — prisma réservé aux écritures et aux
      pré-lectures immédiatement suivies d'une écriture dans le même
      appelant (findByIdAdmin, lu juste avant update/delete/applyTemplate
      par les services appelants) ; prismaRead pour toutes les lectures
      pures (findAll, findById, findDeleted, countNonDraftInvoices,
      hasDepositInvoice, countOnboardings). task.repository.ts :
      findAll/findById/existsInCompany (lectures pures) passées à
      prismaRead ; findByIdAdmin laissée sur prisma pour la même raison
      de pré-lecture-avant-écriture (utilisée par updateTask/deleteTask).
      projectProgress.ts : requête SQL brute ($queryRaw) passée à
      prismaRead — appelée sur chaque liste de projets, confirmée par
      grep des appelants (project.repository.ts, summary.repository.ts).

      Nouveau test server/test/prismaReadWriteSeparation.test.ts (câblé
      dans test/run-all.test.ts) — sans dépendance base de données
      (DATABASE_READ_URL non configuré ici rend un test comportemental
      impossible à distinguer) : scanne directement le code source réel
      des deux fichiers, confirme qu'aucun appel prismaRead.<model>
      .<méthode mutante> n'existe, et que l'alias prismaRead as prisma
      (la cause racine du bug) a bien disparu.

      CONSTAT 4 (Kanban tâches) : TasksKanban.tsx acceptait visuellement
      n'importe quel drop (ex. TODO -> DONE), interdit par
      ALLOWED_TASK_TRANSITIONS (shared/) — rejet serveur (422), puis
      rollback optimiste avec un toast générique masquant le message
      serveur explicite ("Cannot transition from TODO to DONE. Allowed:
      ..."). Corrigé : garde ALLOWED_TASK_TRANSITIONS[activeStatus]
      ?.includes(overStatus) ajoutée avant tout appel réseau (rejet
      immédiat, pas de round-trip inutile) ; le onError restant remonte
      désormais error.response.data.error.message (le message serveur
      réel) au lieu du seul toast générique, pour les rejets que ce
      garde-fou client ne peut pas anticiper (ex: projet complété).
      Pattern calqué sur LeadsKanban.tsx#leadInvalidTransition, déjà
      établi pour la même classe de défaut côté Leads.

      CONSTAT 5 (plafond Kanban) : TasksPage.tsx fixe pageSize: 200 en
      vue kanban sans indicateur — au-delà, des tâches disparaissent
      silencieusement du board. Le rapport lui-même le qualifie de
      "pas un bug à ce stade... mais une bombe à retardement". Corrigé a
      minima : bandeau d'avertissement ("Affichage limité aux 200
      premières tâches sur N") affiché quand total > 200 en vue kanban —
      pas de refonte de la pagination du Kanban, hors du périmètre
      proportionné pour ce stade du produit (décision du porteur du
      projet).

      CONSTAT 6 (typage mensonger) : task.controller.ts
      #getFreelancerAvailability caste req.query as unknown as
      {startDate: Date, endDate: Date} — trompeur en lecture isolée
      (req.query est nativement des chaînes), mais correct à l'exécution
      grâce à validate(getFreelancerAvailabilitySchema) (transform Zod +
      réassignation de req.query par validate.middleware.ts), confirmé
      par lecture directe des deux fichiers. Pas de bug réel —
      commentaire explicite ajouté documentant la dépendance au
      middleware, pour qu'un futur développeur ne retire pas le
      validateur sans comprendre que le typage du controller en dépend
      silencieusement.

      OBSERVATIONS POSITIVES DU RAPPORT, NON MODIFIÉES : clientApprove
      (project.service.ts) revérifie les conditions critiques (tâches
      ouvertes, acompte payé, approbations en attente) À L'INTÉRIEUR de
      la transaction après une pré-lecture — bonne défense contre les
      races, déjà en place, aucune action requise.
      PROJECT_STATUS_VALID_TRANSITIONS/ALLOWED_TASK_TRANSITIONS
      centralisées dans shared/, réutilisées identiquement front/back —
      bon principe DRY déjà en place, aucune action requise.

      npx tsc --noEmit vert (server, client). npm run build client
      réussi. node scripts/check-i18n.mjs passé après ajout des 2
      nouvelles clés (taskInvalidTransition, kanbanTruncatedNotice,
      FR+EN). Suite complète serveur : 306/306 (303 + 3 nouveaux), ~24s,
      aucune régression (après un aléa transitoire de connexion
      Postgres, résolu par nouvelle tentative — conteneur confirmé
      healthy via docker ps, pas lié à mes changements).

      Limite de vérification signalée explicitement : aucun outil de
      navigateur disponible dans cet environnement pour cliquer/glisser
      réellement une carte Kanban et confirmer visuellement le rejet de
      transition et le bandeau de troncature — vérification de niveau
      code uniquement (typecheck, lint, build, test structurel réel côté
      serveur), pas un test UI en conditions réelles.

      "resolu" déclaré SANS confirmation CI : la CI est actuellement
      désactivée sur origin/main sur demande du porteur du projet
      (workflow_dispatch seul, session du 2026-07-17), dérogation "no
      make it resolu" déjà établie dans cette session.

