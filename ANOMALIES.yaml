  - id: SEC-102
    titre: "Un lead créé manuellement (formulaire « Ajouter un lead ») n'a jamais serviceId ni assignedManagerId renseignés — invisible pour tout MANAGER, visible seulement par un ADMIN"
    perimetre: "4.1 CRM & Pipeline commercial — shared/src/schemas/lead.schema.ts, client/src/features/leads/LeadsPage.tsx, server/src/services/lead.service.ts, server/src/repositories/lead.repository.ts"
    regle_violee: RG-002
    classe: "scoping_pole_manquant_ou_incorrect"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un lead créé via « Ajouter un lead » par un MANAGER
      reçoit un `serviceId` (celui du MANAGER créateur, au minimum) et
      apparaît ensuite dans sa propre liste de leads (`GET /leads`) — prouvé
      par un test qui appelle réellement leadService.createLead avec un
      scope MANAGER puis leadRepository.findAll avec ce même scope, sur une
      base migrée, et vérifie que le lead créé y figure. Un lead créé par un
      ADMIN reste visible par tous comme aujourd'hui.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Lu directement en session : shared/src/schemas/lead.schema.ts
      (`leadBaseSchema` n'expose ni `serviceId` ni `assignedManagerId`),
      client/src/features/leads/LeadsPage.tsx (aucune occurrence de
      `serviceId`/`assignedManagerId` dans le formulaire), contrôlé contre
      server/src/services/contact.service.ts:21,30,34 (le chemin PUBLIC —
      formulaire de contact du site — calcule bien `serviceId` via
      `serviceService.resolveServiceIdForType` avant de créer le Lead),
      server/src/services/lead.service.ts:61-63 (`createLead` transmet
      `data` tel quel à `leadRepository.create`, sans dérivation de pôle par
      défaut), server/src/repositories/lead.repository.ts:11-20
      (`buildWhere` restreint un MANAGER via `OR: [{serviceId:
      scope.userServiceId}, {assignedManagerId: scope.userId}]` — un lead
      sans aucun des deux valorisés ne matche ni l'un ni l'autre). Asymétrie
      confirmée entre les deux chemins de création de Lead du dépôt : celui
      issu du formulaire de contact public scope correctement, celui du
      formulaire interne « Ajouter un lead » ne scope jamais. Un ADMIN
      continue de voir tous les leads (scope non appliqué à son rôle), donc
      le lead n'est pas perdu — seulement invisible à tout Manager, y
      compris celui qui l'a saisi.

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-20 :
      `lead.controller.ts#createLead` appelle désormais `buildScope(req)`
      (absent auparavant, seul point d'entrée de création qui ne le
      faisait pas) ; `leadService.createLead(data, scope?)` dérive
      `serviceId`/`assignedManagerId` du scope MANAGER par défaut
      (`ownPoleDefaults`), sans effet pour un ADMIN (comportement inchangé,
      toujours visible par tous) ; `leadRepository.create` étend son type
      d'entrée pour accepter ces deux champs (déjà acceptés par
      `buildWhere`, jamais par `create`). Preuve : nouveau fichier
      `server/test/leadCreateScope.test.ts` (2 cas, appelle le vrai
      leadService/leadRepository contre une base migrée) — un lead créé par
      un MANAGER hérite du pôle et de l'assignation du créateur et apparaît
      dans sa propre liste (absent de celle d'un autre pôle), un lead créé
      par un ADMIN garde `serviceId`/`assignedManagerId` nuls (comportement
      antérieur préservé). Vérification complète serveur : `npx tsc
      --noEmit` (clean), `npm run lint` (0/0), `npx tsx --test
      test/run-all.test.ts` (403/403, stable sur 2 exécutions consécutives).
      Résolu SANS confirmation CI (workflow GitHub Actions sur
      `origin/main` en `workflow_dispatch` uniquement, déviation documentée
      depuis la session du 2026-07-17).

  - id: SEC-103
    titre: "proposalRepository.findAll interpole options.orderBy directement dans la clause Prisma sans passer par la whitelist buildOrderBy/SORTABLE_FIELDS déjà utilisée par leadRepository — un nom de champ de tri invalide fait planter Prisma en 500 au lieu d'être ignoré"
    perimetre: "4.1 CRM & Pipeline commercial — server/src/repositories/proposal.repository.ts, server/src/utils/listQuery.ts"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `GET /proposals?orderBy=<valeur arbitraire>` ne
      provoque jamais d'erreur 500 : `proposalRepository.findAll` utilise
      `buildOrderBy(options.orderBy, options.orderDir, SORTABLE_FIELDS,
      "createdAt")` (même utilitaire que leadRepository) au lieu
      d'interpoler `options.orderBy` directement, et retombe silencieusement
      sur le tri par défaut si le champ demandé n'est pas dans la
      whitelist — prouvé par un test qui appelle
      proposalRepository.findAll avec un `orderBy` invalide et vérifie
      qu'il ne lève pas d'exception Prisma.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Lu directement en session : server/src/repositories/proposal.repository.ts
      (`orderBy: { [options.orderBy || "createdAt"]: options.orderDir ||
      "desc" }`, aucune whitelist), server/src/utils/listQuery.ts
      (`buildOrderBy` compare `orderBy` à `allowedFields` et retombe sur
      `defaultField` sinon ; `parseListQuery` ne fait que vérifier
      `typeof query.orderBy === "string"`, sans validation Zod du contenu),
      server/src/repositories/lead.repository.ts:7,33 (utilise déjà
      `buildOrderBy` avec `SORTABLE_FIELDS = ["name", "email", "status",
      "source", "createdAt"]`), server/src/controllers/proposal.controller.ts
      (options passées telles quelles depuis `req.query.orderBy`, une
      chaîne arbitraire côté client). Pas une faille de données (aucun accès
      hors scope), un défaut de robustesse : un tri invalide dégrade en 500
      au lieu d'un tri par défaut silencieux.

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-20 :
      `proposalRepository.findAll` utilise désormais
      `buildOrderBy(options.orderBy, options.orderDir || "desc",
      SORTABLE_FIELDS, "createdAt")` (`SORTABLE_FIELDS = ["title", "status",
      "amount", "expiresAt", "createdAt"]`), même utilitaire que
      leadRepository. Preuve : nouveau fichier
      `server/test/proposalListOrderBy.test.ts` (2 cas, appelle le vrai
      proposalRepository.findAll contre une base migrée) — un `orderBy`
      inconnu (y compris une tentative d'injection SQL grossière dans la
      valeur) ne lève plus d'exception et retombe sur le tri par défaut, un
      `orderBy` whitelisté (`title`) trie effectivement. Vérification
      complète serveur : `npx tsc --noEmit` (clean), `npm run lint` (0/0),
      `npx tsx --test test/run-all.test.ts` (403/403, stable sur 2
      exécutions consécutives). Résolu SANS confirmation CI (workflow
      GitHub Actions sur `origin/main` en `workflow_dispatch` uniquement,
      déviation documentée depuis la session du 2026-07-17).

  - id: SEC-104
