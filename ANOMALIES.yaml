  - id: SEC-054
    titre: "Le selecteur Assigne a du formulaire de creation de tache liste usersApi.getUsers() sans filtrer par role : un CLIENT peut y apparaitre alors que le serveur rejette l'assignation en 422 INVALID_ASSIGNEE_ROLE, decouvert seulement apres soumission"
