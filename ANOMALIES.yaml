      chronologie complète) : `client-approval.spec.ts` cherche
      `?search=Géant&pageSize=1` en attendant "Géant Tunisia", mais
      recevait "Vermeg Digital" — un nom sans rapport. Vérifié en
      direct (`curl`/`fetch` contre un serveur réel, conteneurs Docker
      frais migrés+seedés) : `?search=Géant` retournait 4 clients
      (Vermeg Digital, Monoprix Tunisia, Géant Tunisia, Carrefour
      Tunisia) dans le même ordre que `GET /clients` sans aucun
      paramètre — la liste complète non filtrée, triée par
      `createdAt`. Lu directement `client.repository.ts#findAll`
      (avant correctif) : construit `where = { deletedAt: null, ... }`
      puis ajoute conditionnellement `archivedAt`/`projects.some`
      (scope MANAGER), mais n'appelle JAMAIS `buildTextSearchFilter`
      ni n'ajoute `options.search` au `where` d'aucune façon — le
      paramètre `search` de la requête est silencieusement ignoré tout
      du long. Comparé aux repositories analogues qui font tous ce
      même appel correctement : `lead.repository.ts`,
      `project.repository.ts`, `serviceRequest.repository.ts`,
      `task.repository.ts` (tous via `buildTextSearchFilter`, motif
      confirmé par grep). Bug produit réel, pas seulement un artefact
      e2e : toute page ADMIN/MANAGER avec une barre de recherche
      clients est cassée en production, retourne toujours la liste
      complète (tronquée par pagination) au lieu du sous-ensemble
      cherché — gravité `majeur` (fonctionnalité visible et utilisée
      silencieusement non-opérante, pas de fuite de données puisque
      chaque résultat individuel reste correctement scope-vérifié par
      ailleurs, seul le FILTRAGE est absent).

      Corrigé : ajoute `...buildTextSearchFilter(options.search,
      ["name", "email"])` au `where` de `findAll`, même motif que les
      autres repositories (`name`/`email` — les deux champs texte du
      modèle `Client`, cohérent avec `SORTABLE_FIELDS` existant qui
      inclut déjà `email`). `npm run typecheck`/`npm run lint`
      --workspace=server vérifiés propres. Vérifié directement contre
      un vrai Postgres : `?search=Géant` ne retourne plus que "Géant
      Tunisia" après correctif. Suite serveur complète (77 fichiers,
      `test:coverage`) revérifiée verte après ce changement — aucune
      régression sur les tests existants de `client.repository.ts`/
      `client.service.ts`.

  - id: SEC-214
    titre: "taskChecklistRepository.create (server/src/repositories/taskChecklist.repository.ts) ne retry que sur le code Prisma P2034 avec un budget de 8 tentatives et un jitter plat 0-20ms — sous 5 créations concurrentes réelles proches du plafond en CI, ce budget peut s'épuiser avant que les 5 appelants aient fini de se sérialiser, laissant fuiter l'erreur Prisma brute vers l'appelant au lieu du HttpError CHECKLIST_LIMIT_REACHED attendu par le test SEC-077 (server/test/taskChecklist.test.ts)"
    perimetre: "4.3 Gestion des tâches — server/src/repositories/taskChecklist.repository.ts#create"
    regle_violee: null
    classe: "checklist-position-concurrence"
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      Résolu quand `server/test/taskChecklist.test.ts` (test SEC-077,
      5 créations concurrentes proches du plafond de 100) passe de
      façon stable sur au moins 5 exécutions consécutives contre un
      vrai Postgres (pas un mock) — vérifié directement, pas déduit
      d'un seul run vert isolé qui pourrait n'être qu'une coïncidence
      de charge.
    detecte_le: "2026-07-23"
    source: manuel
    confiance: certain
    note: >
      Découvert en corrigeant SEC-212 : une fois le job `server`
      débloqué (seed) et la couverture repassée au-dessus des seuils,
      un seul test restait rouge — log CI lu directement :
      `AssertionError: a losing create must be rejected specifically
      for the cap, not an unrelated error`, avec en amont plusieurs
      lignes `prisma:error ... Transaction failed due to a write
      conflict or a deadlock. Please retry your transaction` sur
      `tx.taskChecklistItem.create()`. Distinct de SEC-077 (déjà
      `resolu`, même `classe`) : SEC-077 a fermé la fenêtre de course
      sur l'ATOMICITÉ du comptage plafond/position (un seul `count()`
      dans la transaction) ; ce constat porte sur la ROBUSTESSE du
      retry autour de cette même transaction sous charge réelle —
      critère de résolution distinct (stabilité sous contention réelle,
      pas seulement correction du calcul), donc ID séparé plutôt que
      réouverture de SEC-077 (CLAUDE.md « un ID = un critère de
      résolution »).

      Lu directement `taskChecklist.repository.ts#create` (lignes
      48-78 avant correctif) : la boucle de retry ne considère comme
      rejouable que `err.code === "P2034"` (le code Prisma documenté
      pour un conflit de sérialisation OU un deadlock), avec 8
      tentatives et un backoff `Math.random() * 20` (0-20ms plat, pas
      exponentiel). Sous 5 appelants concurrents réels contre un
      Postgres CI (pas un mock), ce budget peut s'épuiser avant que
      tous se soient sérialisés, laissant l'erreur Prisma brute
      remonter à l'appelant (ligne `if (!isSerializationConflict ||
      remainingRetries === 0) throw err;`) au lieu du HttpError attendu
      — exactement le symptôme observé en CI, pas un défaut du test.

      Corrigé (même session) : budget porté à 12 tentatives, backoff
      exponentiel plafonné (`Math.min(200, 10 * 2 ** attemptNumber) *
      Math.random()`, jusqu'à ~200ms par palier) au lieu du jitter plat
      précédent — étale davantage les tentatives sur la durée totale
      disponible pour 5 racers. `npm run typecheck`/`npm run lint`
      --workspace=server vérifiés propres. Vérifié directement contre
      un vrai Postgres (conteneur Docker frais, migré, seedé) : le test
      SEC-077 exécuté isolément (`--test-name-pattern=SEC-077`) 5 fois
      de suite, toutes vertes (112-195ms chacune) — pas un seul run
      isolé.

  - id: SEC-216
    titre: "clientService.inviteClientUser (server/src/services/client.service.ts) réinitialise le mot de passe de tout utilisateur CLIENT dont lastLoginAt est null, quel que soit son état réel — un compte provisionné directement (mot de passe déjà connu/fonctionnel, jamais passé par le flux d'invitation email) n'a jamais lastLoginAt renseigné avant son tout premier vrai login, donc se fait silencieusement réinitialiser au prochain déclenchement du flux d'invitation pour son client (ex. un second paiement d'acompte sur un second projet)"
    perimetre: "server/src/services/client.service.ts#inviteClientUser ; server/prisma/seed.ts (données de seed concernées)"
    regle_violee: null
    classe: "reinitialisation-mdp-silencieuse"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      Résolu quand un utilisateur CLIENT dont le mot de passe a été
      déjà réellement défini (pas un mot de passe temporaire jamais
      consommé) ne voit plus jamais ce mot de passe changé par un appel
      à `inviteClientUser` déclenché automatiquement (paiement
      d'acompte) — vérifié en payant un second acompte pour un client
      déjà actif et en confirmant que son mot de passe existant reste
      valide après coup, pas seulement en relisant le code.
    detecte_le: "2026-07-23"
    source: manuel
    confiance: certain
    note: >
      Découvert en investiguant SEC-213 : le mot de passe seedé de
      `client3@example.tn` (`client123`) a cessé de fonctionner (401
      réel, vérifié par `bcrypt.compare` direct en base) après
      l'exécution locale de `client-approval.spec.ts`, qui paie un
      second acompte pour le même client (Géant Tunisia) déjà activé
      par un projet seedé antérieur. Tracé dans les logs Prisma du
      serveur (`prisma:query`) : `UPDATE "User" SET "passwordHash" =
      $1, "mustChangePassword" = $2 ...` déclenché juste après une
      tentative d'envoi d'email d'invitation à `client3@example.tn` —
      exactement la signature de `inviteClientUser`. Cause trouvée en
      lisant `invoice.service.ts` : le paiement déclenche
      `justActivatedPortal` (vrai seulement si `Client.
      portalActivatedAt` passe de `null` à une date DANS la même
      transaction) qui appelle `inviteClientUser` ; celui-ci définit
      `neverLoggedIn = existing.find(u => u.lastLoginAt === null)` —
      mais `seed.ts` ne renseignait `lastLoginAt` pour AUCUN
      utilisateur, et ne renseignait pas non plus
      `Client.portalActivatedAt` (voir SEC-213/SEC-215 pour la
      chronologie complète) : chaque client seedé démarrait donc
      « jamais activé », rendant sa toute première mise à jour de
      facture-avec-paiement en session de test un déclencheur légitime
      de `justActivatedPortal`, qui retombait ensuite sur un compte
      utilisateur déjà réel et fonctionnel comme s'il s'agissait d'une
      invitation jamais consommée.

      Double correctif (même session) :
      1) `seed.ts` : les 4 comptes CLIENT (`client1`-`client4`)
      reçoivent désormais `lastLoginAt: <maintenant>` à la création, et
      les 4 `Client` associés reçoivent `portalActivatedAt: <maintenant>`
      — cohérent avec l'intention documentée du seed (mots de passe
      `client123` connus, distribués, prêts à l'emploi, pas des
      invitations en attente). Corrige la cause immédiate observée par
      les 2 tests e2e concernés.
      2) `client.service.ts#inviteClientUser` (défense en profondeur,
      décision explicite du porteur d'élargir la correction au-delà du
      seed) : la condition `neverLoggedIn` exige maintenant aussi
      `u.mustChangePassword === true`, un champ qui ne devient vrai que
      via ce même flux de (ré)invitation ou les flux de mot de passe
      temporaire équivalents (`register`, `resetPassword`) — jamais
      pour un compte dont le mot de passe courant a été délibérément
      défini comme définitif. Ne change rien pour le cas légitime de
      SEC-154 (relance d'une invitation jamais consommée, où
      `mustChangePassword` est justement resté `true`) : les 3 tests de
      `clientInviteResend.test.ts` (SEC-154) revérifiés verts après ce
      changement, sans modification. Suite serveur complète revérifiée
      verte (`test:coverage`, exit code 0, 0 test en échec) après les 2
      correctifs combinés. `npm run typecheck`/`npm run lint`
      --workspace=server vérifiés propres.

  - id: SEC-217
    titre: ".github/workflows/backup.yml (\"Daily DB Backup\") échoue systématiquement (cron quotidien 01:00 UTC) : `SSH_HOST`/`SSH_USER`/`SSH_PRIVATE_KEY`/`BACKUP_ENV_PATH` sont vides à l'exécution (`ssh \"@\"` littéral dans le log, `usage: ssh...`, exit code 255) — aucun secret n'est configuré dans l'environnement GitHub \"production\" du dépôt, et REFERENTIEL.md §7 (décision datée 2026-07-16) confirme qu'aucun serveur de production n'existe pour l'instant : ce n'est pas une config manquante à corriger, c'est un workflow prématuré vu l'état réel du projet"
    perimetre: ".github/workflows/backup.yml — infrastructure CI/déploiement, pas le code applicatif"
    regle_violee: null
    classe: "ci_workflow_infra_inexistante"
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand le job ne s'exécute plus automatiquement sans
      pouvoir jamais réussir (cron désactivé tant qu'aucun serveur de
      production n'existe), tout en restant déclenchable manuellement
      (`workflow_dispatch` conservé) pour le jour où un serveur de
      production existera et où les secrets `SSH_HOST`/`SSH_USER`/
      `SSH_PRIVATE_KEY`/`BACKUP_ENV_PATH` seront réellement configurés
      dans l'environnement GitHub "production" du dépôt.
    detecte_le: "2026-07-23"
    source: manuel
    confiance: certain
    note: >
      Log CI collé directement par le porteur : chaque interpolation de
      secret (`${{ secrets.SSH_PRIVATE_KEY }}`, `${{ secrets.SSH_USER
      }}@${{ secrets.SSH_HOST }}`, `${{ secrets.BACKUP_ENV_PATH }}`)
      résout en chaîne vide dans la commande exécutée (`ssh -i
      /tmp/deploy_key "@" "source  && ..."`), confirmant qu'aucun des 4
      secrets requis n'est défini dans l'environnement GitHub
      "production" référencé par `environment: production` (ligne 12 du
      workflow) — pas un bug du script `backup-db.sh` lui-même, jamais
      atteint. Avant de proposer un correctif de configuration,
      REFERENTIEL.md §7 relu : entrée datée 2026-07-16 déjà présente,
      citant une vérification directe demandée par le porteur («
      Confirmé : aucun workflow de déploiement... n'existe... Un push
      vers `origin/main` ne déclenche donc aucun déploiement ») —
      confirme qu'il n'y a jamais eu de serveur de production
      configuré pour ce projet (cohérent avec CLAUDE.md : agence en
      lancement, 0 client actif). Le porteur, interrogé directement, a
      confirmé ne pas savoir avec certitude si un serveur existe —
      traité par prudence comme absent plutôt que de deviner des
      identifiants SSH inexistants.

      Corrigé : le déclencheur `schedule` (cron quotidien) retiré de
      `backup.yml`, `workflow_dispatch` conservé — le job ne peut plus
      échouer silencieusement chaque jour sans espoir de succès, mais
      reste disponible en un clic le jour où un vrai serveur de
      production et ses secrets existeront. Aucun secret créé ni
      deviné (contraire à CLAUDE.md « aucune clé API en dur… toujours
      via variables d'environnement » et à l'interdiction d'inférer une
      décision du porteur) : la configuration des 4 secrets manquants
      reste une action manuelle du porteur sur GitHub (Settings >
      Environments > production), hors de portée de cette session.
      YAML de `backup.yml` revalidé après édition (`js-yaml`).

