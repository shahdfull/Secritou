  - id: SEC-151
    titre: "generateCreditNoteNumber (creditNote.service.ts) utilise CN-${Date.now()} sans retry sur collision — deux avoirs créés dans la même milliseconde violent la contrainte @unique de CreditNote.number et l'appelant reçoit une erreur Prisma brute (500) au lieu d'un numéro régénéré"
    perimetre: "server/src/services/creditNote.service.ts"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `generateCreditNoteNumber`/`createCreditNoteTx`
      retente avec un nouveau numéro en cas de P2002 sur `CreditNote.number`
      (même pattern que la gestion P2002 déjà présente ailleurs dans ce
      service pour `applyCredit`, lignes 131-136), au lieu de laisser
      l'erreur Prisma remonter brute. Vérifié par un test qui force deux
      créations d'avoir dans la même milliseconde (numéro généré mocké ou
      appels strictement concurrents) et confirme que les deux réussissent
      avec des numéros distincts.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Vérifié par lecture directe : creditNote.service.ts:16-18
      (`generateCreditNoteNumber`) renvoie `CN-${Date.now()}`, résolution
      milliseconde. schema.prisma:1370 (`CreditNote.number String @unique`)
      confirme la contrainte DB. `createCreditNoteTx` (l.24-32), appelée à
      la fois par le endpoint explicite `POST /invoices/:id/credit-note`
      et par le chemin de sur-paiement automatique dans `addPayment`, ne
      catch aucun P2002 autour de `tx.creditNote.create` — contrairement à
      `applyCredit` un peu plus bas dans le même fichier (l.121-136), qui
      catch explicitement P2025 sur une collision similaire. Deux appels
      concurrents dans la même milliseconde (ex. deux sur-paiements
      simultanés sur des factures différentes du même client, ou un
      double-clic sur `POST /invoices/:id/credit-note`) produisent un
      P2002 non catché, remontant comme 500 générique plutôt qu'un numéro
      régénéré ou un message d'erreur métier clair.

      CORRECTIF ÉCRIT (pas résolu — non commité, pas de test dédié
      concurrence), session du 2026-07-20 : approche différente de celle
      envisagée dans le critère (retry sur P2002) — `createCreditNoteTx`
      s'exécute dans la transaction de l'appelant (`addPayment`
      notamment), où un retry local ne peut pas fonctionner (Postgres
      "aborted" après l'échec d'une commande dans une transaction,
      pattern déjà documenté ailleurs dans ce dépôt pour un cas
      similaire). Choix retenu : rendre le numéro non-collisionnable
      plutôt que de retenter — `generateCreditNoteNumber` combine
      `Date.now()` à un compteur en mémoire de process, incrémenté sans
      jamais être remis à zéro ni borné (`CN-<timestamp>-<compteur
      monotone>`), garantissant l'unicité quel que soit le débit d'appels
      pendant la durée de vie du process. ATTENTION méthode : une première
      version avec compteur modulo 1000 a été écrite puis rejetée après
      test réel — `node` en boucle serrée dépasse 1000 générations/ms et
      provoque des collisions (1042 sur 5000 générations mesurées) ; la
      version sans modulo, revérifiée, produit 0 collision sur 50 000
      générations. `npx tsc --noEmit` propre, `npm run lint` 0 error/0
      warning.

