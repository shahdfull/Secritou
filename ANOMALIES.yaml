  - id: SEC-114
    titre: "PermissionProfile.delete ne vérifie pas si des ManagerPermission y sont encore rattachées : la suppression passe (ON DELETE SET NULL en base), mais les managers concernés perdent silencieusement toutes les permissions venant du profil, sans avertissement ni trace"
    perimetre: "server/src/services/managerPermission.service.ts ; schema.prisma — relation ManagerPermission.profile"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand la suppression d'un `PermissionProfile` encore
      rattaché à au moins un `ManagerPermission` est soit bloquée (erreur
      explicite listant les managers impactés), soit exige une confirmation
      explicite côté appelant qui liste ces managers — prouvé par un test qui
      appelle réellement `managerPermissionService.delete` sur un profil
      rattaché à un manager et vérifie que la permission de ce manager n'est
      pas silencieusement vidée (ou que l'appel est refusé), par opposition
      au comportement actuel où `resolvePermissions` retombe sur
      `base = {}` sans signal.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Contrairement à un premier constat brut évoquant un risque de crash au
      runtime : vérifié par lecture directe que ce n'est PAS le cas.
      `server/prisma/migrations/20260625150326_init/migration.sql:1493` — la
      contrainte FK réelle est
      `ON DELETE SET NULL ON UPDATE CASCADE` (pas `RESTRICT`), donc
      `permissionProfileRepository.delete(id)` (appelé depuis
      `managerPermission.service.ts:117`, sans aucune vérification préalable
      d'usages) ne lève pas d'erreur SQL : `profileId` passe simplement à
      `NULL`. `managerPermission.service.ts:56-76`
      (`resolvePermissions`) gère bien ce cas sans crash — `if (mp.profileId)`
      ligne 68 est faux, donc `base = {}` ligne 67, seuls les `overrides`
      individuels du manager s'appliquent. Le vrai défaut n'est donc pas une
      panne technique mais une dégradation silencieuse d'autorisation :
      un manager qui avait un accès en lecture/écriture sur plusieurs modules
      via son profil se retrouve, à la prochaine invalidation de cache après
      la suppression du profil (déjà déclenchée ligne 118 pour cet
      utilisateur précis), avec un référentiel de permissions vide sauf
      overrides — sans notification à l'admin qui a supprimé le profil, ni
      au manager concerné.

      RÉSOLU (session en cours, commit `3e4d14d` puis améliorations) : 
      - Ajout de `managerPermissionRepository.findUserNamesByProfileId` (résout les
        noms des managers rattachés, pas seulement leurs ids) et modification
        de `permissionProfileService.delete` — si au moins un manager est
        encore rattaché au profil et `force` est false (défaut), lève `HttpError(409,
        "Cannot delete a permission profile still assigned to N manager(s):
        <noms>", "PERMISSION_PROFILE_IN_USE")` avant tout appel à
        `permissionProfileRepository.delete`, au lieu de supprimer puis
        seulement invalider le cache.
      - Ajout de `managerPermissionRepository.findManagersByProfileId` pour récupérer les détails des managers rattachés
      - Modification de `permissionProfileService.delete` pour accepter un paramètre `force`, `actorId`, et `ipAddress`
      - Si `force` est true, supprime le profil, invalide le cache des managers concernés, et enregistre une trace dans `AuditLog` avec les managers affectés
      - Modification du validateur (`deletePermissionProfileSchema`) pour accepter `force` en query param
      - Mise à jour du controller pour passer `force`, `actorId`, et `ipAddress` au service
