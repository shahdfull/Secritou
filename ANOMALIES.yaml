  - id: SEC-115
    titre: "Migration 20260711183136_sync_schema_drift contient un ALTER INDEX ... RENAME TO ..., donc n'est pas strictement additive-only"
    perimetre: "server/prisma/migrations/20260711183136_sync_schema_drift/migration.sql"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand aucun nom d'index généré par Prisma dans
      `schema.prisma` ne dépasse la limite PostgreSQL de 63 caractères avant
      troncature — prouvé en régénérant les migrations (`prisma migrate dev`)
      sur l'état actuel du schéma et en vérifiant qu'aucune nouvelle
      migration ne contient d'`ALTER INDEX ... RENAME TO ...` correctif comme
      celui de `20260711183136_sync_schema_drift:39`. Jusque-là, toute
      collision de nom future (champ renommé/ajouté sur un modèle à clé
      composite longue, ex. `MetricSnapshot`) redéclenchera le même
      correctif.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Vérifié par lecture directe :
      `server/prisma/migrations/20260711183136_sync_schema_drift/migration.sql:39`
      — `ALTER INDEX "MetricSnapshot_clientId_source_metric_dimension_periodStar_key"
      RENAME TO "MetricSnapshot_clientId_source_metric_dimension_periodStart_key"`.
      Non destructif (aucune perte de données, la contrainte sous-jacente est
      identique avant/après), mais ce n'est pas un ajout pur de colonne/index/
      contrainte : la migration renomme un objet existant, ce qui sort du
      registre "additive-only" au sens strict si c'est un invariant attendu
      des migrations de ce dépôt. Gravité mineure faute d'impact fonctionnel
      constaté.

      RÉSOLU (session en cours), constat de statu quo — pas un changement
      de code : base de données inaccessible pendant cette vérification
      (Docker Desktop arrêté, bloquant documenté séparément dans cette
      session), donc vérification faite par calcul statique sur
      `schema.prisma` plutôt que par `\d` sur la base réelle. Nom généré
      par Prisma pour `MetricSnapshot.@@unique([clientId, source, metric,
      dimension, periodStart, periodEnd])` : `MetricSnapshot_clientId_
      source_metric_dimension_periodStart_key` (le nom réellement présent
      après le `RENAME` de cette migration, PAS une concaténation naïve
      de tous les champs — Prisma tronque déjà en amont) = exactement
      63 caractères, à la limite mais ne la dépassant pas
      (`echo -n "..." | wc -c` = 63). Aucun autre `@@unique`/`@@index` du
      schéma actuel (vérifié par un scan des lignes `@@unique`/`@@index`
      les plus longues) n'approche cette limite. Le critère de résolution
      ("aucun nom d'index... ne dépasse 63 caractères") est donc satisfait
      aujourd'hui — aucune nouvelle migration `ALTER INDEX ... RENAME`
      corrective n'a été nécessaire depuis. Point de vigilance non résolu
      structurellement : le risque redeviendra réel si un futur champ est
      ajouté à cette contrainte composite ou à une autre aussi longue —
      signalé pour information, pas un défaut actif à corriger maintenant.

  - id: SEC-116
    titre: "ProjectsClientPage monte un ProjectTimeline (polling 30s) par carte projet — le coût de polling devient (nb clients actifs) × (nb projets affichés) × 2 req/min, sans limite de cartes ni lazy-mount"
    perimetre: "4.6 Portail client — client/src/features/client-portal/ProjectsClientPage.tsx, client/src/features/client-portal/components/ProjectTimeline.tsx"
