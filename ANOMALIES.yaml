      édition de tâche) n'affiche que les rôles réellement assignables
      (ADMIN/MANAGER/FREELANCER) — vérifié par un test qui appelle
      réellement la fonction de filtrage sur un jeu des 4 rôles et
      confirme l'exclusion de CLIENT.
    detecte_le: "2026-07-19"
