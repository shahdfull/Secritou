  - id: SEC-090
    titre: "taskRepository.create utilise un littéral maison sans priority (au lieu du type Prisma genere) — priority transite silencieusement à l'execution sans jamais etre verifie par TypeScript, meme classe de defaut que SEC-012 non couverte par sa conversion"
    perimetre: "4.3 Gestion des tâches — server/src/repositories/task.repository.ts#create, server/src/types/entities.ts#CreateTaskDTO"
    regle_violee: null
    classe: "type_maison_substitue_au_type_prisma"
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      Résolu quand `taskRepository.create` accepte
      `Prisma.TaskUncheckedCreateInput` (ou un type dérivé) au lieu
      d'un littéral maison recopié à la main, et que `CreateTaskDTO`
      déclare explicitement `priority` — cohérent avec le critère déjà
      posé par SEC-012 sur l'ensemble des repositories/services.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Audit exhaustif du module Gestion de Projets, confirmé par
      lecture directe. `CreateTaskDTO` (`server/src/types/entities.ts`)
      ne déclare pas `priority`. `taskRepository.create`
      (`task.repository.ts:126`) prend un littéral maison `{ title,
      description?, status?, startDate?, dueDate?, projectId,
      assigneeId? }`, sans `priority`, transmis à
      `prisma.task.create({ data })` — `data` étant une variable
      (jamais un littéral frais à cet appel), TypeScript ne vérifie
      pas les propriétés en excès : `priority` (bien présent dans
      `req.body` validé par le schéma Zod partagé) transite donc
      silencieusement jusqu'à la base sans qu'aucun type ne le
      documente. C'est la même classe de défaut que SEC-012 (types
      maison substitués aux types Prisma générés), mais spécifiquement
      sur `taskRepository.create` — non couvert par la conversion
      antérieure de SEC-012, qui portait sur `update` (déjà
      `Prisma.TaskUpdateManyMutationInput`), pas `create`. Aucun bug
      fonctionnel actuel (le champ est bien persisté), seulement un
      typage mensonger qui masque la réalité — signalé par exigence de
      cohérence avec SEC-012, pas par symptôme observé.

      Corrigé (même session) : `taskRepository.create` accepte
      désormais `Prisma.TaskUncheckedCreateInput` au lieu du littéral
      maison ; `CreateTaskDTO` (`server/src/types/entities.ts`)
      déclare désormais `priority?: Priority`. Aucun changement de
      comportement (le champ était déjà persisté) — uniquement un
      correctif de typage, conforme à SEC-012. Vérification complète :
      `npx tsc --noEmit` (serveur, propre), `npx tsx --test
      test/run-all.test.ts` (391/391). Résolu SANS confirmation CI :
      workflow GitHub Actions sur `origin/main` en `workflow_dispatch`
      uniquement (déviation établie en session le 2026-07-17, citée à
      chaque clôture depuis).

  - id: SEC-091
    titre: "Portail client : chaque carte projet declenche 2 requetes independantes (timeline avec polling 30s + taches terminees), motif N+1 qui s'aggrave avec le nombre de projets d'un client"
    perimetre: "4.2 Gestion de projet, 4.6 Portail client — client/src/features/client-portal/ProjectsClientPage.tsx, client/src/features/client-portal/components/ProjectTimeline.tsx, client/src/features/client-portal/components/CompletedTasksList.tsx"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: en_cours
    critere_de_resolution: >
      Sera résolu par la consolidation des requêtes par carte (batch
      côté serveur ou désactivation du polling au-delà d'un certain
      nombre de projets affichés), si le volume de projets par client
      le justifie un jour.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Audit exhaustif du module Gestion de Projets, confirmé par
      lecture directe. `ProjectsClientPage.tsx` rend une
      `ProjectTimeline` (polling `refetchInterval: 30_000`) et une
      `CompletedTasksList` par carte projet — N projets = 2×N requêtes
      actives, dont N qui repollent en continu. En pratique un client
      a peu de projets actifs simultanés, donc impact réel faible à ce
      stade ; non corrigé cette passe (décision du porteur : gravité
      mineure, effort moyen, pas de symptôme réel observé — reste
      `ouvert` pour suivi si le volume de projets par client augmente).
      Champ `statut` corrigé de `resolu` à `en_cours` (session du
      2026-07-22) : la note ci-dessus documentait déjà explicitement
      « non corrigé cette passe », un statut `resolu` sans correctif
      associé était une incohérence du champ, pas un fait nouveau.

      Depuis (SEC-116, session antérieure) : `ProjectTimeline` n'est
      plus montée inconditionnellement pour chaque carte — montage
      paresseux via `IntersectionObserver` (`LazyProjectTimeline` dans
      `ProjectsClientPage.tsx`). Cela réduit le nombre de pollers actifs
      simultanés à ceux réellement visibles, mais ne change ni le
      nombre de requêtes par carte visible (toujours 2), ni la
      fréquence de polling elle-même — les deux volets restaient
      entiers.

      RÉSOLU PARTIELLEMENT (session du 2026-07-22, décision explicite
      du porteur) : fusionner les 2 endpoints (timeline synthétique en
      7 étapes vs liste réelle des tâches terminées) inverserait une
      décision architecturale déjà prise et documentée (SEC-061 :
      routes délibérément séparées, la timeline résume tandis que
      `completed-tasks` renvoie de vraies lignes de tâches CLIENT-only)
      — non retenu pour ne pas défaire ce choix sans nouvelle
      instruction. `CompletedTasksList` n'a d'ailleurs déjà aucun
      polling (`useProjectCompletedTasks` : `staleTime` seul, pas de
      `refetchInterval`) ; seule `ProjectTimeline` repolle en continu.
      Le porteur a choisi d'espacer ce polling plutôt que de fusionner :
      `refetchInterval` de `useProjectTimeline` relevé de 30s à 120s
      (`ProjectTimeline.tsx`). Les 2 requêtes distinctes par carte au
      premier rendu restent inchangées (chacune sert une donnée
      réellement différente, pas une duplication), seule la répétition
      dans le temps de l'une des deux est réduite d'un facteur 4.
      `npx tsc --noEmit` (client) vert. Laissé `en_cours` plutôt que
      `resolu` : correctif non encore committé.

