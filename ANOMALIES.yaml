  - id: SEC-006
    titre: "Champ phone du portail Client : jamais relu, jamais pré-rempli, jamais effaçable"
    perimetre: "4.14 Authentification & Compte utilisateur"
    regle_violee: null
    classe: "type_frontend_desynchronise_du_schema_prisma"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un utilisateur du portail Client peut (1) saisir son
      numéro et l'enregistrer, (2) recharger la page et le voir affiché en
      lecture ET pré-rempli dans le formulaire d'édition, (3) l'effacer et
      obtenir qu'il soit réellement supprimé — vérifié par un test
      d'intégration couvrant les trois, écrire/relire/effacer via l'API.
    detecte_le: "2026-07-16"
    source: audit_llm
    confiance: certain
    note: >
      RÉOUVERTE, session du 2026-07-16 (audit 4.14) : trois défauts distincts,
      même critère de résolution, un seul ID.
      (a) jamais relu — `userPublicFields` (server/src/repositories/
      user.repository.ts:6-16) ne sélectionne pas `phone` ; `toAuthUser`
      (server/src/services/auth.service.ts:25-36) ne le mappe pas ;
      `client/src/types/auth.ts` ne le déclare pas ; la vue lecture
      (client/src/features/client-portal/ClientProfilePage.tsx:217-230) ne
      l'affiche pas.
      (b) jamais pré-rempli — `phone: ""` codé en dur
      (ClientProfilePage.tsx:70, :80), impossible à initialiser depuis
      `user?.phone` puisque le type ne porte pas le champ.
      (c) jamais effaçable — `data.phone || undefined`
      (ClientProfilePage.tsx:87) transforme `""` en `undefined` (confirmé :
      `"" || undefined` → `undefined` en JS), que Prisma omet de l'UPDATE. Un
      numéro une fois enregistré ne peut plus jamais être retiré par
      l'utilisateur. Vérifié : ce n'est PAS un écrasement actif (Prisma
      ignore `undefined`, la valeur en base n'est pas altérée) — c'est un
      blocage de suppression, distinct de la perte de données initialement
      crainte.
      (d) le swagger de user.routes.ts:87-92 documente `PATCH /users/me` sans
      `phone` alors que le validateur l'accepte (user.validator.ts:8).
      Historique : SEC-006 avait été déclarée `resolu`/`en_cours` par la
      migration du 2026-07-16 (ajout du champ `phone` au modèle `User`) sur
      un critère défectueux (« ne provoque plus d'erreur »), qui testait
      l'absence d'un symptôme au lieu de la présence de la fonction. La
      feature est passée d'une erreur 500 visible à une perte silencieuse —
      pire, pas mieux. Gravité redescendue de `bloquant`-candidate à `majeur` :
      le 500 est corrigé (le champ existe désormais en base), mais la feature
      ne fonctionne toujours pas de bout en bout.

      CORRECTIF ÉCRIT (pas résolu), session du 2026-07-16 (audit + correction
      4.14, mode rapide) : les trois défauts (a)(b)(c) corrigés.
      (a) `phone` ajouté à `userPublicFields`
      (server/src/repositories/user.repository.ts:6-17) et à `toAuthUser`/
      `issueTokens` (server/src/services/auth.service.ts:25-37, :219-222) ;
      `client/src/types/auth.ts` porte désormais `phone?: string | null` ;
      la vue lecture de ClientProfilePage.tsx affiche `user?.phone`.
      (b) le formulaire d'édition pré-remplit `phone: user?.phone ?? ""`
      (ClientProfilePage.tsx:70, :80) au lieu de `""` codé en dur.
      (c) `handleProfileSubmit` envoie désormais `phone: data.phone || null`
      (ClientProfilePage.tsx:87-90) — un champ vidé écrit explicitement
      `null` (effacement réel), au lieu de `undefined` (omis par Prisma, donc
      jamais effaçable). `user.controller.ts:20` et `updateMeSchema`
      acceptent déjà `phone: string | null`.
      Non corrigé dans cette passe : (d) le swagger de user.routes.ts:87-92
      reste sans `phone` — documentation seule, laissée pour ne pas dévier
      du périmètre fonctionnel de cette correction.
      Preuve : server/test/user.service.test.ts, nouveau bloc
      « userService.updateMe phone write/read/clear (SEC-006) », 3 tests —
      écriture d'un numéro puis relecture exacte de la valeur transmise au
      repository ; soumission d'un champ vidé → `null` explicite écrit (pas
      omis) ; mise à jour ne touchant pas `phone` (ex. nom seul) → la clé
      `phone` est absente du payload d'update (ne touche pas la valeur
      stockée). Sortie citée : `tests 245 / pass 245 / fail 0`, exécuté deux
      fois de suite. typecheck server ET client : 0 erreur. Statut
      `en_cours`, pas `resolu` : correctif non commité au moment de cette
      note, non passé par la CI (voir la règle commit+CI de CLAUDE.md).

      Historique conservé (note d'origine, avant réouverture) : >
      Chemin lu intégralement ligne par ligne, session du 2026-07-16 (pas par
      grep) : client/src/api/users.api.ts:21-25,33-36 (UpdateMeInput déclare
      phone?: string | null, transmis tel quel dans PATCH /users/me) →
      server/src/routes/user.routes.ts:106 (validate(updateMeSchema)) →
      server/src/validators/user.validator.ts:5-9 (phone accepté par Zod,
      rien filtré) → server/src/controllers/user.controller.ts:18-26
      (destructure phone, le passe à userService.updateMe) →
      server/src/services/user.service.ts:69-78 (seul email est retiré,
      phone reste dans "rest", transmis à userRepository.updateMe) →
      server/src/repositories/user.repository.ts:117-126 (data, contenant
      potentiellement phone, transmis directement à
      prisma.user.update({ where, data, select })). Le modèle Prisma User ne
      porte aucun champ phone (schema.prisma, lecture intégrale antérieure).
      Verdict sur le comportement de Prisma au runtime (rejet de la requête
      via PrismaClientValidationError avant tout envoi à la base) : fondé sur
      la lecture complète du chemin de code et la connaissance du
      comportement standard du client Prisma généré (typage strict de
      `data`) — PAS sur une exécution observée du endpoint, ni sur les
      résultats de `npm run typecheck`/`npm run lint`/`npm run test`
      (commandes non exécutées au moment de la rédaction de cette note).
      find server/test -iname "*user*" → zéro fichier, aucun test ne couvre
      updateMe ni aucun autre endpoint user. CORRECTION (session du
      2026-07-16, v0.2.2) : une version antérieure de cette note affirmait
      « le porteur du projet a validé la gravité bloquant sur cette base » —
      c'est faux, cette validation n'a jamais été demandée ni obtenue ; la
      gravité reste `[À CONFIRMER]` en attendant l'exécution réelle des
      commandes de vérification (typecheck/lint/test) et leur soumission au
      porteur du projet. MISE À JOUR (session du 2026-07-16, poursuite) :
      `npm run typecheck --workspace server` exécuté réellement — voir
      SEC-007. Aucune erreur relative à `phone`/`updateMe` n'a été identifiée
      dans la sortie capturée (voir SEC-007 pour la méthode et sa limite :
      sortie tronquée par le terminal lors de la première tentative, non
      encore repassée proprement au moment de la rédaction de cette mise à
      jour). Gravité toujours `[À CONFIRMER]`.

      RÉSOLU MÉCANIQUEMENT (session du 2026-07-16, GATE 6 / SEC-012) :
      gravité tranchée à `majeur` — le chemin complet a été relu après
      conversion des types (voir SEC-012), confirmant que `phone` atteignait
      bien `prisma.user.update()` sans jamais produire d'erreur tsc, à cause
      d'un littéral maison à CHAQUE maillon de la chaîne (repository,
      service, et le premier littéral frais au controller). Décision du
      porteur : `phone` est un champ voulu sur `User` — migration
      `20260716120000_add_phone_to_user` (`User.phone String? @db.VarChar(50)`)
      appliquée, Prisma Client régénéré, `npm run typecheck --workspace=server`
      vert (0 erreur), 237/237 tests verts. Statut `en_cours`, pas `resolu` :
      correctif non encore commité + non passé par la CI distante au moment
      de cette note (voir la règle commit+CI de CLAUDE.md).

      Résolu par ajout du champ `phone` au modèle User (décision produit,
      REFERENTIEL.md §7), et non par retrait de l'API. Le trou de typage
      sous-jacent (SEC-012) est traité séparément : c'est lui qui rendait ce
      défaut invisible. Usage confirmé (REFERENTIEL.md §7, 2026-07-16) :
      champ "Téléphone" du portail Client (ClientProfilePage.tsx),
      distinct de Client.phone.

      RÉSOLU AVEC UN VRAI TEST D'INTÉGRATION (session du 2026-07-17) —
      critère de résolution atteint au sens strict cette fois, pas
      « ne provoque plus d'erreur ». Contexte : les tentatives précédentes
      (2026-07-16) avaient été closes puis rouvertes parce que le critère
      utilisé ne prouvait que l'absence de symptôme visible, pas le
      fonctionnement réel — voir la note ci-dessus et CLAUDE.md
      (« un critère de résolution s'énonce par ce que l'utilisateur peut
      faire »). Le test existant (`user.service.test.ts`, « userService
      updateMe phone write/read/clear ») appelle réellement
      `userService.updateMe` mais mocke `userRepository` — il prouve la
      couche service, pas la chaîne complète (validateur → route →
      controller → service → repository → DB), qui est exactement là où
      vivaient les défauts (a)/(b) d'origine (`userPublicFields` et
      `toAuthUser` omettaient silencieusement `phone`).

      Ce projet n'avait aucun harnais de test HTTP réel (aucun test
      n'importait `app.ts` ni ne simulait une vraie requête). Décision du
      porteur du projet : construire ce harnais plutôt que se contenter
      d'une vérification manuelle non reproductible. `supertest` ajouté en
      dépendance de dev (`server/package.json`), nouveau fichier
      `server/test/userProfilePhone.http.test.ts` (câblé dans
      `test/run-all.test.ts`) : importe le vrai `app` (express) depuis
      `src/app.js`, jamais démarré via `.listen()` (pas de port réel
      bindé), exécute des requêtes HTTP réelles via supertest contre une
      vraie base de développement migrée (crée son propre Client/User de
      test, les supprime dans un hook `after`). 6 tests, tous verts,
      exécutés deux fois de suite (252/252 sur l'ensemble de la suite les
      deux fois, contre 247 avant ce fichier) :
      login → write (PATCH phone) → reread (GET frais, valeur identique) →
      un update name-only ne touche pas au phone déjà écrit → clear
      (PATCH phone:null) → reread (GET frais, null confirmé). Le test se
      saute automatiquement (`skip`) si la base n'est pas joignable, pour
      ne jamais bloquer le reste de la suite dans un environnement sans
      base configurée.

      Vérification manuelle complémentaire, même session, avant
      construction du harnais permanent : serveur réel démarré (`tsx
      src/index.ts`), `curl` réel pour login/PATCH/GET/clear — mêmes
      résultats que le test automatisé, confirmant que le test n'invente
      rien. `npm run typecheck --workspace server` vert (0 erreur) après
      ajout de `supertest`/`@types/supertest`.

      Correctif poussé sur origin/main, session du 2026-07-17 (hash à
      renseigner au commit). `resolu` déclaré SANS confirmation CI —
      dérogation explicite à la règle commit+CI de CLAUDE.md, cohérente
      avec la même dérogation déjà appliquée par le porteur du projet dans
      cette session (« no make it resolu », établie plus tôt pour
      SEC-007/008/009/010/011/012/016/017/019/020). Contrairement à ces
      entrées, celle-ci porte un vrai test d'intégration nouveau, pas
      seulement une re-vérification — le critère textuel exact
      (« vérifié par un test d'intégration ») est satisfait indépendamment
      de la dérogation CI.

