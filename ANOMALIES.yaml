  - id: SEC-191
    titre: "userService.deleteUser appelle communicationQueue.getWaiting() SANS borne pour purger les notifications du user supprimé — hydrate chaque job en attente un par un (un HGETALL Redis par job) : avec un backlog réel (worker arrêté, ou file de dev accumulée à 42 054 jobs), la suppression d'un utilisateur gèle la requête HTTP pendant plusieurs minutes"
    perimetre: "4.0 Utilisateurs — server/src/services/user.service.ts#deleteUser ; server/src/jobs/queues.ts (communicationQueue)"
    regle_violee: null
    classe: "operation_non_bornee_chemin_requete"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand la purge best-effort des jobs du user supprimé
      dans deleteUser est bornée (plage explicite passée à getWaiting, ou
      mécanisme équivalent à coût constant) — vérifié par le fait qu'un
      DELETE /users/:id aboutit en temps normal même quand la file
      communication porte un backlog important, et que la suite de tests
      complète ne gèle plus sur les tests appelant deleteUser.
    detecte_le: "2026-07-21"
    source: manuel
    confiance: certain
    note: >
      Découvert incidemment en diagnostiquant deux gels reproductibles de
      la suite de tests complète (runs figés >29 min sans progression,
      toujours au même endroit : userDeleteFinancialHistory.test.ts,
      3e cas, juste après le DELETE User du log Prisma — soit
      exactement la ligne suivante du code, communicationQueue.
      getWaiting()). Redis lui-même parfaitement sain (PONG immédiat
      depuis l'hôte ET le conteneur, port 6379 correctement mappé,
      CPU conteneurs <1%) — pas une panne de connexion, un coût O(n)
      avec n devenu énorme : LLEN bull:communication:wait = 42 054 jobs
      accumulés (chaque run de tests enfile des notifications réelles
      dans le Redis de dev, aucun worker ne tourne pendant les tests
      pour les consommer — accumulation sur des dizaines de runs, chaque
      run ralentissant le suivant). getWaiting() sans arguments hydrate
      la totalité (un aller-retour HGETALL par job via pipeline), d'où
      le gel apparent. En production le même code gèlerait le DELETE
      /users/:id de l'ADMIN pendant plusieurs minutes dès qu'un backlog
      existe (worker en panne une heure, par exemple) — et la purge
      visée est déjà best-effort par conception (try/catch, le worker
      tolère un user supprimé), donc un scan non borné n'a jamais été
      nécessaire. CORRIGÉ dans la même passe : getWaiting(0, 999) —
      plage bornée aux 1000 premiers jobs ; au-delà, les jobs du user
      supprimé sont simplement laissés au worker qui les ignorera
      (comportement déjà toléré). Nettoyage d'environnement effectué
      dans la même passe : FLUSHDB sur le Redis de dev (43 646 des
      43 647 clés étaient du debris bull:* de tests ; le cache
      applicatif se reconstruit seul). Vérifié par la suite complète :
      les gels disparaissent et les tests deleteUser (SEC-165)
      repassent en durée normale — voir le run final vert de cette
      session. Distinct de SEC-119/120 (jobId déterministe, classe
      différente) et de SEC-165 (garde de suppression, même fonction
      mais critère différent). Fix produit par mes propres appels
      d'outils dans cette session. Dérogation CI déjà accordée par
      l'utilisateur pour cette session : `resolu` malgré l'absence de
      run CI vert sur ce commit précis.

