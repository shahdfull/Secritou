  - id: SEC-101
    titre: "Bouton « Créer une proposition » sur un lead : les 3 couches (Kanban, dialogue détail, serveur) se contredisent sur les statuts autorisés — échoue à 100% depuis le Kanban"
    perimetre: "4.1 CRM & Pipeline commercial — client/src/features/leads/LeadsKanban.tsx, client/src/features/leads/LeadDetailDialog.tsx, server/src/services/proposal.service.ts"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand le bouton « Créer une proposition », affiché dans
      LeadsKanban.tsx ET LeadDetailDialog.tsx, n'apparaît que sur les statuts
