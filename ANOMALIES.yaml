      permissions client-success et client-onboarding pour un Manager dans
      la grille de permissions (Settings → Utilisateurs), et que la liste
      de modules côté client correspond exactement à celle utilisée par
      `requirePermission(module, action)` côté serveur.
    detecte_le: "2026-07-17"
    source: audit_llm
    confiance: certain
    note: >
      Trouvé en lisant `client/src/features/settings/PermissionsGrid.tsx`,
      dernier fichier du `perimetre_code` de 4.10 restant à lire après
      l'entité 3.21 (server déjà confirmé intégralement le même jour) —
