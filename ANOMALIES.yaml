  - id: SEC-022
    titre: "creditNoteService.applyCredit : le garde-fou anti-double-application ne se déclenche jamais (P2025 non catché)"
    perimetre: "4.4 Facturation & Paiements — server/src/services/creditNote.service.ts"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand appliquer un avoir déjà appliqué (ou appartenant à
      un autre client) via `creditNoteService.applyCredit` lève une
      `HttpError(409, ..., "CREDIT_ALREADY_APPLIED")` réelle — pas une
      `PrismaClientKnownRequestError` brute remontant en 500 générique —
      vérifié par un test qui appelle réellement `applyCredit` et inspecte
      le type/statusCode/code de l'erreur reçue, pas seulement qu'une
      erreur quelconque a été levée.
    detecte_le: "2026-07-17"
    source: audit_llm
    confiance: certain
    note: >
      Trouvé en lisant intégralement `creditNoteService` pour confirmer le
      statut de l'entité 3.12 (§3, `[À CONFIRMER]` → tentative de
      passage à IMPLÉMENTÉ), session du 2026-07-17 — pas pendant un audit
      formel du module 4.4, enregistré immédiatement conformément à
      CLAUDE.md.

      `applyCredit` (creditNote.service.ts:103-155 avant correction)
      utilisait une mise à jour conditionnelle
      (`tx.creditNote.update({ where: { id, appliedAt: null, clientId } })`)
      pour empêcher qu'un avoir soit appliqué deux fois — protection
      pensée contre une vraie condition de course (deux admins cliquant
      "appliquer" presque simultanément). Le code supposait que Prisma
      renvoie `null` si le `where` ne matche rien (`if (!cn) throw new
      HttpError(409, ..., "CREDIT_ALREADY_APPLIED")`), mais Prisma lève en
      réalité une `PrismaClientKnownRequestError` (code `P2025`) — jamais
      catchée. `server/src/middlewares/error.middleware.ts` n'a aucun
      gestionnaire pour `P2025` (seul `P2002` est traité spécifiquement) :
      l'erreur tombait dans le bloc générique final, renvoyant un `500
      Internal server error` opaque au lieu du `409 CREDIT_ALREADY_APPLIED`
      clair et actionnable que le code visait explicitement.

      CONFIRMÉ PAR REPRODUCTION RÉELLE (pas seulement lecture de code),
      avant tout correctif : avoir créé avec `appliedAt` déjà renseigné,
      appel direct de `creditNoteService.applyCredit` (le vrai service, pas
      une simulation) → `PrismaClientKnownRequestError`, code `P2025`,
      `statusCode: undefined` (donc pas une `HttpError`, confirmant que
      `error.middleware.ts` l'aurait laissée tomber dans le 500 générique).

      CORRECTIF ÉCRIT ET VÉRIFIÉ, même session : l'appel à
      `tx.creditNote.update(...)` entouré d'un `try/catch` qui détecte
      spécifiquement `err instanceof Prisma.PrismaClientKnownRequestError
      && err.code === "P2025"` et lève l'`HttpError(409, ...,
      "CREDIT_ALREADY_APPLIED")` prévu à l'origine. Le `if (!cn)` restant
      est mort (Prisma ne renverra jamais `null` ici) mais conservé pour
      que TypeScript accepte les lectures ultérieures de `cn` — pas
      supprimé, car son retrait exigerait un cast ou une réécriture du
      flux de contrôle hors du périmètre de ce correctif ponctuel.
      Reproduction re-testée après correctif, même scénario : lève bien
      `HttpError`, `statusCode: 409`, `code: CREDIT_ALREADY_APPLIED`.

      Nouveau test `server/test/creditNoteApply.test.ts` (câblé dans
      `test/run-all.test.ts`), appelle réellement `applyCredit` contre une
      base migrée. 2 cas : avoir déjà appliqué → `HttpError` 409 confirmée
      (type, statusCode, code, pas seulement "une erreur a été levée") ;
      avoir frais → application réussie, `Invoice.amountPaid` et
      `Client.creditBalance` vérifiés à leurs valeurs exactes après coup
      (pas seulement l'absence d'erreur). `npm run typecheck --workspace
      server` vert. `npm run test:unit --workspace server` : 269/269
      (267 + 2 nouveaux), exécuté deux fois de suite, ~15-18s (aucune
      régression du type SEC-002 — ce fichier ne touche pas le cache
      Redis, seulement BullMQ déjà fermé par `run-all.test.ts`).

      Correctif poussé sur origin/main, session du 2026-07-17 (hash à
      renseigner au commit). `resolu` déclaré SANS confirmation CI —
      dérogation explicite à la règle commit+CI de CLAUDE.md, déjà établie
      par le porteur du projet dans cette même session (« no make it
      resolu »). Le critère textuel exact est satisfait indépendamment de
      la dérogation CI (vrai test appelant le code réel).

  - id: SEC-023
    titre: "documentService.signDocument : signature de contrat toujours impossible (FK signedByClientId erronée) + client sans projet permanemment bloqué"
    perimetre: "3.18 Document — server/src/services/document.service.ts"
    regle_violee: null
    classe: null
    gravite: bloquant
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un client peut réellement signer un document de
      type CONTRACT, à la fois quand ce document est lié à un projet et
      quand il ne l'est pas (directement attaché au client), vérifié par
      un test qui appelle réellement `documentService.signDocument` contre
      une base réelle et confirme que `signedAt` est renseigné et que
      `signedByClientId` contient bien l'id de l'utilisateur signataire
      (pas juste l'absence d'erreur).
    detecte_le: "2026-07-17"
    source: audit_llm
    confiance: certain
    note: >
      Trouvé en lisant intégralement `document.service.ts` pour confirmer
      le statut de l'entité 3.18 (§3, `[À CONFIRMER]` → tentative de
      passage à IMPLÉMENTÉ), session du 2026-07-17 — pas pendant un audit
      formel d'un module, enregistré immédiatement conformément à
      CLAUDE.md. Deux défauts indépendants dans la même méthode :

      (a) Ownership check incomplet — `signDocument` (avant correction)
      vérifiait uniquement `doc.project?.clientId !== clientId`. Or
      `createDocumentSchema` (shared/src/schemas/document.schema.ts)
      autorise explicitement un document `type: "CONTRACT"` sans
      `projectId` (`projectId` optionnel). Pour un tel document,
      `doc.project` est `null`, donc `doc.project?.clientId` vaut
      `undefined`, qui ne correspond jamais à un `clientId` réel — même le
      propriétaire légitime (via `Document.clientId`, une relation directe
      bien réelle sur le modèle) recevait un 403 permanent, sans aucun
      moyen de le contourner.

      (b) FK erronée, BEAUCOUP plus grave — `Document.signedByClientId`
      (schema.prisma:804-805) est en réalité une clé étrangère vers
      `User.id` (relation nommée `"SignedDocuments"` sur le modèle `User`),
      PAS vers `Client.id`, malgré son nom. Le code écrivait pourtant
      `signedByClientId: clientId` (un `Client.id`) — ce qui viole
      systématiquement la contrainte FK, quel que soit le chemin
      (projet lié ou non). Conséquence concrète, confirmée par
      reproduction réelle des DEUX scénarios (pas seulement lu dans le
      code) : AUCUN client n'a jamais pu signer un contrat avec succès via
      cet endpoint, y compris via le chemin normal/prévu (document lié à
      un projet) — fonctionnalité citée dans README.md (« Document viewer
      with contract e-signature ») cassée depuis l'origine.

      REPRODUCTION RÉELLE avant correctif (pas seulement lecture de
      code) : (1) document CONTRACT sans projectId créé pour un vrai
      client → `signDocument` → `403 Forbidden` (défaut a). (2) document
      CONTRACT AVEC projectId réel, client réel propriétaire du projet →
      `signDocument` → passe le contrôle d'ownership mais échoue avec
      `PrismaClientKnownRequestError P2003, Foreign key constraint
      violated on the constraint: Document_signedByClientId_fkey` (défaut
      b, confirmé sur le chemin normal, pas seulement le cas limite du
      défaut a).

      CORRECTIF ÉCRIT ET VÉRIFIÉ, même session :
      (a) `signDocument` calcule désormais `owningClientId =
      doc.project?.clientId ?? doc.clientId` — accepte l'ownership via
      l'une ou l'autre relation légitime.
      (b) `signDocument` prend un 3e paramètre `signingUserId` (l'id réel
      de l'utilisateur authentifié, `req.user.sub` — pas `clientId`) et
      l'écrit dans `signedByClientId`.
      `document.controller.ts#signDocument` passe désormais
      `req.user!.sub` en plus de `clientId`.
      Reproduction re-testée après correctif, les deux scénarios ET un
      3e (mauvais client rejeté) : les 3 confirmés — signature réussie
      avec `signedByClientId` égal à l'id utilisateur réel dans les 2 cas
      valides, 403 confirmé pour un client non-propriétaire.

      Nouveau test `server/test/documentSignContract.test.ts` (câblé dans
      `test/run-all.test.ts`), appelle réellement `signDocument` contre
      une base migrée. 4 cas : contrat lié à un projet signé avec succès
      (signedByClientId = id utilisateur, pas id client) ; contrat sans
      projet signé avec succès ; un autre client ne peut pas signer un
      contrat qui n'est pas le sien (403) ; un contrat déjà signé ne peut
      pas être signé une seconde fois (409 ALREADY_SIGNED). `npm run
      typecheck --workspace server` vert. `npm run test:unit --workspace
      server` : 273/273 (269 + 4 nouveaux), exécuté deux fois de suite,
      ~15-18s, aucune régression du type SEC-002 (pas de cache Redis
      touché par ce fichier).

      Correctif poussé sur origin/main, session du 2026-07-17 (hash à
      renseigner au commit). `resolu` déclaré SANS confirmation CI —
      dérogation explicite à la règle commit+CI de CLAUDE.md, déjà établie
      par le porteur du projet dans cette même session (« no make it
      resolu »). Gravité `bloquant` (pas `majeur`) : contrairement aux
      autres anomalies de cette session, celle-ci empêchait TOTALEMENT une
      fonctionnalité citée explicitement dans README.md comme livrée,
      depuis l'introduction du champ — pas une dégradation partielle.

  - id: SEC-024
    titre: "executiveMetricsRepository.getAll : 3 des 6 types de risque déclarés ne produisent jamais de ligne dans risks[] (PROJECT_CRITICAL, STALE_PROJECT), et CONTRACT_EXPIRING alimente un badge sans donnée réelle ni ligne de risque correspondante"
    perimetre: "4.8 Analytics & Performance — server/src/repositories/executiveMetrics.repository.ts"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand chaque type de RiskItem déclaré dans le type union
      est effectivement produit par au moins un chemin de code (vérifié par
      un test qui appelle réellement `executiveMetricsRepository.getAll`
      contre une base réelle et trouve une ligne `risks[]` du type attendu),
      et quand chaque compteur de `alerts` correspond à une donnée réelle du
      schéma (pas un badge sans source ni ligne de risque associée).
    detecte_le: "2026-07-17"
    source: audit_llm
    confiance: certain
    note: >
      Trouvé en lisant intégralement `executiveMetrics.repository.ts` (568
      lignes) pour confirmer le module 4.8 Analytics & Performance — pas
      pendant un audit formel du module lui-même mais pendant la lecture
      exhaustive requise pour le classer, enregistré immédiatement
      conformément à CLAUDE.md.

      CONSTAT : `RiskItem.type` déclarait 6 valeurs (INVOICE_OVERDUE,
      APPROVAL_BLOCKED, PROJECT_CRITICAL, CONTRACT_EXPIRING, STALE_PROJECT,
      LEAD_HOT) mais seules 3 (INVOICE_OVERDUE, APPROVAL_BLOCKED, LEAD_HOT)
      étaient effectivement poussées dans `risks[]`. `criticalCount` et
      `watchCount` étaient calculés dans une boucle dédiée par projet
      (isOverdue / isStale / blockedTasks) mais jamais transformés en
      `RiskItem`. Le champ `alerts.expiringContracts` comptait
      `expiringApprovals` — une requête sur le modèle `Approval` (échéance
      de type `dueDate`), sans aucun rapport avec un contrat : vérifié par
      lecture directe de `schema.prisma`, `Document` (le seul modèle
      candidat pour un « contrat ») n'a AUCUN champ d'expiration — seul
      `RefreshToken.expiresAt` existe dans tout le schéma et n'a aucun lien
      avec les contrats. Un utilisateur pouvait donc voir un badge
      « contrats expirants » non nul sans aucune ligne de risque
      correspondante nulle part dans l'UI, et jamais de ligne
      PROJECT_CRITICAL malgré des projets comptés critiques ailleurs sur le
      même tableau de bord.

      DÉCISION UTILISATEUR (AskUserQuestion, session du 2026-07-17) :
      « Nouvelle anomalie, correction complète (Recommandé) » — pousser
      réellement PROJECT_CRITICAL/STALE_PROJECT dans risks[], et supprimer
      ou remplacer CONTRACT_EXPIRING selon l'existence réelle d'un champ
      d'expiration de contrat.

      CORRECTIF ÉCRIT (conforme à « réparer n'est pas développer » de
      CLAUDE.md — pas de nouveau champ de schéma inventé pour combler
      CONTRACT_EXPIRING, qui n'a aucune donnée source réelle) :
      (1) `CONTRACT_EXPIRING` et `expiringContracts` supprimés du type
      `RiskItem`/`alerts` (serveur ET type client
      `client/src/types/executiveMetrics.ts`) et la requête
      `expiringApprovals` retirée — rien de réel à afficher.
      (2) `STALE_PROJECT` retiré du type union : `isStale` route déjà
      inconditionnellement vers la branche `criticalCount`/PROJECT_CRITICAL
      dans le code existant, aucun chemin ne produit un état "stale mais
      pas critique" distinct — un type additionnel sans branche de code qui
      le distingue aurait recréé le même défaut.
      (3) `PROJECT_CRITICAL` est désormais poussé dans `risks[]` depuis la
      boucle `activeProjects` existante (celle qui calcule déjà
      `criticalCount`), avec titre/sous-titre/lien réels, `select` étendu
      pour inclure `name`/`client.name` nécessaires à l'affichage.

      Nouveau test
      `server/test/executiveMetricsProjectRisks.test.ts` (câblé dans
      `test/run-all.test.ts`), crée un projet réel avec échéance dépassée
      et appelle réellement `executiveMetricsRepository.getAll` contre une
      base migrée — vérifie qu'une ligne `PROJECT_CRITICAL` apparaît
      effectivement dans `risks[]` (pas seulement un compteur) et que
      `expiringContracts` n'existe plus dans `alerts`. `npx tsc --noEmit`
      vert côté serveur ET client. Suite complète : 274/274 (273 + 1
      nouveau), ~22s, aucune régression.

      `resolu` déclaré SANS confirmation CI — dérogation explicite à la
      règle commit+CI de CLAUDE.md, déjà établie par le porteur du projet
      dans cette même session (« no make it resolu »). Gravité `mineur` :
      dashboard qui affiche un badge incohérent et masque des risques
      projet déjà comptés ailleurs, mais aucune perte de données ni
      blocage fonctionnel (contrairement à SEC-023).

  - id: SEC-025
    titre: "client/src/types/permissions.ts#MODULES désynchronisé du serveur : client-success et client-onboarding absents, jamais affichés dans la grille de permissions"
    perimetre: "4.10 RBAC & Permissions granulaires — client/src/types/permissions.ts, client/src/features/settings/PermissionsGrid.tsx"
    regle_violee: null
    classe: null
