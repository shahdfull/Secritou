      `POST /proposals` documentait un 403 générique pour un
      dépassement de scope MANAGER visant un `projectId` ; le vrai
      garde-fou (`assertProposalCreationInScope`,
      proposal.service.ts:68-89) vérifie `leadId`/`clientId`, pas
