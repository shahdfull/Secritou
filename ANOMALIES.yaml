  - id: SEC-118
    titre: "LeadsPage kanban envoie pageSize: 200, mais parseListQuery le plafonne silencieusement à 50 côté serveur — le pipeline Kanban est tronqué au-delà de 50 leads, sans aucune indication à l'utilisateur"
    perimetre: "4.1 CRM & Pipeline commercial — client/src/features/leads/LeadsPage.tsx, server/src/utils/listQuery.ts, server/src/controllers/lead.controller.ts"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un pipeline de plus de 50 leads reste
      intégralement visible dans le Kanban (toutes colonnes confondues),
      soit en augmentant explicitement le plafond serveur pour ce cas
      d'usage précis (avec un plafond dur raisonnable, ex. 500, pas
      illimité), soit en chargeant le Kanban colonne par colonne avec la
      pagination serveur déjà existante plutôt qu'en un seul appel — prouvé
      par un test qui crée plus de 50 leads et vérifie qu'ils apparaissent
      tous dans la réponse consommée par la vue Kanban.
    detecte_le: "2026-07-20"
    source: manuel
    confiance: certain
    note: >
      Constat transmis directement par le porteur, formulé initialement
      comme un simple souci de performance (« le kanban charge 200 lignes
      d'un coup ») — vérification demandée par la procédure d'audit a
      révélé un défaut plus grave que celui décrit : `LeadsPage.tsx:130`
      envoie bien `pageSize: view === "kanban" ? 200 : pageSize`, MAIS
      `server/src/utils/listQuery.ts:19`
      (`const pageSize = Math.min(50, Math.max(1, Number(query.pageSize) ||
      10))`) plafonne TOUT `pageSize` reçu à 50, sans exception pour la vue
      Kanban. `lead.controller.ts:9` confirme que `getLeads` passe bien par
      `parseListQuery`. Donc le Kanban Leads ne charge JAMAIS 200 leads —
      il en reçoit au maximum 50, silencieusement, sans erreur ni message :
      un pipeline avec plus de 50 leads perd une partie de ses leads dans
      certaines colonnes (typiquement NEW, la plus peuplée) sans que
      l'utilisateur ne le sache. Gravité élevée à « majeur » (pas
      « bloquant ») car l'effet reste local à l'affichage (les leads ne
      sont pas perdus en base, juste invisibles dans cette vue précise) et
      dépend d'un volume de leads > 50, non garanti sur un pipeline en
      lancement (0 client actif à ce jour).

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-20 :
      `parseListQuery` (`listQuery.ts`) accepte désormais un second
      paramètre optionnel `maxPageSize` (défaut 50, comportement inchangé
      pour tout autre appelant) ; `lead.controller.ts#getLeads` passe
      `LEADS_MAX_PAGE_SIZE = 500` explicitement — plafond dur choisi, pas
      illimité, spécifique à ce seul endpoint (aucun autre endpoint de
      liste n'a ce besoin de « tout charger d'un coup »). Preuve : nouveau
      fichier `server/test/leadsKanbanMaxPageSize.test.ts` (3 cas) —
      `parseListQuery` avec le plafond relevé laisse passer `pageSize: 200`
      sans troncature, le plafond par défaut (sans override) reste bien à
      50 pour tout autre endpoint, et `leadRepository.findAll` avec
      `pageSize: 200` retourne bien les 60 leads réels créés en base par le
      test (pas seulement 50). En vérifiant ce correctif, un test flaky
      préexistant a été trouvé et corrigé dans le même fichier commité sous
      SEC-100 (`leadService.test.ts`) : les 4 appels à
      `leadService.getLeads({ page: 1, pageSize: 50 }, ...)` n'y précisaient
      jamais `orderDir`, un champ pourtant non optionnel du type
      `ListQueryOptions` — à l'exécution `orderDir: undefined` produisait un
      tri Prisma non déterministe (`orderBy: { createdAt: undefined }`),
      risquant de faire sortir de la première page de 50 les leads
      fraîchement créés par CE test précis si la base de test partagée
      contenait déjà suffisamment de leads d'autres tests (exactement ce
      que ce nouveau fichier de 60 leads pour SEC-118 a rendu visible en
      pratique — 1 échec intermittent observé sur 3 exécutions consécutives
      de la suite avant correction, aucun depuis). Corrigé en ajoutant
      `orderDir: "desc"` explicitement aux 4 appels, garantissant que les
      leads du test apparaissent en tête de la première page quel que soit
      le volume déjà présent en base. Vérification complète serveur : `npx
      tsc --noEmit` (clean), `npm run lint` (0/0), `npx tsx --test
      test/run-all.test.ts` (415/415, stable sur 2 exécutions consécutives
      après ce correctif de flakiness). Résolu SANS confirmation CI
      (workflow GitHub Actions sur `origin/main` en `workflow_dispatch`
      uniquement, déviation documentée depuis la session du 2026-07-17).

  - id: SEC-119
    titre: "Les jobs de notification/email BullMQ n'ont pas de jobId déterministe — un retry après un crash post-effet-métier peut dupliquer un envoi (email ou notification en double)"
    perimetre: "transverse — server/src/jobs/queues.ts, server/src/jobs/processors/communication.processor.ts"
    regle_violee: null
    classe: "job_bullmq_sans_deduplication"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand chaque job `sendNotification`/`sendEmail` porte un
      `jobId` déterministe dérivé de l'événement métier qui l'a déclenché
      (BullMQ refuse silencieusement un doublon de `jobId` déjà en file/
      terminé, selon sa politique de rétention), OU quand le processor
      vérifie l'existence de l'effet avant de l'appliquer — prouvé par un
      test qui enfile deux fois le même job métier et vérifie qu'un seul
      email/une seule notification est effectivement créé(e).
    detecte_le: "2026-07-20"
    source: manuel
    confiance: certain
    note: >
      Constat transmis directement par le porteur, vérifié par lecture
      directe : `queues.ts:61-84` (`enqueueNotification`/
      `enqueueNotifications`, `communicationQueue.add`/`addBulk` sans
      option `jobId`), `queues.ts:97-128` (`enqueueEmail`/`enqueueEmails`,
      même constat, `attempts: 5` avec backoff exponentiel) ;
      `communication.processor.ts:10-29`
      (`processNotificationJob` appelle directement
      `notificationRepository.create(data)`, aucune vérification
      d'existence préalable), lignes 33-59 (`processEmailJob` appelle
      directement `emailService.send(...)`, `throw error` en cas d'échec
      pour laisser BullMQ retenter). Un crash du worker après l'envoi
      SMTP/l'écriture en base mais avant l'ack BullMQ déclenche un retry
      qui répète l'effet — email ou notification dupliqué(e), visible par
      l'utilisateur final.

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-20 :
      `notificationJobId(data)` dérive un `jobId` de la forme
      `notification|{type}|{entityId}|{userId}` (identité métier de la
      notification, pas son contenu — deux notifications légitimement
      distinctes pour le même triplet à des moments différents ne sont pas
      conflatées, seul un DOUBLE ENFILEMENT du même événement l'est) ;
      câblé sur `enqueueNotification`/`enqueueNotifications`. `EmailJob`
      n'a aucune identité métier inhérente (contrairement à
      `NotificationJob`) — étendu d'un champ optionnel `dedupeKey`, que
      l'appelant fournit s'il connaît l'identité de son propre événement
      métier ; omis, comportement strictement inchangé (pas de `jobId`,
      BullMQ assigne un id aléatoire, jamais déduplication). BullMQ rejette
      tout `jobId` personnalisé contenant `:` (réservé à son espace de noms
      interne) — `|` utilisé comme séparateur partout, découvert en
      pratique via l'échec du premier jet de test (`Custom Id cannot
      contain :`). Preuve : nouveau fichier
      `server/test/jobDeduplication.test.ts` (appelle les vraies fonctions
      contre une vraie file BullMQ/Redis, pas un mock d'`addBulk`) — deux
      enfilements du même événement de notification produisent un seul job
      réel (vérifié via `queue.getJob(jobId)`), deux événements distincts
      (entité différente) produisent chacun leur propre job, un email avec
      un `dedupeKey` partagé est bien déduplique, un email sans
      `dedupeKey` garde le comportement antérieur (jamais déduplique).

  - id: SEC-120
    titre: "Les jobs de génération de documents (jusqu'à 7 par acceptation de proposition) n'ont pas de jobId déterministe — un retry peut régénérer un document déjà produit, aggravé par la non-idempotence de certains générateurs (SEC-110)"
    perimetre: "transverse — server/src/jobs/queues.ts, server/src/jobs/index.ts, server/src/jobs/processors/documents.processor.ts, server/src/services/proposal.service.ts"
    regle_violee: null
    classe: "job_bullmq_sans_deduplication"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand chaque job `generateDocument` porte un `jobId`
      déterministe dérivé de l'entité métier + type de document (proposal
      acceptée + kind), garantissant qu'un retry ou un ré-enfilement
      accidentel du même événement ne relance jamais deux fois la
      génération d'un même document — prouvé par un test qui enfile deux
      fois le même job de génération et vérifie qu'un seul document est
      effectivement créé.
    detecte_le: "2026-07-20"
    source: manuel
    confiance: certain
    note: >
      Constat transmis directement par le porteur, vérifié par lecture
      directe : `proposal.service.ts:486-515`
      (`acceptWithCascade` construit jusqu'à 7 `DocumentJob` —
      welcomeLetter/contract/specs/clientBrief/quote/roadmap +
      invoice optionnel — puis `enqueueDocumentGeneration(documentJobs)`) ;
      `queues.ts:145-155` (`enqueueDocumentGeneration` →
      `documentsQueue.addBulk`, sans `jobId`) ; `jobs/index.ts:109-118`
      (worker documents, `concurrency: 3`) ; `documents.processor.ts:21-73`
      (`processDocumentJob`, `throw error` en cas d'échec, laisse BullMQ
      retenter selon `attempts: 4` du `documentsQueue`, `queues.ts:40-48`).
      Aggravation confirmée par SEC-110 (déjà résolue) : `generateSpecs`/
      `regenerateSpecsWithAiContent` créent un NOUVEAU document versionné à
      chaque appel — un retry sur le job `specs` ne produit donc pas un
      doublon identique inoffensif, mais une pollution cumulative réelle de
      versions de documents, comme déjà établi pour le chemin webhook
      n8n (même risque, ici via le chemin retry BullMQ plutôt que rejeu de
      callback).

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-20 :
      `documentJobId(data)` dérive un `jobId` de la forme
      `document|{kind}|{entityId}` (l'entité pour laquelle le document est
      généré — `proposal.id` pour welcomeLetter/contract/quote,
      `project.id` pour specs/clientBrief/roadmap, `invoice.id` pour
      invoice — jamais un id générique), câblé sur
      `enqueueDocumentGeneration`. BullMQ rejette un `jobId` personnalisé
      contenant `:` — `|` utilisé comme séparateur, même correction que
      SEC-119. Preuve : `server/test/jobDeduplication.test.ts` — un double
      enfilement du job `specs` pour le même `project.id` produit un seul
      job réel dans `documentsQueue` (vérifié via `getJob`), empêchant
      précisément la pollution cumulative de versions de documents que ce
      constat décrivait. Vérification complète serveur : `npx tsc --noEmit`
      (clean), `npm run lint` (0/0), `npx tsx --test test/run-all.test.ts`
      (415/415, stable sur 2 exécutions consécutives). Résolu SANS
      confirmation CI (workflow GitHub Actions sur `origin/main` en
      `workflow_dispatch` uniquement, déviation documentée depuis la
      session du 2026-07-17).

