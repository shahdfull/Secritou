  - id: SEC-020
    titre: "ensureMonthlyPartitions échoue toujours : Postgres n'accepte aucun paramètre lié dans du DDL"
    perimetre: "transverse — server/src/jobs/processors/maintenance.processor.ts"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `ensureMonthlyPartitions` crée réellement une
      partition mensuelle sur une table d'archive existante, sans erreur,
      vérifié par exécution réelle contre une base de développement (pas
      seulement par lecture du code) — critère déjà atteint pour
      LeadArchive/ContactRequestArchive dans le cadre de SEC-016, à
      reconfirmer si la fonction est appelée sur une nouvelle table.
    detecte_le: "2026-07-17"
    source: manuel
    confiance: certain
    note: >
      Trouvé en vérifiant réellement SEC-016 contre une base vivante (pas
      seulement en lisant le code), session du 2026-07-17. Le commentaire
      d'origine à maintenance.processor.ts:123-124 affirmait : « Table/
      partition identifiers can't be bound parameters in Postgres DDL —
      only rangeStart/next (plain date literals) are parameterizable here,
      so those are passed as bound args. » C'est faux : l'instruction
      entière (`CREATE TABLE ... PARTITION OF ... FOR VALUES FROM ($1::date)
      TO ($2::date)`) est du DDL, et Postgres n'accepte AUCUN paramètre lié
      nulle part dans une instruction DDL, pas seulement pour les
      identifiants de table/colonne. Reproduit directement : la même
      requête échoue avec `$1::date` en paramètre lié (erreur 42P02 « there
      is no parameter $1 ») et réussit avec la même valeur inlinée en
      littéral SQL (`'2020-01-01'::date`). Conséquence : `archiveColdData`
      n'a jamais pu fonctionner, même une fois les tables d'archive créées
      (SEC-016) — la création de partition, première étape de
      `archiveTableRows`, échouait systématiquement avant d'atteindre le
      DELETE/INSERT.

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-17 :
      maintenance.processor.ts, `ensureMonthlyPartitions` — `rangeStart`/
      `next` inlinés directement dans la chaîne SQL au lieu d'être passés
      en arguments liés à `$executeRawUnsafe`. Sûr à inliner : ces deux
      valeurs sont toujours des chaînes `YYYY-MM-DD` produites par
      `partitionParts()` via `toISOString().slice(0, 10)`, jamais une
      entrée utilisateur — même classe de garantie que `sourceTable`/
      `archiveTable`/`whereClause`, déjà inlinés et protégés par
      `assertSafeArchiveTable`/`assertSafeWhereClause` juste au-dessus dans
      le même fichier. Vérifié par exécution réelle (voir SEC-016) :
      partition `LeadArchive_2026_07` créée avec succès après correctif,
      plus aucune erreur 42P02. `npm run typecheck --workspace server`
      vert (0 erreur) après le changement.

      Correctif poussé sur origin/main au commit eff7755, session du
      2026-07-17. `resolu` déclaré SANS confirmation CI — dérogation
      explicite à la règle commit+CI de CLAUDE.md, sur instruction directe
      du porteur du projet (« no make it resolu »). Écart à la procédure
      documentée ici pour traçabilité, pas dissimulé.

