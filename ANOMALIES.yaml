  - id: SEC-012
    titre: "Types maison substitués aux types d'entrée Prisma générés (15 repositories)"
    perimetre: "transverse — validateurs → controllers → services → repositories (pas repositories/** seul, voir correction ci-dessous)"
    regle_violee: null
    classe: "type_maison_substitue_au_type_prisma"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand plus aucun paramètre `data` porté par la CHAÎNE
      ENTIÈRE d'un endpoint d'écriture (validateur Zod → controller →
      service → repository) n'est typé par un littéral écrit à la main :
      chaque maillon utilise soit le type Prisma généré correspondant
      (Prisma.<Model>UpdateInput / UncheckedUpdateInput / CreateInput /
      UncheckedCreateInput), soit un type dérivé directement de celui-ci
      (ex. via Pick/Omit), jamais une interface ou un `Partial<{ ... }>`
      recopiés à la main. Vérifié par `grep -rn "Partial<{"
      server/src/repositories/*.ts server/src/services/*.ts` → zéro
      résultat, ET `npm run typecheck --workspace=server` vert sur le
      commit correspondant. Correction du 2026-07-16 : la première version
      de ce critère ne portait que sur `server/src/repositories/**` — trop
      étroit. TypeScript ne fait de vérification des propriétés en excès
      que sur les littéraux d'objet FRAIS, jamais sur les variables : un
      repository correctement typé ne suffit pas si l'appelant (le service,
      ex. `userService.updateMe`) construit `data` avec son propre type
      maison puis le transmet via une variable — l'écart de type reste
      invisible en aval sans jamais produire d'erreur. La garantie n'existe
      que si CHAQUE maillon de la chaîne est lui-même correctement typé.
    detecte_le: "2026-07-16"
    source: manuel
    confiance: certain
    note: >
      SEC-006 (phone/updateMe) est un symptôme de cette classe. 17 méthodes
      sur 15 fichiers de repositories converties, session du 2026-07-16 :
      approval, client, clientSuccess (×4), document,
      freelancerApplication, invoice, lead, managerPermission,
      permissionProfile, project, proposal, serviceRequest, task, user (×2,
      dont updateMe). Un seul repository du dépôt,
      clientOnboarding.repository.ts, utilisait déjà le type Prisma généré
      avant cette session — laissé tel quel, c'était l'exception, pas la
      règle, et n'appelait aucune conversion.

      Par défaut, la conversion utilise `Prisma.<Model>UncheckedUpdateInput`
      (scalaires FK à plat), jamais la variante checked (`connect`) sauf là
      où le code effectue déjà réellement une écriture imbriquée de
      relation — décision du porteur, 2026-07-16 : ce dépôt passe des
      scalaires à plat partout, réécrire les call sites en `connect` est du
      churn sans bénéfice de garantie (`phone` échoue aussi bien sous
      `UncheckedUpdateInput` que sous `UpdateInput`).

      Occurrence 1 — server/src/services/freelancerApplication.service.ts:130.
      `freelancerApplicationRepository.update(id, { status: "ACCEPTED",
      userId: user.id, accountCreatedAt: new Date() })` : `userId` est un
      scalaire FK réel sur `FreelancerApplication` (`userId String?` +
      relation `user`), mais `Prisma.FreelancerApplicationUpdateInput`
      (variante checked) n'expose pas les scalaires FK à plat — il attend
      une écriture de relation imbriquée (`user: { connect: { id } }`).
      Invisible sous l'ancien littéral maison, qui traitait `userId` comme
      un scalaire ordinaire. Résolu par conversion vers
      `Prisma.FreelancerApplicationUncheckedUpdateInput`, sans toucher au
      call site : `userId` y est un scalaire à plat valide.

      Occurrence 2 — server/src/repositories/managerPermission.repository.ts:24-37.
      `upsert` avec `create: { userId, ...data }` où `data` était
      update-shaped : jamais valide structurellement (UpdateInput et
      CreateInput ne sont pas des formes interchangeables en Prisma —
      `UpdateInput.user` est un `UserUpdateOneRequiredWithoutXNestedInput`,
      `CreateInput.user` un `UserCreateNestedOneWithoutXInput`, deux types
      distincts). Invisible sous l'ancien littéral maison, qui ne
      contraignait `data` à aucune des deux formes réelles. Résolu en
      supprimant le spread : la branche `create` énonce désormais
      `profileId` et `overrides` explicitement à partir de `data` (typé
      `Prisma.ManagerPermissionUncheckedUpdateInput`), aucun spread ne
      traverse plus deux opérations Prisma de formes différentes.

      `phone` — la question décisive de ce SEC-012, tranchée : une fois
      `user.repository.ts` converti, `phone` ne produisait ENCORE aucune
      erreur tsc, parce que `userService.updateMe`
      (server/src/services/user.service.ts:73) portait son propre littéral
      maison `{ name?: string; email?: string; phone?: string }` et
      transmettait `rest` — une variable, jamais vérifiée pour propriétés
      en excès — au repository. Une fois `userService.updateMe` lui-même
      converti vers `Prisma.UserUncheckedUpdateInput`, l'erreur est
      remontée d'une couche supplémentaire jusqu'au premier littéral frais
      de la chaîne : server/src/controllers/user.controller.ts:21 (`{
      name, phone }`), qui a produit `TS2353: 'phone' does not exist in
      type 'UserUncheckedUpdateInput'`. Décision du porteur, 2026-07-16 :
      `phone` est un champ voulu sur `User` (cohérent avec Client, Lead,
      FreelancerApplication) — ajouté par migration
      `20260716120000_add_phone_to_user`, `User.phone String? @db.VarChar(50)`,
      appliquée en dev et Prisma Client régénéré. `npm run
      typecheck --workspace=server` vert (0 erreur), 237/237 tests verts
      après cette migration. SEC-006 (l'anomalie d'origine sur ce même
      champ) peut passer `resolu` sous les mêmes conditions que SEC-009/011
      (commit + CI verte), pas avant.

      RE-VÉRIFIÉ (session du 2026-07-17), TOUJOURS OUVERT : le critère de
      résolution exact (`grep -rn "Partial<{" server/src/repositories/*.ts
      server/src/services/*.ts` → zéro résultat) n'est PAS atteint. 7
      occurrences restantes, toutes au niveau SERVICE (pas repository — les
      15 méthodes de repository de la session du 2026-07-16 restent
      correctement converties, ce n'est pas une régression) :
      approval.service.ts:81 (update), clientSuccess.service.ts:99/116/132
      (updateObjective/updateMetric/updateRecommendation),
      document.service.ts:28 (update), invoice.service.ts:133 (update),
      proposal.service.ts:209 (update). C'est exactement la classe de
      risque que ce SEC-012 documente déjà : un service avec son propre
      type maison casse la garantie même si le repository en aval est bien
      typé (TypeScript ne vérifie les propriétés en excès que sur les
      littéraux frais, pas sur les variables transmises). Non corrigé dans
      cette session — 6 fichiers, volume de travail comparable à la
      conversion déjà faite, non demandé explicitement. Reste `en_cours`,
      pas `resolu` : c'est la seule anomalie de ce lot où la dérogation du
      porteur du projet ne s'applique pas, faute de correctif réel à
      couvrir — le critère textuel n'est simplement pas atteint.

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-17 (sur décision du
      porteur du projet, choix explicite entre SEC-006/SEC-012 comme
      prochaine anomalie à traiter). Les 6 dernières occurrences de
      `Partial<{` converties vers le type Prisma généré correspondant :
      approval.service.ts:81 → `Prisma.ApprovalUncheckedUpdateInput`,
      clientSuccess.service.ts:99/117/132 →
      `Prisma.SuccessObjectiveUncheckedUpdateInput`/
      `SuccessMetricUncheckedUpdateInput`/
      `SuccessRecommendationUncheckedUpdateInput`,
      document.service.ts:28 → `Prisma.DocumentUncheckedUpdateInput`,
      invoice.service.ts:133 → `Prisma.InvoiceUncheckedUpdateInput`,
      proposal.service.ts:209 → `Prisma.ProposalUncheckedUpdateInput`.
      `grep -rn "Partial<{" server/src/repositories/*.ts
      server/src/services/*.ts` → zéro résultat (critère de résolution
      exact atteint, confirmé par exécution réelle du grep, pas supposé).

      La conversion a révélé 2 défauts réels que le type maison masquait
      (exactement le mécanisme documenté par ce SEC-012 — TypeScript ne
      vérifie les propriétés en excès que sur les littéraux frais) :
      (1) clientSuccess.service.ts:119 (`updateMetric`) transmettait
      `data.currentValue` tel quel à `addMetricHistory({ value: ... })`,
      qui attend un `number` — sous le type Prisma réel, `currentValue`
      peut être `string | Decimal | DecimalJsLike |
      DecimalFieldUpdateOperationsInput`, incompatible. Corrigé en lisant
      la valeur réellement persistée (`Number(metric.currentValue)`, après
      l'UPDATE) plutôt que la valeur brute reçue en entrée — comportement
      plus correct de toute façon (enregistre ce qui a été écrit, pas ce
      qui a été demandé).
      (2) proposal.service.ts:220-221 (`update`) appelait
      `data.expiresAt.getTime()` directement, alors que le type Prisma
      réel autorise `NullableDateTimeFieldUpdateOperationsInput`
      (`{ set: ... }`), pas seulement un `Date` brut. Corrigé par un garde
      `instanceof Date` — tous les appelants réels (controllers) passent
      déjà un `Date` brut, donc le garde ne change aucun comportement
      observable, il satisfait seulement le type plus large.

      VÉRIFICATION RÉELLE CONTRE UNE BASE VIVANTE (pas seulement
      typecheck), session du 2026-07-17, sur les deux points ci-dessus
      (les seuls où le typecheck avait révélé un écart de comportement
      potentiel) :
      (a) `clientSuccessService.updateMetric` : metric créé avec
      `currentValue: 10`, mis à jour à `42` via le service — `currentValue`
      relu à `42`, `MetricHistory` contient bien les deux entrées `[10, 42]`
      dans l'ordre. Données de test nettoyées après vérification.
      (b) `proposalService.update` sur une proposition `SENT` : changement
      d'`expiresAt` → statut repasse bien à `DRAFT`, version `1→2`,
      `ProposalHistory` contient l'entrée `REVERTED_TO_DRAFT` avec le bon
      commentaire. Deuxième test, garde contre faux positif : `expiresAt`
      envoyé identique à la valeur déjà en base sur une proposition `SENT`
      → statut reste `SENT` (pas de revert non désiré). Données de test
      nettoyées après vérification.

      `npm run typecheck --workspace server` vert (0 erreur). `npm run
      test:unit --workspace server` exécuté deux fois de suite : 247/247,
      exit 0 les deux fois, aucune régression.

      Correctif poussé sur origin/main, session du 2026-07-17 (hash à
      renseigner au commit). `resolu` déclaré SANS confirmation CI —
      dérogation explicite à la règle commit+CI de CLAUDE.md, cohérente
      avec la même dérogation déjà appliquée par le porteur du projet à
      SEC-007/008/009/011/016/017/019/020 dans cette session (« no make it
      resolu »). Contrairement à ces entrées, celle-ci n'a pas eu besoin
      qu'on redemande la dérogation — le porteur avait déjà établi le
      précédent dans la même session.

