  - id: SEC-009
    titre: "userRepository.revokeSessions appelée depuis updateUser sans exister sur le repository"
    perimetre: "4.14 Authentification & Compte utilisateur"
    regle_violee: null
    classe: "typecheck_serveur_en_echec"
    gravite: bloquant
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `userRepository.revokeSessions(id)` référence une
      méthode qui existe réellement et révoque bien toutes les sessions
      actives (tous les refresh tokens, toutes familles confondues) de
      l'utilisateur ciblé, ET qu'un test couvre le scénario "changement de
      rôle d'un utilisateur ayant une session active → son ancien token
      d'accès ne doit plus permettre d'agir avec l'ancien rôle après appel à
      updateUser".
    detecte_le: "2026-07-16"
    source: audit_llm
    confiance: certain
    note: >
      Chemin lu directement, session du 2026-07-16 :
      server/src/services/user.service.ts:149-168 (`updateUser`) — quand un
      Admin change le rôle d'un utilisateur (`role && role !== user.role`),
      le code appelle `userRepository.revokeSessions(id)` (ligne 160) avec
      l'intention explicite, documentée en commentaire ligne 157-158, de
      forcer une ré-authentification pour qu'un token déjà émis avec
      l'ancien rôle ne reste pas valide. `userRepository` (server/src/
      repositories/user.repository.ts, lu en entier) ne définit aucune
      méthode `revokeSessions`. Le repository qui gère réellement la
      révocation de refresh tokens est un fichier différent,
      server/src/repositories/auth.repository.ts, qui expose
      `revokeRefreshToken(id)` (par id de token) et
      `revokeTokenFamily(familyId)` (par famille) — mais aucune méthode qui
      révoque TOUTES les sessions d'un `userId` donné, toutes familles
      confondues, n'existe nulle part dans le code lu. Le défaut n'est donc
      pas seulement un nom de méthode manquant : la capacité elle-même
      (révoquer toutes les sessions d'un utilisateur par son id) n'est
      implémentée dans aucun repository. Au runtime, cet appel provoque un
      TypeError (méthode non définie sur l'objet), qui remonterait comme une
      erreur 500 sur l'endpoint `PATCH /users/:id` dès qu'un Admin change
      effectivement le rôle d'un utilisateur — chemin de sécurité RBAC
      directement affecté (un changement de rôle échouerait après avoir déjà
      persisté la mise à jour du rôle en base, ligne 156, avant l'appel
      cassé de la ligne 160 — donc le rôle change bien, mais l'ancien token
      d'accès reste valide jusqu'à expiration naturelle, ce qui est
      exactement le risque que le code voulait éviter). Je n'ai pas exécuté
      ce chemin réellement (pas de test dédié trouvé) — verdict fondé sur la
      lecture du code, cohérent avec l'erreur TypeScript observée dans
      SEC-007.

      CORRECTIF ÉCRIT (pas résolu), session du 2026-07-16 (GATE 4) : décision du porteur — garder
      la capacité, avec une RG explicite et un test. `updateUser` appelle
      désormais `authRepository.revokeAllSessionsForUser(id)`
      (server/src/repositories/auth.repository.ts:60), méthode réelle qui
      révoque tous les refresh tokens actifs de l'utilisateur, toutes
      familles confondues (`updateMany({ where: { userId, revokedAt: null },
      data: { revokedAt: new Date() } })`). Condition de déclenchement
      inchangée et vérifiée : uniquement `role && role !== user.role`
      (server/src/services/user.service.ts:163), jamais sur un changement de
      `name` seul. Voir REFERENTIEL.md RG-019 (IMPLÉMENTÉ, `verifie: test`)
      et server/test/user.service.test.ts. Important pour la chronologie :
      la révocation était inopérante (TypeError au runtime) depuis
      l'introduction de l'intention au commit eb93f08 (2026-07-11) jusqu'à
      cette session — soit environ 5 jours où tout changement de rôle en
      production aurait laissé l'ancien token d'accès valide jusqu'à
      expiration naturelle, sans qu'aucun test ne le détecte.

      Correctif écrit, non commité au moment de la rédaction de cette note,
      non passé par la CI. Résolution effective conditionnée au commit + CI
      verte. (Commité depuis au commit ff181d7, session du 2026-07-16 —
      mais la CI distante n'a pas été confirmée comme l'ayant exécuté, voir
      SEC-010 : statut à relever à `resolu` seulement après confirmation CI.)

      RÉSOLU (reconfirmé, session du 2026-07-17) : `authRepository.revokeAllSessionsForUser`
      confirmé présent (`server/src/repositories/auth.repository.ts:60`) et
      appelé depuis `userService.updateUser`
      (`server/src/services/user.service.ts:164`). Le test dédié
      (`userService.updateUser session revocation (RG-019)`,
      server/test/user.service.test.ts) passe dans les deux exécutions
      complètes du 2026-07-17 (247/247). `resolu` sans confirmation CI
      externe — dérogation à la règle commit+CI, cohérente avec la décision
      explicite du porteur du projet sur SEC-016/017/019/020 dans cette
      même session.

  - id: SEC-010
    titre: "Défaut de processus, pas d'outillage — la CI est correcte, le code ne l'atteignait pas"
    perimetre: "infrastructure — .github/workflows/ci.yml"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: en_cours
    critere_de_resolution: >
      C'est résolu au premier push vers origin/main qui déclenche le workflow
      ci.yml et le voit passer au vert (jobs "client" et "server", incluant
      typecheck et test:coverage) sur un commit contenant les correctifs
      SEC-007/SEC-008/SEC-009/SEC-011/SEC-012.
    detecte_le: "2026-07-16"
    source: manuel
    confiance: certain
    note: >
      `.github/workflows/ci.yml` existe, lu en entier, substantiel (jobs
      "client", "server", "restore-smoke-test", "i18n-check", déclenchés sur
      push vers main et sur pull_request). Le défaut n'est PAS un défaut
      d'outillage — la CI elle-même est correctement conçue. Le défaut est
      un défaut de PROCESSUS : `git log origin/main --oneline -1` (session du
      2026-07-16) montre `origin/main` à 3bdda4b, alors que `git status -sb`
      montre le HEAD local 3 commits devant (`ahead 3`) au moment de cette
      vérification — les ~4500 lignes de changements de cette session
      (reverts, RG-019, conversions SEC-012) n'ont jamais été poussées, donc
      jamais vues par la CI. SEC-007/SEC-008/SEC-009 ne sont pas des preuves
      d'une CI défaillante : ce sont des défauts qui vivaient dans un working
      tree local, jamais commité avant cette session, donc structurellement
      hors de portée de tout workflow déclenché par push/PR. Fermeture
      conditionnée au premier push vert, pas à une inspection supplémentaire
      du fichier de workflow lui-même.

      NON RÉSOLU (session du 2026-07-17, première vérification) : à ce
      stade restait `en_cours` — le critère de résolution de SEC-010 nomme
      explicitement SEC-012 comme précondition, et SEC-012 était alors
      encore ouvert (7 occurrences de `Partial<{` restantes).

      RÉSOLU (même session, après correctif SEC-012) : SEC-012 converti à
      zéro occurrence restante (voir SEC-012 pour le détail). SEC-007,
      SEC-008, SEC-009, SEC-011 et SEC-012 sont désormais tous `resolu`.
      Note de précision sur le critère textuel : « un commit contenant les
      correctifs » — les 5 correctifs sont répartis sur plusieurs commits
      de cette session (eff7755, a2801e2, 59cc206, c0c58b9, et le commit à
      venir pour SEC-012), pas un seul commit unique ; interprété comme
      « l'historique poussé contient tous ces correctifs », lecture la plus
      cohérente avec l'intention du constat d'origine (le défaut réel était
      « jamais poussé du tout », pas « pas dans un seul commit »). `origin/main`
      confirmé à jour avec HEAD local à chaque étape de cette session.
      `resolu` déclaré SANS confirmation CI — dérogation explicite à la
      règle commit+CI de CLAUDE.md, sur instruction directe du porteur du
      projet établie plus tôt dans cette même session (« no make it
      resolu »).

      ROUVERT `en_cours` (session du 2026-07-17, vérification CI réelle) :
      le critère de résolution textuel exige explicitement « le voit
      passer au vert » — vérification faite via l'API GitHub REST non
      authentifiée (`gh` CLI indisponible), 3 jobs échouent réellement sur
      le HEAD `2c8d3cc` (`client`, `server`, `i18n-check`). Précision
      importante : les échecs ne portent PAS sur les correctifs que
      SEC-010 nommait comme précondition (SEC-007/008/009/011/012, tous
      toujours vérifiés verts individuellement) — ils portent sur une
      dette ESLint pré-existante et sans rapport, jamais commise par
      aucune session d'audit, désormais tracée séparément sous SEC-026.
      SEC-010 reste `en_cours` tant que la CI n'a pas été vue verte sur un
      HEAD réel, même si la cause du rouge actuel est hors de son propre
      périmètre — le critère se lit littéralement, pas par intention
      reconstruite.

  - id: SEC-011
    titre: "Fenêtre de grâce de 30 s sur les refresh tokens révoqués, introduite sans décision documentée"
    perimetre: "4.14 Authentification & Compte utilisateur — server/src/services/auth.service.ts"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand le porteur du projet a tranché : soit un revert (le
      remplacement de la vérification `if (stored.revokedAt ||
      stored.expiresAt < new Date())` par la fenêtre de 30 s n'est pas
      conservé, et le test `refresh() with revoked token throws 401 and
      revokes family` redevient vert sans modification), soit une RG
      explicite dans REFERENTIEL.md énonçant que la fenêtre de grâce ne
      s'applique qu'à la rotation concurrente bénigne — jamais à une
      révocation par logout explicite ou par détection de rejeu — avec un
      test qui distingue ces trois cas (la colonne `revokedAt` ne porte
      aujourd'hui aucun code de raison permettant cette distinction).
    detecte_le: "2026-07-16"
    source: manuel
    confiance: certain
    note: >
      Écrite par une session Claude Code antérieure (working tree non
      commité, ~148 fichiers modifiés au moment de la découverte). Aucun
      commit, aucune PR, aucune trace du raisonnement — l'intention de
      l'auteur est définitivement perdue. Affaiblit l'invariant explicite du
      test d'origine (« tout rejeu d'un token révoqué tue la famille »). Ne
      distingue pas rotation concurrente / logout / détection de rejeu :
      `revokedAt` est posé à l'identique par les trois chemins
      (`revokeRefreshToken`, `revokeTokenFamily`, `revokeAllSessionsForUser`),
      la colonne ne porte aucun code de raison. Décision du porteur : revert
      (voir arbitrage du 2026-07-16, §2-3).

      CORRECTIF ÉCRIT (pas résolu), session du 2026-07-16 (GATE 3) : `REFRESH_REUSE_GRACE_MS` et le
      bloc conditionnel associé retirés de
      server/src/services/auth.service.ts (revert complet à
      `if (stored.revokedAt || stored.expiresAt < new Date()) { revokeTokenFamily; throw 401 }`,
      identique à l'état d'avant introduction). Le constant n'était référencé
      nulle part ailleurs (grep sur tout le dépôt : aucune occurrence dans
      env.ts ni .env.example — il s'agissait d'une constante en dur, pas
      d'une variable d'environnement). Critère de résolution atteint : le
      test d'origine `refresh() with revoked token throws 401 and revokes
      family` (server/test/auth.service.test.ts, `revokedAt: new Date()`)
      passe au vert SANS aucune modification du test — 234/234 tests verts,
      typecheck 0 erreur. Reste hors-scope de ce revert, à traiter
      séparément (voir SEC-012) : le code `REFRESH_RACE` que `refresh()`
      n'émet plus jamais est toujours consommé par
      server/src/controllers/auth.controller.ts:59 et
      client/src/api/axios.ts:146 — code mort, pas une régression
      fonctionnelle (branche simplement inatteignable), à nettoyer ou non
      selon décision du porteur.

      Correctif écrit, non commité au moment de la rédaction de cette note,
      non passé par la CI. Résolution effective conditionnée au commit + CI
      verte. (Commité depuis au commit ff181d7, session du 2026-07-16 —
      mais la CI distante n'a pas été confirmée comme l'ayant exécuté, voir
