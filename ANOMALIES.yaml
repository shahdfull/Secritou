  - id: SEC-176
    titre: "20 des 37 fichiers routes/*.ts n'appliquent aucun rate limiter (ni authRateLimit ni sensitiveWriteRateLimit ni autre) sur leurs routes POST/PUT/PATCH/DELETE authentifiées, alors que le middleware existe et est déjà utilisé ailleurs (invoice, client, freelancerApplication)"
    perimetre: "transverse — server/src/routes/{project,task,document,clientOnboarding,clientSuccess,permissionProfile,managerPermission,notification,analytics,dashboard,freelancer,portfolio,rating,search,service,serviceRequest,siteContent,summary,translation,clientPortal}.routes.ts"
    regle_violee: null
    classe: "rate_limiting_couverture_incomplete"
    gravite: mineur
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand chaque route d'écriture authentifiée (POST/PUT/
      PATCH/DELETE) sur ces 20 fichiers applique un rate limiter (au
      minimum `sensitiveWriteRateLimit`, déjà utilisé ailleurs pour ce même
      besoin) — OU qu'une décision explicite du porteur (REFERENTIEL.md §7)
      documente que le rate limiting applicatif est volontairement limité
      aux routes publiques/sensibles déjà couvertes, le reste étant
      considéré protégé par l'authentification seule tant qu'il n'y a pas
      de client actif.
    detecte_le: "2026-07-21"
    source: audit_llm
    confiance: certain
    note: >
      Audit AppSec, item 7 (rate limiting/DoS). Vérifié par script shell sur
      `server/src/routes/*.ts` : sur 37 fichiers routes, 17 utilisent au
      moins un `*RateLimit` (`authRateLimit`, `refreshRateLimit`,
      `sensitiveWriteRateLimit`, `contactRateLimit`, `aiRateLimit`,
      `applicationRateLimit`, `analyticsEventRateLimit`,
      `uploadPublicRateLimit` — tous définis dans
      `rateLimit.middleware.ts`), 20 n'en utilisent aucun, dont des modules
      à fort volume d'écriture ou sensibles : `project.routes.ts`,
      `task.routes.ts`, `document.routes.ts` (création/mise à jour/versions,
      malgré l'upload S3 sous-jacent), `permissionProfile.routes.ts` et
      `managerPermission.routes.ts` (modification de droits RBAC),
      `clientOnboarding.routes.ts`, `clientSuccess.routes.ts`. Le mécanisme
      lui-même n'est pas absent (`express-rate-limit` configuré et
      correctement utilisé ailleurs, ex. `invoice.routes.ts`,
      `client.routes.ts`) — c'est une couverture incohérente, pas un
      mécanisme manquant. Gravité `mineur`, pas `majeur` : toutes ces
      routes restent derrière `authenticate` + `authorize` (aucune n'est
      publique), donc le scénario d'exploitation réel exige un compte déjà
      valide (ou un token volé) — pas un abus anonyme. Non vérifié dans
      cette passe : le coût unitaire réel de chaque route non protégée
      (seule `clientSuccess.routes.ts#calculateClientSuccessScore` a été
      identifiée comme potentiellement coûteuse par son nom, sans lecture
      de son implémentation) — à approfondir si le porteur veut une
      priorisation plus fine parmi les 20 fichiers.

      EXAMINÉ, NON CORRIGÉ DANS CETTE PASSE (session en cours, statut
      inchangé) : appliquer mécaniquement `sensitiveWriteRateLimit` aux
      routes d'écriture de 20 fichiers d'un coup risquerait de casser des
      usages légitimes à haute fréquence (ex. le drag-and-drop Kanban de
      `task.routes.ts` enchaîne plusieurs PATCH rapides ; les actions
      bulk de tâches déclenchent des rafales par conception) — chaque
      route doit être évaluée individuellement contre sa fréquence
      d'appel UI réelle avant de recevoir une limite, ce qui n'est pas
      vérifiable dans cette session (impossibilité de tester le
      comportement navigateur réel, infrastructure Docker arrêtée). Un
      plafonnement erroné serait un vrai bug utilisateur introduit pour
      corriger un constat `mineur` dont la note reconnaît elle-même que
      l'exploitation exige un compte authentifié valide. Reste `ouvert`
      pour une passe dédiée route par route, ou pour la décision
      explicite du porteur prévue par le second volet du critère de
      résolution. Aucune décision inférée.

      CORRECTIF APPLIQUÉ SANS ÉVALUATION ROUTE PAR ROUTE (session du
      2026-07-22, commit `702b07b`) : `sensitiveWriteRateLimit` ajouté
      mécaniquement sur les 19 des 20 fichiers restants (tout sauf
      `permissionProfile.routes.ts`, traité séparément commit `0b8c065`)
      — exactement l'action que la note précédente refusait de faire sans
      vérification. `sensitiveWriteRateLimit` = 10 requêtes/minute par clé
      (`rateLimitKeyGenerator`, `rateLimit.middleware.ts:45-52`). Risque
      identifié mais NON vérifié dans cette session (même blocage
      qu'en_cours précédent : pas d'environnement pour tester le
      comportement navigateur réel) : `task.routes.ts` reçoit la limite
      sur `PUT /:id` (utilisé par le drag-and-drop Kanban, potentiellement
      plusieurs appels/minute par utilisateur actif) et sur
      `bulk/status`/`bulk/delete`. Statut délibérément laissé `en_cours`
      (pas `resolu`) : le critère de résolution textuel est rempli
      littéralement, mais le risque de régression UX nommé par la note du
      2026-07-21 n'a pas été levé, seulement contourné par nécessité de
      livrer le lot demandé. À vérifier avant tout déploiement réel :
      qu'un utilisateur actif sur le Kanban ne se fasse pas bloquer par
      429 en usage normal.

      DÉCISION SUR LES 7 DERNIERS FICHIERS (session du 2026-07-22, sur
      demande explicite du porteur de trancher un par un plutôt que de
      laisser un silence) : `analytics.routes.ts`, `dashboard.routes.ts`,
      `search.routes.ts`, `service.routes.ts`, `summary.routes.ts`,
      `clientPortal.routes.ts` lus intégralement — les 6 ne contiennent
      QUE des routes `GET`, confirmé par `grep -nE
      "\.(post|put|patch|delete)\("` sur chacun (zéro résultat sur les
      6). Le critère de résolution de SEC-176 porte explicitement sur
      « chaque route d'écriture authentifiée (POST/PUT/PATCH/DELETE) » —
      il ne s'applique littéralement à aucune route de ces 6 fichiers,
      ce n'est donc pas une dérogation à motiver (rien à exempter) mais
      une non-applicabilité vérifiée et tracée dans REFERENTIEL.md §7
      (entrée du 2026-07-22), pas laissée en silence. Décision identique
      appliquée au 7e fichier du périmètre non nommé explicitement par la
      demande (probablement une confusion de comptage, la liste
      structurée `perimetre:` de cette entrée n'en compte que 20 au
      total, tous déjà couverts par le correctif ou cette vérification).
      SEC-176 reste `en_cours` globalement : le risque de régression UX
      sur `task.routes.ts` (paragraphe précédent) n'est toujours pas levé,
      et aucun des correctifs de cette entrée n'a encore été confirmé
      vert par un run CI réel.

  - id: SEC-177
    titre: "projectService.clientApprove : le preread (status !== REVIEW, clientApprovedAt déjà posé) tourne hors transaction et n'est jamais re-vérifié dans le $transaction — contrairement aux gardes tâches ouvertes/acompte/approbations qui, elles, sont explicitement re-vérifiées via tx (commentaire ligne 341-344) — deux appels concurrents (double-clic, retry réseau) sur le même projet REVIEW peuvent tous deux passer le preread et écraser clientApprovedAt/clientApprovedById avec un second horodatage"
    perimetre: "4.2 Gestion de projet, 4.4 Facturation — server/src/services/project.service.ts#clientApprove (lignes 296-388)"
    regle_violee: null
    classe: "toctou_precheck_hors_transaction"
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `tx.project.update` (ligne 365) est précédé, à
      l'intérieur du même `$transaction`, d'une relecture de `status`/
      `clientApprovedAt` (via `tx.project.findUnique`, comme c'est déjà fait
      pour `openTasksTx`/`depositTx`/`unresolvedApprovalsTx` juste
      au-dessus) qui rejette explicitement un second appel sur un projet
      déjà `COMPLETED` — prouvé par un test qui appelle deux fois
      `projectService.clientApprove` en séquence rapprochée sur le même
      projet et vérifie que `clientApprovedAt` du second appel est soit
      rejeté (409), soit identique au premier (jamais écrasé par un second
      horodatage).
    detecte_le: "2026-07-21"
    source: audit_llm
    confiance: certain
    note: >
      Audit DB (item 3, transactions/isolation), passe complémentaire.
      Vérifié par lecture directe ligne par ligne de `clientApprove`
      (`project.service.ts:295-388`). Le `preread` (hors transaction, via
      `prismaRead`) vérifie `clientApprovedAt` déjà posé (ligne 302) et
      `status !== "REVIEW"` (ligne 308, ajouté par SEC-085 — voir cette
      entrée, `resolu`, dont le critère de résolution portait uniquement
      sur « la garde existe-t-elle », pas sur sa re-vérification en
      transaction ; SEC-177 est distinct par son critère de résolution,
      relié à SEC-085 par la `classe`). À l'intérieur du
      `prisma.$transaction` (ligne 340), un commentaire explicite (lignes
      341-344) justifie pourquoi `openTasksTx`/`depositTx`/
      `unresolvedApprovalsTx` sont re-vérifiés via `tx` : « the preread
      checks above ran outside it [...] Without this, the project could
      complete despite one of these conditions no longer holding » — le
      même raisonnement s'applique à `status`/`clientApprovedAt`, mais
      aucune relecture de ces deux champs n'existe dans le bloc `tx`.
      Impact borné, pas une duplication financière : la création de la
      facture de solde reste protégée (ligne 372,
      `balanceAlreadyExistsInTx` relit `project.invoices` à l'intérieur du
      même `tx.project.update`, donc un deuxième appel sérialisé par le
      verrou de ligne Postgres verrait la facture déjà créée par le
      premier) — seul l'horodatage d'approbation
      (`clientApprovedAt`/`clientApprovedById`, valeur potentiellement
      opposable en cas de litige contractuel sur la date d'acceptation du
      projet) peut être silencieusement écrasé par un second appel
      concurrent, sans erreur ni trace de la tentative. Non déclenché par
      un attaquant externe : nécessite deux appels quasi simultanés du
      même CLIENT propriétaire (double-clic UI, retry réseau côté
      `client-approve` — aucune clé d'idempotence sur cette route,
      vérifié : `project.controller.ts#clientApproveProject` ne transmet
      aucun paramètre d'idempotence à `projectService.clientApprove`).

      CORRECTIF ÉCRIT (session en cours), `en_cours` en attente de
      vérification par test réel : le `Promise.all` de re-vérification
      intra-transaction (`project.service.ts`, bloc `tx`) relit désormais
      aussi `status`/`clientApprovedAt` via
      `tx.project.findUnique({ select: { status, clientApprovedAt } })`,
      aux côtés des trois gardes existantes — un second appel concurrent
      est rejeté avec 409 `PROJECT_ALREADY_APPROVED` (ou
      `PROJECT_NOT_IN_REVIEW`) au lieu d'écraser silencieusement
      l'horodatage. Test écrit
      (`server/test/projectClientApproveConcurrency.test.ts`, importé
      dans `run-all.test.ts`) : deux appels strictement concurrents
      (`Promise.allSettled`) au vrai `projectService.clientApprove` sur
      le même projet REVIEW, assertion qu'exactement 1 réussit, que le
      rejet porte `PROJECT_ALREADY_APPROVED`, et que `clientApprovedAt`
      n'est posé qu'une fois. `npx tsc --noEmit` vert. NON exécuté :
      base de données inaccessible au moment de l'écriture (Docker
      Desktop arrêté, bloquant documenté dans cette session) — reste
      `en_cours` conformément à la règle CLAUDE.md (un correctif non
      vérifié par test n'est pas `resolu`), à passer `resolu` dès que la
      suite tourne verte sur ce test. Fix et test produits par mes
      propres appels d'outils dans cette session.

      CORRECTION DU CORRECTIF + CONFIRMATION (même session, après
      retour de l'infrastructure) : le premier correctif (relecture de
      status/clientApprovedAt via tx.project.findUnique dans le
      Promise.all du bloc transactionnel) s'est révélé INSUFFISANT —
      mon propre test de concurrence l'a prouvé en laissant les DEUX
      appels réussir : sous READ COMMITTED, les deux transactions
      lisent l'état pré-commit, la relecture ne sérialise rien.
      Remplacé par le seul patron réellement atomique : un
      tx.project.updateMany({ where: { id, status: "REVIEW",
      clientApprovedAt: null }, data: {...} }) — le perdant bloque sur
      le verrou de ligne, ré-évalue le WHERE contre l'état commité du
      gagnant, matche 0 ligne et reçoit 409 PROJECT_ALREADY_APPROVED
      (la relecture post-échec distingue ALREADY_APPROVED de
      NOT_IN_REVIEW pour le bon code d'erreur). Test de concurrence
      exécuté vert dans la suite complète : 513/513, 0 échec (run
      final7). Dérogation CI du porteur toujours applicable.

  - id: SEC-178
    titre: "Rating n'a ni champ projectId ni contrainte @@unique/garde applicative sur (freelancerId, ratedByUserId) — un même évaluateur peut soumettre un nombre illimité de notes pour le même freelance, chacune recalculant la moyenne (ratingService.updateFreelancerRatingAverage), sans lien traçable vers le projet ayant déclenché la demande d'évaluation"
    perimetre: "4.7 Marketplace freelance — schema.prisma#Rating (lignes 741-752) ; server/src/services/rating.service.ts"
    regle_violee: null
    classe: "contrainte_unicite_manquante"
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      Sera résolu soit par l'ajout d'un champ `projectId` sur `Rating` (le
      déclencheur documenté est une demande d'évaluation par projet
      complété — voir la note positive existante sur ce flux) assorti d'une
      contrainte `@@unique([projectId, freelancerId, ratedByUserId])`, soit
      par une décision explicite du porteur documentant qu'une note libre
      et illimitée par évaluateur est le comportement voulu (à écrire dans
      REFERENTIEL.md §7) — dans les deux cas la décision doit être écrite,
      pas laissée implicite.
    detecte_le: "2026-07-21"
    source: audit_llm
    confiance: certain
    note: >
      Audit DB (item 7, types/contraintes), passe complémentaire. Vérifié
      par lecture directe : `schema.prisma:741-752` (`model Rating`) ne
      porte que `id, score, comment, freelancerId, ratedByUserId,
      createdAt` — aucun `projectId`, aucun `@@unique`, seul un
      `@@index([freelancerId])`. `rating.service.ts:23`
      (`prisma.rating.create({ data: { score, comment, freelancerId,
      ratedByUserId } })`) ne fait précéder la création d'aucune
      vérification d'existence d'une note récente du même évaluateur pour
      le même freelance — ni contrainte DB, ni garde applicative. Impact :
      un manager qui rate deux fois le même freelance (double-clic, ou
      volontairement pour influencer sa moyenne) voit les deux notes
      comptées dans `updateFreelancerRatingAverage`, sans qu'aucune des
      deux couches (schéma, service) ne le prévienne ou ne le bloque.
      Gravité `mineur` : nécessite un compte MANAGER/ADMIN déjà authentifié
      (pas de surface anonyme), impact réputationnel/moyenne plutôt que
      perte de données. Non vérifié dans cette passe : si un flux
      applicatif (frontend) limite déjà l'accès au formulaire de notation à
      une fois par demande d'évaluation générée — seul le service/schéma a
      été vérifié, pas le composant React appelant.

      INVESTIGATION COMPLÉMENTAIRE (session en cours), statut inchangé :
      vérifié que `POST /freelancers/:freelancerId` (seule route de
      création, `rating.routes.ts:11`) n'accepte AUCUN `projectId` dans
      son body (`addRatingSchema` vérifié, `rating.controller.ts:27-32`)
      — il n'existe donc aujourd'hui aucun plumbing partiel à étendre, la
      route ne reçoit même pas l'information nécessaire pour la relier à
      un projet précis. Ajouter `projectId` exigerait donc un changement
      cross-cutting (route + validator + frontend, pas seulement le
      schéma) sur la base d'une hypothèse produit non confirmée (quel
      écran déclenche réellement une notation, et transmet-il déjà
      l'identifiant du projet complété ?) — au-delà d'un simple ajout de
      contrainte DB. Laissé `ouvert`, décision porteur toujours requise
      pour les deux options du critère de résolution ; aucune décision
      inférée.

  - id: SEC-179
    titre: "server/test/idor.test.ts (14 tests, invoice.repository + proposal.repository) réimplémente localement invoiceUpdate/invoiceDelete/invoiceFindById/proposalUpdate/proposalDelete/proposalFindById sur un where: { id, companyId } fictif — companyId n'existe nulle part dans ce dépôt mono-tenant ; le fichier n'importe jamais les vrais repositories et ne prouve rien sur leur scoping réel"
    perimetre: "4.4 Facturation, 4.1 CRM & Pipeline commercial — server/test/idor.test.ts ; server/src/repositories/invoice.repository.ts ; server/src/repositories/proposal.repository.ts"
    regle_violee: null
    classe: "test_reimplemente_companyid_fictif"
    gravite: moyen
    statut: resolu
    critere_de_resolution: >
