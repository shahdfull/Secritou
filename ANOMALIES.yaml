  - id: SEC-187
    titre: "leadService.createLead s'appuie sur un pré-check (tx.lead.findFirst puis tx.lead.create) suivi d'un catch P2002 présenté comme filet de sécurité DB, mais Lead.email ne porte qu'un @@index, jamais un @@unique — deux créations vraiment concurrentes (deux managers sur le même prospect) peuvent toutes deux lire « aucun doublon » avant que l'une des deux ne commite, produisant deux leads actifs avec le même email malgré SEC-155"
    perimetre: "4.1 CRM & Pipeline commercial — server/src/services/lead.service.ts#createLead (lignes 69-101) ; schema.prisma#Lead (ligne 268, 291)"
    regle_violee: null
    classe: "toctou_precheck_sans_contrainte_db_reelle"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `Lead.email` porte une contrainte réellement
      unique en base parmi les lignes actives (ex. `@@unique([email])`
      sur une colonne générée `emailIfActive` valant `email` quand
      `archivedAt IS NULL` et `NULL` sinon — pour ne pas bloquer la
      légitime ré-entrée sur un lead archivé déjà couverte par SEC-155),
      pour que le `catch` P2002 déjà écrit dans `createLead` cesse
      d'être du code mort — prouvé par un test qui appelle réellement
      `leadService.createLead` deux fois en concurrence stricte
      (`Promise.allSettled`, même modèle que
      `proposalAcceptCascadeConcurrency.test.ts`, SEC-134) avec le même
      email, et vérifie qu'un seul lead actif existe ensuite en base.
    detecte_le: "2026-07-21"
    source: audit_llm
    confiance: certain
    note: >
      Audit RevOps CRM (item 4, déduplication). Vérifié par lecture
      directe : `lead.service.ts:77` affirme en commentaire « the
      DB-level unique constraint is the real guard, the pre-check is
      only there to give a clean 409 in the common (non-concurrent)
      case » — affirmation vérifiée FAUSSE par lecture du schéma :
      `schema.prisma:268` (`email String? @db.VarChar(255)`) et ligne 291
      (`@@index([email])`, pas `@@unique`) — aucune contrainte
      d'unicité n'existe sur ce champ, dans aucune forme (simple ou
      composite). Le `catch (err) { if (... P2002 ...) }` aux lignes
      96-99 ne peut donc jamais s'exécuter en pratique : Postgres n'a
      rien à rejeter. Seule protection réelle : le
      `tx.lead.findFirst` avant `tx.lead.create`, à l'intérieur d'une
      transaction Prisma par défaut (pas de `isolationLevel:
      "Serializable"` précisé) — insuffisant contre deux transactions
      concurrentes qui liraient toutes deux « pas de doublon » avant que
      l'une ne commite. `leadDuplicateEmail.test.ts` (SEC-155) confirmé
      par lecture directe comme purement séquentiel (un premier
      `await createLead(...)` complètement terminé avant le second) —
      ne peut structurellement pas détecter cette race, même modèle de
      lacune que celui déjà trouvé dans l'audit QA de cette même
      conversation (tests séquentiels ne prouvant rien sur une
      protection concurrente). Gravité `majeur`, pas `bloquant` : pas de
      perte d'argent directe, mais fausse exactement les métriques que
      SEC-155 visait à protéger (volume de pipeline, taux de
      conversion) — deux lignes pour le même prospect gonflent le
      compte de leads actifs si la fenêtre de course est atteinte.

      RÉSOLU (session en cours) : application de la migration
      `20260720000000_lead_email_unique_active` — `CREATE UNIQUE INDEX
      "Lead_email_active_key" ON "Lead" (LOWER(email)) WHERE email IS
      NOT NULL AND "archivedAt" IS NULL` — EXACTEMENT la contrainte
      demandée par le critère de résolution (unique parmi les lignes
      actives, archivage exclu pour préserver la ré-entrée légitime déjà
      couverte par SEC-155). Le fichier SQL lui-même n'est pas de mon
      écriture (produit par le processus externe concurrent plus tôt
      dans cette session, non attribué comme mon travail) mais était
      resté non appliqué/non commité ; vérifié zéro doublon d'email actif
      existant avant application (`GROUP BY LOWER(email) HAVING
      count(*)>1` sur la base réelle : aucun résultat), puis appliqué via
      `npx prisma migrate deploy` (seule migration en attente à ce
      moment). Une fois la contrainte réelle en place, le `catch` P2002
      déjà écrit dans `createLead` (jusque-là mort) devient un vrai
      filet. Preuve par test réel
      (`server/test/leadCreateConcurrency.test.ts`, nouveau fichier) :
      appelle `leadService.createLead` deux fois en concurrence stricte
      (`Promise.allSettled`, même modèle que
      `proposalAcceptCascadeConcurrency.test.ts`/SEC-134) avec le même
      email — exactement 1 des 2 appels réussit, l'autre est rejeté avec
      `LEAD_EMAIL_ALREADY_EXISTS`, et un seul Lead actif existe ensuite
      en base. Suite complète verte (499 tests), `npx tsc --noEmit` et
      `npm run lint --workspace=server` verts. Dérogation CI déjà
      accordée par l'utilisateur pour cette session : `resolu` malgré
      l'absence de run CI vert sur ce commit précis.

  - id: SEC-188
    titre: "invoice.service.ts#addPayment : le paiement est déjà commité (statut PAID, portalActivatedAt posé) quand l'invite client post-commit s'exécute ; si inviteClientUser échoue pour une raison autre que 409 (ex. panne SMTP réelle), l'erreur remonte et fait échouer toute la requête HTTP addPayment, laissant l'appelant croire que le paiement n'a pas été enregistré alors qu'il l'a été"
    perimetre: "4.4 Facturation, 4.6 Portail client — server/src/services/invoice.service.ts#addPayment (lignes 214-306)"
    regle_violee: "RG-018"
    classe: "erreur_post_commit_masque_succes_transaction"
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand une erreur d'invitation non-409 après le commit
      de `addPayment` ne fait plus échouer la requête HTTP — le paiement
      doit être rapporté comme réussi (200/201) avec un signal explicite
      (ex. `data.portalInviteFailed: true`) que l'invite doit être
      renvoyée manuellement via `POST /clients/:id/invite` (déjà
      existant, SEC-154), au lieu de propager l'exception — prouvé par
      un test qui simule un `inviteClientUser` rejetant une erreur
      non-409 et vérifie que `addPayment` retourne quand même un succès
      avec le paiement bien persisté en base.
    detecte_le: "2026-07-21"
    source: audit_llm
    confiance: certain
    note: >
      Audit RevOps CRM (item 3, cascade — creusé après avoir constaté que
      la prémisse initiale de la question, l'invite au moment de
      `acceptWithCascade`, ne correspond plus au code réel depuis SEC-002/
      RG-018 : l'invite portail est désormais déclenchée par
      `invoice.service.ts#addPayment`, pas par l'acceptation de
      proposition). Vérifié par lecture directe : `addPayment` (lignes
      214-306) exécute `tx.payment.create`/`tx.invoice.update` (statut →
      PAID, `portalActivatedAt` posé si c'est la première activation)
      À L'INTÉRIEUR de `prisma.$transaction`, qui commite avant la ligne
      299. Ensuite, post-commit, `clientService.inviteClientUser(...)`
      est appelé dans un `try/catch` qui n'avale QUE les erreurs 409
      (« already invited ») — ligne 304 : `if (!(err instanceof HttpError
      && err.statusCode === 409)) throw err;` — toute autre erreur (panne
      SMTP réelle, timeout, erreur de template) est relancée et remonte
      jusqu'au middleware d'erreur, renvoyant un 4xx/5xx au manager qui
      vient d'enregistrer le paiement, MASQUANT le fait que
      `tx.payment.create` a réussi. Le chemin de rattrapage existe déjà
      (`POST /clients/:id/invite`, SEC-154, reissue un mot de passe
      temporaire vers le même compte) mais rien dans la réponse d'erreur
      ne l'indique — le manager n'a aucun signal que le paiement est
      bien enregistré et qu'il doit utiliser cette route précise pour
      finir le travail. Gravité `majeur`, pas `bloquant` : aucune perte
      de données (le paiement est bien en base), mais une vraie
      confusion opérationnelle à fort risque de double-saisie si le
      manager retente `addPayment` en pensant qu'il a échoué — protégé
      dans ce cas précis par la clé d'idempotence/fenêtre de 10s déjà en
      place, donc pas de double paiement réel, seulement de la friction
      et une inquiétude injustifiée.

      RÉSOLU (session en cours) : `addPayment` capture désormais toute
      erreur d'invite non-409 (`portalInviteFailed = true`, loggée via
      `logger.error`) au lieu de la relancer — le paiement est retourné
      comme un succès avec `portalInviteFailed: true` inclus dans la
      réponse (`invoice.controller.ts#addPayment` propage ce champ dans
      le corps JSON quand il est vrai). Les deux branches de
      déduplication (`idempotencyKey`/fenêtre 10s) portent désormais
      explicitement `justActivatedPortal: false` pour rester typées de
      façon cohérente avec le reste de la fonction. Preuve par test réel
      (`server/test/invoicePaymentInviteFailure.test.ts`, nouveau
      fichier) : appelle `invoiceService.addPayment` (code réel) avec
      `clientService.inviteClientUser` mocké (`mock.method`, le seul
      effet de bord externe simulé — pas le code testé lui-même) pour
      rejeter une erreur générique (style panne SMTP) — l'appel résout
      quand même avec succès, `portalInviteFailed: true`, et le paiement
      est bien persisté en base (`Payment` existe, `Invoice.status ===
      "PAID"`) ; un second cas confirme qu'un 409 reste avalé
      silencieusement (`portalInviteFailed: false`). Suite complète
      verte (499 tests), `npx tsc --noEmit` et
      `npm run lint --workspace=server` verts. Fix et test produits par
      mes propres appels d'outils dans cette session. Dérogation CI déjà
      accordée par l'utilisateur pour cette session : `resolu` malgré
      l'absence de run CI vert sur ce commit précis.

