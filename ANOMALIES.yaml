      ressource assignée directement hors pôle (couvre enfin la branche
      `assignedManagerId` que l'ancien mock ne testait jamais), MANAGER
      sans pôle (`userServiceId: null`) ne voit rien par défaut plutôt que
      tout (4 cas).
      `proposal.service.test.ts` — entièrement réécrit, appelle
      `proposalService.reject`/`send`/`update`/`acceptWithCascade` réels :
      reject transitionne un SENT vers REJECTED et refuse un DRAFT
      (`INVALID_PROPOSAL_TRANSITION`), send transitionne un DRAFT vers
      SENT, update reverte un SENT/VIEWED vers DRAFT sur un vrai changement
      de contenu (avec entrée d'historique réelle) mais pas sur un no-op ni
      un champ non-contenu (pdfUrl), acceptWithCascade rejette une version
      périmée (`PROPOSAL_VERSION_MISMATCH`, après un vrai bump de version)
      et réussit avec création de projet quand la version correspond
      (8 cas). Note : `acceptWithCascade` lui-même est déjà couvert par du
      code réel ailleurs (`portalActivationOnPayment.test.ts`,
      `projectCreateArchiveRestore.test.ts`,
      `proposalScopeAfterCreation.test.ts`), ce fichier ne duplique que le
      guard de version, jamais couvert par du vrai code avant cette
      session.

      DÉFAUT ANALOGUE REPÉRÉ HORS PÉRIMÈTRE, NON TRAITÉ ICI :
      `server/test/proposalAcceptCascade.test.ts` a exactement le même
      défaut (réimplémentation locale avec `companyId` fictif de
      `acceptWithCascade`) — hors du périmètre déclaré de SEC-100 (qui ne
      listait que 3 fichiers), non corrigé dans cette passe. À signaler
