  - id: SEC-202
    titre: "clientApprove (RG-013) échoue TOUJOURS avec DUPLICATE_ENTRY (P2002) dès qu'un projet a une facture d'acompte : createBalanceInvoiceTx reçoit le même proposalId que la facture DEPOSIT déjà créée pour cette proposition, or Invoice.proposalId est @unique globalement (une seule facture par proposition, tous types confondus) — la clôture cliente ne peut donc jamais aboutir sur un projet issu d'une proposition acceptée (le chemin nominal du module)"
    perimetre: "server/src/services/project.service.ts#clientApprove (appel à createBalanceInvoiceTx avec proposalId: preread.proposal.id) ; server/src/services/invoice.service.ts#createBalanceInvoiceTx (accepte et transmet ce proposalId à tx.invoice.create) ; server/prisma/schema.prisma#Invoice.proposalId (@unique, contrainte réelle en base)"
    regle_violee: "RG-013"
    classe: "contrainte_unique_violee_cascade_metier"
    gravite: bloquant
    statut: en_cours
    critere_de_resolution: >
      C'est résolu quand un scénario réel complet (proposition acceptée ->
      acompte payé -> projet en REVIEW -> clientApprove appelé par le
      client) aboutit à un projet `COMPLETED` avec une facture de solde
      (`BALANCE`) réellement créée en base, prouvé par un test qui appelle
      le vrai `projectService.clientApprove` (pas une réimplémentation
      miroir) sur un projet ayant une vraie facture `DEPOSIT` liée à la
      même proposition, et vérifie l'absence d'exception P2002 ainsi que
      la présence de la facture de solde créée.
    detecte_le: "2026-07-22"
    source: manuel
    confiance: certain
    note: >
      Découvert en écrivant le scénario e2e Playwright "approbation
      client" (demande explicite du porteur : installer Playwright et
      écrire les scénarios critiques login/cascade/approbation). Le clic
      réel sur "Confirmer et clôturer" dans un vrai navigateur, contre un
      vrai serveur, ne fermait jamais la boîte de dialogue. Reproduit
      directement via un appel API manuel identique
      (`POST /projects/:id/client-approve` avec un token client réel sur
      un projet réellement en REVIEW avec sa facture d'acompte réellement
      payée) : réponse `{"error":{"code":"DUPLICATE_ENTRY",...}}`. Cause
      isolée par lecture du code : `clientApprove` (project.service.ts
      ligne ~391) appelle `createBalanceInvoiceTx` en passant
      `proposalId: preread.proposal.id` — exactement le même proposalId
      que celui déjà utilisé par la facture `DEPOSIT` créée au moment de
      l'acceptation de la proposition (`createDepositInvoiceTx`,
      proposal.service.ts). Or `Invoice.proposalId` porte `@unique` en
      base (schema.prisma ligne 1299) : une proposition ne peut être liée
      qu'à UNE SEULE facture, tous types confondus — pas une par type
      (contrairement à `[projectId, invoiceType]` qui, lui, est
      légitimement scopé par type via un index partiel, cf. SEC-193).
      Aucune facture `BALANCE` n'existe dans les données de dev/seed
      (vérifié par requête directe), confirmant que ce chemin n'a jamais
      abouti avec succès jusqu'ici — bug de production réel sur le
      chemin nominal du module Projets (0 client actif au moment de la
      découverte, donc jamais remonté). Correctif écrit dans la même
      session (non encore committé au moment de la rédaction de cette
      entrée) : `clientApprove` ne transmet plus `proposalId` à
      `createBalanceInvoiceTx` (le paramètre reste optionnel côté
      fonction ; aucun autre code ne lit `Invoice.proposalId` sur une
      facture `BALANCE`, vérifié par grep). Statut `en_cours` tant que ce
      correctif n'est pas committé ET vert en CI sur ce commit exact.

  - id: SEC-203
