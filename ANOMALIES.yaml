  - id: SEC-155
    titre: "leadService.createLead (formulaire interne « Ajouter un lead ») n'a aucune vérification de doublon par email, contrairement au chemin du formulaire de contact public (contact.service.ts:27, find-or-create explicite) — deux managers créant un lead avec le même email produisent deux fiches distinctes sans erreur ni fusion"
    perimetre: "server/src/services/lead.service.ts, server/prisma/schema.prisma"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `leadService.createLead` vérifie l'existence d'un
      lead actif (non archivé) avec le même email avant insertion — soit en
      renvoyant une erreur 409 explicite au lieu de créer un doublon
      silencieux, soit en fusionnant/mettant à jour l'existant comme le
      fait déjà `contact.service.ts:27-37` pour le chemin public — au choix
      du porteur (comportement de fusion vs rejet explicite étant une
      décision produit). Vérifié par un test qui crée deux leads avec le
      même email via `leadService.createLead` contre une base réelle et
      confirme le comportement choisi (rejet ou fusion, jamais deux lignes
      distinctes silencieuses).
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Vérifié par lecture directe : schema.prisma:268 (`Lead.email
      String?`, indexé ligne 291 mais pas `@unique`) ; `createLead`
      (lead.service.ts:68-73) transmet `data` à `leadRepository.create`
      sans aucune recherche préalable par email — contrairement à
      `contact.service.ts:24-37` (chemin du formulaire de contact public),
      qui fait explicitement `tx.lead.findFirst({ where: { email:
      input.email } })` et met à jour l'existant plutôt que d'en créer un
      second, avec le commentaire « Lead.email is not a unique column, so
      upsert-by-email is not available. Emulate find-or-create ». La même
      protection n'a jamais été portée sur le chemin de création manuelle
      (back-office « Ajouter un lead »). Deux managers de pôles différents
      créant chacun un lead pour la même adresse email (prospect qui
      contacte l'agence par deux canaux distincts, ou double saisie)
      produisent deux fiches, gonflant artificiellement le volume
      d'opportunités et le nombre de leads comptés dans les métriques de
      pipeline (analytics.repository.ts, déjà vérifiées saines par
      ailleurs — recalculées depuis les données sources, donc ce défaut
      fausse la DONNÉE source, pas le calcul qui la lit).

      Écarté après vérification (rapport tiers, non enregistré comme
      anomalie séparée) : (a) `LEAD_NEXT_STATUSES`
      (lead.service.ts:27-34) autorise délibérément les sauts vers l'avant
      (`NEW → PROPOSAL/WON` directement) — le commentaire du code
      l'explicite déjà : « a lead can only move to an adjacent/forward
      stage or be marked LOST, never jump backward » — ce n'est pas un
      défaut de rigueur mais la règle métier documentée, reflet du Kanban
      (LeadsKanban.tsx). Le rapport tiers présentait cette règle comme un
      manque de rigueur alors qu'elle est intentionnelle et déjà
      documentée en commentaire. (b) la conversion ContactRequest→Lead ne
      "perd" aucun historique riche : `ContactRequest`
      (schema.prisma:665-684) est un modèle plat sans relation vers des
      activités, commentaires ou pièces jointes — il n'existe donc rien de
      plus à recopier que ce que `sourceContactId` (déjà `@unique` sur
      `Lead`, ligne 278) référence déjà intégralement. Prémisse du rapport
      tiers factuellement fausse pour ce dépôt. (c) le scoping MANAGER par
      `OR: [serviceId, assignedManagerId]` (lead.repository.ts:11-20)
      n'est pas une ambiguïté de règle — SEC-102 (résolu) a déjà changé ce
      comportement en règle testée et intentionnelle (un lead créé par un
      MANAGER hérite des deux champs par défaut) ; le rapport tiers
      demandait une clarification UI/produit sur une règle déjà correcte
      et déjà testée, pas un défaut de code — pas enregistré comme
      anomalie technique, suggestion UX à évaluer séparément si le porteur
      le souhaite.

      DÉCISION DU PORTEUR DU PROJET (AskUserQuestion, session du
      2026-07-20) : rejet explicite (409) plutôt que fusion — un manager
      qui saisit un lead manuellement a tapé une information spécifique ;
      la fusionner silencieusement dans le lead existant d'un autre
      pourrait écraser ou perdre ce qu'il a saisi.

      CORRECTIF ÉCRIT (pas résolu — non commité, pas de test dédié),
      session du 2026-07-20 : `leadRepository.findFirstByEmail(email)`
      ajouté (lead.repository.ts) — cherche un lead actif
      (`archivedAt: null`) avec le même email, un lead archivé (perdu/gagné)
      ne bloque pas une ressaisie légitime. `leadService.createLead` appelle
      cette recherche avant insertion quand `data.email` est fourni (un
      lead sans email n'est jamais vérifié — rien à dédupliquer) et lève
      `HttpError(409, ..., "LEAD_EMAIL_ALREADY_EXISTS", {leadId})` si un
      doublon actif existe, citant le nom du lead existant dans le
      message. `npx tsc --noEmit` propre, `npm run lint` 0 error/0
      warning, suite `test:unit` complète 453/453 verte après le
      changement (aucune régression). Critère de résolution formel exige
      aussi un test créant deux leads avec le même email et vérifiant le
      409 — non encore écrit, donc `en_cours` malgré le correctif
      fonctionnel complet.

      TEST ÉCRIT ET VÉRIFIÉ (session du 2026-07-20) :
      `server/test/leadDuplicateEmail.test.ts` (câblé dans
      `run-all.test.ts`), appelle réellement `leadService.createLead`
      contre une base migrée, 3 cas : (1) un second `createLead` avec le
      même email qu'un lead actif lève bien 409
      `LEAD_EMAIL_ALREADY_EXISTS`, et confirme qu'aucune deuxième ligne
      n'a été insérée (`prisma.lead.findMany` recompté après l'échec) ;
      (2) un lead archivé (`archivedAt` renseigné, statut `LOST`) ne
      bloque pas une ressaisie légitime du même email — 2 lignes
      distinctes attendues et confirmées ; (3) deux leads sans email ne
      sont jamais comparés entre eux (rien à dédupliquer). Suite complète
      après ajout : 475 tests, 475 pass, 0 fail. Toujours `en_cours` : le
      critère de résolution de CLAUDE.md exige un commit avec CI verte
      confirmée sur GitHub Actions, pas seulement un test local vert —
      voir SEC-010 pour l'état actuel de la CI (déclenchement manuel
      requis, non effectué à ce jour).

      CHANGEMENT CONCURRENT CONSTATÉ, non attribuable à cette session
      (session du 2026-07-20, en revérifiant après écriture du test) :
      pendant la rédaction de `leadDuplicateEmail.test.ts`,
      `lead.service.ts#createLead` et `entities.ts` ont été modifiés par
      un processus hors de cette session (aucun appel d'outil de ma part
      sur ces deux fichiers à ce moment) — `status` temporairement retiré
      de `CreateLeadDTO` (cassant le typecheck de `updateLead`, revenu
      depuis à son état d'origine) et `createLead` réécrit avec une
      implémentation transactionnelle : vérification par email dans un
      `prisma.$transaction`, plus un `catch` sur P2002 en filet. Mon
      propre appel à `leadRepository.findFirstByEmail` (hors transaction)
      coexistait alors en double avec cette nouvelle vérification interne
      à la transaction — retiré pour ne garder que la version
      transactionnelle, plus robuste sur la fenêtre de course entre deux
      créations concurrentes. `leadRepository.findFirstByEmail` reste
      défini (code mort, mais légitime et documenté — non supprimé).

      CONSTAT ADDITIONNEL sur cette version transactionnelle externe :
      le `catch` sur `Prisma.PrismaClientKnownRequestError` code P2002
      (lead.service.ts) est en réalité INATTEIGNABLE — vérifié par
      lecture directe de schema.prisma:268/291 : `Lead.email` est
      `String?` avec un simple `@@index([email])`, PAS de contrainte
      `@@unique`. Aucune insertion ne peut donc jamais lever P2002 sur ce
      champ ; le filet de sécurité pensé pour la fenêtre de course entre
      deux créations concurrentes (deux transactions lisant toutes deux
      "pas de doublon" avant qu'aucune n'ait commité) NE PROTÈGE PAS
      contre ce cas réel — même famille de piège que le code mort
      découvert pour SEC-149 (garde applicative sans contrainte DB
      derrière). Non enregistré comme anomalie séparée : la fenêtre de
      course elle-même n'a pas de preuve d'occurrence réelle (gravité
      théorique, à la différence de SEC-151 où un test a démontré la
      collision réelle), et ce n'est pas du code écrit par cette session
      — signalé ici pour traçabilité, à évaluer par le porteur s'il
      souhaite ajouter `@@unique` sur `Lead.email` (ce qui interdirait
      aussi plusieurs leads sans email simultanés si mal contraint — à
      restreindre à un index partiel `WHERE email IS NOT NULL` le cas
      échéant, décision de schéma hors périmètre de cette session).

      DÉCLARÉ `resolu` SANS confirmation CI (session du 2026-07-20) :
      dérogation explicite à la règle commit+CI de CLAUDE.md, sur
      instruction directe du porteur du projet (« Le ci n est pas
