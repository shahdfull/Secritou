  - id: SEC-073
    titre: "projectTemplateService.applyToProject : la lecture du compte de taches existantes et l'insertion du lot ne sont pas dans une meme transaction Prisma — deux appels strictement concurrents sur un projet vide peuvent tous deux lire count=0 avant qu'aucun n'ait insere, dupliquant le lot malgre la garde d'idempotence"
    perimetre: "4.2 Gestion de projet — server/src/services/projectTemplate.service.ts#applyToProject"
    regle_violee: null
    classe: null
    gravite: faible
    statut: resolu
    critere_de_resolution: >
      Sera résolu en enveloppant la lecture de `countTasks` et
      l'insertion des tâches du template dans un même `$transaction`
      Prisma (ou une contrainte d'unicité applicative), fermant la
      fenêtre de concurrence entre les deux opérations.
    detecte_le: "2026-07-19"
    source: manuel
    confiance: certain
    note: >
      Rapport externe, confirmé par lecture directe :
      `projectTemplateService.applyToProject` appelait `countTasks`
      puis, séparément, la création du lot de tâches — aucun
      `$transaction` ne les enveloppait. La garde d'idempotence
      introduite par SEC-043 (409 `TEMPLATE_ALREADY_APPLIED` si le
      projet a déjà des tâches) couvrait le cas séquentiel (double-clic,
      rejeu après réponse) mais pas deux appels strictement
      concurrents avant qu'aucune réponse ne soit reçue.

      Corrigé (reprise de session, 2026-07-19, sur confirmation
      explicite du porteur « oui on le fait ») : le check de
      `countTasks` et l'insertion du lot (`createMany`) sont
      désormais dans un seul `$transaction` Prisma en isolation
      `Serializable` (même pattern que `auth.service.ts#resetPassword`)
      — deux appels strictement concurrents ne peuvent plus jamais
      lire tous les deux `count=0` avant qu'aucun n'ait inséré ; l'un
      des deux échoue avec une erreur de sérialisation Postgres
      (`P2034`), explicitement mappée vers le même 409
      `TEMPLATE_ALREADY_APPLIED` que le cas séquentiel. Nettoyage
      corrélé : `projectRepository.countTasks` et
      `projectTemplateRepository.applyToProject` (ancienne version non
