  - id: SEC-050
    titre: "Le champ phone promis par le contrat auth-user (toAuthUser + AuthUser client) n'est JAMAIS selectionne par userPublicSelect : login/register/refresh renvoient toujours phone: undefined, quel que soit le telephone reellement stocke"
    perimetre: "4.11 Auth & comptes — server/src/repositories/auth.repository.ts, server/src/services/auth.service.ts, client/src/types/auth.ts"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand le champ `phone` du contrat auth-user est
      cohérent de bout en bout sur les 3 chemins (login, register/refresh,
      me) — vérifié par un test qui appelle réellement `authService.login`
      contre une base migrée et confirme que la réponse porte le téléphone
      réellement stocké (et jamais `passwordHash`).
    detecte_le: "2026-07-19"
    source: manuel
    confiance: certain
    note: >
      Découvert en retirant le `any` de `AuthRepository`
      (`db: ExtendedPrismaClient | any`) pendant le nettoyage SEC-049 :
      le typage strict a fait apparaître un vrai décalage que le `any`
      masquait, exactement le cas prévu par la règle SEC-049 (« un `any`
      qui masque un vrai défaut se remonte en anomalie, ne se répare pas
      en douce »).

      CONSTAT CONFIRMÉ PAR LECTURE DIRECTE : `auth.repository.ts#
      userPublicSelect` (`id, email, name, role, clientId,
      mustChangePassword`) N'inclut PAS `phone`. Or `auth.service.ts#
      toAuthUser` lit `user.phone` et le renvoie dans l'objet auth-user
      exposé au client par login/register/refresh, et le type client
      `AuthUser` (`client/src/types/auth.ts`) déclare `phone?: string |
      null`. Tous les chemins auth (`findUserByEmail`, `createUser`,
      l'`include.user` du refresh) passent par `userPublicSelect` — donc
      `phone` est TOUJOURS `undefined` dans la réponse auth, quel que
      soit le téléphone réellement stocké en base. Le contrat promet un
      champ que le serveur ne remplit jamais.

      CORRECTION DU CONSTAT (approfondissement avant décision) : le titre
      dit « toujours undefined » — INEXACT après vérification. Les 3
      chemins auth utilisaient TROIS selects différents : login/register
      (`findUserByEmail`/`createUser`, `userPublicSelect` SANS phone) et
      refresh (`include.user` SANS phone) renvoyaient phone absent, MAIS
      `GET /auth/me` (`findUserById`, `findUnique` SANS `select` → record
      COMPLET) renvoyait bien phone. Le vrai défaut était l'INCOHÉRENCE
      entre chemins, pas une absence totale — et `ClientProfilePage.tsx`
      lit réellement `user.phone` (store auth) pour pré-remplir son
      formulaire, donc l'exposer EST voulu.

      DÉCISION DU PORTEUR DU PROJET (AskUserQuestion, session du
      2026-07-19, après la correction du constat ci-dessus) : « Rendre
      phone cohérent = présent partout » — plutôt que le retirer du
      contrat (2e option, écartée car ClientProfilePage s'en sert).

      CORRECTIF ÉCRIT : `phone: true` ajouté à
      `auth.repository.ts#userPublicSelect`, alignant login/register/
      refresh sur `GET /auth/me` et sur le type client `AuthUser`. Cela a
      débloqué le retrait du dernier `any` de production
      (`AuthRepository#db` repassé à `ExtendedPrismaClient` seul, le
      `Pick<..., "phone">` d'`issueTokens`/`toAuthUser` étant désormais
      satisfait par le select). Test ajouté :
      `server/test/authPhoneRoundTrip.test.ts`, appelle réellement
      `authService.login`/`me` contre une base migrée (user créé avec un
      phone) et prouve que la réponse porte le phone stocké, jamais le
      `passwordHash`. 333/333 tests verts, typecheck + lint production
      propres. `resolu` SANS confirmation CI : CI désactivée sur
      `origin/main` (workflow_dispatch seul, session du 2026-07-17),
      dérogation « no make it resolu » déjà établie.
  - id: SEC-051
    titre: "Le formulaire questionnaire du portail client (QuestionnaireStep) envoyait les reponses dynamiques (companyName/colors/references/pages, etc.) au top-level du payload au lieu de les envelopper sous data, alors que le serveur ne persiste que serviceType/isDraft/data.data — toutes les reponses etaient silencieusement perdues"
    perimetre: "4.9 ClientOnboarding et sous-etapes — client/src/features/client-onboarding/ClientOnboardingPage.tsx, server/src/repositories/clientOnboarding.repository.ts"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand le formulaire questionnaire envoie ses réponses
      dynamiques imbriquées sous la clé `data` (`{ serviceType, data:
      fields, isDraft }`), correspondant exactement à ce que
      `clientOnboarding.repository.ts#updateQuestionnaire` persiste
      réellement — vérifié par un test qui rend le composant réel
      `QuestionnaireStep` et confirme que le payload de mutation contient
      `data` (jamais les champs au top-level).
    detecte_le: "2026-07-19"
    source: manuel
    confiance: certain
    note: >
      Découvert en typant `ClientOnboardingPage.tsx` pendant le
      nettoyage lint (SEC-049) : `QuestionnaireStep({ step: any,
      updateQuestionnaire: any, t: any })` masquait un vrai défaut de
      forme de payload que le typage a fait apparaître à la lecture du
      code (pas via une erreur TypeScript — le spread `...fields` dans
      un objet littéral passé à une fonction typée ne déclenche pas de
      vérification stricte des propriétés en excès).

      CONSTAT CONFIRMÉ PAR LECTURE DIRECTE (des deux côtés) :
      `handleSave` construisait `{ serviceType, ...fields, isDraft }` —
      `fields` étant un `Record<string, string>` des réponses saisies
      selon le `serviceType` choisi (`companyName`/`colors`/
      `references`/`pages` pour "website", équivalents pour "marketing"/
      "analytics"). Côté serveur,
      `clientOnboarding.repository.ts#updateQuestionnaire` construit
      `updateData = { serviceType: data.serviceType, isDraft:
      data.isDraft }` et n'ajoute `updateData.data` QUE si
      `data.data !== undefined` — un champ imbriqué `data` que le client
      n'envoyait JAMAIS. Confirmé par recherche exhaustive : aucune
      lecture de `questionnaire.data` nulle part côté client non plus
      (ni pour un pré-remplissage, ni pour un affichage). Un client
      remplissant le questionnaire voyait donc ses réponses acceptées
      sans erreur, mais silencieusement jetées — jamais sauvegardées,
      jamais réaffichées.

      DÉCISION DU PORTEUR DU PROJET (AskUserQuestion, session du
      2026-07-19, après description précise du défaut) : « Corriger
      maintenant : envelopper fields sous data (Recommandé) » — plutôt
      que documenter sans corriger, ou ignorer.

      CORRECTIF ÉCRIT : `handleSave` envoie désormais `{ serviceType,
      data: fields, isDraft }`. Aucun changement côté serveur (déjà
      correct). Pré-remplissage de `fields` depuis
      `questionnaire.data` au montage (pour reprendre un brouillon)
      volontairement PAS ajouté — fonctionnalité additionnelle
      distincte de ce correctif, hors périmètre (« réparer n'est pas
      développer »).

      TEST AJOUTÉ : `client/src/features/client-onboarding/
      ClientOnboardingPage.test.tsx` (nouveau fichier), rend le vrai
      composant `QuestionnaireStep` (exporté à cette occasion, était
      seulement local à son module) et vérifie sur 2 cas (soumission,
      brouillon) que le payload de mutation contient `data` et jamais
      les champs au top-level. 24/24 tests client verts, typecheck et
      build client propres. `resolu` déclaré SANS confirmation CI : CI
      désactivée sur `origin/main` (workflow_dispatch seul, session du
      2026-07-17), dérogation "no make it resolu" déjà établie.
