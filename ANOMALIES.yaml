  - id: SEC-055
    titre: "Aucun bouton Ajouter une tache contextualise sur l'onglet Taches de la fiche projet des qu'il contient deja une tache (le bouton template n'apparait qu'a l'etat vide) ; ProjectMeetingsTab n'a ni edition ni suppression de reunion, et sa liste n'est pas paginee"
    perimetre: "4.2 Gestion de projet — client/src/features/projects/ProjectDetailPage.tsx, client/src/features/projects/ProjectMeetingsTab.tsx, client/src/hooks/useTaskActions ts (openCreateDialogForProject), client/src/hooks/useProjectMeetings.ts, client/src/api/projectMeetings.api.ts, server/src/routes/project.routes.ts, server/src/controllers/projectMeeting.controller.ts, server/src/services/projectMeeting.service.ts, server/src/repositories/projectMeeting.repository.ts, server/src/validators/projectMeeting.validator.ts"
    regle_violee: null
    classe: null
    gravite: faible
    statut: resolu
    critere_de_resolution: >
      F5 sera résolu par l'ajout d'un bouton « + Nouvelle tâche »
      contextualisé dans l'onglet Tâches (pré-remplissant `projectId`),
      visible que le projet ait déjà des tâches ou non. F6 sera résolu
      par l'ajout d'une pagination/chargement progressif sur la liste
      des réunions, et d'une route de suppression (réservée à l'auteur
      ou à un ADMIN) — actuellement absente même côté serveur
      (confirmé : seuls GET/POST existent sur `/meetings`, aucun
      PUT/DELETE par réunion).
    detecte_le: "2026-07-19"
    source: manuel
    confiance: certain
    note: >
      Rapport du porteur du projet, casquette développeur full-stack
      (constats F5 et F6), regroupés ici car tous deux dans le
      périmètre `ProjectDetailPage.tsx`/module Project et tous deux
      des lacunes d'ergonomie/complétude fonctionnelle, pas des bugs.

      F5 confirmé par lecture directe : le bouton « Partir du template
      » n'apparaît que dans la branche `displayedTasks.length === 0`
      de `ProjectDetailPage.tsx` — aucun bouton d'ajout de tâche
      contextualisé une fois le projet doté d'au moins une tâche.
      Pour ajouter une tâche à un projet précis dans cet état, il faut
      passer par la page globale `/app/tasks` et choisir manuellement
      le bon projet dans le sélecteur (lui-même limité à 100 projets,
      voir SEC-053).

      F6 confirmé par lecture directe : `ProjectMeetingsTab.tsx` ne
      contient aucune fonction d'édition ni de suppression (recherche
      exhaustive de "delete"/"update"/"edit" : zéro occurrence), et
      `server/src/routes/project.routes.ts` ne déclare que
      `GET /:id/meetings` et `POST /:id/meetings` — aucune route
      `PUT`/`DELETE` par réunion n'existe même côté serveur. Sur un
      projet pluriannuel à cadence hebdomadaire, la liste (non paginée)
      peut représenter des centaines d'entrées chargées d'un coup.

      Non corrigés lors du traitement de F1 (décision du porteur alors :
      « F1 seul, urgent »). Repris ensuite sur décision explicite du
      porteur (portée « F5 et F6 », choisie plutôt que F5 seul malgré
      le coût plus élevé de F6 : nouvelle surface API serveur).

      F5 — correctif : `ProjectDetailPage.tsx` affiche désormais un
      bouton « Nouvelle tâche » (ADMIN/MANAGER, projet non archivé)
      dans la branche `displayedTasks.length > 0`, qui navigue vers
      `/app/tasks?projectId=<id>&openCreate=true`. `TasksPage.tsx` lit
      `openCreate=true` et appelle la nouvelle fonction
      `useTaskActions().openCreateDialogForProject(projectId)`
      (pré-remplit `createForm` avec le `projectId` puis ouvre le
      dialogue via `openCreateDialog`, déjà exposé par
      `useCrudDialogState` mais jusqu'ici non destructuré par
      `useTaskActions`), puis retire `openCreate` de l'URL pour ne pas
      rouvrir le dialogue à chaque re-render. Test réel ajouté
      (`useTaskActions.test.tsx`) : appelle la vraie fonction, vérifie
      `createDialogOpen === true` et `createForm.getValues("projectId")`.

      F6 — correctif serveur : nouvelles routes
      `PUT`/`DELETE /:id/meetings/:meetingId`
      (`project.routes.ts`), `projectMeetingService.update`/`.delete`
      avec autorisation explicite auteur-ou-ADMIN (404 si la réunion
      n'existe pas ou n'appartient pas au projet donné, 403
      `MEETING_NOT_YOURS` si l'acteur n'est ni l'auteur ni ADMIN — un
      MANAGER du même pôle qui n'a pas écrit la note ne peut pas la
      modifier/supprimer, `requirePermission("projects","update")`
      seul ne suffisait pas à cette distinction). `listByProject`
      accepte désormais `page`/`pageSize` optionnels (comptage Prisma
      réel, pas un slice en mémoire) ; omis, le comportement précédent
      (liste complète) est inchangé pour tout appelant qui ne les
      fournit pas. Côté client : `ProjectMeetingsTab.tsx` affiche
      boutons Modifier/Supprimer (masqués si l'utilisateur courant
      n'est ni l'auteur ni ADMIN — le serveur reste l'autorité réelle,
      ceci évite seulement d'proposer une action prévisible de refus),
      formulaire d'édition inline, `ConfirmDeleteDialog` réutilisé,
      pagination via `DataTablePagination` (page de 10). Tests réels
      ajoutés : `server/test/projectMeetingUpdateDelete.test.ts` (7 cas
      — auteur peut éditer/supprimer, un autre MANAGER refusé en 403
      MEETING_NOT_YOURS pour édition ET suppression avec vérification
      que la réunion n'a pas été altérée, ADMIN peut tout éditer/
      supprimer, 404 sur projectId non correspondant, pagination
      correcte et repli non paginé) ; `ProjectMeetingsTab.test.tsx`
      (3 cas — contrôles visibles pour l'auteur, masqués pour un tiers
      non-admin, clic Supprimer + confirmation appelle réellement
      `DELETE /projects/:id/meetings/:meetingId`).

      Effet de bord découvert et traité dans la même passe : le
      changement de forme de retour de `listByProject` (tableau brut →
      `{ data, total }`) cassait un test préexistant
      (`managerScopeIdorFixes.test.ts`, non écrit cette session) qui
      appelait `list.some(...)` directement sur l'ancien tableau —
      corrigé en `list.data.some(...)`/`adminList.data`/`adminList.total`,
      changement mécanique de forme, aucune hypothèse métier du test
      modifiée.

      Vérification complète : serveur `npx tsc --noEmit` (clean),
      `npm run lint` (0/0), `npx tsx --test test/run-all.test.ts`
      (344/344, 7 nouveaux + 1 test préexistant adapté à la nouvelle
      forme de retour) ; client `npx tsc --noEmit` (clean), `npm run
      lint` (12 warnings — exception SEC-049, stable), `npx vitest run`
      (43/43), `npm run build` (succès). Résolu SANS confirmation CI :
      workflow GitHub Actions sur `origin/main` en `workflow_dispatch`
      uniquement (déviation établie en session le 2026-07-17, citée à
      chaque clôture depuis).

