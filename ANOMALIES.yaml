      `INVALID_STATUS_TRANSITION`, tous deux 422, vérifiés dans
      project.service.ts:106,110). (5) `GET /projects` documentait un
      stub minimal `{id, name, description}` au lieu du vrai schema
      partagé `#/components/schemas/Project` déjà utilisé par 6 autres
      endpoints du même fichier — remplacé par le `$ref` existant ;
      dans le même mouvement, ce schema `Project` lui-même
      (server/src/swagger.ts) s'est révélé incomplet face au vrai
      `projectListSelect` (project.repository.ts:37-60, absent :
      clientId/serviceId/proposalId/budget/deadline/serviceType/
