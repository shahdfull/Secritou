      Conséquence : un projet déjà COMPLETED ne peut plus jamais être
      renommé/redécrit via ce formulaire.

      Corrigé (même session) : la garde de `updateProject` teste
      désormais `newStatus === "COMPLETED" && currentStatus !==
      "COMPLETED"` (une vraie transition), au lieu de
      `newStatus === "COMPLETED"` seul. Preuve par test réel :
      `projectCreateArchiveRestore.test.ts` (2 cas — un projet déjà
      COMPLETED peut être renommé sans erreur ; une vraie transition
      REVIEW→COMPLETED via ce chemin reste rejetée). Vérifié sans
      régression sur les 2 tests existants de
      `projectUpdateBlocksCompletion.test.ts` (les deux testent une
      vraie transition, jamais un no-op — non affectés). Vérification
      complète : `npx tsc --noEmit` (serveur, propre), `npx tsx --test
      test/run-all.test.ts` (391/391), `npm run lint` (serveur, 0
      warning). Résolu SANS confirmation CI : workflow GitHub Actions
      sur `origin/main` en `workflow_dispatch` uniquement (déviation
      établie en session le 2026-07-17, citée à chaque clôture
      depuis).

