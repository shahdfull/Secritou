      `COMPLETED` ; (2) pagination indépendante confirmée en parcourant
      chaque page une par une (`pageSize=1`) jusqu'à retrouver les 2
      projets attendus — preuve qu'aucun n'est silencieusement perdu au-delà
      de la première page.

      **Limite de vérification signalée explicitement** : aucun outil de
      navigateur disponible dans cet environnement pour cliquer réellement
      sur les sous-onglets et confirmer visuellement le rendu — vérification
