      courante). La pagination générique en bas de page est désormais
      masquée pour le rôle Freelancer (`!isFreelancer &&`), puisqu'elle ne
      s'applique qu'à la liste plate ADMIN/MANAGER.

      Nouveau test `server/test/projectStatusInFilter.test.ts` (câblé
      dans `test/run-all.test.ts`), appelle réellement
      `projectRepository.findAll` contre une base migrée, 2 cas : (1)
