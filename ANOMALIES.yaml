  - id: SEC-153
    titre: "notifyN8n (webhook.ts) : après échec des 2 tentatives, l'événement est définitivement perdu — seul un logger.warn trace l'abandon, aucune trace persistée ni rejouable (proposal.accepted, invoice.paid, document.contract_signed, etc.)"
    perimetre: "server/src/utils/webhook.ts"
    regle_violee: null
    classe: null
    gravite: mineur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un échec définitif de `notifyN8n` (après les 2
      tentatives) persiste une trace exploitable (ex. une ligne dans une
      table dédiée, ou au minimum un `Sentry.captureException`/compteur
      Prometheus au lieu du seul `logger.warn`), permettant de détecter et
      rejouer manuellement un événement métier externe silencieusement
      perdu (ex. l'agence ne reçoit jamais l'email « proposition acceptée »
      sans qu'aucun signal ne le révèle).
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
      Vérifié par lecture directe : webhook.ts:44-49 — après le 2e essai
      raté, `logger.warn({ err, event }, "[n8n] Webhook delivery failed,
      giving up")` puis `return` silencieux, aucune autre action. Appelé
      en fire-and-forget (`void notifyN8n(...)`, sans await, ex.
      proposal.service.ts:546) par la quasi-totalité des 25+ événements
      catalogués dans docs/n8n-events.md — un n8n indisponible pendant la
      fenêtre des 2 tentatives (10s max, `TIMEOUT_MS * MAX_ATTEMPTS`)
      perd l'événement sans qu'aucun humain ni système de monitoring ne
      soit informé, contrairement à `enqueueDocumentGeneration`
      (jobs/queues.ts:197-209) qui logue ET capture Sentry ET reste dans
      la queue BullMQ pour un retry piloté par le worker en cas d'échec
      d'ENFILEMENT — mais même ce dernier mécanisme ne couvre pas
      `notifyN8n`, qui n'est pas enfilé du tout, juste appelé
      directement. Distinct d'un constat vérifié et écarté cette session :
      la génération de documents (SEC absent car aucun défaut trouvé)
      dispose déjà d'un retry durable via BullMQ + jobId déterministe
