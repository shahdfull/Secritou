      ni `startDate` ni `dueDate` (les deux formulaires, création ET
      édition), vérifié par un test qui appelle réellement la mutation
      réelle (pas une réimplémentation) avec des dates vides et confirme
      un succès, pas un 422.
    detecte_le: "2026-07-20"
    source: audit_llm
    confiance: certain
    note: >
