  - id: SEC-110
    titre: "Protection anti-rejeu des callbacks n8n partielle : la signature HMAC est vérifiée mais n'embarque ni timestamp ni nonce contrôlé, et le garde Redis est fail-open si Redis est indisponible — une signature capturée reste rejouable"
    perimetre: "transverse — server/src/utils/webhook.ts, server/src/middlewares/verifyN8nWebhook.middleware.ts, endpoints PATCH /freelancer-applications/:id/ai-summary et PATCH /projects/:id/ai-specs"
    regle_violee: null
    classe: null
    gravite: majeur
    statut: resolu
    critere_de_resolution: >
      C'est résolu quand un callback n8n entrant (signature HMAC valide)
      dont le `timestamp` embarqué dans le corps signé dépasse une fenêtre
      de fraîcheur raisonnable (quelques minutes) est rejeté même si Redis
      est indisponible ou si la fenêtre de rejeu Redis n'a pas encore
      expiré — prouvé par un test qui appelle réellement
      `verifyN8nWebhook`/`verifyN8nSignature` avec un corps signé portant
      un timestamp périmé et vérifie le rejet, puis avec un timestamp
      récent et vérifie l'acceptation, sans dépendre de Redis pour ce
      verdict précis.
    detecte_le: "2026-07-20"
    source: manuel
    confiance: certain
    note: >
      Constat transmis directement par le porteur (liens de fichier/ligne),
      vérifié par lecture directe : `server/src/utils/webhook.ts:21`
      (`notifyN8n` inclut bien `sentAt` dans le corps SORTANT qu'il signe,
      mais ce champ n'est jamais relu/vérifié nulle part — il ne protège
      que les événements que Secritou émet, pas les callbacks qu'il reçoit
      en retour) ; `verifyN8nSignature` (ligne 53-60) ne vérifie que la
      signature, jamais une fraîcheur temporelle. `verifyN8nWebhook.middleware.ts`
      lignes 8-14 (commentaire du code lui-même, déjà honnête sur la
      limite : « the callback body has no timestamp/nonce field we control
      » et « Fails open … if Redis is unreachable/disabled: this is a
      defense-in-depth replay guard, not the primary auth control ») ;
      lignes 16-27 (`markSignatureSeen` retourne `true`— c'est-à-dire
      "signature jamais vue, autoriser" — si Redis est injoignable, ligne
      23-26 catch explicite) ; ligne 49 (le contrôle Redis est la SEULE
      barrière anti-rejeu, après la vérification HMAC qui elle-même
      n'exclut pas un rejeu d'une requête déjà traitée). Impact réel
      vérifié, PAS hypothétique : les deux endpoints protégés par ce
      middleware (`PATCH /freelancer-applications/:id/ai-summary` →
      `freelancerApplicationService.setAiSummary`, `PATCH
      /projects/:id/ai-specs` → `regenerateSpecsWithAiContent`/
      `regenerateRoadmapWithAiContent`) ne sont PAS idempotents pour le
      second : `projectSpecs.service.ts:27-44` crée un NOUVEAU document
      versionné à chaque appel (`version: previous.version + 1,
      parentId: previous.id`) — un rejeu produit une pollution cumulative
      réelle de versions de documents, pas un no-op. `docs/n8n-events.md`
      confirme que le `callbackUrl` sortant (`freelancerApplication.service.ts:91`,
      `project.service.ts:281`) ne porte aujourd'hui aucun identifiant de
      corrélation/nonce que n8n devrait relayer — le contrat actuel entre
      Secritou et le workflow n8n ne prévoit rien de ce côté, un changement
      de contrat (n8n doit ajouter un `timestamp` à son payload de retour
      avant de signer) est nécessaire, pas seulement un changement de code
      serveur. Signalé, non corrigé au moment de l'enregistrement (correctif
      demandé dans la même session, voir mise à jour ci-dessous si résolu).

      CORRECTIF ÉCRIT ET VÉRIFIÉ, session du 2026-07-20 : nouvelle fonction
      `verifyN8nTimestamp(rawBody, windowMs)` (`webhook.ts`) — parse le
      corps JSON, exige un champ `timestamp` numérique (epoch ms) dans la
      fenêtre `N8N_CALLBACK_FRESHNESS_WINDOW_MS` (5 minutes, symétrique :
      rejette aussi un timestamp dans le futur, contre une horloge n8n
      décalée ou un timestamp forgé) ; `verifyN8nWebhook.middleware.ts`
      appelle cette vérification juste après la signature HMAC et avant le
      contrôle Redis (401 `STALE_WEBHOOK` si absent/malformé/périmé) — donc
      un rejeu échoue même si Redis est totalement indisponible, sans
      changer le comportement fail-open de Redis lui-même (toujours une
      seconde barrière, pas la seule). Changement de CONTRAT documenté dans
      `docs/n8n-events.md` : tout workflow n8n rappelant un `callbackUrl`
      doit désormais inclure `timestamp` (epoch ms) dans le corps qu'il
      signe — un changement de contrat entre systèmes, pas seulement de
      code serveur, comme relevé dans la note initiale. Preuve : nouveau
      fichier `server/test/verifyN8nWebhook.test.ts` (5 cas, appelle le
      vrai `verifyN8nWebhook` avec une vraie signature HMAC calculée avec
      le secret réel de l'environnement) — un timestamp périmé (10 min)
      est rejeté malgré une signature valide (scénario de rejeu exact
      décrit par le constat), un timestamp absent est rejeté, un timestamp
      dans le futur est rejeté, un timestamp frais passe avec succès, une
      signature invalide reste rejetée indépendamment de la fraîcheur.
      Vérification complète serveur : `npx tsc --noEmit` (clean), `npm run
      lint` (0/0), `npx tsx --test test/run-all.test.ts` (399/399, stable
      sur 2 exécutions consécutives). Résolu SANS confirmation CI (workflow
      GitHub Actions sur `origin/main` en `workflow_dispatch` uniquement,
      déviation documentée depuis la session du 2026-07-17).

