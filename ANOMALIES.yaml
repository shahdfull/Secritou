    statut: resolu
    critere_de_resolution: >
      C'est résolu quand `priority` est un champ de tri accepté côté
      serveur (`SORTABLE_FIELDS` des tâches), de sorte que l'en-tête de
      tri « priority » déjà présent dans `TasksListView.tsx` (non-
      freelancer) fonctionne réellement au lieu de retomber
      silencieusement sur `createdAt` — vérifié par un test qui appelle
      réellement `taskService.getAllTasks` avec `orderBy=priority` et
      confirme l'ordre (URGENT avant LOW en `desc`).
    detecte_le: "2026-07-19"
    source: manuel
    confiance: certain
    note: >
      Rapport du porteur du projet, casquette backend/sécurité (constat
      B3), confirmé par lecture directe : `Task.priority`
      (`Priority @default(NORMAL)`, schema.prisma:594) est présent en
      Prisma, accepté par le schéma Zod partagé
      (`shared/src/schemas/task.schema.ts:28`) et renvoyé au client
      (`taskWithRelationsSelect`), MAIS n'apparaissait dans AUCUNE
      logique métier serveur : absent de `SORTABLE_FIELDS`
      (`task.repository.ts` = `["title","status","dueDate","createdAt"]`),
      aucune notification ni règle n'en dépendait (contrairement à
      `ServiceRequest.priority`, qui journalise ses changements).

      RÉSOLUTION (décision produit rendue le 2026-07-19, AskUserQuestion,
      après un premier enregistrement `ouvert`) : « Rendre "priority"
      triable (Recommandé) » — portée minimale. L'approfondissement a
      révélé que `TasksListView.tsx:138` rendait DÉJÀ un en-tête de tri
      `priority` cliquable pour les non-freelancers, mais que le serveur
      rejetait `priority` (absent de `SORTABLE_FIELDS`), si bien qu'un
      clic retombait silencieusement sur `createdAt` — une interaction
      morte, pas seulement une donnée inerte. `priority` ajouté à
      `SORTABLE_FIELDS` (`task.repository.ts`). L'enum `Priority` étant
      déclaré `LOW→NORMAL→HIGH→URGENT`, Postgres trie dans cet ordre :
      `orderDir "desc"` remonte URGENT. Le tri par DÉFAUT n'a PAS été
      changé (reste `createdAt`) — seule l'option de tri manquante est
      réparée. Options plus lourdes écartées par le porteur (tri par
      défaut par priorité ; alerte URGENT en retard).

      TEST AJOUTÉ : `server/test/taskPrioritySort.test.ts`, appelle
      réellement `taskService.getAllTasks` avec `orderBy=priority&
      orderDir=desc` contre une base migrée et confirme URGENT avant LOW.
