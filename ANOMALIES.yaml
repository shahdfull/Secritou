  - id: SEC-068
    titre: "createDocumentSchema (validateur POST /documents) n'a pas de champ title, alors que title est obligatoire (String, sans defaut) sur le modele Prisma Document — le middleware validate() retire silencieusement title du body avant le controleur, faisant echouer toute creation de document via cette route"
    perimetre: "4.2/4.4 — shared/src/schemas/document.schema.ts, server/src/validators/document.validator.ts, server/src/middlewares/validate.middleware.ts, server/src/controllers/document.controller.ts, client/src/features/documents/DocumentsPage.tsx, client/src/features/projects/ProjectDetailPage.tsx"
    regle_violee: null
    classe: null
    gravite: bloquant
    statut: resolu
    critere_de_resolution: >
      Sera résolu par l'ajout du champ `title` (requis, cohérent avec
      `Document.title` non nullable) à `documentBaseSchema`
      (`shared/src/schemas/document.schema.ts`), puis par un test réel
      appelant la vraie route HTTP `POST /documents` (pas seulement le
      service, qui ne passe jamais par le middleware `validate()`) —
      confirmant qu'un document est créé avec son `title` réellement
      persisté, pas silencieusement vidé par la validation.
    detecte_le: "2026-07-19"
    source: manuel
    confiance: certain
    note: >
      Découvert incidemment en travaillant sur SEC-063 (autoriser
      FREELANCER sur `POST /documents`) — enregistré immédiatement
      conformément à la règle CLAUDE.md « enregistrement immédiat de
      tout écart constaté hors d'un audit formel ».

      Confirmé de façon empirique (pas seulement par lecture) : un
      fichier de test temporaire (`test/_scratch_title_check.test.ts`,
      créé pour la vérification puis supprimé, jamais commité)
      important le vrai `createDocumentSchema`
      (`server/src/validators/document.validator.ts`) et lui
      soumettant `{ name: "x", title: "y", url: "...", type:
      "DELIVERABLE" }` retourne `{ name: "x", type: "DELIVERABLE",
      url: "...", tags: [], accessLevel: "CLIENT_ADMIN" }` — `title`
      absent du résultat. `shared/src/schemas/document.schema.ts#documentBaseSchema`
      ne déclare aucun champ `title` (confirmé par lecture directe),
      et Zod retire silencieusement toute clé non déclarée par défaut
      (`.parse`/`.safeParse` sans `.strict()`) — comportement Zod
      vérifié directement dans ce contexte, pas supposé.
      `validate.middleware.ts#validate` réassigne ensuite
      `req.body = parsed.body`, donc le contrôleur ne voit jamais le
      `title` envoyé par le client, alors que
      `documentService.create`/`documentRepository.create` exigent ce
      champ (`Document.title` : `String` sans `?` ni `@default` dans
      `schema.prisma`).

      Portée réelle confirmée : ce n'est pas spécifique à SEC-063/
      FREELANCER — recherche directe montre que le flux principal
      `DocumentsPage.tsx` (`client/src/features/documents/DocumentsPage.tsx:173`)
      envoie aussi `title: data.name`, donc TOUTE création de document
      via `POST /documents` (ADMIN/MANAGER inclus) est affectée, pas
      seulement le dépôt de livrable freelance. Recherche exhaustive :
      aucun test existant n'exerce la vraie route HTTP
      `POST /documents` (seul `test/userProfilePhone.http.test.ts`
      utilise `supertest`/`request(app)` dans tout le dépôt, sur un
      module différent) — les tests existants
      (`freelancerSeesOwnDeliverable.test.ts`) appellent
      `documentService.create` directement, contournant le middleware
      `validate()` où le bug se produit réellement, ce qui explique
      pourquoi ce défaut n'avait jamais été détecté.

      Gravité `bloquant` (pas seulement `majeur`) : ce défaut empêchait
      purement et simplement toute création de document via l'UI dès
      que la route HTTP réelle était exercée (confirmé ensuite par le
      test HTTP ajouté — voir plus bas).

      Reprise dans la même passe que SEC-063 sur décision explicite du
      porteur (« Corriger SEC-068 aussi, dans la même passe
      (Recommandé) » via AskUserQuestion) : sans ce correctif, celui de
      SEC-063 (autoriser FREELANCER) n'aurait jamais fonctionné
      réellement — un FREELANCER franchissant la nouvelle garde
      d'autorisation se serait quand même heurté à la perte silencieuse
      de `title`. Correctif : `title: z.string().min(1).max(255)`
      ajouté à `documentBaseSchema` (`shared/src/schemas/document.schema.ts`),
      requis (pas optionnel) — tous les appelants existants l'envoient
      déjà (`DocumentsPage.tsx`, `ProjectDetailPage.tsx` : `title:
      data.name` ou `title: deliverableName.trim()`), donc un futur
      appelant qui l'omettrait échouera avec un 400 explicite plutôt
      qu'une erreur Prisma opaque sur champ requis manquant.
      `updateDocumentSchema` (qui applique `.partial()` sur le même
      schéma de base) rend `title` de nouveau optionnel pour la mise à
      jour, sans changement nécessaire de ce côté.

      Test réel ajouté (partagé avec SEC-063) :
      `server/test/documentCreateHttp.test.ts`, 4 cas via `supertest`
      contre la vraie route HTTP `POST /documents` (`app.ts` → routes →
      `validate()` → contrôleur → service → repository → vraie base) —
      le premier cas (ADMIN) prouve spécifiquement que le `title`
      envoyé par le client survit à la validation et se retrouve
      persisté dans la réponse, ce que `freelancerSeesOwnDeliverable.test.ts`
      (appel direct au service, contournant `validate()`) n'aurait
      jamais pu détecter — exactement le écart méthodologique qui avait
      laissé ce défaut invisible jusqu'ici.

