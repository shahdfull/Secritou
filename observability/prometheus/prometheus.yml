global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: secritou
    environment: production

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: secritou-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["server:5000"]
        labels:
          service: secritou-api

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis
