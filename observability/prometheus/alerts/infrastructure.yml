groups:
  - name: infrastructure
    rules:
      - alert: HighMemoryUsage
        expr: |
          process_memory_rss_bytes / (1024 * 1024 * 1024) > 1
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "Mémoire RSS > 1 Go"
          description: "Le processus API consomme {{ $value | humanize }} Go de RAM."

      - alert: CriticalMemoryUsage
        expr: |
          process_memory_rss_bytes / (1024 * 1024 * 1024) > 1.5
        for: 3m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "Mémoire RSS critique (> 1.5 Go)"
          description: "Risque d'OOM imminent."

      - alert: HighCpuUsage
        expr: |
          process_cpu_usage_percent > 80
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "CPU Node.js > 80%"
          description: "Le processus API utilise {{ $value }}% CPU."

      - alert: CriticalCpuUsage
        expr: |
          process_cpu_usage_percent > 95
        for: 3m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "CPU Node.js critique (> 95%)"
          description: "Saturation CPU détectée."

      - alert: RedisDown
        expr: |
          redis_connected == 0
        for: 2m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "Redis déconnecté"
          description: "Le cache et les files BullMQ sont impactés."

      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / (1024 * 1024) > 512
        for: 10m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "Redis utilise > 512 Mo"
          description: "Mémoire Redis : {{ $value | humanize }} Mo."

      - alert: LowCacheHitRatio
        expr: |
          (
            rate(redis_cache_hits_total[10m])
            /
            (rate(redis_cache_hits_total[10m]) + rate(redis_cache_misses_total[10m]))
          ) < 0.5
          and
          (rate(redis_cache_hits_total[10m]) + rate(redis_cache_misses_total[10m])) > 0.1
        for: 15m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Taux de hit cache Redis < 50%"
          description: "Le cache est peu efficace, vérifier les TTL et clés."

  - name: bullmq
    rules:
      - alert: BullMQQueueBacklog
        expr: |
          bullmq_jobs_waiting > 100
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "File BullMQ {{ $labels.queue }} en surcharge"
          description: "{{ $value }} jobs en attente."

      - alert: BullMQCriticalBacklog
        expr: |
          bullmq_jobs_waiting > 500
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Backlog critique sur {{ $labels.queue }}"
          description: "{{ $value }} jobs en attente — traitement en retard."

      - alert: BullMQFailedJobs
        expr: |
          increase(bullmq_jobs_failed[15m]) > 10
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Jobs échoués sur {{ $labels.queue }}"
          description: "Plus de 10 échecs en 15 minutes."

      - alert: BullMQStalledJobs
        expr: |
          bullmq_jobs_active > 0 and bullmq_jobs_waiting > 50
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Jobs potentiellement bloqués sur {{ $labels.queue }}"
          description: "Jobs actifs avec backlog important — vérifier les workers."

      - alert: BullMQSlowJobs
        expr: |
          histogram_quantile(0.95,
            sum(rate(bullmq_job_duration_seconds_bucket[10m])) by (le, queue, job_name)
          ) > 60
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Jobs BullMQ lents (p95 > 60s)"
          description: "{{ $labels.job_name }} sur {{ $labels.queue }} est trop lent."

      - alert: ApiTargetDown
        expr: |
          up{job="secritou-api"} == 0
        for: 1m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "API Secritou injoignable"
          description: "Prometheus ne peut pas scraper l'API — service probablement down."
