groups:
  - name: api_performance
    rules:
      - alert: HighApiLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Latence API élevée (p95 > 500ms)"
          description: "La route {{ $labels.route }} a un p95 de {{ $value | humanizeDuration }} sur les 5 dernières minutes."

      - alert: CriticalApiLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route)
          ) > 2
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Latence API critique (p99 > 2s)"
          description: "La route {{ $labels.route }} dépasse 2s en p99."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_errors_total[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Taux d'erreurs HTTP > 5%"
          description: "{{ $value | humanizePercentage }} des requêtes échouent."

      - alert: HighServerErrorRate
        expr: |
          sum(rate(http_errors_total{error_type="server"}[5m])) > 0.1
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Erreurs serveur (5xx) en hausse"
          description: "Plus de 0.1 erreur/s de type serveur détectée."

  - name: database_performance
    rules:
      - alert: SlowPrismaQueries
        expr: |
          histogram_quantile(0.95,
            sum(rate(prisma_query_duration_seconds_bucket[5m])) by (le, model, operation)
          ) > 0.25
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Requêtes Prisma lentes (p95 > 250ms)"
          description: "{{ $labels.model }}.{{ $labels.operation }} est lent."

      - alert: PrismaQueryErrors
        expr: |
          sum(rate(prisma_queries_total{status="error"}[5m])) by (model, operation) > 0.05
        for: 3m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Erreurs Prisma détectées"
          description: "Erreurs sur {{ $labels.model }}.{{ $labels.operation }}."

      - alert: SlowSqlQueries
        expr: |
          histogram_quantile(0.95,
            sum(rate(sql_query_duration_seconds_bucket[5m])) by (le, operation)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Requêtes SQL brutes lentes (p95 > 500ms)"
          description: "Opération {{ $labels.operation }} dépasse le seuil."

  - name: application_errors
    rules:
      - alert: UnhandledApplicationErrors
        expr: |
          sum(rate(app_errors_total{type="unhandled"}[5m])) > 0.05
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Erreurs applicatives non gérées"
          description: "Des exceptions non catchées sont remontées."

      - alert: ValidationErrorSpike
        expr: |
          sum(rate(app_errors_total{type="validation"}[5m])) > 1
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Pic d'erreurs de validation"
          description: "Possible problème de contrat API ou client défectueux."
